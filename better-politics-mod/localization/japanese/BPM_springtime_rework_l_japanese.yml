 notification_bpm_1846_rabacja_galicyjska_name: "#v Krakòw Uprising and Rabacya Galicyjska!#!"
 notification_bpm_1846_rabacja_galicyjska_desc: "A peasant uprising in [SCOPE.sState('1846_state_with_rabacja').GetName] has begun, resulting in thousands of [GetPopType('aristocrats').GetName] murdered, bringing great fear to all European landowners."

 ig_peasant_interests: "Peasant Interests"
 ig_peasant_interests_desc: "A non-ideological group of complex interests composed of peasants, rural labourers and some rural artisans. They generally seek to establish anti-feudal reforms, whether through depriving the aristocracy of their privileges to property, land and the police, or through agrarian reform or other concessions. Emboldened by the revolutionary upheaval, they are quick to take justice into their own hands."

 ig_worker_interests: "Proletarian Interests"
 ig_worker_interests_desc: "A non-ideological interest group representing industrial, usually skillless, workers. They are commonly organized in local trade unions or are acting independently. Their goal is to improve their lot, wages, and working hours through strikes, when possible, and negotiations with employers. Being a group with modest expectations and needs, gaining their interest in grandeous politics will be hard."

