name: Deploy Trait Viewer to GitHub Pages

on:
  push:
    branches: [main, declarative-ideologies]
    paths:
      - "better-politics-mod/common/scripted_effects/bpm_aa_interest_group_traits.txt"
      - "support-scripts/trait_viewer/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate viewer
        run: python3 support-scripts/trait_viewer/parse_traits.py

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp support-scripts/trait_viewer/traits_viewer.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
