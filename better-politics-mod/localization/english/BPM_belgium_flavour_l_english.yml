 bpm_belgian_law_amendments.3.t: "Radical Electoral Tax Amendment"
 bpm_belgian_law_amendments.3.d: "After lengthy negotiations and arguments, amid a terrible atmosphere and the ever-growing threat of revolution, the amendment to the #gold Constitution#! and electoral law passed through the #yellow House of Representatives#! and the #yellow Senate#!.\n\nThis amendment modifies the constitutional minimum for the so-called electoral tax, which now stands at #yellow 10 florins#!.\n\nThis change is significant and controversial, introducing a completely new electorate into politics — farmers, craftsmen, wealthier workers, merchants, and small shopkeepers.\n\nAmendments changing who can be elected are already being drafted and debated."

 bpm_belgian_law_amendments.3.a: "A new era for Belgium opens before us!"

 the_following_requirements_are_optional: "The following requirements are purely #L #bold #green optional#!#!#!:"

 has_made_leuven_a_corporate_body: "Has passed the #bold #blue Law Conferring Legal Personality on the Catholic University of Louvain#!#!, making #gold C.U.L.#! a civil body though without the right to control property. (#L #bold Has passed [GetLawType('law_repeatable_religion_promote_state_religion').GetName] [concept_bpm_repeatable_law]#!#!)"

 has_banned_holding_public_office_and_be_a_rep: "Has passed the #bold #blue Law on Parliamentary Incompatibilities#!#!, banning all public officials from also being legislators. (#L #bold Has passed [GetLawType('law_repeatable_politics_anti_corruption_drive').GetName] [concept_bpm_repeatable_law]#!#!)"

 has_has_sucessfully_implemented_a_regulatory_bill: "Has pursued and passed the #bold #blue Law on the Policing of Workshops, Factories, and Plants and on Child Labor#!#!, enacting first regulations in Belgium. (#L #bold Has successfully reconsidered the draft bill and managed to pass it — effectively enacting [GetLawType('law_regulatory_bodies').GetName], [GetLawType('law_restricted_child_labor').GetName] and [GetLawType('law_token_time_regulations').GetName]#!#!)"

