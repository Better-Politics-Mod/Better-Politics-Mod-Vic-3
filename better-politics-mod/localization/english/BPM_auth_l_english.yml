 bpm_state_capacity_tooltip_causes: "Base $bpm_state_capacity$ is increased by loyal [GetInterestGroupVariant('ig_petty_bourgeoisie', GetPlayer).GetName], loyal [GetInterestGroupVariant('ig_armed_forces', GetPlayer).GetName] and loyal [Concept('concept_bpm_minister', 'Ministers')], as well as repressive [Concept('concept_law', 'Laws')]. It is decreased by [Concept('concept_radical', 'Radicals')], [Concept('concept_revolution', 'Revolutions')] and weak [Concept('concept_law', 'Laws')]."
 bpm_state_capacity_tooltip_effect_overview: "This affects the popularity of [Concept('concept_bpm_institutional_ig', 'Institutional')] vs [Concept('concept_bpm_ideological_ig', 'Ideological')] [Concept('concept_interest_group', 'Interest Groups')]:\n- Higher $bpm_state_capacity$ makes [Concept('concept_bpm_institutional_ig', 'Institutional Groups')] more popular.\n- Lower $bpm_state_capacity$ makes [Concept('concept_bpm_ideological_ig', 'Ideological Groups')] more popular."
 bpm_state_capacity_tooltip_effect_spec: "@warning! $bpm_state_capacity$ gives scaling bonuses and penalties:\n  Above #v 75%#! ([Concept('concept_bpm_politically_stagnant', 'Stable')]):\n    Everything is cool and chill!!\n  #v 50% - 75%#! ([Concept('concept_bpm_politically_dynamic', 'Strained')]):\n     No effect.!\n  #v 25% - 50%#! ([Concept('concept_bpm_politically_dynamic', 'Fragile')]):\n     No effect.\n  Below #v 25%#! ([Concept('concept_bpm_politically_unstable', 'Collapsed')]):\n    Everything collapses forever good luck lol ;)"

