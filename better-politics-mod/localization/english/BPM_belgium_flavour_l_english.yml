 concept_bpm_belgium_dominant: "Dominant Government"
 concept_bpm_belgium_dominant_desc: "A unilaterally dominant [concept_government] is one in which one side, whether it is #yellow Liberals#!/#yellow Left Unionists#! or #blue Catholics#!/#blue Right Unionists#!, has significantly more [Concept('concept_bpm_minister', 'Ministers')] than the other, without, however, having a government consisting solely of one group.\n\nSuch governments may encounter cynicism and hostility from both sides, where one side does not win enough and the other is overly disadvantaged."

 concept_bpm_belgium_homogenous: "Homogenous Government"
 concept_bpm_belgium_homogenous_desc: "A homogeneous [concept_government] is one in which all [Concept('concept_bpm_minister', 'Ministers')] belong to one side, whether they are #yellow Liberals#!/#yellow Left Unionists#! or #blue Catholics#!/#blue Right Unionists#!.\n\nHowever, such government may encounter problems in creating [Concept('concept_law', 'Laws')] and policies.\n\nThis is because such a government, representing only one side, will most likely seek to introduce changes that harm the other side, its interests, or ideas, even if these changes are minor and genuinely friendly. If such a government encounters a barrier that it cannot overcome, it will be forced to resign."

 concept_bpm_belgium_mixed: "Mixed Government"
 concept_bpm_belgium_mixed_desc: "A mixed [concept_government] is one in which the status quo is maintained in terms of the number of [Concept('concept_bpm_minister', 'Ministers')] between #yellow Liberals#!/#yellow Left Unionists#! and #blue Catholics#!/#blue Right Unionists#!.\n\nSuch a government may have a slight bias towards one side, but if this side begins to gain a significant advantage, the cabinet will be then called unilaterally [Concept('concept_bpm_belgium_dominant', 'Dominant')].\n\nSuch cabinet will encounter few problems in terms of [Concept('concept_law', 'Lawmaking')] and its actions, as long as the gap between the two sides does not become so great that a policy of compromise is no longer sustainable."

 je_bpm_unions_des_oppositions: "Unions des Oppositions"
 je_bpm_unions_des_oppositions_reason: "In 1828, two supposed opposites — #yellow Liberalism#! and #blue Catholicism#! — joined forces in an alliance called the Unions des Oppositions, in order to liberate Belgium from Dutch rule in 1830. In 1831, our Constitution was created, and from that moment on, the Unionists were engaged in building the state from scratch. However, Belgium is far from complete: administration, elections, education, the army, and finances require a great deal of attention, because they either do not exist or are incomplete, and organizing them will take time.\n\nCurrent #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_right_unionists_description_tooltip #blue Catholic#!/#blue Right Unionist#!#!#! ministers: [GetPlayer.MakeScope.ScriptValue('bpm_right_unionist_ig_government')|0]\nCurrent #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_left_unionists_description_tooltip #yellow Liberal#!/#yellow Left Unionist#!#!#! ministers: [GetPlayer.MakeScope.ScriptValue('bpm_left_unionist_ig_government')|0]\nCurrent status of the composition of the [concept_government]: [SCOPE.GetRootScope.GetCountry.GetCustom('je_bpm_belgium_current_government_type')]\n\nIn order to consolidate the [ROOT.GetCountry.GetAdjective] [Concept('concept_country', 'State')], you must introduce many #bold #blue Organic Laws#!#!, the concepts, drafts, and details of which cause great debate and arguments between the #yellow Left#! and #blue Right#! #gold Unionists#!. Depending on the speed of state consolidation, the laws enacted, and the reforms implemented, the @warning! #red #bold Discontent#!#! of the #yellow #bold Liberals#!#!/#yellow #bold Left Unionists#!#! will also grow, which will one day lead to the collapse of the entire #v Unions des Oppositions#!.\n\n#lore Our fellow citizens have invested us with complete social powers; they have consigned constituent power to us, they have charged us with the foundation of Belgian nationality; in short, they have entrusted the entire September Revolution to us.\n\n— Jean-Baptiste Nothomb, 1831#!"

 je_bpm_doctrinaires_description_tooltip: "doctrinaire liberals wip"
 je_bpm_catholics_description_tooltip: ""
 
 je_bpm_left_unionists_description_tooltip: "#yellow #bold Liberals#!#! as a whole are made out of a couple of [Concept('concept_interest_group', 'Interest Groups')], that is:\n  #v -#! [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_national_liberals',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant];\n\nThey can also be joined by:\n  #v -#! [GetInterestGroupVariant('ig_reactionaries',GetPlayer).GetNameWithCountryVariant] (#italic If Pierre-Théodore Verhaegen is alive#!)\n\nAs part of the #v Unions des Oppositions#!, they seek to introduce moderate reforms on which both sides of the political spectrum can agree, while ensuring that policies and laws remain strongly liberal in nature.\n\n#lore Belgian Liberals, composed mainly of Left Unionists, are a broad group with many representatives in parliament, mainly in the House of Representatives, who hold deeply liberal principles. They are generally divided on virtually every issue — from their stance on the Union, state intervention, centralization and municipal rights, to their approach to religion and the military.\n\nFor example, the @ig_liberals! #yellow Doctrinaires#! prefer protectionism and interventionism, while the @ig_national_liberals! #light_green Conservative Unionists#! want to ensure freedom of trade and enterprise. @intelligentsia! #brightyellow Provincial Liberals#! distrust any cooperation with #blue Catholics#!, while the rest have a relatively conciliatory attitude towards the political right.#!"
 je_bpm_right_unionists_description_tooltip: "#yellow #bold Catholics#!#! as a whole are made out of a couple of [Concept('concept_interest_group', 'Interest Groups')], that is:\n  #v -#! [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_market_liberals',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant];\n\nThat also includes the primarily grassroots [Concept('concept_interest_group', 'Interest Groups')] (who do #red #L NOT#!#! count as a part of any side), that being:\n  #v -#! [GetInterestGroupVariant('ig_christian_democrats',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant];\n  #v -#! [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetNameWithCountryVariant];\n\nAs part of the #v Unions des Oppositions#!, they seek to introduce moderate reforms on which both sides of the political spectrum can agree, while ensuring that policies and laws entrench their interests and ensure religious morality.\n\n#lore Belgian Catholics, composed mainly of Right Unionists, are a broad group with many representatives in parliament, mainly in the House of Representatives and the Senate, who hold deeply clerical-liberal, pro-King principles.\n\nThey are divided in many respects — @ig_conservatives! #blue Right Unionists#! hold a deep belief in Unionism despite frequent disputes with @ig_liberals! @ig_radicals! #yellow Liberals#!, while @rural_folk! @ig_christian_democrats! @ig_reactionaries! #purple ultramontane#! factions distrust Liberals; @ig_market_liberals! #green Catholic Liberals#! favor free trade and laissez-faire economics, while the vast majority of #blue Catholics#! prefer to maintain various tariffs on agricultural imports and certain raw goods.#!"

