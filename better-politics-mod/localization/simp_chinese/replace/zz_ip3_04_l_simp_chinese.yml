 peoples_springtime.10.f:0 ""I found in the capital a hundred thousand armed workmen formed into regiments, out of work, dying of hunger, but with their minds crammed with vain theories and visionary hopes. I saw society cut into two: those who possessed nothing, united in a common greed; those who possessed something, united in a common terror. There were no bonds, no sympathy between these two great sections; everywhere the idea of an inevitable and immediate struggle seemed at hand."\n\n—Alexis de Tocqueville, #italic The Recollections of Alexis de Tocqueville#!"
 peoples_springtime.71.f:0 ""There is nothing more fruitful in wonders than the art of being free; but there is nothing harder than apprenticeship in liberty."\n\n—Alexis de Tocqueville, #italic Democracy in America#!"
 national_awakening.4.f:0 ""I've ordered a copy of the #italic Principia#! in [SCOPE.sCulture('relevant_culture').GetNameNoFormatting], and one of my colleagues has requested a full Bible in the same. If we can have one work of merit translated per year, and each translation done by a student that goes on to teach others, we shall have a sizable corpus by the end of the century. Far more than that, if the suppliers recognize the demand."\n\n"An ambitious undertaking, indeed. Do you believe you could manage to change the department over?"\n\n"I dream of a future where our language is one that others desire to learn - where a Swede may request essays from a [SCOPE.sCulture('relevant_culture').GetNameNoFormatting] publisher. And, furthermore, I dream that one of my own students shall be the author of those essays.""
 metternich_memory_level_1:0 "a discredited font of reaction, whose vision would prove corrosive to all it touched."
 metternich_memory_level_6:0 "the worthy opponent of the progressive, an icon of a gallant aristocracy that may yet endure."
 subjecthood_events.1.f:0 "The people of the village had long been loyal subjects of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Certainly, there had been troubles - tax evasion, individual rebellions, the typical grumbling of disaffected peasants - but they had been loyal, in the end. And then the news from [ROOT.GetCountry.GetCapital.GetCityHubName] came, and a great feeling of unease accompanied it. The government would now issue its decrees in [SCOPE.sCulture('relevant_primary_culture').GetNameNoFormatting], a language few of them spoke and even fewer of them read. The [SCOPE.sCulture('relevant_minority_culture').GetNameNoFormatting] language would no longer be good enough. "Learn", it seemed to say. "Speak in our tongue, or say nothing at all"."
