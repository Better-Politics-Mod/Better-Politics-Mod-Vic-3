 je_march_to_radicalism: "The Spectre of Revolution"
 je_march_to_radicalism_status: "A powderkeg fills..."
 je_march_to_radicalism_awaiting_spark_status: "#pink Awaiting a revolutionary spark.#!"
 je_march_to_radicalism_powderkeg_explosion_status: "#bold #red The powderkeg is about to explode!#!#!"
 je_march_to_radicalism_the_echo_ripples: "#bold #red The echo ripples...#!#!"
 je_march_to_radicalism_reason: "The legacies of the French Revolution of the previous century that had rocked everyone in Europe live on and flourish underground, even after many years since its final defeat. Newly reborn ideologies and doctrines fueled by romantic ideals, whether of revolutionary @ig_radicals! @ig_socialists! #bold #pink Democrats#!#!, reformist @ig_liberals! @ig_national_liberals! @ig_market_liberals! #bold #yellow Liberals#!#!, or other @ig_conservatives! #bold #blue Moderates#!#!, as well as the cunning @ig_reactionaries! #bold #purple Reactionaries#!#!, unite or divide various bourgeois, proletarians, artisans, and peasants to each side or cause. The children of the new realities will strive to overthrow or protect the rotten systems of old.\n\nThis is a #v [Concept('concept_bpm_global_je', 'Global Journal Entry')]#!. It #P gains progress#! every time a country in Europe:\n@arrow_up! Researches #YB [GetTechnology('egalitarianism').GetName]#!, #YB [GetTechnology('nationalism').GetName]#!, #YB [GetTechnology('dialectics').GetName]#!, #YB [GetTechnology('organized_sports').GetName]#! or #YB [GetTechnology('labor_movement').GetName]#!;\n@arrow_up! Experiences a historical event or uprising;\n\n#P Monthly progress#! is added for:\n@arrow_up! [concept_clout] of [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant] and [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] in [Concept('concept_country', 'Countries')] with [GetLawType('law_autocracy').GetName] or [GetLawType('law_landed_voting').GetName];\n@arrow_up! [concept_political_movement_support] #v x#! [concept_activism] of #bold Liberal#!, #bold Liberal-Nationalist#! and #bold Radical#! [Concept('concept_political_movement', 'Movements')];\n@arrow_up! @academics! #gold #bold Liberal Consciousness#!#! of countries in Europe;\n@arrow_up! Amount of @population_radical! [Concept('concept_radical', 'Radicals')] in [SCOPE.sCountry('BPM_france_scope').GetName];\n\nAdditionally, some #P half-yearly progress#! is added for:\n@arrow_up! Each [Concept('concept_bpm_ig_is_radical_left', 'Radical Left')] [concept_agitator] in a European [Concept('concept_great_power', 'Great Power')];\n@arrow_up! Popularity of [concept_bpm_ig_is_moderate_liberal] [Concept('concept_politician', 'Politicians')] in [Concept('concept_country', 'Countries')] with [GetLawType('law_censorship').GetName];\n@arrow_up! Population below [Concept('concept_expected_sol','Minimum SoL')] in each European [Concept('concept_great_power', 'Great')] and [Concept('concept_major_power', 'Major Power')];\n\nAs this [concept_journal_entry] progresses, various reformist and radical [Concept('concept_interest_group', 'Interest Groups')] will see a rise in popularity, and countries across Europe will see mass radicalization of their population.\n\nUpon completion, Europe will face a wave of revolutionary movements, events and uprisings in pursuit of various liberal ideals, constitutionalism, freedom, nationalism, economical concessions or reforms, the masses enforcing their wills on the cowering elites. In countries that have yet to research #YB [GetTechnology('egalitarianism').GetName]#!, this technology will also gradually gain research progress.\n\n#lore Therefore, my brothers, in the name of your duty, and for the sake of your interest, never forget that your first duties — duties, without fulfilling which you cannot rightly fulfill those towards your country and family — are those towards Humanity.\n\n— Giuseppe Mazzini, 1858#!" # #lore The cause of freedom is identified with the destinies of humanity, and in whatever part of the world it gains ground by and by, it will be a common gain to all those who desire it.\n\n— Lajos Kossuth, 1849#! # And so long as you are ready to die for Humanity, the life of your country will be immortal. # The idea of the liberation and redemption of the peoples... The goal of uniting the West—whether already free or on the path to freedom—is the cause to which I lend my voice. Once this goal is achieved, freedom and peace in Europe will be secured; once this goal is achieved, the greatest and most enlightened segment of the European family of nations will be united in an invincible alliance.\n\n Robert Blum, July 22nd 1848
 bpm_peoples_springtime_spark_happened: "A #v Revolutionary Spark#! has burst in Europe."
 bpm_activate_je_springtimes: "Activate #v Springtime of the Peoples#!."

