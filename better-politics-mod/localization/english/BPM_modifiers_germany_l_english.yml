l_english:

# Schutzzoll
schutzzoll.1.t: "A Marriage of Iron and Rye"
schutzzoll.1.d: "The troubling state the Gründerkrach has left our economy in has led to an unorthodox alliance - that of Industrialists and Agrarian Junkers. Representatives have come together in respective conventions to draft a plan for the introduction of $CONCEPT_IMPORT$ [Concept('concept_tariffs','$concept_tariffs$')] on various industrial and agrarian goods. While the [GetInterestGroupVariant('ig_national_liberals',GetPlayer).GetNameWithCountryVariant] support the prospect of tariffs, the [GetInterestGroupVariant('ig_market_liberals',GetPlayer).GetNameWithCountryVariant] are in staunch opposition to them, which has caused a split in the Nationalliberale Partei."
schutzzoll.1.f: ""
schutzzoll.1.a: "Interesting"
