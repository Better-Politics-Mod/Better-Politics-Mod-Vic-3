 bpm_springtime_of_the_peoples.100.t: "Introduction of Jury Trials"
 bpm_springtime_of_the_peoples.100.d: "Today, an establishment of a #yellow jury trial system#! for [SCOPE.GetRootScope.GetCountry.GetCustom('bpm_check_jury_trials_clout')] was enacted, with a reform of the #yellow Code of Criminal Procedure#!.\n\nIt also establishes #yellow public#! and #yellow oral proceedings#!, the organization of jury trials and judges in criminal cases, and specific provisions regarding its operation.\n\nThis [concept_law] will subsequently be incorporated into the [Concept('concept_bpm_constitutional_level', 'Constitution')]."
 bpm_springtime_jury_press_offenses: "press and some criminal offenses"
 bpm_springtime_jury_criminal_offenses: "serious criminal cases, and press and political offenses"
 bpm_springtime_of_the_peoples.100.f: "CHAPTER II\nOn Judicial Proceedings\n\n§ 17. Offenses against the press shall be tried publicly by a jury. The Ministry is authorized to establish jury courts by decree, strictly in accordance with the principles set forth in the previous Diet bill on criminal procedure.\n\nIt is noted regarding Section 39 that an annual income of 200 forints is required for eligibility to serve on a jury; and regarding Chapter VIII, that the authority of the Supreme Court is temporarily vested in a seven-member panel.\n\n— Act XVIII #bold Press Act#!, 1848"
 bpm_springtime_of_the_peoples.100.a: "Now the judicial system will truly be fair!"

 bpm_has_not_introduced_jury_trials: "Has #Red #bold not#!#! introduced #yellow Jury Courts#! already"

 je_bpm_implement_jury_trials_name: "#bold #blue Implement Jury Courts#!#!" # [SCOPE.GetRootScope.GetCountry.GetCustom('bpm_check_jury_trials_completion')]
 je_bpm_reform_jury_trial: "Implement Jury Courts"
 je_bpm_reforms_completed: "#bold #green Completed#!#!"
 je_bpm_implement_jury_trials_desc: "Jury trials are one of the reforms strongly desired by many [Concept('concept_bpm_ig_is_liberal', 'Liberal')] groups within our country, as they educate citizens and involve them in the judicial process. For a professional judge is appointed by the [SCOPE.sCountry('je_bpm_our_ruler_king_president').GetRuler.GetPrimaryRoleTitle], to whom he is loyal, thereby granting the sovereign significant judicial powers and prerogatives.\n\nA jury can ensure a fair and just trial and verdict for the defendant, countering absolute power; and uphold the freedoms and rights of citizens, whether of the press, personal, or otherwise.\n\nAnother important matter is the principles of public and oral proceedings, ensuring the fair and transparent functioning of the courts. We must therefore carry out a reform of the judiciary and the criminal code."

 bpm_je_government_is_reformist_liberal_moderate: "Current [concept_government] and [concept_bpm_cabinet] is @ig_liberals! @ig_national_liberals! @ig_market_liberals! #YB Liberal#! (also includes @ig_conservatives! #BB Moderate#! [Concept('concept_bpm_minister', 'Ministers')])"

 bpm_je_government_is_radical_democratic: "Current [concept_government] and [concept_bpm_cabinet] is @ig_radicals! @ig_socialists! #bold #pink Democratic#!#! (also includes [Concept('concept_bpm_minister', 'Ministers')] that are [GetInterestGroupVariant('ig_agrarian_populists',GetPlayer).GetName] and [Concept('concept_bpm_ig_is_republican', 'Republican')] [GetInterestGroupVariant('ig_liberals',GetPlayer).GetName])"

 

 bpm_springtime_of_the_peoples.101.t: "Academic Freedom"
 bpm_springtime_of_the_peoples.101.d: "Free, unrestricted education is the true foundation of modern thought, and that, in turn, of a liberal nation.\n\nFor an oak to grow strong, it must be planted in rich soil, so that its roots and crown may spread wide and grow tall.\n\nWe must not, therefore, postpone this most fundamental groundwork until a later time! Let us not delay in nourishing our nation, and let us set free the word and thought in our university halls!\n\nAway with the ecclesiastical-authoritarian weeds poisoning the space of our education; long live freedom!"

 bpm_springtime_of_the_peoples.101.a: "Freedom to think!"

 bpm_springtime_of_the_peoples.102.t: "Step by Step" # thank u habuba!!!!!
 bpm_springtime_of_the_peoples.102.d: "The medieval snow is slowly melting, and from beneath it emerge the future blossoms of our nation. Universities, once shackled by the chains of powerful [Concept('concept_institution', 'Institutions')], are now finally beginning to teach with sincerity and without restrictions. [GetPopType('academics').GetName] alike are rejoicing at the increasingly warmer days on our campuses.\n\nThe withered weeds of the aristocracy had overgrown this glorious institution of education, but brave [GetInterestGroupVariant('ig_liberals',GetPlayer).GetName] have cut them down almost to the last with the shears of legislation, allowing everyone, regardless of faith, background or beliefs, to develop and broaden their knowledge.\n\nIn the other corner of the academic garden, however, the marble statues of teachers, hitherto confined, now inspire passion and duly assist their students.\n\nWhen summer comes, we will all be able to taste the fruits of our labor together!" # The new environment allows them to exchange ideas freely. It is no longer doctrines that are taught, but discoveries. Not herbal superstitions, but true botany. Education has ceased to be the privilege of the highest classes and the most devout, and has become the daily bread of the people.
 
 bpm_springtime_of_the_peoples.102.a: "Freedom to think!"

 bpm_springtime_of_the_peoples.101.f: "Before taking our seats in this chamber, we championed the cause of free education with our pens; we have defended it with our voices ever since we have taken our seats here. We wish, however, to hasten to declare that this theory must be applied with great caution and moderation, and that it is necessary to proceed step by step in order to accustom the country to this new system.\n\n— Camillo Benso di Cavour, November 21st 1851"

 je_bpm_ensure_freedom_of_education_name: "#bold #blue Ensure Academic Freedom#!#!"
 je_bpm_ensure_freedom_of_education_desc: "In our homeland, there is no guarantee of academic freedom of any kind, whether it be the freedom to learn or to teach.\n\nOne may be expelled from a [GetBuildingType('building_university').GetName] or stripped of their teaching privileges — or even arrested and convicted — simply because of their faith or beliefs. Most of the education system belongs to hostile [Concept('concept_institution', 'Institutions')] or the [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant], which maintain a monopoly or strictly and harshly control both the educational system and the students — whether in terms of behavior or social background.\n\nAt the same time, they suppress unwelcome ideas and destroy unwanted educational [Concept('concept_institution', 'Institutions')], which deeply affects the quality of education and the awareness of the population.\n\nA modern state guarantees personal rights and freedoms, which must therefore extend to academic freedoms, even if we move toward them step by step, degree by degree."

