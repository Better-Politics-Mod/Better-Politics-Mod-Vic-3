 bpm_springtime_of_the_peoples.22.t: "Capital Retaken!"
 bpm_springtime_of_the_peoples.22.d_sicily: "After several days of fighting for our capital of #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#!, which was under the control of the #springtime Revolution#!, we managed to recapture it.\n\nBefore all this, the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] and militant MPs demanded that the [concept_army] be sent north to support the #bold #green Italian#!#! #springtime Revolutionaries#! and that the parliament undergo constitutional reform to allow it to control foreign affairs.\n\n[SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('our_beloved_ruler').GetFirstName] responded by sending troops to [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName] to intimidate them, which met with a brutal response from the [Concept('concept_capital_state', 'Sapital')]’s residents, who built barricades and began street fighting with the [concept_army].\n\nAfter three days of bombardment, and nearly a #red thousand dead#!, the entire city was brought under control. Many [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] fled to [SCOPE.sState('1848_calabarian_insurrection_source').GetName], where they organized a new, revolutionary government together with the locals — a government we must destroy." 
 bpm_springtime_of_the_peoples.22.d_europe: "After several days of fighting for our capital of #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#!, which was under the control of the #springtime Revolution#!, we managed to recapture it.\n\nBefore all this, the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] and militant MPs demanded that the army support the nearby #springtime Revolutionaries#! and that the parliament undergo constitutional reform to allow it to control foreign affairs.\n\n[SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('our_beloved_ruler').GetFullName] responded by sending troops to [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName] to intimidate them, which met with a brutal response from the [Concept('concept_capital_state', 'Sapital')]’s residents, who built barricades and began street fighting with the [concept_army]. After three days of bombardment, and nearly a #red thousand dead#!, the entire city was brought under control. Many [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] trying to continue their armed resistance, but we are slowly managing to crush them."
 bpm_springtime_of_the_peoples.22.f: "‘Death to the royalists!’\n\n— Slogan of Calabrian Peasant Revolutionaries, May-June 1848"
 bpm_springtime_of_the_peoples.22.a: "Just as it should be!"

 je_bpm_attempt_self_coup_button_name: "Attempt Self-Coup"
 je_bpm_attempt_self_coup_button_desc: "The wrath of the #springtime Revolution#! still haunts Europe, manifesting itself in various forms, while destroying what is eternal, what is precious, and what is natural.\n\nNow that its most zelous believers, the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant], possess personal freedoms such as freedom of speech, of the press, and of assembly — and sometimes even a local or national militia ([GetLawType('law_national_guard').GetName]) — they can agitate, exploit, and destroy whatever they please; and we, the faithful and honest people, must watch this unfold, powerless or afraid to do anything.\n\nWe cannot allow them to continue destroying the country, especially when [concept_bpm_springtime_revolutionary_disorder_events] reigns in every corner of our land, where everyone, driven by greed and hatred, force concessions and ‘justice’, steal what is not theirs, break the [concept_law], and even kill their fellows."

 

