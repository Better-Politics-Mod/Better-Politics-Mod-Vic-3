 ############################################ BELGIAN INQUIRY ON CHILD LABOR AND POLICE OF WORKSHOPS

 je_bpm_establish_a_comission_of_inquiry_name: "Investigate the Industry"
 je_bpm_establish_a_comission_of_inquiry_desc: "The work of a laborer is brutal and sad. Everyone knows this, regardless of how close they are to the idea of work itself. However, no one truly knows the full truth about the working conditions of children, ordinary workers, and those with more stable jobs.\n\nThe topic of the lives of working people is becoming increasingly popular among the propertied, academic institutions, and the general public. In addition, issues related to hygiene, poverty, and overwork among these people are beginning to attract the specific interest of the government, especially since the #bold #blue Organic Law on Primary Education#!#! was introduced.\n\n#yellow Édouard Ducpétiaux#! has been actively involved in improving the situation of the proletariat for a long time, so he, along with the well-known [GetIdeology('ideology_protectionist').GetName] #yellow Auguste Visschers#!, and several other equally worthy specialists, should be appointed as members of a commission. Its purpose shall be investigating the living conditions of working children, workers, workplaces, and much more."

 bpm_belgian_law_events.8.t: "Establishment of the Comission of Inquiry into Child Labor and the Police of Workshops"
 bpm_belgian_law_events.8.d: "On this day, through a royal decree, due to the initiative of the #yellow Minister of the Interior#!, a comission has been established called ‘#L Enquête sur le travail des enfants et la police des ateliers#!’.\n\nWith [SCOPE.sCharacter('bpm_member_of_the_inquiry').GetFullName] as one of its members, the goal of it is to investigate how many children are employed, the duration of work, on nightshifts, on Sunday rest, and on the advisability of regulations, eventually publishing its conclusions and findings.\n\nFactory and workshop owners, chambers of commerce, mining engineers, doctors, specialists and alike are to be consoluted and asked for opinions."
 bpm_belgian_law_events.8.f: "A law on child labor is a law that massively removes the natural and legitimate guardianship of their children from fathers in the working classes; it is a law that declares them both unworthy and incapable of properly exercising this guardianship, it is a law that proclaims that within the working classes, fathers are heartless and mothers are merciles.\n\n— Walthère Frère-Orban, date unknown"
 bpm_belgian_law_events.8.a: "We'll see what will they find."

 bpm_belgian_labor_events.1.t: "The Comission's Conluded Survey"
 bpm_belgian_labor_events.1.d: "Today, after almost five years, the commission, with its well-known member [SCOPE.sCharacter('bpm_member_of_the_inquiry').GetFullName], announced its findings and information on #yellow child labor#!, #yellow workplace conditions#!, #yellow working hours#!, and many other issues affecting the life and work of the average worker.\n\nThe results are appalling: 1/4 of workers are children who usually work 12 hours a day for very low wages, receive little education, and are often exploited.\n\nA bill is being drafted that seeks to establish mandatory Sunday rest for children, severe restrictions on child labor, a 12-hour workday for all, and the introduction of numerous labor inspections."

 bpm_belgian_labor_events.1.f: "This factory is detestable; the children work in a poor shed, cold, damp, dirty and open to the wind, because the windows opposite which these unfortunate little creatures perform their hard work are conspicuous for the absence of a good number of panes.\n\n— Central Public Health Council of Brussels during a visit to a chemical match factory, 1843"
 bpm_belgian_labor_events.1.a: "We shall submit the draft bill to the opinion of the chambers of commerce."

 bpm_belgian_labor_events.2.t: "Responses from the Chambers of Commerce"
 bpm_belgian_labor_events.2.d: "The inquiry conducted by the [concept_government] commission was rejected by a significant majority of #yellow chambers of commerce#! and #yellow competent bodies#!.\n\nMost private entrepreneurs criticized the bill on economic grounds: children ensure competitiveness and economic benefits, which could be seriously threatened if the regulations were implemented; others criticized the bill for being too general and harsh on a developing industry."
 bpm_belgian_labor_events.2.f: "In this position created by new inventions, wanting to remove children from factory exploitation means drying up the fertile source of work for everyone, placing us powerless to withstand the struggle and antagonism of similar foreign production.\n\n— Chamber of Commerce of Liège, 1849"
 bpm_belgian_labor_events.2.a: "No point in dwelling on this any more. (Historical)"
 bpm_belgian_labor_events.2.b: "God, please help these poor souls..."

 this_draft_bill_will_not_be_touched_any_further: "@information! This #gold draft bill#! will be abandoned and not pursued any further."
 this_bill_will_brought_back_and_amended_tt: "@information! This #gold draft bill#! will be returned to the #gold Ministry of the Interior#! for reconsideration."
 this_bill_oponents_tt: "@warning! #red The reformed bill might spark outrage amongst its greatest opponents!#!"

 bpm_belgian_labor_events.3.t: "New Modest Draft Bill"
 bpm_belgian_labor_events.3.d: "The draft bill, which was met with disapproval from, among others, the Chamber of Commerce of Liège, underwent extensive analysis and amendments after returning to the #gold Ministry of the Interior#!.\n\nThe new, more modest, draft bill now proposes to limit child labor in mines and specific small workshops, limits working hours for men in specific establishments, establishes labor inspections, and introduces a number of other changes, many of them with a religious flavor.\n\nThe draft is now broad in scope and sets out specific solutions and actions by the state regarding workers’ labor.\n\nThe bill was then presented to the Prime Minister, and after a discussion, it was approved by the [concept_government]. The bill will be then sent to the #yellow House of Representatives#!."
 bpm_belgian_labor_events.3.f: "The cause of the worker's misconduct comes from the abandonment in which he is often left, from his lack of education and from the bad examples he sometimes has before his eyes.\n\n— Report of the Chamber of Commerce of Charleroi, 1843"

 bpm_belgian_labor_events.3.a: "It's always something..."
 
 bpm_you_must_now_pass_regulatory_bodies_to_implement_this_bill: "To pass #bold #blue Law on the Policing of Workshops, Factories, and Plants and on Child Labor#!#! you must enact [GetLawType('law_regulatory_bodies').GetName], which will also gain the #bold Modest Regulatory Measures#! [concept_amendment]. If you succeded, [GetLawType('law_restricted_child_labor').GetName] and [GetLawType('law_token_time_regulations').GetName] will be atuomatically passed."

 bpm_you_will_receive_events_of_support: "@information! You will then receive events of support, where various groups will speak in favor of the [concept_law]"

 this_law_automatically_passed_if_you_pass_bill_tt: "This [concept_law] will be automatically passed if you #green #L succeded#!#! in passing [GetLawType('law_regulatory_bodies').GetName] through the #gold Investigate the Industry#! button-story. (#italic This requirements will automatically dissapear with the #bold $je_bpm_unions_des_oppositions$#! [concept_journal_entry]#!)"

 bpm_amendment_modest_regulatory_measures: "Modest Regulatory Measures"
 bpm_amendment_modest_regulatory_measures_desc: "Regulations, despite continous legislation to improve them, are still quite modest and dissatisfying."

 bpm_je_belgium_unionism_is_collapsing: "#red #bold The concept of Unionism is in total collapse!#!#!" 
 bpm_je_belgium_unionism_weak: "The concept of Unionism is beginning to show cracks."
 bpm_je_belgium_union_safe_igs_united: "The concept of Unionism is holding well... for now..." #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_modifiers_holding_well The concept of Unionism is holding well... for now...#!#!

 bpm_belgian_labor_events.4.t: "Ultra-Liberals Pronounce their Active Support"
 bpm_belgian_labor_events.4.d: "Various members belonging to the so-called [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] in the #yellow House of Representatives#!, along with coutless professionals, seeking to improve the lives of the working classes, began to take very active actions.\n\nLong, loud articles in newspapers about the need to introduce [GetLawType('law_regulatory_bodies').GetName]; long speeches both in and outside parliament, one of which was given by [SCOPE.sCharacter('bpm_ultraliberal_leader').GetFullName]; and lobbying; are convincing an increasing proportion of the public and even influencing the decisions of members of parliament."
 bpm_belgian_labor_events.4.f: "We think that the manufacturer will understand that it is better for him to have workers with intelligence and a spirit of order who will double the activity, than brutal manoeuvres, knowing no brakes, and of which, in days of political disturbance, he may become the first victim.\n\n— Royal Academy of Medicine of Brussels, 1843"  
 bpm_belgian_labor_events.4.a: "You beautiful people..."
 
 bpm_active_press_war: "Active Pro-Law Sentiment from the Ultra-Liberal Press"

 bpm_belgian_labor_events.5.t: "[SCOPE.sCharacter('bpm_doctrinaire_leader').GetFullName] Pronounces his Support for the Law"
 bpm_belgian_labor_events.5.d: "[SCOPE.sCharacter('bpm_doctrinaire_leader').GetFullName], a prominient member of the [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant], after initial skepticism towards the bill, was persuaded by some MPs and experts to change his mind and expressed his approval of the bill in a speech. This was particularly easy due to the fact that he had always been a staunch supporter of interventionism, progress, and ensuring work and dignity for people.\n\nRogier, in addition to expressing his approval, proposed imposing tariffs on imports of finished goods in order to protect industry, ridiculing certain opponents of the bill.\n\nIronically, this proposal convinced some Flemish manufacturers to pronounce their support."
 bpm_belgian_labor_events.5.f: "If being a socialist means taking measures to ensure work for the working classes, to increase their well-being, to create new resources for them, then every sensible person must declare themselves a socialist... Is a project good or bad? That is the question. If it is good, whether it is called socialist or something else, it must be carried out.\n\n— Charlies Rogier, 1849"
 bpm_belgian_labor_events.5.a: "The only Liège-man with a heart!"

 bpm_belgian_labor_events.6.t: "Law on the Policing of Workshops, Factories, and Plants and on Child Labor"
 bpm_belgian_labor_events.6.d: "The bill introducing the first regulations in industry and mining has just passed through parliament.\n\nAfter months of debate, arguments, madness, dynamic changes, and clever politics, the bill made it through the #yellow House of Representatives#!.\n\nThen, thanks to the efforts of [SCOPE.sCharacter('bpm_rogier_leader').GetLastName] and [SCOPE.sCharacter('bpm_ducpiteux_leader').GetLastName], the bill was sent to the King and signed, preceded by a number of amendments introduced by the relatively conservative Senate, which ensured restrictions on work on religious holidays, such as Sunday."
 bpm_belgian_labor_events.6.f: "We think that the manufacturer will understand that it is better for him to have workers with intelligence and a spirit of order who will double the activity, than brutal manoeuvres, knowing no brakes, and of which, in days of political disturbance, he may become the first victim.\n\n— Royal Academy of Medicine of Brussels, 1843"
 bpm_belgian_labor_events.6.a: "Absolutely fabulous!"

 bpm_belgian_labor_events.7.t: "Certain Catholics Approve of the Bill"
 bpm_belgian_labor_events.7.d: "The bill, authored by the [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant] [concept_government], despite the approval of its ministers and a few individual MPs, did not initially gain widespread support from the rest, mainly #blue Catholics#!.\n\nHowever, impressed by speeches and press coverage supporting the bill, which emphasized the religious nature and goodness of the law, a positive number of them began to support the bill.\n\nMost importantly, more and more members of the #yellow Senate#! are coming out in favor of it."
 bpm_belgian_labor_events.7.a: "[SCOPE.sCharacter('bpm_ducpiteux_leader').GetLastName] is probably crying from happiness."

 bpm_belgian_law_events.9.t: "Law Conferring Legal Personality on the Catholic University of Louvain"
 bpm_belgian_law_events.9.d: "The proposal in the form of a draft bill granting legal personality to the #gold C.U.L.#!, proposed by Messrs. [SCOPE.sCharacter('bpm_mossieur_brabant').GetLastName] and #yellow Dubus#! months ago, has finally been introduced and implemented.\n\nBy granting legal personality, it can now, among other things, receive donations and perform legal acts in its own name, but with broad restrictions on property management as the bill proposed.\n\nAs soon as the proposal was presented, the anti-Unionist press was in an uproar, talking about dead hands, restoration of guilds, and violations of freedom of education, with some city councils sending criticism to the Parliament, mainly about of the alleged wealth. [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant], on the other hand, view the bill with distaste and serious skepticism."
 bpm_belgian_law_events.9.f: "Messrs. Brabant and Dubus, the two most extreme representatives of the Catholic party, made the famous proposal to the chamber to establish the University of Louvain as a civil entity, a childish claim if ever there was one, since this university already enjoyed, under the cover of well-known figureheads, the privileges that the proposal sought to restore.\n\n— Gustave d'Alaux in #italic La belgique et le parti catholique depuis 1830#!, 1845" # 
 bpm_belgian_law_events.9.a: "That's rough."

 bpm_belgian_law_events.10.t: "Law on Parliamentary Incompatibilities"
 bpm_belgian_law_events.10.d: "The Parliamentary Incompatibility Law, prohibiting the holding of public office and being a member of parliament, has just been successfully signed.\n\nThis law was originally moderate, designed by the [concept_government], and sought to limit the number of officials, with exceptions such as generals, provincial governors, advisors, and other important officials.\n\nHowever, the #yellow Central Section#! stated that under this rule, #L all civil servants#!, with the obvious exception of [Concept('concept_bpm_minister', 'Ministers')], should not be members of parliament.\n\nThe #yellow Central Section#!'s proposal was approved by a significant number of non-Government members of parliament and was passed by #green 60#! votes to #red 23#!."
 bpm_belgian_law_events.10.f: "Look through our ranks, remove all the members who have held public office, and you will see what a void you will have created for business intelligence!\n\n— Félix de Mérode, May 20th 1848"
 bpm_belgian_law_events.10.a: "Tough luck..."

 bpm_belgian_law_events.11.t: "Draft Bill on the Law on Parliamentary Incompatibilities"
 bpm_belgian_law_events.11.d: "The draft bill on Parliamentary Incompatibilities, created by the [concept_government] of [SCOPE.sInterestGroup('bpm_government_ig_scope').GetNameWithCountryVariant], has just been fully completed and refined.\n\nThis bill aims to significantly reduce the number of officials, with the exception of generals, advisors, provincial governors, and other important civil servants.\n\nWhen the [concept_government] begins the process of implementing the draft, it will be sent to the #yellow Central Section#! for analysis and preparation of its own draft. [Concept('concept_bpm_minister', 'Ministers')] believe that the bill will pass smoothly without any problems, especially with revolutions raging in Europe."
 bpm_belgian_law_events.11.f: "I want to try to retain, to a certain extent, within the legislative chambers, civil servants whose presence there is, in my opinion, of great benefit to the country. (...) It gives us the guarantee of clear, officially recognized independence, the guarantee of strict morality as the rule, almost without exception, of a consideration that is no longer disputed.\n\n— Joseph Lebeau, May 20th 1848"
 bpm_belgian_law_events.11.a: "So how will the Central Section feel about this?"

 bpm_law_effect_tt_repeatable_you_need_to_prepare_the_bill_first: "You must first finish preparing the #bold #blue Law on Parliamentary Incompatibilities#!#! through the [concept_journal_entry] button to send it to the #yellow Central Section#!!"
 bpm_this_law_effect_is_different_under_the_union: "@information! #blue The following effects are different while we are in the era of Unionism.#!"

 bpm_belgian_law_events.12.t: "The Bill of the Central Section"
 bpm_belgian_law_events.12.d: "The [concept_government] law limiting the number of state officials was thoroughly analyzed by the #yellow Central Section#!.\n\nFor our moderate bill, the Central Section sent its own proposal — a truly radical one.\n\nIt prohibits holding public office and sitting in parliament regardless of profession, with the obvious exception of [Concept('concept_bpm_minister', 'Ministers')].\n\nThis bill has been met with great surprise and nervousness among the cabinet, and now they are on the defensive, aware that this project may not end as planned."
 bpm_belgian_law_events.12.f: "We propose to reduce, they propose to destroy. We propose to prune the branches, they propose to cut down the tree at the root.\n\n— Charles Rogier, May 20th 1848"
 bpm_belgian_law_events.12.a: "Oh..."

 bpm_passing_the_law_after_central_section_has_analysed_it: "The Central Section has Proposed its own Bill"
