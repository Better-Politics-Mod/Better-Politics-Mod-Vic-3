 this_modifier_will_be_removed_if_you_freeholding_juristicions: "This [concept_modifier] will disappear if you pass [GetLawType('law_homesteading').GetName] or if you abolish the [GetAmendmentType('bpm_amendment_noble_police_privilages').GetName] #springtime Privilege#! ([concept_amendment])"

 this_modifier_will_be_removed_if_you_freeholding_bring_order_back: "This [concept_modifier] will disappear if you pass [GetLawType('law_homesteading').GetName] or if you bring back law and order yourself, using the buttons in the #springtime $je_springtime_of_the_peoples$#! [concept_journal_entry]"

 bpm_springtime_revolutionary_disorder.11.t: "@rural_folk! #green Peasants#! Intimidate and Coerce Nobles"
 bpm_springtime_revolutionary_disorder.11.d: "Villages everywhere are taking very active steps to obtain compensation from the nobility.\n\nMany villages, in addition to #red burning#! and #red looting#! residences and [GetBuildingType('building_manor_house').GetName], also conspire against the nobility, demonstrate, exert pressure, and intimidate local lords of noble descent, forcing them to sign renunciations.\n\nIn these renunciations, the [GetPopType('aristocrats').GetName] would relinquish their property rights and forest ownership; their #springtime Privileges#!, prerogatives, and much more.\n\nLater, the peasants took the opportunity to set the tax offices ablaze and returned to their homes satisfied."
 bpm_springtime_revolutionary_disorder.11.f: "When, by the union of the classes possessing property, freedom and law shall be firmly established, rights and possessions secured against arbitrary aggression from whatever quarter emanating, then it will become a sacred duty to turn attention to the poor labouring population, and by wise legislation and other appropriate measures to place them in such improved circumstances as will insure their ready co-operation in the preservation of order.\n\n— Prince Leiningen, April 1848"
 bpm_springtime_revolutionary_disorder.11.a: "So much destruction for a minor thing that legislature can do..."
 
 bpm_destruction_of_privilages: "No More Privileges and Ownership"

 bpm_springtime_revolutionary_disorder.12.t: "@rural_folk! #green Peasants#! Attack Rural Property"
 bpm_springtime_revolutionary_disorder.12.d: "Militant peasants attack and raid various properties belonging to [GetPopType('aristocrats').GetName] and rural [GetPopType('bureaucrats').GetName], as well as other [Concept('concept_building', 'Buildings')] that they see as symbols of the oppression and poverty plaguing the countryside.\n\nThey throw stones, set fires, fight, tear things down, steal, and loot.\n\nThey do whatever they can to take revenge before the arrival of the attacked lord’s police officers or local [GetInstitutionType('institution_police').GetName]."
 bpm_springtime_revolutionary_disorder.12.a: "What zelous belief in revenge can do to man..."

 bpm_springtime_revolutionary_disorder.13.t: "@rural_folk! #green Peasants#! Rejoice at the News of Access to Forests"
 bpm_springtime_revolutionary_disorder.13.d: "Peasants in [SCOPE.sState('bpm_springtime_revdis_nobles_renounce_their_stuff').GetName] are rejoicing because a rich local landowning aristocrat has officially, and voluntarily, relinquished his #springtime Privileges#! and #springtime Prerogatives#!, and most importantly, has given up his exclusive right to use the forests and communal lands for hunting.\n\nThis allows the [GetPopType('peasants').GetName] to hunt for game, kill or scare away crop-eating animals such as rabbits or deer, and cut wood without any problems or restrictions.\n\nSmaller [GetPopType('aristocrats').GetName] have followed his lead, renouncing some or all of their privileges."
 bpm_springtime_revolutionary_disorder.13.a: "First time they haven't killed anyone."

 bpm_springtime_revolutionary_disorder.14.t: "@rural_folk! #green Peasants#! Redistribute Private Land"
 bpm_springtime_revolutionary_disorder.14.d: "With great vigor and enthusiasm, the peasants are carrying out a terrible campaign in [SCOPE.sState('bpm_springtime_revdis_peasants_occupy_land').GetName], acting in the spirit of social radicalism.\n\nThe [GetPopType('peasants').GetName] there, having seriously intimidated the local aristocrats, have begun to occupy, steal, and exploit their lords’ lands and forests, killing their game.\n\nAt the same time, they are fervently supporting local [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] cells and associations, dreaming together of an equal distribution of land.\n\nSuch an occupation was expected to provoke a response from local state authorities, but constant reports of violence and the fear that the peasants might launch an uprising made it clear to the authorities that they should not even dare to."
 bpm_springtime_revolutionary_disorder.14.f: "Peace to the huts! War on the palaces!\n\n— Georg Büchner, March 1834"
 bpm_springtime_revolutionary_disorder.14.a: "We most certainly need to have them arrested!"
 
 bpm_seigneurial_dues_commutated: "Seigneurial Dues Commutated"

 bpm_springtime_revolutionary_disorder.15.t: "@rural_folk! #green Peasants#! Have their Seigneurial Dues Commutated"
 bpm_springtime_revolutionary_disorder.15.d: "Peasant servile duties — whether out of fear or the lord’s goodwill — have been commutated, or promises of commutation have been made, by several wealthier local [GetPopType('aristocrats').GetName].\n\nThese generally include reductions in #gold rent#!, #gold tolls#!, or other #gold fees#!; a relaxation of #gold obligations#!, and sometimes some minor concessions regarding land use, sale or redemption #gold prices#!, or other forms of support.\n\nThe peasants, whose families live in poverty, hunger, and [Concept('concept_credit', 'Debt')] because of these very [Concept('concept_taxes', 'Payments')], are glad that what their ancestors fought and died against is finally coming to an end."
 bpm_springtime_revolutionary_disorder.15.f: "Jeremi, servant of the people, son of the inspired earth, Soared above the clouds like a wounded bird And gazed upon his mother, who beneath his gaze Burned like a lamp veiled by a cloud, And pondered her life, so pale and frail. And then that light, with a redder glow, Burst forth, and a wild clamor suddenly blew from it, So Jeremiah furled the sails of his white wings And descended from the blue... I look... my land Is drenched in blood!... It is the enemy who has slaughtered my tribe.\n\n— Kornel Ujejski’s ‘#bold Słowo Jeremiego#!’ poem in his ‘#bold Skargi Jeremiego#!’ chorale, Paris 1847" 
 bpm_springtime_revolutionary_disorder.15.a: "How nice of them!"

 bpm_occupied_land: "Occupied and Transferred Land"

 bpm_local_nobles_renounce_their_privilages: "Renounced Privileges and Prerogatives"

 bpm_attacks_on_property: "Widespread Attacks on Rural Property"

 #### Privileges
 
 bpm_amendment_noble_police_privilages: "Seigneurial Jurisdictions"
 bpm_amendment_noble_police_privilages_desc: "Landowners enjoy full administrative, judicial, and police powers, possessing their own feudal jurisdictions. They have the right of first recourse in adjudicating and resolving all matters between themselves and the peasants, or between peasants themselves. A nobleman, and/or his official, based on local feudal law, arrests and imposes sentences, restrictions, and punishments; peasants are almost never tried by state courts. Attempted legal processes may take decades."

 bpm_amendment_noble_forests: "Noble Forest and Land Privileges"
 bpm_amendment_noble_forests_desc: "The aristocracy enjoys privileges and exclusive rights to use the forests for their own purposes and for hunting. Killing game or cutting down trees is prohibited, and punished severely. The nobility also often has the right to use the communal lands of the village."

 bpm_amendment_inequality_before_the_law: "Inequality Before the Law"
 bpm_amendment_inequality_before_the_law_desc: "Depending on one’s social status or background, the judicial system operates differently. An individual is tried in a court appropriate to their social status, with corresponding and specific procedures and penalties, and in the case of nobles, also with the possibility of leniency."

 bpm_amendment_peasant_taxes: "Seigneurial Dues and Fees"
 bpm_amendment_peasant_taxes_desc: "Peasants are burdened with various special costs and obligations. They must pay special taxes, fees, rents, tithes, levies, and duties set by their lord, either in kind or in cash. They are also required to purchase their lord’s goods or patronize his taverns, with an additional tax applied."

 bpm_amendment_the_guild_system: "Legally Established Guild System"
 bpm_amendment_the_guild_system_desc: "The guild system, which has existed since the Middle Ages, remains in force and is legally established. Guilds are endowed with quasi-legal powers to regulate production, prices, wages, employment, and labor standards at the local level in all manner of ways. They often also hold a monopoly on the practice of a trade within the city, restricting or eliminating the activities of independent artisans and bourgeois; membership in a guild is often mandatory."

 bpm_amendment_remnants_of_guilds: "Remnants of the Guild System"
 bpm_amendment_remnants_of_guilds_desc: "Although guilds have been stripped of their quasi-legal powers and rights and the economic freedoms they once enjoyed, they continue to function as legal remnants of the past. They are now private associations and corporations tasked with training and certifying journeymen, as well as providing support to their members. They still maintain many workshops of their own, often limiting work and education according to their capabilities."

 bpm_amendment_no_freedom_of_education: "No Academic Freedoms"
 bpm_amendment_no_freedom_of_education_desc: "There are bureaucratic or religious regulations in the country governing education, specifically regarding who is taught and who teaches. Institutions, whether state or church, play a unique role in appointing teachers and professors, organizing the school system, and regulating the content of the curriculum; state institutions often pursue order in schools. Radical, anti-establishment, and undesirable ideas are suppressed and banned." # In our country, there are no guarantees of freedom of teaching, and of learning.

 bpm_amendment_moderate_freedom_of_education: "Moderate Academic Freedoms"
 bpm_amendment_moderate_freedom_of_education_desc: "The state guarantees freedom of teaching and learning in higher education, but does not extend this guarantee to secondary and primary education. Consequently, both state institutions and the church have the right to regulate teaching, its scope, and its system with excessive zeal." # In our country, certain academic and educational freedoms are guaranteed, primarily to institutions of higher education.

 bpm_springtime_has_had_first_revdis: "We have had our very first [concept_bpm_springtime_revolutionary_disorder_events]"

 je_bpm_appeal_to_civic_decency_name: "Appeal to Civic Decency"
 je_bpm_appeal_to_civic_decency_desc: "[concept_bpm_springtime_revolutionary_disorder_events] reigns in every corner of our country, hurting many people and causing widespread damage. The [concept_lower_strata] are forcing concessions, stealing, and destroying in order to avenge past wrongs and gain an advantage over some other group.\n\nWe must therefore make all these people aware, through national and local proclamations and manifestos, that violence and bloodshed will achieve little. We shall encourage our citizens to exercise discipline, which will prove that they are worthy of freedom; we shall tell them openly that their future is in good hands, which will grant them freedom and equality.\n\nIn addition, we shall encourage [GetPopType('bureaucrats').GetName] and [GetPopType('clergymen').GetName] to exercise public self-restraint and preach order. Citizens, secure in their safety, will thereby restore the rule of law and order."

 bpm_springtime_of_the_peoples.103.t: "An Appeal to the National Sense of Decency"
 bpm_springtime_of_the_peoples.103.d: "Having witnessed the terrible consequences of the absence of law and order — which bore bitter fruit and gave rise to [concept_bpm_springtime_revolutionary_disorder_events] everywhere — the [concept_government] issued a plea, urging citizens to exercise restraint and suppress anarchy.\n\nAlong with them, several local governments called on citizens to exercise discipline, informing residents that their interests are now carefully protected, and that lawlessness is groundless.\n\nPopular and local [Concept('concept_politician', 'Politicians')] and leaders began delivering sermons condemning rebellions and false pride."
 bpm_springtime_of_the_peoples.103.f: "Do not mistake license for liberty, nor suppose that because much must be remodelled, all must be overturned. Far be such a thought from us: let us progress, but steadily and thoughtfully.\n\n— Karl Theodor Welcker, March 26th 1848"
 bpm_springtime_of_the_peoples.103.a: "Be good and honest citizens!"

 bpm_appeal_to_national_sense_of_decency: "Have Some Decency!"

 bpm_springtime_national_sense_of_decency_tt: "@information! [concept_bpm_springtime_revolutionary_disorder_events] will be #P less likely#! to occur."
 
 je_bpm_protect_private_property_name: "Protect Private Property" 
 je_bpm_protect_private_property_desc: "Assaults, raids, robberies, and the plundering of private property are widespread throughout our territory; so too are killings, injuries, and the extortion of money from people.\n\nAnd all of this is done out of wicked pride and vindictiveness against good and cultured, wealthy people. In fact, the wrath of the mob is just as oppressive as the tyranny of [Concept('concept_ruler', 'Kings')].\n\nWords alone can accomplish nothing, but actions can achieve everything. We must put these dangerous people in their place and restore the rule of [concept_law] and [Concept('concept_authority', 'Order')]. The [concept_army] must therefore be ordered to crush the riots and peasant raids, patrol the streets, and protect private property from the masses of artisans and proletarians."
 
 bpm_springtime_of_the_peoples.104.t: "Zealous Protection of Private Property"
 bpm_springtime_of_the_peoples.104.d: "The period of anarchy, destruction, and looting of #italic sacred#! property has come to an end, for the [concept_government] has begun to deploy the [concept_army] to suppress the brutal and savage [concept_bpm_springtime_revolutionary_disorder_events].\n\nThe streets will no longer be filled with parading masses of workers and artisans, people disobedient to progress and the common good.\n\nThere will be no more reports of burning [GetBuildingType('building_manor_house').GetName] in the villages, nor of injured innocent owners and passersby.\n\nThe rule of law and order shall return!"
 bpm_springtime_of_the_peoples.104.a: "Incredible!"

 bpm_zelous_protection_of_property: "Zealous Protection of Property"



 je_bpm_restrict_the_national_guard_name: "#bold #blue Restrict the National Guard#!#!"
 je_bpm_restrict_the_national_guard_desc: "National, mobile, or civilian guards are excellent and disciplined organizations that maintain social order independently of the state and educate citizens about democratic systems. Willing and capable men enlist in these forces, and, armed with weapons, carry out all manner of duties.\n\nThe problem arises, however, when the violent rabble joins the ranks of various guards. They exploit their position and power to achieve their own goals, circumvent the [concept_law], and create a negative atmosphere. Most alarming is the dominance of artisans, who are the most hostile toward the very things the guards are tasked with protecting.\n\nTherefore, access to the guard must be restricted for propertyless individuals who pose a threat. At the same time, the [concept_middle_strata] and [GetPopType('bureaucrats').GetName] should be encouraged, through an [concept_bpm_decree_level] from the #gold Ministry of the Interior#!, to form their own militias."

 bpm_amendment_restricted_national_civic_guard: "Restricted National Guard"

