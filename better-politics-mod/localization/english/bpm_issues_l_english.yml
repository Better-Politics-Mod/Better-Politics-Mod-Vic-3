  bpm_issues_of_elections.1.t: "Scathing Remarks on #gold;tooltipable;tooltip:[GetPlayer.GetTooltipTag],bpm_issue_sol_tooltip [Localize(Concatenate(GetPlayer.MakeScope.Var('bpm_current_target_issue').GetFlagName, '_name'))]"
  bpm_issues_of_elections.1.d: "[SCOPE.sCharacter('first_party_leader').GetFullName], the candidate hopeful for the [SCOPE.sParty('first_party').GetName] has been holding numerous rallies campaigning on the issue of [Localize(Concatenate(GetPlayer.MakeScope.Var('bpm_current_target_issue').GetFlagName, '_name'))], attacking [SCOPE.sCharacter('second_party_leader').GetFullName] of the [SCOPE.sParty('second_party').GetName]."
  bpm_issues_of_elections.1.f: "[Localize(Concatenate(GetPlayer.MakeScope.Var('bpm_current_target_issue').GetFlagName, '_attack_flavor'))]"
  bpm_issues_of_elections.1.a: "[SCOPE.sCharacter('first_party_leader').GetFullName] ought to pursue this succesful strategy"
  bpm_issues_of_elections.1.b: "[SCOPE.sCharacter('second_party_leader').GetFullName] should change [SCOPE.sCharacter('second_party_leader').GetHerHis] handling of this #crisis issue#!."
  bpm_issue_relevance_very_up_tt: "#crisis Issue#! #yellow Relevance#! increases #N significantly#!."
  bpm_issue_relevance_up_tt: "#crisis Issue#! #yellow Relevance#! increases."
  bpm_issues_of_elections.1.b_tt: "[SCOPE.sCharacter('second_party_leader').GetFullName] may adopt this issue as part of the [SCOPE.sParty('second_party').GetName]'s platform, but it will be difficult to do so without losing face."

  bpm_electoral_mandate_progressbar_tooltip: "#tooltip_header Electoral Mandate#!\n$TOOLTIP_DELIMITER$\nElectoral mandates require four points to be considered completed. Every year after the election the public will expect progress by one point. Failure to keep up will incur [Concept('concept_radical', 'Radicals')] and [concept_bpm_state_exhaustion]. Completing it early will increase [concept_bpm_state_capacity] and create [Concept('concept_loyalist', 'Loyalists')].\nThe ruling party will have a bonus or penalty to their [concept_momentum] based on their progress at the next [concept_election].\n\n[Localize(Concatenate(Scope.GetFlagName, '_progressbar_tooltip'))]"


  bpm_elecmandate_progress_tooltip: "@information! Furthers [GetPlayer.MakeScope.Var('bpm_headofgov').GetName]'s electoral agenda.
