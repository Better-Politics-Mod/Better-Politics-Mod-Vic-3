 notification_bpm_1848_calabarian_insurrection_name: "#v Unione, forza e libertà!#!"
 notification_bpm_1848_calabarian_insurrection_desc: "Following [SCOPE.sCharacter('our_beloved_ruler').GetFirstName]’s self-coup and the bombing of [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName], the Democrats have fled to [SCOPE.sState('1848_calabarian_insurrection_source').GetName] and launched their own insurrection!"

