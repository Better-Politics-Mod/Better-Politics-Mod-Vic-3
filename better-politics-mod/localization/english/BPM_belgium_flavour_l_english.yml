 je_bpm_parliamentary_incompatibilities_name: "Prune the Branches"
 je_bpm_parliamentary_incompatibilities_desc: "The idea of a law that would limit the number of officials in Parliament did not meet with much interest, because, apart from more important matters, some of the MPs were officials themselves, which could harm their interests.\n\nUntil now. The anger of the European people towards absolute monarchs and social injustice is spreading to every corner of Europe, with minor disturbances or plans for such disturbances in our country.\n\nThe weakening of the revolutionaries' momentum and the introduction of reasonable modernization in Belgium is most desirable, so we must begin to draft a bill on #blue #bold Parliamentary Incompatibilities#!#! that will restrict who can be a member of parliament, with the exception of important types of people."

