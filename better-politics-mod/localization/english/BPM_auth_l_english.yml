 je_bpm_auth_tracker: "State Exhaustion"
 je_bpm_auth_tracker_status: "Exhaustion: #b #r 0 #!#!"
 je_bpm_auth_tracker_status_set: "Exhaustion: #b #r [SCOPE.GetRootScope.GetCountry.MakeScope.Var('bpm_auth_state_exhaustion').GetValue|0] #!#! Capacity: #b;r [GetPlayer.MakeScope.ScriptValue('bpm_state_capacity')|0] #!#!"
 je_bpm_auth_tracker_desc: "Measure the overextension of the current regime."
 je_bpm_auth_tracker_reason: "Current [Concept('concept_bpm_state_exhaustion', 'State Exhaustion')]: #b #r [SCOPE.GetRootScope.GetCountry.MakeScope.Var('bpm_auth_state_exhaustion').GetValue|-0] #!#! Current [concept_bpm_state_capacity]: [GetPlayer.MakeScope.ScriptValue('bpm_state_capacity')|+0] \n\nVarious measures by the state to suppress the population exhaust its administrative and coersive resources. This is represented by the [Concept('concept_bpm_state_exhaustion', 'State Exhaustion')] which decreases [concept_bpm_state_capacity]. It is reduced every week by #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_auth_tracker_recovery_rate_tooltip [Country.MakeScope.ScriptValue('bpm_auth_weekly_state_exhaustion_recovery')|+0]#!. It increases every week by #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_auth_tracker_increase_rate_tooltip [Country.MakeScope.ScriptValue('bpm_auth_weekly_state_exhaustion_increase')|-0]#!"

 je_bpm_auth_tracker_recovery_rate_tooltip: "[Country.MakeScope.GetScriptValueDesc('bpm_auth_weekly_state_exhaustion_recovery_percentage')]\nTotal: [Country.MakeScope.ScriptValue('bpm_auth_weekly_state_exhaustion_recovery_percentage')|v0]#v %#! of total [concept_bpm_state_capacity] / week.\nWhich resolves to [Country.MakeScope.ScriptValue('bpm_auth_weekly_state_exhaustion_recovery')|+=v] / week."
 je_bpm_auth_tracker_increase_rate_tooltip: "[Country.MakeScope.GetScriptValueDesc('bpm_auth_weekly_state_exhaustion_increase')]"

