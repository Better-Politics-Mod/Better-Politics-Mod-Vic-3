 bpm_from_old_liberal_coalition: "Old Liberals 'Cooperate' with Radical Liberals"
 bpm_from_traditonal_culture: "Pro-Traditional Culture"

 bpm_from_similar_conservative_interests: "Similar Conservative Interests"
 
 ig_old_liberals: "Old Liberals"
 ig_old_liberals_desc: "Old Liberals, in contrast to the current radicals who call themselves ‘Free-thinkers’ (Freisinnige), represent the remnants of the disintegrated regeneration movement of 1830-31. They are the main force in the cantons of Solothurn and Bern, and are advocates of reform through law, pragmatic decentralization with a custom union; and personal rights. Examples include Josef Munzinger, Eduard Blösch, Karl Neuhaus, and even Johann Caspar Bluntschli."

 ig_moderate_radicals: "Moderate Radicals"
 ig_moderate_radicals_desc: "Moderate Radicals uphold egalitarianism and broadly understood freedoms and democracy, while maintaining pragmatism and realism, and attachment to Switzerland’s federal character and religious freedom. They are most influential in the canton of Zürich and Vaud. Examples include Jonas Furrer, Johann Konrad Kern, Casimir Pfyffer, and later Ulrich Ochsenbein."

 ig_swiss_radicals: "Radicals"
 ig_swiss_radicals_desc: "Radicals, who commonly call themselves ‘Free-thinkers’ (Freisinnige), are the main driving and revolutionary force in Switzerland. Following Hegelian idealism and Jacobinism, they resort to bloody revolutions and coercion. In addition to seeking to centralize power, they also pursue codified welfare, strict secularism, and broad egalitarianism. Examples include Daniel-Henri Druey, Jakob Stämpfli, and Ignaz Paul Vital Troxler."

 ig_reformed_conservatives: "Reformed Conservatives"
 ig_reformed_conservatives_desc: "Reformed Conservatives are composed of Protestant defunct patricians and newly enfranchised plebeians. They are generally traditionalist, and their converging ideals revolve around decentralization and cantonal rights. Examples include Johann Heinrich Emanuel Mousson and Paul Carl Eduard Ziegler." # Philipp Anton von Segesser?

 ig_patricians: "Patricians"
 ig_patricians_desc: "The patricians are a group of very wealthy, hereditary families who have monopolized access to various public offices, voting or connections. Composed of ancient families from cities and villages, they strive to maintain their crumbling status and privileges."

 ig_grutlians: "Grütlians"
 ig_grutlians_desc: "The ‘Schweizerischer Grütliverein’ is a patriotic workers’ organization founded on May 20, 1838, initially dedicated exclusively to personal development and national integration. Composed of journeymen, civil servants, laborers, and farmers, it was quickly dominated by left-wing activists seeking to achieve their goals, or to improve the lot of the workingman."

 ig_liberal_conservatives_swiss: "Liberal-Conservatives"
 ig_liberal_conservatives_swiss_desc: "Swiss Liberal Conservatives represent a moderate, exceptionally Protestant wing of liberalism. Most influential in the canton of Zürich, they combine liberal values of freedom and parliamentarianism with traditional decentralization and clericalism. Well-known figures include Eduard Blösch and Karl Neuhaus."

 ig_catholic_conservatives: "Catholic Conservatives"
 ig_catholic_conservatives_desc: "Unlike the Reformed Conservatives, Catholics are more committed to developing and supporting democratic institutions, which is why they are sometimes referred to as ‘Catholic Democrats’. They are also strong advocates of maintaining deep decentralization and privileges for the church, and are also inclined to roll back personal rights. The most famous figures are Josef Leu, Constantin Siegwart-Müller, and Theodor Scherer-Boccard."

