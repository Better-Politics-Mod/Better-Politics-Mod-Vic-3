 bpm_hungry_forties.4.t: "Mass Food Riots in [ROOT.GetCountry.GetName]" 
 bpm_hungry_forties.4.d: "Riots are raging across the country, in every corner, whether in cities or villages. Caused by food shortages, they are extremely violent, resulting in people being hurt while defending their #L property#! and #L possessions#!.\n\nGroups of peasants, workers, or craftsmen, together or in class isolation, attack food convoys, shops, and merchants, stealing whatever they can.\n\nSometimes there is a victim, or several, after the enraged mob does not get what it demands.\n\nThe response of the [concept_government] must be firm."

 bpm_hungry_forties.3.t: "Food Riots in [SCOPE.sState('BPM_minor_food_riots').GetName]"
 bpm_hungry_forties.3.d: "Riots caused by growing anger and fear over severe shortages and high food prices broke out in [SCOPE.sState('BPM_minor_food_riots').GetName].\n\nLocal groups of hungry villagers and townspeople, whether they are craftsmen, weavers, farmhands, or even small farmers, began to raid food supplies.\n\nThey rob convoys owned by local [GetPopType('aristocrats').GetName], full of #yellow grain#!, #green vegetables#!, and sometimes #pink meat#!; or force merchants to sell at below-market prices after threatening them. Sometimes they get into fights and steal food, which, in rare cases, had resulted in #red deaths#!.\n\nThe response of the [concept_government] must be firm."
 bpm_hungry_forties.3.f: "The situation in Ireland is greatly alarming. To save the people of Ireland from the horrors of famine, to invite commerce to come to their succour, vigorous and well-combined measures are needed, and above all, no time must be lost.\n\n— Article in #italic Journal des Débats#!, December 19th 1845"
 bpm_hungry_forties.3.a: "Order must be restored."
 
 bpm_hungry_forties.1.t: "The Hungry [SCOPE.GetRootScope.GetCountry.GetCustom('getDecadeName')|U]"
 bpm_hungry_forties.1.d: "As long period of wet and humid weather begin, a potato blight ( #italic Phytophthora infestans#! ) from [SCOPE.sState('relevant_state').GetName] began to spread rapidly across the European continent.\n\nHuge quantities of #L #yellow potato crops#!#!, which are the staple food of many of the poor — of peasants, workers, or craftsmen — are completely destroyed, pushing millions into hunger and fear of #blue winter#!.\n\nTheir only consolation is the availability of other foodstuffs.\n@information! You may track this #crisis Crisis#! in the #crisis Crisis Monitor#!."
 bpm_hungry_forties.1.a: "We must do something!"

 bpm_hungry_forties.2.t: "A Looming Drought"
 bpm_hungry_forties.2.d: "After a destructive potato blight that ruined last year's harvest, and a decline in yields caused by wet and very rainy weather, an alarmingly long period of little rain has begun in recent weeks.\n\nThere are rumors that this is only the beginning of a [GetHarvestConditionType('drought').GetName] that will decisively and completely ruin this year's harvest of [GetGoods('grain').GetName], vegetables, and much more."
 bpm_hungry_forties.2.a: "#bold Now#!... it's gonna get bad."

 
 
 bpm_crisis_impact_of_hunger: "Political Anger by Hunger"

 notification_bpm_1847_buzancais_food_riot_name: "#v Food Riot in Buzançais, [SCOPE.sState('1847_buzancais_food_riot_scope').GetName]!#!"
 notification_bpm_1847_buzancais_food_riot_desc: "A two-day riot with victims led by the hungry and unememployed in #v Buzançais#! has been crushed."

 bpm_springtime_of_the_peoples.1.t: "Statuto Albertino"
 bpm_springtime_of_the_peoples.1.d: "Almost a month ago, King [SCOPE.sCharacter('BPM_king_albert_sardinia').GetFullName] promised to introduce a constitution in the country.\n\nThe time has therefore come to issue it, fully finalized, especially since the Revolution in [SCOPE.sCountry('1848_revolution_beginning_country').GetName] is reverberating throughout Europe, stirring up the agitated and despairing masses and the bourgeoisie.\n\nThis [Concept('concept_bpm_constitutional_level', 'Constitution')] will ensure a bright future for [SCOPE.sCountry('1848_sardegna_piedmont').GetName]."
 bpm_springtime_of_the_peoples.1.f: "We, believing that the broad and permanent representative institutions established by this fundamental statute are the surest means of cementing the bonds of indissoluble affection that bind to our crown a people that has so often given us ample proof of their faithfulness, obedience, and love, have determined to sanction and promulgate this statute. We believe, further, that God will bless our good intentions, and that this free, strong, and happy nation will ever show itself more deserving of its ancient fame and thus merit a glorious future.\n\n— Preamble of the #italic #bold Statuto Albertino#!#!, March 4th 1848"
 bpm_springtime_of_the_peoples.1.a: "A step closer towards the future."

 bpm_springtime_of_the_peoples.2.t: "[SCOPE.sCharacter('bpm_lajos_kossuth').GetFullName]’ Speech"
 bpm_springtime_of_the_peoples.2.d: "On #gold March 3rd#!, the famous liberal [SCOPE.sCharacter('bpm_lajos_kossuth').GetFullName] delivered a magnificent and lengthy speech in which he subjected Austria’s absolutism and reactionary policies, as well as the oppression of Hungary, to scathing criticism. He also laid out all the demands, needs, and aspirations of our Hungarian people."
 bpm_springtime_of_the_peoples.2.f: "But if until now I have been concerned about this only because I lament seeing our development held back beyond all measure — to the irreparable detriment of our country — due to the influence of the Viennese system, and because I see that the constitutional direction of our progress is not secured, and because I see that the divergence that has existed for three centuries between the absolutist nature of the imperial system of government and the constitutional direction of the Hungarian nation has not been resolved to this day, nor can it be resolved without one side or the other giving up its position.\n\n— Kossuth Lajos, March 3rd 1848"
 bpm_springtime_of_the_peoples.2.a: "Great!"

 notification_bpm_1848_lajos_kossuth_speech_name: "#v [SCOPE.sCharacter('bpm_lajos_kossuth').GetFullName]’ Speech in #gold [SCOPE.sCountry('1848_hungarian_revolution_state').GetCapital.GetCityHubName]#!#!!"
 notification_bpm_1848_lajos_kossuth_speech_desc: "A popular liberal [SCOPE.sCharacter('bpm_lajos_kossuth').GetFullName] gave an extensive speech, criticizing the Habsburg monarchy."

 notification_bpm_1848_sardinia_constitution_name: "#v Statuto Albertino in [SCOPE.sCountry('1848_sardegna_piedmont').GetName]"
 notification_bpm_1848_sardinia_constitution_desc: "Following the #springtime Revolution#! in [SCOPE.sCountry('1848_revolution_beginning_country').GetName] and protests in #gold Genua#!, King [SCOPE.sCharacter('BPM_king_albert_sardinia').GetFullName] of [SCOPE.sCountry('1848_sardegna_piedmont').GetName] promulgated his own [Concept('concept_bpm_constitutional_level', 'Constitution')]!"

 bpm_springtime_drift_towards_revolution_artisans_slight: "@intelligentsia! #yellow Artisans#! will drift #bold slightly#! towards the #v #L Revolution#!#! side!"
 bpm_springtime_drift_towards_revolution_proletarians_slight: "@trade_unions! #pink Proletarians#! drift #bold slightly#! towards the #v #L Revolution#!#! side!"

 bpm_springtime_of_the_peoples.3.t: "Unrest in the Rhine"
 bpm_springtime_of_the_peoples.3.d: "Today, on #gold March 3rd#!, news of the victorious revolution in [SCOPE.sCountry('1848_revolution_beginning_country').GetName] reached the #yellow Rhineland#! and the surrounding areas.\n\nIn #gold Köln#!, 5.000 people — primarily workers and craftsmen — submitted a petition and began demonstrations under the leadership of the German section of the @ig_socialists! #red Communist League#!.\n\nThis petition, presented to the magistrate, included demands for [GetLawType('law_universal_suffrage').GetName], #yellow Freedom of Speech#!, the #yellow Press#!, and #yellow Association#!; the arming of the population, [GetLawType('law_worker_protections').GetName], and children’s education.\n\nFortunately, the meeting, which was preceded by a demonstration by these radical masses, was dispersed by the military, and their leaders — #L #yellow Andreas Gottschalk#!#!, #yellow #L August Willich#!#!, and #yellow #L Friedrich Anneke#!#! — were arrested."
 bpm_springtime_of_the_peoples.3.f: "It’s a bad business in Cologne. Our three best men are in jug. I have been speaking to someone who took an active part in the business. They wanted to go into the attack, but instead of supplying themselves with weapons, which were easily obtainable, they went to the town hall unarmed and let themselves be surrounded. It is said that most of the troops were on their side.\n\n— Letter from Friedrich Engels to Karl Marx, March 9th 1848" 
 bpm_springtime_of_the_peoples.3.a: "Worrying."

 bpm_springtime_buildup.3.t: "The Buzançais Food Riot"
 bpm_springtime_buildup.3.d: "The problem of hunger, high prices, and unemployment caused by the so-called ‘#v The Hungry [SCOPE.GetRootScope.GetCountry.GetCustom('getDecadeName')|U]#!’ is widespread. Hungry people are becoming increasingly [Concept('concept_radical', 'radicalized')] and aggressive. This aggression culminated today in the town of #gold Buzançais#!.\n\nA group of women seized several grain trucks passing through the town, with protests beginning later. Then, in an incident, the son of a local @aristocrats! #yellow Aristocrat#! shot a protester, after which the crowd beat the shooter to death.\n\nSince this incident, chaos has spread throughout [SCOPE.sState('1847_buzancais_food_riot_scope').GetName]: price fixing, robberies, attacks on machinery, fights, and much more, while the local elites have fled, calling for intervention.\n\nThe [concept_government]’s response must be concrete."
 bpm_springtime_buildup.3.f: "The condemned of Buzançais were guilty, so be it, but their execution has purified them. Now no one remembers their crime, they pity them.\n\n— Article in #italic L'Atelier#!, May 1847"
 bpm_springtime_buildup.3.a: "Repress them stringently with public trials, hangings and military occupation."

 bpm_crisis_hunger_remains: "Hunger Remains"

 bpm_springtime_buildup.4.t: "Als Kartoffelrevolution"
 bpm_springtime_buildup.4.d: "Today, three days of hunger riots in #gold [SCOPE.sCountry('1847_prussian_state_berlin').GetCapital.GetCityHubName]#! ended after arrests and pacification by the army.\n\nCaused by failed harvests during ‘#v The Hungry [SCOPE.GetRootScope.GetCountry.GetCustom('getDecadeName')|U]#!’, as well as the inability of the #gold Berlin#! administration to provide access to [GetGoods('grain').GetName] or other food, they were widespread.\n\n45 stores, 30 of which were bakeries, were attacked and looted, and some of the equipment and furniture was stolen or destroyed.\n\nThe police were unable to control the situation, so the army was called in, which put the rebellious workers and craftsmen in their place."
 bpm_springtime_buildup.4.f: "Since yesterday, our city has been witnessing the most reprehensible excesses. They fill the peaceful citizens with indignation, but also with great concern. Even though the hardship of the moment weighs heavily on many residents of our city, the local authorities must acknowledge that they have done everything possible and necessary, together with the well-meaning residents of the city, to alleviate this hardship for all our beleaguered residents.\n\n— Berlin Magistrate's petition to #L King Friedrich Wilhelm IV#!, April 24th 1847"
 bpm_springtime_buildup.4.a: "Good!"

 notification_bpm_1847_berlin_potato_revolution_name: "#v The Potato Revolution in [SCOPE.sCountry('1847_prussian_state_berlin').GetCapital.GetCityHubName]!#!"
 notification_bpm_1847_berlin_potato_revolution_desc: "A three-day long hunger riot of Berlinese craftsmen and proletarians has been crushed."

 ####################################### SPRINGTIME BEGINS

 bpm_springtime_buildup.5.t: "The Milanese Tobacco Strike"
 bpm_springtime_buildup.5.d: "Today, #gold January 1st#!, on #yellow New Year's Day#!, the residents of #gold Milan#!, mostly middle-class, began a boycott of gambling and smoking tobacco.\n\n#bold Field Marshal#! and #bold Governor#! #yellow Joseph Radetzky von Radetz#! therefore ordered his soldiers and the police to provocatively smoke large cigars in the streets, blowing smoke in people's faces.\n\nOn #gold January 3rd#!, an imperial decree informed the Italians that preventing others from smoking would be severely punished.\n\nOn the evening of that very day, passing soldiers cut, slashed, and beat civilians, and later a serious clash broke out including a cavalry charge.\n\n5 people were killed and about 50 were injured."
 bpm_springtime_buildup.5.f: "Young Lombards!\nNew destinies await Italy in the coming year. Today, the right wing is becoming more tenacious, and among those who agree, the word sounds grave, almost like a religious promise. But if times prepare events, only the will of the strong brings them to fruition.\n\n— Giovanni Cantoni’s manifesto that begun the strike, January 1st 1848"
 bpm_springtime_buildup.5.a: "Money is far more important!"

 notification_bpm_1848_milanese_tobacco_strike_name: "#v The Milanese Tobacco Strike!#!"
 notification_bpm_1848_milanese_tobacco_strike_desc: "The New Year's boycott of [GetGoods('tobacco').GetName] smoking by the people of #gold Milan#! ended after bloody clashes and military violence."

