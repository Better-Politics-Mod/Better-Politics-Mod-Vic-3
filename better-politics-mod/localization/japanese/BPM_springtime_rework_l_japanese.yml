 bpm_springtime_counter_revolution.1.t: "A new Prime Minister..."
 bpm_springtime_counter_revolution.1.d: "After a recent period of unpopularity and conflicts with military officers and the [SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('our_beloved_ruler').GetFirstName], the relatively conciliatory [Concept('concept_bpm_minister', 'Prime Minister')] [SCOPE.sCharacter('BPM_prime_minister_pfuel').GetFullName] resigned.\n\nHe was replaced by the new, truly militant [SCOPE.sCharacter('bpm_springtime_new_prime_minister').GetFullName]."
 bpm_springtime_counter_revolution.1.f: "The Minister of the Interior, Eichmann, has announced—by means of a notice posted this morning—that he has instructed the relevant authorities that in all cases in which the citizen militia (Bürgerwehr), which is primarily responsible for maintaining lawful order, fails to fulfill this duty promptly and fully, as on the 31st of last month, they are to requisition the armed military forces immediately.\n\nThe undersigned command considers this a violation of the assurances given and recognized by the ministries to the citizen militia and the municipal authorities concerning the requisitioning of the military, and has therefore lodged a formal protest with the Minister of the Interior.\nThis is hereby made known to the public.\n\n— Otto Rimpler, November 2nd 1848" 
 bpm_springtime_counter_revolution.1.a: "I wonder whether something is going to happen..."

 bpm_parliament_adjourned: "Absent Parliament"

 bpm_springtime_counter_revolution.2.t: "Capital Retaken and Besieged!"
 bpm_springtime_counter_revolution.2.d: "A few days earlier, [Concept('concept_bpm_minister', 'Prime Minister')] [SCOPE.sCharacter('bpm_springtime_new_prime_minister').GetFullName] had informed the parliament that it was adjourned and transferred to a tiny town several dozen kilometers from the [Concept('concept_capital_state', 'Capital')].\n\nSubsequently, on the orders of [SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('our_beloved_ruler').GetFirstName], the [concept_army], equiped with [GetGoods('artillery').GetName], entered Berlin under the command of [SCOPE.sCharacter('bpm_scope_von_wrangel').GetFullName]; after disarming a significant portion of the #yellow Civil Guard#!, two days later he declared a #red state of siege#! in the capital.\n\nIn protest, the #yellow National Assembly#! called on citizens to engage in a tax strike, which is unlikely to have much effect; moreover, it is completely isolated and powerless."
 bpm_springtime_counter_revolution.2.f: "The Citizen Militia (Bürgerwehr) therefore declares the dissolution of the National Assembly, the dissolution and disarmament of the militia, and the imposition of the state of siege to be entirely unconstitutional, and protests against them.\n\n— #bold Das 5. und 14. Bataillon der Bürgerwehr.#!, November 14th 1848"
 bpm_springtime_counter_revolution.2.a: "The city is completely peaceful!"

 bpm_springtime_counter_revolution.3.t: "The Counterrevolution"
 bpm_springtime_counter_revolution.3.desc_liberal: "Today, [SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('our_beloved_ruler').GetFirstName] dissolved the parliament and promulgated his own [Concept('concept_bpm_constitutional_level', 'Constitution')], after the [concept_army] peacefully took control of the [Concept('concept_capital_state', 'Capital')].\n\nThis constitution — known as the [SCOPE.GetRootScope.GetCountry.GetCustom('getCurrentMonthName')] Constitution — guarantees many fundamental rights and freedoms, establishes an independent judiciary, and abolishes many privileges; it also places limited restrictions on the monarch’s powers, establishes [GetLawType('law_separated_powers').GetName], and introduces an elected legislature chosen by [GetLawType('law_universal_suffrage').GetName]."
 bpm_springtime_counter_revolution.3.f: "They inflicted on us a revolution, with which not even 10,000 inhabitants of the kingdom besides the Poles were in fundamental agreement, and then they won sympathy for it only by promising the moon to the peasants and the workers.\n\n— Otto von Bismarck, July 4th 1850"
 bpm_springtime_counter_revolution.3.a: "Beautiful."

 bpm_springtime_je_revolutionary_legitimacy: "Revolutionary Legitimacy"

 bpm_springtime_counter_revolution.4.t: "A New Man of the Future"
 bpm_springtime_counter_revolution.4.d: "The romanticism of the early revolutionary era is long gone, perhaps it has never even existed.\n\nThe people of #gold [GetPlayer.GetCapital.GetCityHubName]#!, living in poverty and despair, look left and right in search of someone with a noble and strong character.\n\nAnd that person is [SCOPE.sCharacter('bpm_springtime_new_man_appears').GetFullName], a member of the [SCOPE.gsInterestGroup('new_mans_ig').GetName] who has emerged out of nowhere and is already winning the hearts of the masses."
 bpm_springtime_counter_revolution.4.f: "Hegel remarks somewhere that all great world-historical facts and personages appear, so to speak, twice. He forgot to add: the first time as tragedy, the second time as farce.\n\n— Karl Marx, 1852"
 bpm_springtime_counter_revolution.4.a: "Who the hell is that?"

 bpm_springtime_a_new_character_appears: "[SCOPE.sCharacter('bpm_springtime_new_man_appears').GetFullName] of the [SCOPE.gsInterestGroup('new_mans_ig').GetNameWithCountryVariant] appears in [ROOT.GetCountry.GetNameNoFlag]"

 bpm_springtime_je_new_man_of_the_future: "The New Man"

 

 je_bpm_abolish_land_privileges_name: "#bold #blue Abolish Land Privileges#!#!"
 je_bpm_abolish_land_privileges_desc: "A vast portion of the forests in rural areas — according to various privileges, laws, and forestry codes of the past — belonged to or were under the jurisdiction of local [GetPopType('aristocrats').GetName].\n\nAlthough for centuries, since medieval feudalism, the lord had the privilege of using the forests for hunting game, a significant portion of these forests still belonged, as communal land, to the village, which primarily allowed for the harvesting of timber.\n\nIn the present day, a peasant cannot take wood from a forest that no one uses; he cannot kill game that invades the land; and increasingly, he cannot even use the land — for example, for grazing cattle or other needs — land that has always been rural to him.\n\nThis problem affects [GetPopType('peasants').GetName] most of all, but it also creates difficulties for the developing [Concept('concept_building', 'Industry')] and [concept_trade].\n\nWe must put an end to this injustice by abolishing all privileges and codes concerning the ownership of forests and communal land." # Many landowners hold exclusive rights and privileges to use forests and lands, and above all, to hunt. \n\nEven without owning these territories, they can freely use and exploit nature as they please, punishing anyone who uses their ‘perpetual property’. At the same time, [GetPopType('peasants').GetName], [GetPopType('farmers').GetName], and [GetPopType('capitalists').GetName] alike, desire the abolition of these privileges.\n\nBy eliminating this injustice, the use of forests will be available to everyone and for every need, whether for logging, sustenance, or to build something majestic or industrial in their place.

 bpm_springtime_we_have_abolished_sei_juri: "We have already abolished [GetAmendmentType('bpm_amendment_noble_police_privilages').GetName] #springtime Privilege#! ([concept_amendment])"
 bpm_has_introduced_jury_courts: "We have already introduced #yellow Jury Courts#!"

 bpm_springtime_landowners_dislike_losing_privileges: "Naturally, the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] will very much #red #bold not#!#! like that!"
 
 je_bpm_abolish_seigneurial_jurisdictions_name: "#bold #blue Abolish Seigneurial Remnants#!#!"
 je_bpm_abolish_seigneurial_jurisdictions_desc: "The countryside is plagued by numerous problems, systemic issues, and legal and social injustices.\n\nWhether it is the system of [GetAmendmentType('bpm_amendment_noble_police_privilages').GetName] and administrative, police, and judicial privileges granted to the [GetPopType('aristocrats').GetName] centuries ago, or the enormous amounts of fees and levies and forced patronage, or inequalities regarding the status of towns and villages — the list goes on and on.\n\nDespite the theoretical equality before the law poorly practiced by previous [Concept('concept_government', 'Governments')], and even the indirect codification of this principle in the #yellow Civil Code#! and the #yellow Criminal Code#!, [GetPopType('peasants').GetName] remain second-class citizens.\n\nWho can speak of equality and justice when a poor farmhand is beaten, judged by his master, by his steward, and by a feudal court — a farmhand from whom the master sucks away all his possessions and wealth? This dreadful situation must be brought to an end, and the remnants of feudal law and taxation must be abolished." # The system of [GetAmendmentType('bpm_amendment_noble_police_privilages').GetName], with all the judicial and police privileges it grants to the aristocracy, creates an unjust system of special, feudal justice within the broader judicial system.\n\nIt is appalling that working on someone else’s land gives your employer the right to decide on your freedom and rights, while simultaneously stifling attempts to break free from the remnants of the past.\n\nWe must abolish all judicial and administrative privileges belonging to [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant].

 bpm_springtime_privilege_abolished_big: "Very Much Disapproves Losing Privileges"
 bpm_springtime_privilege_abolished_small: "Disapproves Losing Privileges"
 bpm_springtime_privilege_abolished_tiny: "Somewhat Disapproves Losing Privileges"

 bpm_springtime_of_the_peoples.107.t: "No More Legal Feudalism!"
 bpm_springtime_of_the_peoples.107.d: "Remnants of #bold feudalism#!, such as the system of [GetAmendmentType('bpm_amendment_noble_police_privilages').GetName] along with administrative, police, and judicial #springtime Privileges#! granted to [GetPopType('aristocrats').GetName];\n\nInequalities, or remnants thereof, regarding the rights and opportunities of towns and villages; heavy and unnecessary [concept_taxes], levies, customs duties, tithes, and other charges;\n\nAs well as other social injustices weighing on the countryside — all of these have now been definitively abolished (and thus replaced by a state-run, independent judiciary) by an [Concept('concept_law', 'Act')] of Parliament.\n\nThe [GetPopType('peasants').GetName] rejoice and delight in these freedoms and this justice, for which their ancestors and they themselves once had to toil and suffer."
 bpm_springtime_of_the_peoples.107.f: "Liberty! That was the cry of the captives of Egypt, the slaves of Spartacus, the peasants of the Middle Ages, and more recently of the bourgeoisie oppressed by the nobility and religious corporations, of the workers oppressed by masters and guilds. Liberty! That was the cry of all those who found their property confiscated by monopoly and privilege. Liberty! That was the burning aspiration of all those whose natural rights had been forcibly repressed.\n\n— Gustave de Molinari, 1849" # § 8 Manorial jurisdiction is hereby abolished; - temporarily, until the administration of justice is generally organized, in civil matters regarding summary proceedings, where there are no organized councils with first-instance judicial authority, the district judges shall exercise it; - and regarding criminal and ordinary civil proceedings, the county court shall exercise it.\n\n— Act IX #bold On the Abolition of Labor Services (robot), Tithes, and Monetary Payments Previously in Force Under Manorial Tenure and Subsequent Agreements#!, 1848
 bpm_springtime_of_the_peoples.107.a: "Liberté, égalité, fraternité!"
 
 je_bpm_empower_guilds_name: "#bold #blue Empower Guilds#!#!"
 je_bpm_empower_guilds_desc: "The guilds, once powerful and endowed with many rights, now lie in oblivion and decline. Devastated by economic freedom, economic crises, and the impoverishment of the artisan, they are but shadows of their former selves.\n\nSeeing the interest of guild masters in the old, good, and natural order, and noting the enslavement of man by the bourgeoisie, we must make an important decision and restore the old guild system by law.\n\nThis time, we will involve the [Concept('concept_country', 'State')] more, requiring proof of professional competence through examinations conducted by the guild or the state. We will also introduce restrictions on the practice of the [concept_profession] and [concept_good_production], and entrust the guilds with fostering a sense of community and pride.\n\nThis shall ensure strong support from the artisan masses."

 je_bpm_establish_national_workshops_name: "#bold #blue Establish National Workshops#!#!"
 je_bpm_establish_national_workshops_desc: "Just as in the countryside, thousands of people in the city — living in unemployment or without stable employment — are starving and suffering. Many thousands, even tens of thousands, of these people once had dignity; had work that filled their chests with pride... and now what?\n\nLike wild animals, they eke out an existence somewhere out there, oppressed by the wealthy owners of their own graves and suffering. How can we look upon such a life and not use the [Concept('concept_country', 'State')] to provide work and money to these starving [concept_unemployed]?\n\nWe must create a system of ‘[GetAmendmentType('bpm_amendment_national_workshops').GetName]’, which, in the spirit of the ‘#bold right to work#!’, will provide a [concept_government_wage] to these working people; and, moreover, they will be of great benefit to society and the economy. For they will work hard on many projects, and one day, they will be able to provide for themselves.\n\nThe problem, however, will be raising funds for this undertaking... and from whom better to obtain these funds than from the counter-revolutionary [GetPopType('aristocrats').GetName] and [GetPopType('peasants').GetName]?" # Thousands of people are suffering in the cities, starving and [concept_unemployed]. Thousands of people who could be provided with temporary employment and some form of income.\n\nThis work, as part of the so-called ‘National Workshops’, could both ensure economic development and give thousands of [concept_unemployed] people a chance at a livelihood.\n\nBut to raise funds for such an undertaking, we must tax the [GetPopType('aristocrats').GetName]: surely it won’t hurt them to give a few pennies, will it?

 je_bpm_abolish_seingeurial_taxes_name: "#bold #blue Abolish Seigneurial Taxes#!#!"
 je_bpm_abolish_seingeurial_taxes_desc: "Taxes in various forms — whether in money or in kind — weigh heavily on the peasants. \n\nThese poor peasants, living in hardship and hunger, must pay additional taxes, duties, and other levies to the [GetBuildingType('building_manor_house').GetName], the Church, or is forced to buy [Concept('concept_good', 'Goods')] they don’t want or need, on top of providing for their own sustenance.\n\nThis remnant of feudalism must be eliminated, initially by reducing these charges and subsequently by abolishing them entirely."

 bpm_je_government_underwent_counterrevolution: "We have underwent a successful [Concept('concept_bpm_springtime_counterrevolutionary_preparadness', 'Counterrevolution')] which forced @ig_reactionaries! #purple #bold Reactionaries#!#! into the [concept_government] and [concept_bpm_cabinet]"
 bpm_springtime_we_have_not_underwent_a_counterevolution: "We have #bold #red NOT#!#! underwent a successful [Concept('concept_bpm_springtime_counterrevolutionary_preparadness', 'Counterrevolution')] which forced @ig_reactionaries! #purple #bold Reactionaries#!#! into the [concept_government] and [concept_bpm_cabinet]"
 bpm_springtime_we_have_inequality_law: "We have the [GetAmendmentType('bpm_amendment_inequality_before_the_law').GetName] #springtime Privilege#! ([concept_amendment])"
 bpm_springtime_we_have_noble_forests: "There is [GetAmendmentType('bpm_amendment_noble_forests').GetName] ([concept_amendment])"
 bpm_springtime_we_have_seigneurial_jurisdictions: "[GetAmendmentType('bpm_amendment_noble_police_privilages').GetName] ([concept_amendment]) exist in [ROOT.GetCountry.GetName]"
 bpm_springtime_we_have_no_academic_freedom: "There is [GetAmendmentType('bpm_amendment_no_freedom_of_education').GetName] or [GetAmendmentType('bpm_amendment_moderate_freedom_of_education').GetName] ([concept_amendment]) in [ROOT.GetCountry.GetName]"
 bpm_springtime_we_have_guilds: "[GetAmendmentType('bpm_amendment_remnants_of_guilds').GetName] ([concept_amendment]) still exist"

 bpm_je_government_is_made_out_of_liberals_democrats: "Current [concept_government] and [concept_bpm_cabinet] has @ig_liberals! @ig_national_liberals! @ig_market_liberals! #YB Liberal#!, @ig_conservatives! #bold #blue Moderate#!#! and/or @ig_radicals! @ig_socialists! #bold #pink Democratic#!#! [Concept('concept_bpm_minister', 'Ministers')] and [Concept('concept_interest_group', 'Interest Groups')]"

 
 bpm_springtime_of_the_peoples.105.t: "Restriction of National Guard"
 bpm_springtime_of_the_peoples.105.desc_parliament: "Today, Parliament passed a [Concept('concept_law', 'Bill')] restricting access to the [GetLawType('law_national_guard').GetName].\n\nThe [concept_law] is fairly simple, primarily imposing restrictions on who can join the #yellow Guard#!, limiting access to members of the [Concept('concept_middle_strata', 'Middle')] and [concept_upper_strata].\n\nThe [concept_government] has also openly encouraged the bourgeoisie and [GetPopType('bureaucrats').GetName] to form their own civil guard composed of men of means."
 bpm_springtime_of_the_peoples.105.desc_decree: "Today, the [concept_government] [Concept('concept_bpm_decree_level', 'Decreed')] the restriction of access to various types of guards — whether civil, national, or even mobile.\n\nIt imposes restrictions on who can join civil guards, limiting access to members of the [concept_middle_strata].\n\nThe [concept_government] has also openly encouraged the bourgeoisie and [GetPopType('bureaucrats').GetName] to form their own civil guard composed of men of means."
 bpm_springtime_of_the_peoples.105.f: "The working classes are entirely excluded from the ranks of the national guard, by the law now under consideration, the second reading of which has been already carried! Moreover the President has the right to suspend for one year the national guards of every parish — and, actually, throughout half France, the national guard has been dissolved!\n\n— Karl Marx, 1851"
 bpm_springtime_of_the_peoples.105.a: "Law and order shall prevail!"

 je_bpm_equality_before_the_law_name: "#bold #pink Abolish Legal Inequality#!#!" 
 je_bpm_equality_before_the_law_desc: "The icing on the cake of the reforms and the implementation of the ideals of freedom and equality introduced over the past weeks and months will be major [Concept('concept_amendment', 'Amednments')] and new [Concept('concept_law', 'Laws')] to the legal codes.\n\nReforms concerning the #yellow Civil Code#!, the #yellow Criminal Code#!, and the #yellow Code of Criminal Procedure#! will rewrite and change many things, such as the course of proceedings; they will consolidate and completely remove various #springtime Privileges#!; they will ensure equal and universal access to independent state courts; they will introduce jury trials; they will equalize the opportunities to own and use property; they will weaken the [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant]; and much more.\n\nSoon, everyone will be equal!" # It is unthinkable that someone born into a family with a coat of arms, or a noble title, deserves special treatment from the legal system.\n\nAll people are equal and deserve a truly just, single court. They deserve equal legal rights, duties, and penalties, with equal opportunities. We must eliminate this terrible inequality before the law.

 bpm_springtime_of_the_peoples.106.t: "On the Realization of Legal Equality"
 bpm_springtime_of_the_peoples.106.d: "After weeks, even months, of efforts, [Concept('concept_bpm_legal_level', 'Legal Laws')], [Concept('concept_bpm_decree_level', 'Edicts')], and reforms, we can now, with a broad smile, introduce the final series of [Concept('concept_law', 'Laws')] reforming the #yellow Civil Code#!, the #yellow Code of Criminal Procedure#!, and the #yellow Criminal Code#!, which will fully codify an equal and just judicial system.\n\nThe reformed codes guarantee the rule of law, access to property rights, abolish unjust #springtime Privileges#! and prerogatives, ensure specific personal freedoms and contract rights, provide [GetPopType('peasants').GetName] with access to independent and impartial courts, introduce jury trials, and much more." # Today, Parliament passed the final of several [Concept('concept_law', 'Bills')] repealing numerous rights and privileges by amending various sections of the #yellow Civil Code#! and the #yellow Criminal Code#!.\n\nThese amendments establish complete #yellow legal#! and #yellow judicial equality#! regardless of [concept_social_class]; they have eliminated injustices regarding #red punishments#!; they have made all #yellow cities#! equal, placing their residents and properties under the same legal jurisdiction.\n\nThey have also consolidated the [Concept('concept_bureaucracy', 'Bureaucracy')] by abolishing privileges, rights, and various, different ystems.
 bpm_springtime_of_the_peoples.106.f: "Now that the abolition of aviticitas has been declared in principle, it is hereby decreed:\n\n§ 1 The Ministry shall draft a civil code based on the complete and total abolition of aviticitas, and shall submit a proposal for this code to the next National Assembly.\n§ 2 In the meantime, until the next National Assembly, all proceedings in lawsuits arising from aviticitas relations and not yet concluded by a final judgment shall be suspended; and the initiation of such lawsuits shall also be prohibited, except in cases covered by Article 1836:14.\n\n— Act XV #bold On the Abolition of Aviticitas#!, 1848"
 bpm_springtime_of_the_peoples.106.a: "What a great achievement!"

 bpm_springtime_fresh_code_of_law_reforms: "Code of Law Reforms"

 je_bpm_close_the_national_workshops_name: "#bold #blue Close the National Workshops#!#!"
 je_bpm_close_the_national_workshops_desc: "The much-beloved [GetAmendmentType('bpm_amendment_national_workshops').GetName] have become highly disadvantageous and very ineffective for us.\n\nTo fund them, we taxed the [GetPopType('aristocrats').GetName] and [GetPopType('peasants').GetName], who became fierce enemies of this project and the [concept_government] of [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] en masse. The public works consume enormous sums; after all, they employ tens of thousands across many corners of our country, though a vast majority are located in our capital, #gold [GetPlayer.GetCapital.GetCityHubName]#! — a city already teeming with turmoil, poverty, and unrest.\n\nUnfortunately, those employed often cannot even perform any work, usually due to a lack of tools and materials; and their earnings barely provide food for the table. On top of all this, voices are beginning to emerge claiming that these public works pose a threat to property and public peace.\n\nThe [GetAmendmentType('bpm_amendment_national_workshops').GetName] must be closed; young workers can be given the choice of enlisting in the [concept_army], being sent home with a small amount of funds, or simply being left to fend for themselves."

 bpm_springtime_of_the_peoples.108.t: "The [SCOPE.GetRootScope.GetCountry.GetCustom('getCurrentMonthName')] Days Uprising"
 bpm_springtime_of_the_peoples.108.d: "With the closure of the [GetAmendmentType('bpm_amendment_national_workshops').GetName], the pent-up anger of the desperate residents of #gold [GetPlayer.GetCapital.GetCityHubName]#! erupted into a living hell.\n\nBarricades were erected throughout the capital, and shops and buildings were destroyed; thousands of working people and remaining [concept_unemployed] took up arms and began a bloody battle against the [GetLawType('law_national_guard').GetName], which had been called in by [concept_general] [SCOPE.sCharacter('general_cavaignac').GetFullName].\n\nThe fighting lasted five days and resulted in #red thousands#! of casualties on both sides.\n\nHowever, [concept_law] and [Concept('concept_authority', 'Order')] were restored in the capital, and the current [concept_government] was successfully maintained."
 
 bpm_springtime_we_have_national_workshops: "[GetAmendmentType('bpm_amendment_national_workshops').GetName] ([concept_amendment]) exist in [ROOT.GetCountry.GetName]"
 bpm_springtime_we_have_restricted_national_guard: "A [GetAmendmentType('bpm_amendment_restricted_national_civic_guard').GetName] ([concept_amendment]) exists in [ROOT.GetCountry.GetName]"
 je_bpm_open_the_national_guard_name: "#bold #blue Open the National Guard#!#!"
 je_bpm_open_the_national_guard_desc: "Access to the [GetLawType('law_national_guard').GetName] was restricted years ago, and to this day, most citizens — such as [GetPopType('peasants').GetName] and [GetPopType('laborers').GetName] — are barred from joining it.\n\nTo an [concept_institution] that is supposed to allow citizens to independently maintain peace and order, and to serve as an [concept_army] of citizens whose rights and freedoms are to be protected against [Concept('concept_country', 'State')] oppression — where is the sense and justice in this?\n\nThe National Guard must be opened to every citizen, regardless of how much they earn or what they own."

 bpm_springtime_of_the_peoples.108.f: "One thing was not ridiculous, but really ominous and terrible; and that was the appearance of Paris on my return. I found in the capital a hundred thousand armed workmen formed into regiments, out of work, dying of hunger, but with their minds crammed with vain theories and visionary hopes. I saw society cut into two: those who possessed nothing, united in a common greed; those who possessed something, united in a common terror.\n\n— Alexis de Tocqueville, 1851"
 bpm_springtime_of_the_peoples.108.a: "Bloody hell."

 bpm_springtime_it_is_imperative_you_have_stuff: "It is essential that you have a high [concept_investment_level] in the [GetInstitutionType('institution_police').GetName] and [GetInstitutionType('institution_home_affairs').GetName], a high [concept_army] [concept_power_projection], and #P positive#! [concept_bureaucracy] before making this decision. Otherwise, the protests resulting from the closure of the [GetAmendmentType('bpm_amendment_national_workshops').GetName] could prove too overwhelming for the [concept_government]!"

 je_bpm_create_the_mobile_guard_name: "#bold #blue Create the Mobile Guard#!#!"
 je_bpm_create_the_mobile_guard_desc: "The [GetLawType('law_national_guard').GetName] is a wonderful institution that helps maintain law and order. It is also often called upon to quell riots and social unrest caused by starving [concept_unemployed], [GetPopType('shopkeepers').GetName], and [GetPopType('laborers').GetName].\n\nBut what if we were to create something new and add a more military aspect; what if we were to create a synthesis of these two opposing forces...? That is exactly what the [GetAmendmentType('bpm_amendment_mobile_guard').GetName] will be!\n\nIt will consist of temporarily employed urban working people, paid enough to keep them from starving, who will work with dedication to maintain public peace. They could also participate as soldiers in wars.\n\nFurthermore, this will help civilize the urban rabble and give them a chance for social enlightnment: the benefits of this concept are clear!"

 bpm_country_fraction_below_expected_sol_10p_tt: "More than #v 10.0%#! of our [Concept('concept_pop', 'Population')] has [concept_sol] below [Concept('concept_expected_sol', 'Expected')]"

 bpm_springtime_of_the_peoples.25.t: "The Pentecostal Storm"
 bpm_springtime_of_the_peoples.25.d: "All hell broke loose in #gold Prague#! after its people erected barricades against [concept_general] [SCOPE.sCharacter('windisch_gratz_character').GetFullName] on #gold June 12th#!, following his earlier provocations, which included bringing in reinforcements and surrounding the city with artillery.\n\nClashes between the [concept_army] and the residents lasted five days, until #gold June 17th#!, when the insurgents surrendered.\n\n[SCOPE.sCharacter('windisch_gratz_character').GetFullName] then declared a state of siege in the city, arrested the insurgents, and sent the delegates of the #yellow Slavic Congress#! home, all to the applause of the local Germans."
 bpm_springtime_of_the_peoples.25.f: "Slavs, in the political sense, are children, but I found an incredible freshness and incomparably more natural intelligence and energy in them than in the Germans. It was touching to see them meet, their childish yet profound delight; one would say that the members of one and the same family, scattered by a terrible fate throughout the whole world, were meeting for the first time after a long and bitter separation. They wept, they laughed, they embraced and in their tears, in their joy, in their cordial greetings there was no phrasemaking, no falseness, no high-flown bombast. Everything was simple, sincere, sacred.\n\n— Mikhail Bakunin, 1851"
 bpm_springtime_of_the_peoples.25.a: "Finally, no more agitators in our backyard!"

 bpm_springtime_of_the_peoples.26.t: "Day and Night in Prague"
 bpm_springtime_of_the_peoples.26.d: "A city-wide uprising is rapidly taking shape in #gold Prague#!.\n\nThe turmoil in the city is growing by the day, especially with the #yellow Slavic Congress#! in session, the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] agitation, and the militant stance of the students and residents of the capital of [SCOPE.sState('BPM_capital_city_of_bohemia').GetName].\n\n[concept_general] [SCOPE.sCharacter('windisch_gratz_character').GetFullName] attempted to defuse the situation with military demonstrations: parades and patrols, deployments of [GetGoods('artillery').GetName], and an active influx of reinforcements; which, however, ended in demonstrations that, after being stopped by the [concept_army], turned into a battle with barricades, wounded, and dead.\n\nFor the moment, [SCOPE.sCharacter('windisch_gratz_character').GetLastName] has withdrawn outside the city..."
 bpm_springtime_of_the_peoples.26.f: "In my opinion, the importance of the Slav Congress lay in the fact that this was the first meeting, the first acquaintance, the first effort at union and understanding of the Slavs among themselves. As far as the congress itself is concerned, it — just like all other contemporary congresses and political gatherings — was decidedly empty and meaningless.\n\n— Mikhail Bakunin, 1851"
 bpm_springtime_of_the_peoples.26.a: "Let [SCOPE.sCharacter('windisch_gratz_character').GetLastName] put them in place."
 bpm_springtime_of_the_peoples.26.b: "Prevent any further escalations under any circumstances!"
 
 general_gratz_puts_them_in_place: "[SCOPE.sCharacter('windisch_gratz_character').GetFullName] will ensure law and order prevail in #gold Prague#!. It is very, very #PB unlikely#! that the [GetCulture('czech').GetName] #springtime Revolutionaries#! win."
 bpm_fear_of_czech_revolution_modifier: "Fear of Czech Revolution"

 bpm_springtime_of_the_peoples.28.t: "On the Aspirations and Demands of the Slavs"
 bpm_springtime_of_the_peoples.28.d: "Today, a delegation led by #yellow Jerzy Lubomirski#! and #yellow Jan Helcelet#! was granted an audience with Kaiser [SCOPE.sCharacter('ferdinandy_the_first').GetFullName] following prior discussions with the [concept_government]. They presented a document containing requests and demands, and expressions of gratitude, from all the #blue Slavic#! peoples residing within the empire.\n\nThe preamble includes a brief overview of recent political events and the assertion that fulfilling the #blue Slavs#!’ demands will serve the interests of a revitalized [ROOT.GetCountry.GetName].\n\nThis is followed by the demands and needs of each of the #blue Slavic#! nations: the strengthening or legalization of their regional assemblies; cultural, administrative, and educational autonomy; freedom from #pink Magyarization#! and #v Germanization#!; equal rights and justice; and other needs.\n\nWhat are we to do?" # This is followed by the demands and needs of each Slavic nation: the #yellow Czechs#!, expressing satisfied gratitude; the #yellow Moravians#!, seeking equal rights with [SCOPE.sState('BPM_capital_city_of_bohemia').GetName]; the #yellow Poles#! and #yellow Ukrainians#!, who in equality and friendship, demand the strengthening of their Galician assembly and the removal of non-#blue Slavic#! [GetPopType('bureaucrats').GetName]; the #yellow Slovaks#!, who want autonomy, free from [SCOPE.sCountry('1848_hungarian_revolution_state').GetName]; the #yellow South Slavs#!, who want their provisional assemblies legalized; and the #yellow Slovenes#!, who want their own Kingdom, a [GetBuildingType('building_university').GetName], and charter.
 bpm_springtime_of_the_peoples.28.a: "Hmm... let's see what we can do about that..."
 bpm_springtime_of_the_peoples.28.b: "Nothing. They don't need any of that."

 bpm_springtime_slavic_demands_sent_to_reichstag: "The #blue Slavic#! #gold Document#! will be sent to the #yellow Reichstag#! and considered by parliament, which may adopt a resolution — either in its #P entirety#! or in a #P modified form#! — to implement the requests and demands."
 bpm_springtime_slavic_demands_constitution: "This resolution will be incorporated into the articles of the [Concept('concept_bpm_constitutional_level', 'Constitution')] and [Concept('concept_law', 'Subsequent Legislation')], granting numerous rights (such as broader legislative and representative powers) to the [GetLawType('law_crownland_diets').GetName]; depending on various factors, depending on various factors, you will then either enact [GetLawType('law_federated').GetName], or maintain the [GetLawType('law_devolved').GetName] [concept_law]."
 
 bpm_springtime_slavic_demands_casus_belli: "If the #yellow Reichstag#! passes the resolution and completes a [Concept('concept_bpm_constitutional_level', 'Constitution')], you will obtain a legitimate [Concept('concept_war_goal', 'Casus Belli')] to go to war with [SCOPE.sCountry('1848_hungarian_revolution_state').GetName]."

 bpm_springtime_it_is_very_unlikely_gratz_can_be_stopped_in_time: "It is very unlikely that [SCOPE.sCharacter('windisch_gratz_character').GetFullName] will be stopped in time."

 bpm_amendment_mobile_guard: "Mobile Guard"
 bpm_amendment_mobile_guard_desc: "A special state-run institution established to maintain peace, typically composed of workers and peasants tasked with upholding public order in times of crisis."
 

 bpm_springtime_healthy_liberal_democracy: "A Healthy and Effective Government" 
 
 je_bpm_responsible_ministers_name: "#bold #pink Sound Representation#!#!"
 je_bpm_responsible_ministers_desc: "[Concept('concept_government', 'Governments')] in our country are becoming fair, effective, and representative.\n\nThere is a sound [GetLawType('law_separated_powers').GetName]; parliamentary sessions are active and regular, filled with debates, legislative changes, and the passage of [Concept('concept_law', 'Laws')]; and [Concept('concept_bpm_minister', 'Ministers')] are becoming increasingly accountable to and responsible before parliament, which reinforces the principle of mutual checks and balances among the branches of government.\n\nMoreover, power is exercised by educated people who possess property, wealth, and wisdom, ensuring the best possible development of society. Even members of the working and rural classes are beginning to engage in politics, developing and acting to the best of their abilities.\n\nA time of beautiful development is dawning."

 bpm_springtime_since_we_have_appointed_by_hos: "Because we have [GetLawType('law_appointed_by_hos').GetName], we will also receive the following:"

 bpm_springtime_of_the_peoples.109.t: "A Healthy and Effective Government"
 bpm_springtime_of_the_peoples.109.d: "Enough time has passed, and enough reforms and changes have been implemented, to allow us to describe the current parliamentary system as sound, representative, and effective.\n\nThe [GetLawType('law_separated_powers').GetName] between the [concept_government] and parliament — each with distinct responsibilities and authorities, and acting as checks and balances on one another — is now firmly established, and will remain in place for many decades to come."
 bpm_springtime_of_the_peoples.109.f: "What has been the result of this legal lie? It meant that, until now, you have had only a sham representative government, a distorted national representation; it meant that you have had a government of abuse, privilege, and injustice; it meant that the interests of the country have never been properly defended in this chamber and that our parliamentary history is one of constant struggle against our revolutionary achievements.\n\n— Adelson Castiau, March 3rd 1848"
 bpm_springtime_of_the_peoples.109.a: "This is great!"

 bpm_we_have_had_special_stuff_for_1_year: "We have had [GetLawType('law_separated_powers').GetName] and [GetLawType('law_wealth_voting').GetName], [GetLawType('law_census_voting').GetName] or [GetLawType('law_universal_suffrage').GetName] for at least #v 1 year#! (currently: #v [ROOT.GetCountry.MakeScope.Var('bpm_springtime_objective_responsible_ministers').GetValue]#! months)"

 notification_bpm_1848_we_have_entered_the_reaction_phase_name: "#v We have entered the [concept_bpm_springtime_reaction_phase]#!"
 notification_bpm_1848_we_have_entered_the_reaction_phase_desc: "The chaos of the #springtime Revolution#! has finally subsided, so the #purple #bold @ig_reactionaries! Reactionaries#!#!, no longer cowering, have begun preparations to retake power."
 
 notification_bpm_1848_we_have_entered_the_revolution_phase_name: "#v We have entered the [concept_bpm_springtime_revolution_phase]#!"
 notification_bpm_1848_we_have_entered_the_revolution_phase_desc: "The fighting spirit of the masses striving for justice is spreading at an astonishing rate, driving the #purple #bold @ig_reactionaries! Reactionaries#!#! back into their cowardly hiding places and spurring the people to action."

 bpm_anger_and_despair_modifier: "Reaction Phase: Vengence and Desperation"

 bpm_requirements_for_the_revolution_to_win: "You must meet the following requirements to enter the [concept_bpm_springtime_reform_phase] and secure a @ig_radicals! @ig_socialists! #bold #pink Democrat#!#! victory:"

