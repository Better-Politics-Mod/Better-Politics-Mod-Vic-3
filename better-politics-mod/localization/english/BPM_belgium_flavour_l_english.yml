 liberal_party_congress_happened_tooltip: "The #gold Liberal Congress#! has happened, creating the #yellow Liberal Party#!"

 bpm_weakened_impetum: "Weakened Impetum"

 bpm_belgian_law_events.6.t: "Fixing Electoral Qualification at the Established Minimum"
 bpm_belgian_law_events.6.d: "A bill reforming electoral qualifications was recently introduced in the #yellow House of Representatives#!.\n\nFive days later, the bill was passed unanimously, and a week later. it was implemented by the vote of the #yellow Senate#!.\n\nThis reform equalizes the electoral tax throughout the country, without distinction between rural and urban areas as was previously the case, at #gold 20 florins#!, established by the constitutional minimum."
 bpm_belgian_law_events.6.f: "What has been the result of this legal lie? It meant that, until now, you have had only a sham representative government, a distorted national representation; it meant that you have had a government of abuse, privilege, and injustice; it meant that the interests of the country have never been properly defended in this chamber and that our parliamentary history is one of constant struggle against our revolutionary achievements.\n\n— Adelson Castiau, March 3rd 1848"
 bpm_belgian_law_events.6.a: "Belgium will withstand the storm!"

 je_bpm_push_for_electoral_tax_equal_name: "Equalize the Electoral Tax"
 je_bpm_push_for_electoral_tax_equal_desc: "Europe is rumbling, revolutionary and subversive voices are reaching ever deeper corners of the old continent. These voices are also growing louder here, seeking to overthrow the current system.\n\nA reform is needed to take the momentum out of these movements, and the proposal from the Liberal Congress program introduced by [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant], which mentions lowering the electoral tax throughout the country to the constitutional minimum (20 florins), could be an excellent weapon against the revolutionaries.\n\nAlthough many representatives are opposed to it in their hearts, the current circumstances should convince them to vote yea." 

 je_bpm_push_for_doctrinairean_name: "Implement the Doctrinaire Tax"
 je_bpm_push_for_doctrinairean_desc: "The threat of Catholic domination and betrayal of the principles and ideals of the September Revolution, in which many Belgians fought for freedom, is very great.\n\nWe have already seen these infamous ‘reactionary’ reforms and attempts to introduce them by [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant] and other traitors to freedom and liberalism, all in order to cement their structures and influence.\n\nAllowing such people to vote must be stopped by raising the electoral tax and equalizing it across the country to give those in cities the same opportunities as those in rural areas."

 you_will_be_able_to_choose_the_minimum_tt: "@information! Since no #brightyellow Doctrinaire#! agreed on the amount by which the electoral tax should be increased, you will be able to #L #bold choose#!#! one of the options."
 
 bpm_law_effect_tt_repeatable_different_union_of_opposotions: "@information! #blue The following effects are different while #bold $je_bpm_unions_des_oppositions$#! [concept_journal_entry] is active.#!"

 doctrinairean_igs_have_more_clout_than_right_unionists: "#brightyellow Doctrinaire#! [Concept('concept_interest_group', 'Interest Groups')] have more [concept_clout] than #blue Right Unionist#! [Concept('concept_interest_group', 'Interest Groups')] (currently [GetPlayer.MakeScope.ScriptValue('bpm_doctrinaire_igs_group_clout')|%] #v vs.#! [GetPlayer.MakeScope.ScriptValue('bpm_right_unionist_interest_groups_clout')|%])"

 bpm_belgian_law_events.7.t: "Fixing an Increased Electoral Qualification"
 bpm_belgian_law_events.7.d: "A bill reforming electoral qualifications was recently introduced in the #yellow House of Representatives#!.\n\nIt is highly controversial because its aim is to #red raise#! the electoral tax and make it equal across the country, which deprives many rural residents of their vote and keeps the lower middle class outside the threshold in cities.\n\nThere are constant amendments and proposals regarding the minimum amount to which it should be raised, and each of them is moderately attractive to the #brightyellow Doctrinaires#!."

 information_this_is_a_radical_reform: "@information! This reform is unpopular, and is questioned among the less moderate #brightyellow Doctrinaires#!!"
 
 warning_this_is_a_radical_reform: "@warning! This reform is highly unpopular, and its usefulness is questioned even among the most conservative #brightyellow Doctrinaires#!!"

 bpm_belgian_law_events.7.a: "A minimum of 35 florins should keep thing cultured."
 bpm_belgian_law_events.7.b: "50 florins will certainly keep the swine out of politics."
 bpm_belgian_law_events.7.c: "Minimum of 60 florins will be harsh, but it's needed."



 ideology_leader_liberal_paternalistic: "Liberal Paternalistic"
 ideology_leader_liberal_paternalistic_desc: "#lore This leader is both a liberal and paternalist, and keeping principles of liberalism in mind seeks to ensure equal chances through state involvement.#!"

 bpm_je_green_progress_complete: "The #bold #green Progress Bar#!#! has reached #variable 100%#!"

 bpm_belgian_law_amendments.1.t: "Municipal Law Amendments"
 bpm_belgian_law_amendments.1.amendment_into_federated: "The prerogatives introduced by the [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant], giving the #gold King#! the power to appoint #yellow burgomasters#! from among the electors, as well as the amendment introducing the fragmentation of electoral districts, were repealed.\n\nThe repeal of the so-called ‘reactionary laws’ is seen by all liberals as a victory of freedom and progress over reaction."
 bpm_belgian_law_amendments.1.amendment_into_devolved: "A couple of changes have been passed through the Parliament regarding the #yellow Municipal Law#!. It gives the King the right to appoint burgomasters from outside the municipal council, from among its electors.\n\nThis amendment had trouble getting through parliament, so the Prime Minister persuaded [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant] to vote in favor by introducing another amendment on the fragmentation of electoral districts.\n\nThis law divides districts for municipalities with a population of more than 12,000 into smaller ones, which deprives municipalities of a significant number of liberal representatives.\n\nLiberals of all branches criticize, and protest against the ‘reactionary laws’."
 bpm_belgian_law_amendments.1.f: "Elsewhere and at the same time, Catholics realized that decentralization itself had its dangers. (...) several cities used their communal rights as a bulwark against ultramontane sentiment. In some places, this took the form of refusing subsidies to Christian schools; in others, it meant hindering the establishment of Jesuit institutions; and elsewhere, it meant encouraging state colleges in all kinds of ways.\n\n— Gustave d'Alaux in #italic La belgique et le parti catholique depuis 1830#!, 1845"
 bpm_belgian_law_amendments.1.a: "So much storm over minor laws..."

 Brabant: "Brabant"

 bpm_belgian_law_amendments.2.t: "Organic Law on Primary Education Amendments"
 bpm_belgian_law_amendments.2.amendment_into_public: "Some changes to the #yellow Organic Law on Primary Education#! were introduced by the [concept_government]. It managed to push through some amendments to the clerical law of the [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant].\n\nThese amendments significantly weaken the clergy, introduce a commission giving municipalities the power to appoint teachers, and change the organization of schools. Although many anti-clericals wanted complete secularization, fears of weakening the state during consolidation prevented their demands from being met."
 bpm_belgian_law_amendments.2.amendment_into_religious: "Not fully satisfied with the compromise Organic Law on Primary Education, [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant] pushed through a number of amendments to the law following a clerical offensive in municipalities.\n\nThese amendments grant many concessions to the clergy, including state subsidies exclusively for them, and restrict the municipalities in the field of education.\n\nOpponents of the new law are actively protesting and have already launched their own counterattack, calling the law a ‘religious reaction’."
 bpm_belgian_law_amendments.2.f: "It was only at the time of the competition, when I sent a circular to all establishments receiving state subsidies, that the municipal administration of Chimay informed me that the episcopal authority was in charge of its college and that it opposed the government inspecting the establishment by means of a competition. It was only then that I learned that the college had been handed over to the bishop. I informed the municipal administration that if it refused to submit to the inspection, all subsidies would be withdrawn.\n\n— Charles Rogier to #L Prime Minister#! Sylvain Van de Weyer, January 16th 1846"
 bpm_belgian_law_amendments.2.a: "Will this ever end?"

 this_decentralization_not_considered_tt: "This level of decentralization is #bold #red not#!#! even considered by any representative. (#italic Has #bold $je_bpm_unions_des_oppositions$#! [concept_journal_entry] active#!)"
 this_centralization_not_considered_tt: "This level of centralization is #bold #red not#!#! even considered by any representative. (#italic Has #bold $je_bpm_unions_des_oppositions$#! [concept_journal_entry] active#!)"
 
 
