 ideology_dop_radical_parliamentarian: "Radical Parliamentarian"
 ideology_dop_radical_parliamentarian_desc: "#lore This group believes in the primacy and glory of democracy centered around a powerful parliament, and will vigorously promote suffrage in all areas of government.#!"

 ideology_dop_moderate_parliamentarian: "Moderate Parliamentarian"
 ideology_dop_moderate_parliamentarian_desc: "#lore Striking a middle stance, this group holds democracy centered around a powerful parliament as a political principle, but believes that limits must be imposed in any sensible government.#!"

 ideology_dop_authoritarian_parliamentarian: "Authoritarian Parliamentarian"
 ideology_dop_authoritarian_parliamentarian_desc: "#lore Either cynically or sincerely, this group believes that some amount of popular participation in parliamentary governance is needed, but seeks to impose strong limits on who can participate and what can be changed.#!"

 bpm_springtime_buildup.1.t: "Schlesischer Weberaufstand"
 bpm_springtime_buildup.1.d: "Rapid industrialization brought new weaving machines to factories in #yellow Silesia#!, depriving many traditional local weavers of their jobs and income.\n\nThis, combined with the growing radicalization of the population, led to a small, local armed uprising.\n\nOn the first day, after the arrest of one of the demonstrators in #gold Peterswaldau#!, a desperate crowd vandalized and marched on several nearby factories.\n\nThe next day in #gold Langenbielau#!, the house of prominent #yellow Christian Gottlob Dierig#! was burned down and several factories were damaged; the first armed forces units began to quell the revlot. The next day, the uprising was completely suppressed, with a death toll of about #red 11#! and several dozen injured."
 bpm_springtime_buildup.1.f: "A curse on the king, the wealthy men's chief\nWho was not moved even by our grief\nWho wrenched the last coin from our hand of need,\nAnd shot us, screaming like dogs in the street!\nWe're weaving, we're weaving!\n\n— Heinrich Heine’s ‘#bold Die armen Weber#!’ poem in the #italic Vorwärts#!, July 10th 1844"
 bpm_springtime_buildup.1.a: "We're weaving, we're weaving!"

 bpm_springtime_buildup.2.t: "Münchner Bierrevolution"
 bpm_springtime_buildup.2.d: "Beer is a natural and integral part of every Bavarian's life, consumed primarily by the working classes. The price of beer, a satisfying #gold 9 kreutzers#!, was set by our state, but it did not reflect the rising price of grain.\n\nTherefore, [SCOPE.sCountry('BPM_bavaria_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('king_ludwig_of_bavaria').GetFullName] raised the price of beer by #gold 1 kreutzer#!, which, unlike the increase in the price of bread, was met with a fierce reaction.\n\nThousands of craftsmen and workers began protests in #yellow München#!, which soon turned into riots, destruction of property, and fights with the police, which lost. The army refused to carry out orders.\n\nThe frightened [SCOPE.sCountry('BPM_bavaria_scope').GetRuler.GetPrimaryRoleTitle] restored the price, ending the four-day riots."
 bpm_springtime_buildup.2.f: "If the people once know that they can frighten the government out of their taxing system, they will soon learn that it will be as easy to frighten them as far as regards more serious affairs.\n\n— Frederick Engels’s article in #italic The Northern Star#!, May 25th 1844"
 bpm_springtime_buildup.2.a: "Better to have a belly from drinking than a hump from working."

 concept_bpm_springtime_revolution_phase: "Revolution Phase"
 concept_bpm_springtime_revolution_phase_desc: "The Revolution Phase is one of three possible phases that can occur during the #springtime $je_springtime_of_the_peoples$#! [concept_journal_entry]. It is one of two possible phases for the [Concept('concept_bpm_springtime_victim_of_the_revolution', 'Victims of the Revolution')], and it lasts 6 months.\n\nDuring the Revolution Phase, @ig_liberals! @ig_national_liberals! @ig_market_liberals! #bold #yellow Liberals#!#! and/or @ig_radicals! @ig_socialists! #bold #pink Democrat#!#! are on the bold offensive; whereas @ig_reactionaries! @landowners_bpm! @petty_bourgeoisie_bpm! @armed_forces_bpm! #bold #purple Reactionaries#!#! are in a panicked retreat, and the [concept_bpm_springtime_counterrevolutionary_preparadness] progress bar cannot rise.\n\nThe [concept_government]’s main goal during the Revolution Phase is to maintain public support ([concept_bpm_springtime_revolutionary_drift]), enact [Concept('concept_law', 'Laws')] and #bold #blue Reforms#!#!, and abolish [Concept('concept_amendment', 'Privileges')]. During this phase, [concept_bpm_political_stability] remains relatively low, allowing for rapid reforms.\n\nTime is of the essence! Once the 6 months have passed, the [Concept('concept_country', 'State')] will enter the [concept_bpm_springtime_reaction_phase]."

 concept_bpm_springtime_reaction_phase: "Reaction Phase"
 concept_bpm_springtime_reaction_phase_desc: "The Reaction Phase is one of three possible phases that can occur during the #springtime $je_springtime_of_the_peoples$#! [concept_journal_entry]. It is one of two possible phases for the [Concept('concept_bpm_springtime_victim_of_the_revolution', 'Victims of the Revolution')], and it lasts 6 months.\n\nDuring the Reaction Phase, the previously cowardly @ig_reactionaries! @landowners_bpm! @petty_bourgeoisie_bpm! @armed_forces_bpm! #bold #purple Reactionaries#!#! begin preparations, and become increasingly arrogant, to carry out a violent seizure of power — a counterrevolution — and restore the old order, albeit perhaps in a modified form.\n\nThat is measured by the [concept_bpm_springtime_counterrevolutionary_preparadness] progress bar, which rises for various reasons and to varying degrees, but is empowered most by low [concept_bpm_springtime_revolutionary_drift].\n\nOnce the 6 months have passed, the [Concept('concept_country', 'State')] will enter the [concept_bpm_springtime_revolution_phase]."

 concept_bpm_springtime_reform_phase: "Reform Phase"
 concept_bpm_springtime_reform_phase_desc: "The Reform Phase is one of three possible phases that can occur during the #springtime $je_springtime_of_the_peoples$#! [concept_journal_entry].\n\nIt is the final phase, which can be entered by fulfilling all the requirements for a @ig_liberals! @ig_national_liberals! @ig_market_liberals! #bold #yellow Liberal#!#! or @ig_radicals! @ig_socialists! #bold #pink Democrat#!#! victory; and it is the only phase available to [Concept('concept_bpm_springtime_child_of_the_revolution', 'Children of the Revolution')], though it remains ‘incomplete’ until one of the [Concept('concept_bpm_ideological_ig', 'Ideological Groups')] wins. @petty_bourgeoisie_bpm! @armed_forces_bpm! #bold #purple Reactionaries#!#! force this phase after a successful counterrevolution.\n\nIn the Reform Phase, which is the final point between social stability and the chaos and fear of the #springtime Revolution#!, [concept_bpm_springtime_revolutionary_disorder_events] is very rare, and the threat from @ig_reactionaries! @landowners_bpm! @petty_bourgeoisie_bpm! @armed_forces_bpm! #bold #purple Reactionaries#!#! ([concept_bpm_springtime_counterrevolutionary_preparadness]) does not exist.\n\nThis is a phase from which one can no longer exit, unlike the [concept_bpm_springtime_revolution_phase] and the [concept_bpm_springtime_reaction_phase]."  

 concept_bpm_springtime_child_of_the_revolution: "Child of the Revolution"
 concept_bpm_springtime_child_of_the_revolution_desc: "A Child of the Revolution is [concept_country] where the spirit of revolution has fully taken hold of the state and its nation, replacing the previous [Concept('concept_government', 'Government')] and entering the [concept_bpm_springtime_reform_phase].\n\nChildren of the Revolution appear when, for example, a [concept_state] secedes, revolutionaries overthrow the existing system, or a [concept_country] under the oppression of another ignites its own #springtime Revolution#! and carries out a major reform of its system.\n\nChildren of the Revolution heavily rely on the legitimacy of the masses, which is based on the overall average of the [concept_bpm_springtime_revolutionary_drift] of @intelligentsia_bpm! #yellow Artisans#!, @trade_unions_bpm! #pink Proletarians#!, and @rural_folk_bpm! #green Peasants#!.\n\nThis legitimacy grants them great advantages, but it can also be easily lost. For example, failure to complete a [Concept('concept_bpm_constitutional_level', 'Constitution')] within a year or the laborious implementation of reforms can lead to its loss, and that may create a threat of either the decline of the #springtime Revolution#!’s forces, vulnerability to an invasion from outside, or the emergence of a new, charismatic figure or group (with #purple Reactionary#! leanings). This group or figure will then attempt to seize this legitimacy and, following a successful [concept_election] and a period in office, carry out a coup d’état."

 concept_bpm_springtime_victim_of_the_revolution: "Victim of the Revolution"
 concept_bpm_springtime_victim_of_the_revolution_desc: "A Victim of the Revolution is a [concept_country] that has had the misfortune of fighting against the spirit of the #springtime Revolution#! and had been forced to make all manner of concessions; however, that spirit has not overthrown the existing system.\n\nVictims of the Revolution progress through the [Concept('concept_bpm_springtime_revolution_phase', 'Revolution Phases')] and the [Concept('concept_bpm_springtime_reaction_phase', 'Reaction Phases')] until they enter the [concept_bpm_springtime_reform_phase] or the #springtime $je_springtime_of_the_peoples$#! [concept_journal_entry] concludes.\n\nThey are exceptionally susceptible to [concept_bpm_springtime_revolutionary_disorder_events], which is based on high [concept_bpm_springtime_revolutionary_drift] #v vs.#! the maintenance of law and order. High revolutionary drift or some reactionary event can lead to the emergence of the fearsome [concept_bpm_springtime_wrath_of_the_revolution], which, if left uncurbed, may lead to a [GetLawType('law_parliamentary_republic').GetName] (and thus becoming a [concept_bpm_springtime_child_of_the_revolution]).\n\nDuring the [Concept('concept_bpm_springtime_reaction_phase', 'Reaction Phases')], Victims of the Revolution must contend with [concept_bpm_springtime_counterrevolutionary_preparadness], based on multiple indicators including [concept_bpm_springtime_revolutionary_drift], which can destroy the achievements of the #springtime Revolution#! and restore former influential and oppressive figures to power.\n\nThe ultimate goal of the victims of the revolution is, therefore, to maintain the highest possible [concept_bpm_springtime_revolutionary_drift] of the masses and to enter the [concept_bpm_springtime_reform_phase]; this is achieved through the successful completion of the [Concept('concept_bpm_constitutional_level', 'Constitution')] and the abolition of [Concept('concept_amendment', 'Privileges')]."

 

 concept_bpm_springtime_counterrevolutionary_preparadness: "Counterrevolutionary Preparadness"
 concept_bpm_springtime_counterrevolutionary_preparadness_desc: "Counterrevolutionary Preparadness represents the overall level of preparation, organization, resources, determination, dedication, and arrogance of the reactionary forces in carrying out a counterrevolution. This progress bar can only increase during the [concept_bpm_springtime_reaction_phase] and only for countries that are [Concept('concept_bpm_springtime_victim_of_the_revolution', 'Victims of the Revolution')].\n\nIf it reaches #v 100%#!, the reactionary forces will attempt to seize the capital; if they encounter the [concept_bpm_springtime_wrath_of_the_revolution], they will have to fight a bloody and fierce battle against the revolutionary forces — if they win, Preparadness will drop to #v 0%#! and the [concept_bpm_springtime_revolution_phase] will begin; the second time, the [Concept('concept_bpm_constitutional_level', 'Constitution')] will be decidedly autocratic.\n\nHowever, once the reactionary forces successfully reconquer the capital — whether they encounter the [concept_bpm_springtime_wrath_of_the_revolution] or not — and depending on the previously chosen tactics (if you have sided with the @ig_reactionaries! #purple Reactionaries#!), the [concept_ruler]’s [Concept('concept_character_trait', 'Character Traits')], and the [concept_clout] of [Concept('concept_interest_group', 'Interest Groups')] in the country, a constitution may be imposed. This constitution may be relatively liberal, very conservative; if the atmosphere is too reactionary however, the [concept_ruler] may abolish every reform and law implemented by the #springtime Revolution#!!"

