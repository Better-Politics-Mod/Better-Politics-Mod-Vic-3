 bpm_amendment_curiae_suffrage_system: "Curiae System"
 bpm_amendment_curiae_suffrage_system_desc: "A system of the so-called ‘Curiae’ where each class-based assembly elects representatives. There is one curia each for landowners, industrialists, towns and cities, and rural communities."
 
 bpm_amendment_estate_assembly_system: "Estate Assembly System"
 bpm_amendment_estate_assembly_system_desc: "A system of political representation in which strictly defined social classes — such as the nobility, the clergy, the burghers, and the peasantry — elect representatives or are appointed to the legislature. However, these classes are balanced against one another, typically with a single vote allocated to each one."

 bpm_amendment_elitist_upper_chamber: "Elitist Upper Chamber"
 bpm_amendment_elitist_upper_chamber_desc: "The Upper House is either elected or fully controled by the nobility, clergymen and by apointees by the ruler; often also supplemented by a large variety of rights."

 bpm_amendment_freedom_of_christian_faith: "Freedom for Recognised Christians"
 bpm_amendment_freedom_of_christian_faith_desc: "Only certain close Christian faiths, such as specific Protestant faiths and Catholicism, are accepted and protected by the state."

