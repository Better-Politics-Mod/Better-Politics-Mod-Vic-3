l_english:

### Vormärz ###
 vormaerz.1.t: "Legacy of the Napoleonic Code"
 vormaerz.1.d: ""
 vormaerz.1.f: ""
 vormaerz.1.a: "A thorn in our side to be sure."

 vormaerz.2.t: "The Dream of Unity"
 vormaerz.2.d: ""
 vormaerz.2.f: ""
 vormaerz.2.a: "One day, we shall be united as one."

 vormaerz.3.t: "Of Culture and Politics"
 vormaerz.3.d: "The Karlsbad Decrees within the German Confederation have put severe restrictions on political and personal liberties. Some political thinkers have retreated into private life, whereas others have begun organising in sports or singing clubs. Seemingly apolitical on the surface, they serve as excellent places for exchange of political thought without raising suspicion."
 vormaerz.3.f: ""Important question to be considered in today's meeting:\n\nHow much longer will we be allowed to think?""
 vormaerz.3.a: "Worrisome."

 vormaerz.4.t: "The State of the Countrtyside"
 vormaerz.4.d: ""
 vormaerz.4.f: ""
 vormaerz.4.a: "An awful sight..."

 vormaerz.5.t: "The Communist Manifesto"
 vormaerz.5.d: "Across the channel in London, a manifesto has been published - the Manifesto of the Communist Party. Within it, the authors Marx and Engels speak of class struggle, an idea that has not fallen on deaf ears in the German states."
 vormaerz.5.f: ""A spectre is haunting Europe - the spectre of communism." \n\n From the preamble of the Communist Manifesto"
 vormaerz.5.a: "This will certainly rile up the workers..."

### Robert Blum ###
 robert_blum.1.t: "The Man from Cologne"
 robert_blum.1.d: "Born in Cologne and politically active in Saxony, [SCOPE.sCharacter('robert_blum_scope_scope').GetFullName] had already made a name for himself well before the revolution. He travelled to Frankfurt to join the National Assembly and quickly became the de-facto leading figure of the [SCOPE.sCharacter('robert_blum_scope').GetInterestGroup.GetName] within it, in part due to his energetic speeches and excellent leading skills."
 robert_blum.1.f: ""There would never have been a Christendom nor a Reformation nor a state revolution nor anything good and great at all if everyone had always thought: 'You're not changing anything!'" \n\n-Robert Blum, 1844"
 robert_blum.1.a: "A man for the people..."
 robert_blum.1.b: "...and a threat to stability!"

 robert_blum.2.t: "The Fate of Robert Blum"
 robert_blum.2.d1: "With democracy and unity brought to Germany, the revoltuion had succeeded at last. [SCOPE.sCharacter('robert_blum_scope').GetFullName], ambitious as ever, continues his political career and has now assumed leadership of the [SCOPE.sCharacter('robert_blum_scope').GetInterestGroup.GetName]. "
 robert_blum.2.d2: "After hearing of a popular uprising in Vienna and the flight of the Habsburg Kaiser, [SCOPE.sCharacter('robert_blum_scope').GetFullName] had made his way to the Austrian capital. The counterrevolutionary forces quickly swept into the city, however, and arrested Blum soon after. Despite his immunity as a representative of the National Assembly, he was sentenced to death after a performative trial and executed the following morning."
 robert_blum.2.f1: ""When I heard Blum speak so splendidly today and the galleries could not help applauding, Robespierre involuntarily came to mind, and a dark premonition awoke in my soul that it was quite possible that he might soon have surpassed Gagern (president of the National Assembly), that he might soon be at his post..."\n\n-Clotilde Koch-Gontards, 1848"
 robert_blum.2.f2: ""I die for the freedom I fought for. May the fatherland remember me." \n\n-Robert Blum's last words, 9th November 1848"
 robert_blum.2.a: "The future of Germany will be bright."
 robert_blum.2.b: "The revolution dies with him."

### Schutzzoll ###
 schutzzoll.1.t: "A Marriage of Iron and Rye"
 schutzzoll.1.d: "The troubling state the Gründerkrach has left our economy in has led to an unorthodox alliance - that of Industrialists and Agrarian Junkers. Representatives have come together in respective conventions to draft a plan for the introduction of $CONCEPT_IMPORT$ [Concept('concept_tariffs','$concept_tariffs$')] on various industrial and agrarian goods. While the [GetInterestGroupVariant('ig_national_liberals',GetPlayer).GetNameWithCountryVariant] support the prospect of tariffs, the [GetInterestGroupVariant('ig_market_liberals',GetPlayer).GetNameWithCountryVariant] are in staunch opposition to them, which has caused a split in the Nationalliberale Partei."
 schutzzoll.1.f: ""
 schutzzoll.1.a: "Interesting"
