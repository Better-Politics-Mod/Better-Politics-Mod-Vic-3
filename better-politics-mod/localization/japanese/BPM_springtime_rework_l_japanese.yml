 je_bpm_crises_italian_war_of_independence: "#v Italian War of Independence#!\n$TOOLTIP_DELIMITER$\nCurrent [Concept('concept_battle', 'Battles')] won by #bold #green Italians#!#!: [GetGlobalVariable('bpm_italian_independence_revolutionaries_score').GetValue|+0=]\nCurrent [Concept('concept_battle', 'Battles')] won by #bold #white Austrians#!#!: [GetGlobalVariable('bpm_italian_independence_austrians_score').GetValue|-0=]\n$TOOLTIP_DELIMITER$\nIf the #green #bold Italians#!#! lose #bold #yellow 5 [Concept('concept_battle', 'Battles')]#!#!, non-revolutionary and external powers, such as [SCOPE.sCountry('1848_sardinia_piedmont_country').GetName], will withdraw from the war by signing the #v Salasco Armistice#!. [SCOPE.sCountry('1848_austria_empire_country').GetName] will then take full control of [GetStateRegion('STATE_LOMBARDY').GetName] and will be able to prepare for the final capture of [GetStateRegion('STATE_VENETIA').GetName].\n\nIf the #bold #white Austrians#!#! lose #bold #yellow 5 [Concept('concept_battle', 'Battles')]#!#!, they will sign a treaty with the victors, withdrawing completely from the #yellow #L Apennine Peninsula#!#!. The #bold #green Italians#!#! will be then able to pursue [concept_unification] through [concept_customs_union], their very own #v National Assembly#! or [concept_revolution]"

 bpm_springtime_of_the_peoples.13.t: "The Salasco Armistice"
 bpm_springtime_of_the_peoples.13.d: "After the defeat at the #yellow Battle of Custoza#!, the united #green #bold Italian#!#! forces were forced to retreat to #gold Milan#!, where there was a shortage of money and sufficient ammunition supplies.\n\n[SCOPE.sCountry('1848_sardinia_piedmont_country').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('king_of_piedmont').GetFullName] therefore began negotiations with the #white #bold Austrians#!#! regarding the terms of surrender, securing a guarantee of safety for the city and its people; however, this did not sit well with the people at all, who began rioting, demanding the city’s defense and accusing him of treason.\n\nTwo days after the talks concluded, the [SCOPE.sCountry('1848_austria_country').GetAdjective] [concept_army] entered #gold Milan#!, and the following day an official armistice was signed, restoring the borders of #v 1815#! and establishing a six-week ceasefire."
 bpm_springtime_of_the_peoples.13.f: "If ever a new war arises against Austria, I will come running immediately, even if only as a simple soldier, among the ranks of her enemies I am equally raised up by the thought and the hope that the day will come which I tried to bring about... The nation could have had a better prince than me, but not one that loved her more.\n\n— King Charles Albert, 1849"
 bpm_springtime_of_the_peoples.13.a: "It had to be done."
 bpm_traditore: "Tratidore!"
 bpm_betrayed_the_revolution: "Betrayed the Revolution"

 PAR_will_be_released: "Parma-Pianceza will be released"
 MOD_will_be_released: "Modena-Reggio will be released"

 bpm_springtime_of_the_peoples.14.t: "The Two Plebiscites"
 bpm_springtime_of_the_peoples.14.d: "Following the flight of the Duke of #yellow Parma-Piacenza#! and the evacuation of the #white #bold Austrian lords#!#!, a #gold Provisional Government#! was established, which later announced that citizens would be able to vote in a plebiscite on which country they wished to join.\n\nFirst, the residents of #gold Piacenza#! voted: they voted almost unanimously to join [SCOPE.sCountry('1848_sardinia_piedmont_country').GetName].\n\nThen, a few weeks later, the residents of the #gold Parma#! region voted: they also voted almost unanimously to join their northern neighbor."
 bpm_springtime_of_the_peoples.14.f: "The Provisional Government of Parma, considering the current state of affairs in our country and in Italy, and the necessity that this uncertainty — which is harmful to each of the newly independent states and dangerous to all of Italy — should not continue any longer.\n\n— Content of the ‘#bold Solemn Act of the State of Parma Regarding its Union with the Kingdom of Sardinia#!’, May 29th 1848"
 bpm_springtime_of_the_peoples.14.a: "One step closer to unified Italy!"

 bpm_springtime_of_the_peoples.15.t: "Duke [SCOPE.sCharacter('bpm_ruler_francis_v').GetFullName] Exiles Himself!"
 bpm_springtime_of_the_peoples.15.d: "Duke [SCOPE.sCharacter('bpm_ruler_francis_v').GetFullName], seeing that his attempt to suppress the revolutionaries and demonstrators led by [SCOPE.sCharacter('giuseppe_malmusi_guy').GetFullName] and others was failing, and upon learning of the approaching volunteers from #gold Bologna#! who were eager to fight him, made a drastic decision.\n\nHe granted [SCOPE.sCharacter('giuseppe_malmusi_guy').GetLastName] the title of head of government, promised a [Concept('concept_bpm_constitutional_level', 'Constitution')] and amnesties, and left the country."
 bpm_springtime_of_the_peoples.15.f: "It was not the weapons of governments, nor the tactics of reactionaries, but revolutionary excesses that have thwarted—and continue to thwart—the triumph of nations striving to win their independence.\n\n— Giuseppe Malmusi, 1850"
 bpm_springtime_of_the_peoples.15.a: "At least that's that..."

 Malmusi: "Malmusi"

 notification_bpm_1848_salasco_armistice_name: "#v [SCOPE.sCountry('1848_sardinia_piedmont_country').GetName] signs the #L Salasco Armistice#!!#!"
 notification_bpm_1848_salasco_armistice_desc: "Following the defeat at the #yellow Battle of Custoza#! and the realization that #gold Milan#! could not be defended, [SCOPE.sCountry('1848_sardinia_piedmont_country').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('king_of_piedmont').GetFullName] signed an armistice with the Austrians."

 notification_bpm_1848_pillersdorf_constitutition_name: "#v Pillersdorf Constitution in [SCOPE.sCountry('1848_austria_empire_country').GetName]!#!"
 notification_bpm_1848_pillersdorf_constitutition_desc: "As Kaiser [SCOPE.sCharacter('ferdinandy_the_first').GetFullName] had promised, a [Concept('concept_bpm_constitutional_level', 'Constitution')] has been promulgated, however met with widespread discontent."
  
 bpm_add_italian_independence_crisis: "Adds #springtime $je_bpm_italian_war_of_independence$#! #crisis Crisis#! to the #crisis Crisis Monitor#!!"

 bpm_springtime_of_the_peoples.51.t: "The Revolution's Wrath: Demonstrations!"
 bpm_springtime_of_the_peoples.51.d: "Today, the #springtime Revolution#! has reached our capital, #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#!.\n\nCrowds of workers, artisans, and members of the bourgeoisie gathered and held a massive demonstration.\n\nVarious [Concept('concept_politician', 'Politicians')] and orators spoke, agitating, and later sent petitions asking — or rather demanding — the introduction of all manner of #L #yellow freedoms#!#! and #L #yellow equality#!#!, #L #yellow representation#!#!, and #L #yellow reforms#!#!.\n\nEven the [GetPopType('peasants').GetName] have begun to take an interest in liberalization.\n\nWhat are we to do?"
 bpm_springtime_of_the_peoples.51.f: "I turned from very conservative to very liberal within 24 hours.\n\n— King William II Orange-Nassau, March 16th 1848"
 bpm_springtime_of_the_peoples.51.a: "Liberalize and establish a commission to draft the constitution."
 bpm_springtime_of_the_peoples.51.b: "Liberalize and prepare an edict on electoral law."
 bpm_springtime_of_the_peoples.51.c: "Put an end to those scoundrels!"
 bpm_springitme_state_comission_will_be_appointed: "A #yellow State Comission#! will be appointed, which will prepare a [Concept('concept_bpm_constitutional_level', 'Constitution')]."
 bpm_springtime_this_comission: "@information! This #yellow Commission#! will carry out its work in cooperation with the #gold [SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle]#! and the political elites, which will make it quite conservative but also widely respected."
 bpm_springitme_the_parliament_will_draft: "A parliament will be elected to draft a [Concept('concept_bpm_constitutional_level', 'Constitution')]. @information! You will have full control over the choice of [Concept('concept_law', 'Laws')] and reforms."
 bpm_springtime_moderate_revolutionarism: "#gold Revolutionary Drift#! of @intelligentsia! #yellow Artisans#!, @trade_unions! #pink Proletarians#! and @rural_folk! #green Peasants#! will be #L #bold low#!#!!"
 bpm_we_have_9_months_to_draft_a_constition: "@warning! We have #bold #yellow 9 months#!#! to draft a [Concept('concept_bpm_constitutional_level', 'Constitution')]. If we #red #bold fail#!#! to, we may face the full wrath of the #springtime Revolution#!!"
 bpm_springtime_counterrevolution_will_be_stronger_tt: "@warning! The @ig_reactionaries! #purple #bold Counterrevolutionary Preparadness#!#! will be much more extensive and rapid, as many reforms could work terribly against it!"

 bpm_springtime_of_the_peoples.511.t: "[SCOPE.sCountry('bpm_our_capital').GetAdjectiveNoFormatting] Electoral Law"
 bpm_springtime_of_the_peoples.511.d: "As #yellow [SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle]#! [SCOPE.sCharacter('our_beloved_ruler').GetFirstName] had promised, the electoral law for the election of the parliament was enacted today; once convened, the parliament will begin work on a new constitution for [ROOT.GetCountry.GetName].\n\nThe electoral law has characteristics of [SCOPE.GetRootScope.GetCountry.GetCustom('bpm_our_country_has_what_suffrage')]."
 bpm_universal_suffrage_wow: "[GetLawType('law_universal_suffrage').GetName]"
 bpm_census_voting_name: "[GetLawType('law_census_voting').GetName]"
 bpm_springtime_of_the_peoples.511.f: "We, Frederick William, by the grace of God, King of Prussia, etc., etc.,\n\ndecree, after hearing Our loyal estates assembled in the United Landtag, upon the proposal of Our State Ministry, as follows:\n\n§ 1. Every Prussian who has attained the age of 24 and has not lost the full enjoyment of civil rights as a result of a final judicial decision shall be a voter with the right to vote in the municipality in which he has had his residence or place of abode for six months, provided that he does not receive public assistance for the poor.\n\n— Contents of the ‘#bold Wahlgesetz für die zur Vereinbarung der Preußischen Staatsverfassung zu berufende Versammlung#!’, April 8th 1848"
 bpm_springtime_of_the_peoples.511.a: "That should do fine."

 bpm_springtime_of_the_peoples.16.t: "Pillersdorfsche Verfassung"
 bpm_springtime_of_the_peoples.16.d: "Today, on #gold April 25th#!, after receiving ratification from Kaiser [SCOPE.sCharacter('ferdinandy_the_first').GetFullName], Interior Minister #yellow Franz von Pillersdorf#! announced [ROOT.GetCountry.GetName]’s first [Concept('concept_bpm_constitutional_level', 'Constitution')].\n\nThis constitution applies to the hereditary lands, with the exception of [SCOPE.sCountry('hungary_country_scope').GetName] and the currently uncontrolled #bold #green Italians#!#! territories.\n\nThis constitution guarantees #L #yellow individual rights#!#! and codifies previous [Concept('concept_bpm_decree_level', 'Edicts')], but also grants very extensive powers to the Kaiser.\n\nAlthough the draft constitution has not yet come into force, it is already unpopular with both [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] and moderates alike."
 bpm_springtime_of_the_peoples.16.f: "Convinced that state institutions must keep pace with the progress that has taken place in the cultural and intellectual development of peoples, and always inclined to acknowledge that the peoples entrusted to Us, enjoying the blessings of a long-standing peace, have not lagged behind on the path of this progress, We assured them of the granting of a constitution through Our Patent of March 15, 1848.\n\n— Preamble of the ‘#bold Verfassungs-Urkunde des österreichischen Kaiserstaates#!’, April 25th 1848"
 bpm_springtime_of_the_peoples.16.a: "We promised a constitution, here's a constitution!"

 ##### German Interest Group Names pre-Springtime thx~~

 ig_radikale_demokraten: "Radikale Demokraten"
 ig_radikale_demokraten_desc: "The Radikale Demokraten are German radicals that incorporate Marxist ideas into their programme. Unlike their moderate counterparts, they fully reject cooperation with contitutional liberals in their struggle for a Germany free from aristocratic influences."

 ig_arbeitervereine: "Arbeitervereine"
 ig_arbeitervereine_desc: "The Arbeitervereine are workers' associations, which have began organising in the lead up to the Springtime of the Peoples. Usually divided by profession, they remain decentralised organisations, unless a general strike were to compel them to form a German trade union federation..."

 ig_linksliberale: "Linksliberale"
 ig_linksliberale_desc: "The Linksliberale make up the centre-left of German Liberalism. They support the introduction and preservance of a democratic constitution under a parliamentry German state, with the aim of protecting personal liberties and property rights."

 ig_manchesterliberale: "Manchesterliberale"
 ig_manchesterliberale_desc: "Inspired by their British counterparts, the Manchesterliberale support laissez-faire economics and free trade. While economic policy was their primary issue, the group also supports radical-democratic reform and has some social ambitions, mostly limited promoting trade unions and worker cooperatives."

 ig_nationalliberale: "Nationalliberale"
 ig_nationalliberale_desc: "The Nationalliberale make up the right of German liberalism. While being supportive of constitutionalism, they remain opposed to parliamentarisation. The establishment of a liberal German nation-state is their highest priority, even going so far as to refrain from liberal reforms to achieve unity. They prefer liberal economic policy and are in opposition to most social reform."

 ig_konservative_proper: "Konservative"
 ig_konservative_proper_desc: "$ig_conservatives_desc$"

 ig_altkonservative: "Altkonservative"
 ig_altkonservative_desc: "The Altkonservative are the staunch supporters of the ancién regime, opposing constitutionalism, democracy and parliamentarism. They primarily represent the inetersts of East-Elbian Junkers, while also posessing a strong anti-socialist and anti-semitic character."

 bpm_springtime_of_the_peoples.512.t: "A Finished Draft"
 bpm_springtime_of_the_peoples.512.d: "Today, #yellow [SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle]#! [SCOPE.sCharacter('our_beloved_ruler').GetFirstName] was presented with a full and complete [Concept('concept_bpm_constitutional_level', 'Constitution')] draft, prepared by the previously established #springtime State Commission#!.\n\nThe constitution was drafted through cooperation among various groups and elites, with the aim of creating a widely supported constitution.\n\nThis draft establishes #yellow Political Representation#!, #yellow Ministerial Responsibility#!, [GetLawType('law_separated_powers').GetName], #yellow Individual Rights#! and #yellow Freedoms#!, a modest degree of decentralization of power, and more."
 bpm_springtime_of_the_peoples.512.a: "This is a good draft."
 bpm_springtime_of_the_peoples.512.b: "I've changed my mind. We don't need any of this, at all!"
 
 bpm_das_bundeswahlgesetz: "Das Bundeswahlgesetz"

 bpm_springtime_of_the_peoples.17.t: "Das Bundeswahlgesetz"
 bpm_springtime_of_the_peoples.17.d: "Today, on #gold April 7th#!, a second resolution was announced establishing the electoral law — which has characteristics of [GetLawType('law_universal_suffrage').GetName] — for a future #yellow National Assembly#!, whose purpose will be the unification of #L #yellow Germany#!#!.\n\nThe ‘#yellow Bundestag#!’ began its work and collaboration on establishing a #yellow National Assembly#! as early as #gold March 30th#!; while on #gold April 3th#!, the ‘#yellow Vorparlament#!’, working in cooperation with the ‘#yellow Bundestag#!’ appointed the ‘Commission of Fifteen’ to oversee the elections.\n\nToday’s resolution was announced due to the mostly bad, complex and varied effects and discontent caused by the first resolution."
 bpm_springtime_of_the_peoples.17.f: "Every adult, independent citizen shall be considered eligible to vote and to be elected;\n\n— Article 3 of the ‘#bold Zweiter Bundesbeschluß über die Wahl der deutschen Nationalversammlung#!’, April 7th 1848"
 bpm_springtime_of_the_peoples.17.a: "Surely the will of the people will be represented."

 bpm_springtime_of_the_peoples.18.t: "The Frankfurt National Assembly"
 bpm_springtime_of_the_peoples.18.d: "Today, on #gold May 18th#!, following the elections held in each german state on #gold May 1st#!, the #yellow National Assembly#! convened for the first time in the majestic #yellow St. Paul’s Church#! in #gold Frankfurt am Main#!.\n\nThe purpose of this assembly will be to draft a [Concept('concept_bpm_constitutional_level', ' National Constitution')], decide on many socio-political matters regarding citizens and law, and ultimately bring about the complete [Concept('concept_unification', 'Unification')] of Germany.\n\nThe Slavs, primarily the [GetCulture('czech').GetName]#yellow s#!, openly boycotted the elections, seeking to establish their own #yellow Slavic Congress#! in #gold Prague#!.\n\nThe future of Germany lies entirely in its hands."
 bpm_springtime_of_the_peoples.18.f: "We are to draft a constitution for Germany, for the entire Reich. The mandate and authority to do so lie in the sovereignty of the nation.\n\n— Heinrich Freiherr von Gagern, May 19th 1848"
 bpm_springtime_of_the_peoples.18.a: "Deutschland, Deutschland über alles, über alles in der Welt!"

 notification_bpm_1848_frankfurt_parliament_opened_name: "#v Deutschland, Deutschland über alles!#!"
 notification_bpm_1848_frankfurt_parliament_opened_desc: "A #yellow National Assembly#! was convened for the first time in #gold Frankfurt am Main#!, with the aim of unifying Germany into one."

 bpm_springtime_of_the_peoples.19.t: "Provisorische Wahlordnung"
 bpm_springtime_of_the_peoples.19.d: "Today, on #gold May 9th#!, the ‘#italic #yellow Provisional Electoral Regulations for the Constitutional Charter of April 25, 1848#!#!’ were promulgated, establishing an electoral system to represent the people and their civil interests.\n\nWe have taken into account the specific, weighted interests of four groups — the landed gentry, industrialists and merchants, cities, and rural areas — which together constitute the entirety of our state.\n\nThis system, known as the ‘#yellow #L Curiae System#!#!’, grants indirect voting rights to many people — with the exception of day laborers, some peasants, and servants — while at the same time ensuring, in our view fairly, significant influence for [GetPopType('aristocrats').GetName].\n\nHowever, this does not sit well with the masses, especially those in #gold Wien#!."
 bpm_springtime_of_the_peoples.19.f: "II. Election of Members to the Chamber of Deputies\n\n#bold § 18#! The Chamber of Deputies consists of 383 members; their election is based on the size of the population and on the representation of all civic interests.\n\n— Contents of the ‘#bold Provisorische Wahlordnung zur Verfassungs-Urkunde vom 25. April 1848’#!, May 9th 1848"
 bpm_springtime_of_the_peoples.19.a: "This is fair, why are they unhappy?"

 bpm_springtime_of_the_peoples.20.t: "The Mairevolution"
 bpm_springtime_of_the_peoples.20.d: "On #gold May 13th#!, #L #yellow Johann Ernst Hoyos-Sprinzenstein#!#! issued an order to dissolve the ‘#yellow Politisches Zentralkomitee der gesamten Nationalgarde Wiens#!’— formed on #gold May 7th#! and composed of the petty bourgeoisie — while simultaneously beginning the mobilization of the [concept_army].\n\nThis was met with a fierce reaction.\n\nOn #gold May 15th#!, members of the [GetAmendmentType('bpm_amendment_akademische_legion').GetName], the [GetLawType('law_national_guard').GetName], construction workers, and the petty bourgeoisie marched on the #yellow Hofburg#!, delivering the ‘#yellow #L Sturmpetition#!#!’ and demanding that the #yellow Central Committee#! be allowed to remain.\n\nAfter street fighting, in the evening, the [concept_government] declared the previous constitution ‘#L provisional#!’ and announced elections to a unicameral #yellow Reichstag#! to be held under [GetLawType('law_universal_suffrage').GetName].\n\nKaiser [SCOPE.sCharacter('emperor_austria').GetFirstName] and the imperial family fled to #gold Innsbruck#! on #gold May 17th#!."
 bpm_springtime_of_the_peoples.20.a: "This... is not good..."



 the_wrath_of_the_revolution_is_upon_us: ""
 bpm_springtime_tooltip_the_wrath_of_the_revolution: "@warning! We are destined to face the [concept_bpm_springtime_wrath_of_the_revolution]."
 bpm_info_if_counterrevolutionary_preparadness_revolution: "@information! #bold If#! the @ig_reactionaries! #purple #bold Counterrevolutionary Preparadness#!#! progress bar reaches #v 100%#! and an attempt to forcefully seize back power is made, a revolutionary uprising will break out in the [Concept('concept_capital_state', 'Capital')]. If the uprising successfully defeats the attacking forces, it will replace the [concept_government] and proclaim a [GetLawType('law_parliamentary_republic').GetName]!" # @warning! #bold If#!, or #bold when#!, the @ig_reactionaries! #purple #bold Counter-Revolutionary Preparadness#!#! reaches #v 100%#!, a revolutionary uprising will begin in the [Concept('concept_capital_state', 'Capital')]. If the uprising successfully defeats the @ig_reactionaries! #bold #purple Reactionaries#!#!, it will takeover the [concept_government] and you will become a [GetLawType('law_parliamentary_republic').GetName].

 bpm_info_if_counterrevolutionary_preparadness_not_100_revolution_tt: "@information! #bold However#!, if this progress bar never reaches #v 100%#! and we haven’t entered the [concept_bpm_springtime_reform_phase] within the next #v 6 months#!, the @ig_radicals! @ig_socialists! #bold #pink Democrats#!#! will either stage their own revolution, assassinate a member of the [concept_government], or force the [concept_ruler] to flee — and successfully proclaim a [GetLawType('law_parliamentary_republic').GetName]!"

 
 ###### Artisans

 bpm_springtime_artisanal_revdrift_change_small: "Certain decisions, such as improving the [concept_sol], pro-#gold Guild#! reforms, and democratization, will increase support among craftsmen. Therefore, [concept_bpm_springtime_revolutionary_drift] of @intelligentsia! #yellow Artisans#! has #P slightly increased#!!"
 
 bpm_springtime_artisanal_revdrift_change_small_decrease: "Certain decisions, such as combating vigilantism or curbing social [GetTechnology('egalitarianism').GetName], will reduce support among craftsmen. Therefore, [concept_bpm_springtime_revolutionary_drift] of @intelligentsia! #yellow Artisans#! has #PB slightly decreased#!!"

 bpm_springtime_artisanal_revdrift_change_medium_decrease: "Certain decisions, such as combating vigilantism or curbing social [GetTechnology('egalitarianism').GetName], will reduce support among craftsmen. Therefore, [concept_bpm_springtime_revolutionary_drift] of @intelligentsia! #yellow Artisans#! has #PB decreased#!!"

 ##### Peasants
 
 bpm_springtime_peasant_revdrift_change_medium_decrease: "Certain decisions, such as the fight against vigilantism or the curbing of social [GetTechnology('egalitarianism').GetName], will reduce support in rural areas. Therefore, [concept_bpm_springtime_revolutionary_drift] of @rural_folk! #green Peasants#! has #PB decreased#!!"

