l_english:
  bpm_dispatch_issue_type_democratic: "Popular Issues"
  bpm_dispatch_issue_type_despotism: "Elite Issues"
  bpm_dispatch_issue_type: "[GetPlayer.GetCustom('bpm_dispatch_issue_type_cusloc')]"

  bpm_issue_sol_name: "Increasing the [Concept('concept_sol', 'SoL')]"
  bpm_issue_sol_tooltip: "#tooltip_header Increasing the [concept_sol]#!\n$TOOLTIP_DELIMITER$\nRelevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest')|%v0] to the electorate:\n#yellow;bold Workers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_workers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_workers_weight')|%v0].\n#yellow;bold Professionals#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_professionals')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_professionals_weight')|%v0].\n#yellow;bold Peasantry#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_peasantry')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_peasantry_weight')|%v0].\n#yellow;bold Soldiers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_soldiers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_soldiers_weight')|%v0]."
  bpm_issue_sol_attack_flavor: "#italic “Poverty, and the wretchedness and human degradation which always follows in its camp, will be as remote to the people of this country as the wolves which once infested its forests.” ー Lloyd George#!"
  bpm_issue_sol_progressbar_tooltip: "#tooltip_header Increasing the [concept_sol]#!\n$TOOLTIP_DELIMITER$\nThe [concept_sol] progress tracks the progress of the ruling party in increasing the [concept_sol] of the population. Every increase from the start by #v 0.25#! provides one point. The [Concept('concept_sol', 'SoL')] before the [concept_election] was [GetPlayer.MakeScope.Var('bpm_electoral_mandate_sol_baseline_sol').GetValue|v1]."

  bpm_issue_anti_war_name: "Opposing the War"
  bpm_issue_anti_war_tooltip: "#tooltip_header Opposing War#!\n$TOOLTIP_DELIMITER$\nRelevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_war_interest')|%v0] to the electorate:\n#yellow;bold Workers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_war_interest_workers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_war_interest_workers_weight')|%v0].\n#yellow;bold Professionals#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_war_interest_professionals')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_war_interest_professionals_weight')|%v0].\n#yellow;bold Peasantry#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_war_interest_peasantry')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_war_interest_peasantry_weight')|%v0].\n#yellow;bold Soldiers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_war_interest_soldiers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_war_interest_soldiers_weight')|%v0]."
  bpm_issue_anti_war_attack_flavor: "#italic “The soldier above all others prays for peace, for it is the soldier who must suffer and bear the deepest wounds and scars of war.” — MacArthur#!"
  bpm_issue_anti_war_progressbar_tooltip: "#tooltip_header Opposing War#!\n$TOOLTIP_DELIMITER$\nThe Anti-War progress tracks the progress of the ruling party in ending the current war. Ending the War completes this issue."

  bpm_issue_anti_liberal_name: "Opposing Liberalization"
  bpm_issue_anti_liberal_tooltip: "#tooltip_header Opposing Liberalization#!\n$TOOLTIP_DELIMITER$\nRelevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_liberal_interest')|%v0] to the electorate:\n#yellow;bold Workers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_liberal_interest_workers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_liberal_interest_workers_weight')|%v0].\n#yellow;bold Peasantry#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_liberal_interest_peasantry')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_liberal_interest_peasantry_weight')|%v0].\n#yellow;bold Landowners#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_liberal_interest_landowners')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_liberal_interest_landowners_weight')|%v0]."
  bpm_issue_anti_liberal_attack_flavor: "#italic “The age of chivalry is gone. That of sophisters, economists, and calculators has succeeded.” — Edmund Burke#!"
  bpm_issue_anti_liberal_progressbar_tooltip: "#tooltip_header Opposing Liberalization#!\n$TOOLTIP_DELIMITER$\nThe Anti-Liberal progress of the ruling party in suppressing the growing liberal movements in society. Reducing the combined support of liberal movements by 1/8th provides a point."

  bpm_issue_trade_deficit_name: "Strengthening Economic Sovereignty"
  bpm_issue_trade_deficit_tooltip: "#tooltip_header Strengthening Economic Sovereignty#!\n$TOOLTIP_DELIMITER$\nRelevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_trade_deficit_interest')|%v0] to the electorate:\n#yellow;bold Workers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_trade_deficit_interest_workers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_trade_deficit_interest_workers_weight')|%v0].\n#yellow;bold Peasantry#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_trade_deficit_interest_peasantry')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_trade_deficit_interest_peasantry_weight')|%v0].\n#yellow;bold Soldiers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_trade_deficit_interest_soldiers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_trade_deficit_interest_soldiers_weight')|%v0].#yellow;bold Professionals#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_trade_deficit_interest_professionals')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_trade_deficit_interest_professionals_weight')|%v0]."
  bpm_issue_trade_deficit_attack_flavor: "#italic “The age of chivalry is gone. That of sophisters, economists, and calculators has succeeded.” — Edmund Burke#!"

  bpm_issue_unemployment_name: "Lowering Unemployment"
  bpm_issue_unemployment_tooltip: "#tooltip_header Lowering Unemployment#!\n$TOOLTIP_DELIMITER$\nRelevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_unemployment_interest')|%v0] to the electorate:\n#yellow;bold Workers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_unemployment_interest_workers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_unemployment_interest_workers_weight')|%v0].\n#yellow;bold Peasantry#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_unemployment_interest_peasantry')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_unemployment_interest_peasantry_weight')|%v0].\n#yellow;bold Soldiers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_unemployment_interest_soldiers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_unemployment_interest_soldiers_weight')|%v0].#yellow;bold Professionals#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_unemployment_interest_professionals')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_unemployment_interest_professionals_weight')|%v0]."
  bpm_issue_unemployment_attack_flavor: "#italic “The age of chivalry is gone. That of sophisters, economists, and calculators has succeeded.” — Edmund Burke#!"

  bpm_issue_anti_socialist_name: "Opposing Socialism"
  bpm_issue_anti_socialist_tooltip: "#tooltip_header Opposing Socialism#!\n$TOOLTIP_DELIMITER$\nRelevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_socialist_interest')|%v0] to the electorate:\n#yellow;bold Workers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_socialist_interest_workers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_socialist_interest_workers_weight')|%v0].\n#yellow;bold Peasantry#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_socialist_interest_peasantry')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_socialist_interest_peasantry_weight')|%v0].\n#yellow;bold Landowners#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_socialist_interest_landowners')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_socialist_interest_landowners_weight')|%v0]."
  bpm_issue_anti_socialist_attack_flavor: "#italic “The age of chivalry is gone. That of sophisters, economists, and calculators has succeeded.” — Edmund Burke#!"

  bpm_issue_anti_liberal_progressbar_tooltip: "#tooltip_header Opposing Liberalization#!\n$TOOLTIP_DELIMITER$\nThe Anti-Liberal progress tracks the ruling party's progress in suppressing liberal movements. Every reduction of liberal movement support by half (50%) from the baseline provides full completion. The combined liberal movement support before the [concept_election] was [GetPlayer.MakeScope.Var('bpm_electoral_mandate_anti_liberal_baseline_liberal').GetValue|v0]."

  bpm_issue_anti_socialist_progressbar_tooltip: "#tooltip_header Opposing Socialism#!\n$TOOLTIP_DELIMITER$\nThe Anti-Socialist progress tracks the ruling party's progress in suppressing socialist movements. Every reduction of socialist movement support by half (50%) from the baseline provides full completion. The combined socialist movement support before the [concept_election] was [GetPlayer.MakeScope.Var('bpm_electoral_mandate_anti_socialist_baseline_socialist').GetValue|v0]."

  bpm_issue_anti_monarchist_progressbar_tooltip: "#tooltip_header Supporting Republicanism#!\n$TOOLTIP_DELIMITER$\nThe Republicanism progress tracks the ruling party's success in suppressing reactionary monarchist movements or enacting a republic. Every reduction of reactionary movement support by half (50%) from the baseline provides full completion. The combined monarchist movement support before the [concept_election] was [GetPlayer.MakeScope.Var('bpm_electoral_mandate_anti_monarchist_baseline_monarchist').GetValue|v0]."

  bpm_issue_trade_deficit_progressbar_tooltip: "#tooltip_header Strengthening Economic Sovereignty#!\n$TOOLTIP_DELIMITER$\nThe Economic Sovereignty progress tracks the ruling party's success in reducing the national trade deficit. The total value of trade before the [concept_election] was [GetPlayer.MakeScope.Var('bpm_electoral_mandate_trade_deficit_baseline_trade_deficit').GetValue|v0]. Reducing this value grants progress toward completing the issue."

  bpm_issue_pro_slavery_progressbar_tooltip: "#tooltip_header Preserving Slavery#!\n$TOOLTIP_DELIMITER$\nThe Pro-Slavery progress tracks the ruling party's ability to preserve slavery by suppressing abolitionist movements. The baseline strength of abolitionist movements before the [concept_election] was [GetPlayer.MakeScope.Var('bpm_electoral_mandate_pro_slavery_baseline_support').GetValue|v0]. Progress increases as abolitionist support weakens."

  bpm_issue_anti_slavery_progressbar_tooltip: "#tooltip_header Enacting Abolition#!\n$TOOLTIP_DELIMITER$\nThe Abolition progress tracks the ruling party's effort to abolish slavery. If slavery laws are already enacted, this issue is considered compromised. Otherwise, enacting abolitionist legislation will complete the issue."

  bpm_issue_unemployment_progressbar_tooltip: "#tooltip_header Lowering Unemployment#!\n$TOOLTIP_DELIMITER$\nThe Unemployment progress tracks the ruling party's success in lowering the average unemployment rate across all states. The average unemployment rate before the [concept_election] was [GetPlayer.MakeScope.Var('bpm_electoral_mandate_unemployment_baseline_unemployment').GetValue|v1]. Progress increases as the average unemployment rate decreases."

  bpm_issue_land_reform_progressbar_tooltip: "#tooltip_header Enacting Land Reform#!\n$TOOLTIP_DELIMITER$\nThe Land Reform progress tracks the ruling party's advancement toward more progressive agrarian policies. Passing a more progressive or equally progressive land reform law completes the issue."

  bpm_issue_chauvinism_progressbar_tooltip: "#tooltip_header Promoting Chauvinism#!\n$TOOLTIP_DELIMITER$\nThe Chauvinism progress tracks the ruling party's effort to advance national chauvinistic policies. Each chauvinistic law enacted counts as a step toward completion, with four total required."
  bpm_issue_sol_support_flavor: "A nation is strong only when its people prosper, when the table is full and the home secure."
  bpm_issue_sol_defense_flavor: "Raising the condition of the many is not charity but stability; hunger breeds discontent, comfort breeds loyalty."

  bpm_issue_anti_war_support_flavor: "Peace is the true victory; no mother weeps for a battle never fought."
  bpm_issue_anti_war_defense_flavor: "To end this war is not weakness but wisdom—every coin and life spent on killing weakens the nation."

  bpm_issue_anti_liberal_support_flavor: "Too much freedom dissolves into chaos; order is the safeguard of civilization."
  bpm_issue_anti_liberal_defense_flavor: "We defend our traditions not out of fear, but because they are the roots from which our society grows."

  bpm_issue_tradedeficit_support_flavor: "A nation that cannot feed itself, clothe itself, and arm itself is no nation at all."
  bpm_issue_tradedeficit_defense_flavor: "Protecting our markets from foreign domination ensures our independence endures."

  bpm_issue_unemployment_support_flavor: "Every idle hand is a wasted strength; let all who can work, work."
  bpm_issue_unemployment_defense_flavor: "A job is more than wages—it is dignity, order, and belonging in society."

  bpm_issue_anti_socialist_support_flavor: "Equality preached at the cost of property is but envy disguised as justice."
  bpm_issue_anti_socialist_defense_flavor: "We must defend against the false promise of socialism, for it destroys the very engines of prosperity."

  bpm_issue_anti_monarchist_support_flavor: "No man is born to rule another; a nation belongs to its citizens, not its kings."
  bpm_issue_anti_monarchist_defense_flavor: "To cast off monarchy is not to destroy order, but to bind authority to the will of the people."

  bpm_issue_chauvinism_support_flavor: "Our destiny is to rise above all others; our greatness is the world’s truth."
  bpm_issue_chauvinism_defense_flavor: "Unity and pride forge the spirit of the nation; without them, we are but dust."

  bpm_issue_pro_slavery_support_flavor: "The order of master and servant is as ancient as civilization itself."
  bpm_issue_pro_slavery_defense_flavor: "Slavery is not cruelty but necessity, preserving stability where chaos would otherwise reign."

  bpm_issue_anti_slavery_support_flavor: "No man should own another; freedom is the birthright of all."
  bpm_issue_anti_slavery_defense_flavor: "Abolition is not mere sentiment, but the fulfillment of justice and the promise of progress."

  bpm_issue_land_reform_support_flavor: "The soil belongs to those who till it; justice demands the earth be shared."
  bpm_issue_land_reform_defense_flavor: "Reforming land is not about vengeance, but about securing peace between peasant and proprietor."

  bpm_issue_anti_monarchist_name: "Supporting Republicanism"
  bpm_issue_anti_monarchist_tooltip: "#tooltip_header Supporting Republicanism#!\n$TOOLTIP_DELIMITER$\nRelevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_monarchist_interest')|%v0] to the electorate:\n#yellow;bold Workers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_monarchist_interest_workers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_monarchist_interest_workers_weight')|%v0].\n#yellow;bold Peasantry#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_monarchist_interest_peasantry')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_monarchist_interest_peasantry_weight')|%v0].\n#yellow;bold Landowners#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_monarchist_interest_landowners')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_monarchist_interest_landowners_weight')|%v0]."
  bpm_issue_anti_monarchist_attack_flavor: "#italic “The age of chivalry is gone. That of sophisters, economists, and calculators has succeeded.” — Edmund Burke#!"

  bpm_issue_chauvinism_name: "Enacting Chauvinistic Policies"
  bpm_issue_chauvinism_tooltip: "#tooltip_header Enacting Chauvinistic Policies#!\n$TOOLTIP_DELIMITER$\nRelevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_chauvinism_interest')|%v0] to the electorate:\n#yellow;bold Workers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_chauvinism_interest_workers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_chauvinism_interest_workers_weight')|%v0].\n#yellow;bold Peasantry#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_chauvinism_interest_peasantry')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_chauvinism_interest_peasantry_weight')|%v0].\n#yellow;bold Landowners#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_chauvinism_interest_landowners')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_chauvinism_interest_landowners_weight')|%v0]."
  bpm_issue_chauvinism_attack_flavor: "#italic “The age of chivalry is gone. That of sophisters, economists, and calculators has succeeded.” — Edmund Burke#!"

  bpm_issue_pro_slavery_name: "Preserving Slavery"
  bpm_issue_pro_slavery_tooltip: "#tooltip_header Preserving Slavery#!\n$TOOLTIP_DELIMITER$\nRelevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_pro_slavery_interest')|%v0] to the electorate:\n#yellow;bold Peasantry#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_pro_slavery_interest_peasantry')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_pro_slavery_interest_peasantry_weight')|%v0].\n#yellow;bold Landowners#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_pro_slavery_interest_landowners')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_pro_slavery_interest_landowners_weight')|%v0]."
  bpm_issue_pro_slavery_attack_flavor: "#italic “The age of chivalry is gone. That of sophisters, economists, and calculators has succeeded.” — Edmund Burke#!"

  bpm_issue_anti_slavery_name: "Enacting Abolition"
  bpm_issue_anti_slavery_tooltip: "#tooltip_header Enacting Abolition#!\n$TOOLTIP_DELIMITER$\nRelevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_slavery_interest')|%v0] to the electorate:\n#yellow;bold Workers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_slavery_interest_workers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_slavery_interest_workers_weight')|%v0].\n#yellow;bold Peasantry#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_slavery_interest_peasantry')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_slavery_interest_peasantry_weight')|%v0].\n#yellow;bold Landowners#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_slavery_interest_landowners')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_slavery_interest_landowners_weight')|%v0].\n#yellow;bold Capitalists#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_slavery_interest_capitalists')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_anti_slavery_interest_capitalists_weight')|%v0]."
  bpm_issue_anti_slavery_attack_flavor: "#italic “The age of chivalry is gone. That of sophisters, economists, and calculators has succeeded.” — Edmund Burke#!"

  bpm_issue_land_reform_name: "Enacting Land Reforms"
  bpm_issue_land_reform_tooltip: "#tooltip_header Enacting Land Reforms#!\n$TOOLTIP_DELIMITER$\nRelevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_land_reform_interest')|%v0] to the electorate:\n#yellow;bold Workers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_land_reform_interest_workers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_land_reform_interest_workers_weight')|%v0].\n#yellow;bold Peasantry#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_land_reform_interest_peasantry')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_land_reform_interest_peasantry_weight')|%v0].\n#yellow;bold Landowners#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_land_reform_interest_landowners')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_land_reform_interest_landowners_weight')|%v0].\n#yellow;bold Capitalists#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_land_reform_interest_capitalists')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_land_reform_interest_capitalists_weight')|%v0]."
  bpm_issue_land_reform_attack_flavor: "#italic “The age of chivalry is gone. That of sophisters, economists, and calculators has succeeded.” — Edmund Burke#!"

  bpm_issues_of_elections.1.t: "Scathing Remarks on #gold;tooltipable;tooltip:[GetPlayer.GetTooltipTag],bpm_issue_sol_tooltip [Localize(Concatenate(GetPlayer.MakeScope.Var('bpm_current_target_issue').GetFlagName, '_name'))]"
  bpm_issues_of_elections.1.d: "[SCOPE.sCharacter('first_party_leader').GetFullName], the candidate hopeful for the [SCOPE.sParty('first_party').GetName] has been holding numerous rallies campaigning on the issue of [Localize(Concatenate(GetPlayer.MakeScope.Var('bpm_current_target_issue').GetFlagName, '_name'))], attacking [SCOPE.sCharacter('second_party_leader').GetFullName] of the [SCOPE.sParty('second_party').GetName]."
  bpm_issues_of_elections.1.f: "[Localize(Concatenate(GetPlayer.MakeScope.Var('bpm_current_target_issue').GetFlagName, '_attack_flavor'))]"
  bpm_issues_of_elections.1.a: "[SCOPE.sCharacter('first_party_leader').GetFullName] ought to pursue this succesful strategy"
  bpm_issues_of_elections.1.b: "[SCOPE.sCharacter('second_party_leader').GetFullName] should change [SCOPE.sCharacter('second_party_leader').GetHerHis] handling of this #crisis issue#!."
  bpm_issue_relevance_very_up_tt: "#crisis Issue#! #yellow Relevance#! increases #N significantly#!."
  bpm_issue_relevance_up_tt: "#crisis Issue#! #yellow Relevance#! increases."
  bpm_issues_of_elections.1.b_tt: "[SCOPE.sCharacter('second_party_leader').GetFullName] may adopt this issue as part of the [SCOPE.sParty('second_party').GetName]'s platform, but it will be difficult to do so without losing face."

  bpm_issues_of_elections.3.t: "Campaign Rally for #gold;tooltipable;tooltip:[GetPlayer.GetTooltipTag],bpm_issue_sol_tooltip [Localize(Concatenate(GetPlayer.MakeScope.Var('bpm_current_target_issue').GetFlagName, '_name'))]"
  bpm_issues_of_elections.3.d: "[SCOPE.sCharacter('first_party_leader').GetFullName], the candidate hopeful for the [SCOPE.sParty('first_party').GetName] has been holding numerous rallies campaigning on the issue of [Localize(Concatenate(GetPlayer.MakeScope.Var('bpm_current_target_issue').GetFlagName, '_name'))], raising awareness of the party's policy proposals."
  bpm_issues_of_elections.3.f: "[Localize(Concatenate(GetPlayer.MakeScope.Var('bpm_current_target_issue').GetFlagName, '_support_flavor'))]"
  bpm_issues_of_elections.3.a: "The campaign rally is a success."
  bpm_issues_of_elections.3.b: "Frustration grows at [SCOPE.sCharacter('first_party_leader').GetLastName]'s handling of this #crisis issue#!."


  bpm_issues_of_elections.4.t: "Public Response on #gold;tooltipable;tooltip:[GetPlayer.GetTooltipTag],bpm_issue_sol_tooltip [Localize(Concatenate(GetPlayer.MakeScope.Var('bpm_current_target_issue').GetFlagName, '_name'))]"
  bpm_issues_of_elections.4.d: "[SCOPE.sCharacter('first_party_leader').GetFullName], the candidate hopeful for the [SCOPE.sParty('first_party').GetName] has been defending himself in campaign rallies from his opponent [SCOPE.sCharacter('second_party_leader').GetFullName] of the [SCOPE.sParty('second_party').GetName] on the issue of [Localize(Concatenate(GetPlayer.MakeScope.Var('bpm_current_target_issue').GetFlagName, '_name'))]."
  bpm_issues_of_elections.4.f: "[Localize(Concatenate(GetPlayer.MakeScope.Var('bpm_current_target_issue').GetFlagName, '_defense_flavor'))]"
  bpm_issues_of_elections.4.a: "The response is lackluster."
  bpm_issues_of_elections.4.b: "Many people turn on [SCOPE.sCharacter('second_party_leader').GetLastName]."
  bpm_issue_relevance_very_up_tt: "#crisis Issue#! #yellow Relevance#! increases #N significantly#!."
  bpm_issue_relevance_up_tt: "#crisis Issue#! #yellow Relevance#! increases."
  bpm_issue_relevance_down_tt: "#crisis Issue#! #yellow Relevance#! decreases."


  bpm_electoral_mandate_progressbar_tooltip: "#tooltip_header Electoral Mandate#!\n$TOOLTIP_DELIMITER$\nElectoral mandates require four points to be considered completed. Every year after the election the public will expect progress by one point. Failure to keep up will incur [Concept('concept_radical', 'Radicals')] and [concept_bpm_state_exhaustion]. Completing it early will increase [concept_bpm_state_capacity] and create [Concept('concept_loyalist', 'Loyalists')].\nThe ruling party will have a bonus or penalty to their [concept_momentum] based on their progress at the next [concept_election].\n\n[Localize(Concatenate(Scope.GetFlagName, '_progressbar_tooltip'))]"


  bpm_elecmandate_progress_tooltip: "@information! Furthers [GetPlayer.MakeScope.Var('bpm_headofgov').GetName]'s electoral agenda.
