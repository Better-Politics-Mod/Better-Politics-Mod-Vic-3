 bpm_springtime_of_the_peoples.23.t: "A Slavic Congress?"
 bpm_springtime_of_the_peoples.23.d: "Today, on #gold April 20th#!, [SCOPE.sCharacter('Ivan_Kukuljevic_character').GetFullName], a well-known [GetCulture('croat').GetName] [concept_politician], called in the newspaper ‘#italic #yellow Novine Dalmatinsko-Hervatsko-Slavonske#!#!’ for broader political cooperation among the #blue #bold Slavs#!#!, aimed at protecting the interests, culture, and freedoms of the #bold #blue Slavs#!#! against #v Germanization#! and #pink Magyarization#!.\n\nHe proposed convening a congress in #gold Prague#! that would invite representatives from the #gold #L Habsburg#!#!, #L #gold Ottoman#!#!, and #gold #L Tsarist#!#! territories.\n\nThis idea was supported by the [GetCulture('slovak').GetName] #yellow Ľudovít Štúr#!, and a similar proposal was soon put forward by [SCOPE.sCharacter('jedrzej_moraczewski_character').GetFullName].\n\nThe #blue #bold Slavs#!#! of our empire are beginning to gather in #gold Prague#! to organize and prepare for such a congress, which will most likely begin its deliberations at the turn of #gold May#! and #gold June#!."
 bpm_springtime_of_the_peoples.23.f: "Assuredly, if the Austrian State had not existed for ages, it would have been in the interests of Europe and indeed of humanity to endeavor to create it as soon as possible.\n\n— František Palacký, April 11th 1848"
 bpm_springtime_of_the_peoples.23.a: "Interesting..."

 je_the_slavic_congress: "The Second Slavic Congress"

 Ivan_Kukuljevic: "Ivan Kukuljević"
 Sakcinski: "Sakcinski"

 
 bpm_springtime_of_the_peoples.24.t: "The Slavic Congress in Prague"
 bpm_springtime_of_the_peoples.24.d: "Today, on #gold June 2nd#!, the first-ever #yellow Slavic Congress#!, held in #gold Prague#!, began its proceedings.\n\nA month earlier, on #gold May 1st#!, the ‘#yellow Preparatory Committee#!’ invited the #blue Slavs#! of the Habsburg Empire, while also welcoming other #blue Slavs#!.\n\nOver the next month, representatives of the Slavic nations have arrived, and with #green 340#! delegates and over #green 500#! official guests in attendance, #gold Congress President#! #yellow František Palacký#! solemnly opened the proceedings.\n\nThe purpose of this congress is to present the aspirations and needs of the #blue Slavs#! to the Kaiser and to establish a positive relationship between his subjects and himself."
 bpm_springtime_of_the_peoples.24.f: "The convening of the Slavic Congress in Prague is an extraordinary event, both for Europe and for us Slavs ourselves. For the first time in recorded history, the scattered members of the great family of nations have gathered in large numbers from distant lands to meet and greet one another as brothers and to discuss our common needs in peace.\n\n— ‘Manifesto to the Nations of Europe’, June 10th 1848"
 bpm_springtime_of_the_peoples.24.a: "I see..."

 bpm_springtime_if_circumstances_were_to_happen_tt: "The #yellow Slavic Congress#! in #gold Prague#! is convening. Once its proceedings conclude, you will be presented with proposals regarding the needs and aspirations of the Slavs, as well as the federalization of [ROOT.GetCountry.GetName]."
  
