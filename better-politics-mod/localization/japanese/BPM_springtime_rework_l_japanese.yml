 bpm_springtime_of_the_peoples.27.t: "The [SCOPE.GetRootScope.GetCountry.GetCustom('getCurrentMonthName')] Demonstrations"
 bpm_springtime_of_the_peoples.27.d: "Today, nearly a month after the [Concept('concept_election', 'Parliamentary Elections')], angry and disorganized crowds attempted to take control of #gold Paris#!.\n\nThe agitated crowd, dissatisfied with the election results and incited by foreign nationals present in the city, initially demonstrated at the #gold Place de la Bastille#!, then moved to the #gold Place de la Concorde#!, and finally headed toward the #gold Palais Bourbon#!.\n\nIn a disorderly manner, they sought to force the formation of a new [concept_government], which would be composed of many [GetInterestGroupVariant('ig_socialists',GetPlayer).GetNameWithCountryVariant] and [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant].\n\nFortunately, #yellow Lamertine#! and #yellow Ledru-Rollin#! mobilized the [GetLawType('law_national_guard').GetName], which dispersed the demonstrators, arrested their leaders, and crushed the clubs."
 bpm_springtime_of_the_peoples.27.f: "The French constitute the most brilliant and the most dangerous nation in Europe and the best qualified in turn to become an object of admiration, hatred, pity or terror but never indifference.\n\n— Alexis de Tocqueville, 1856"
 bpm_springtime_of_the_peoples.27.a: "What was this mob even planning?"

