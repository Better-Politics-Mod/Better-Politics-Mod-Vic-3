 bpm_belgian_historical_events.1.t: "Pastoral Circular Condemning Freemasonry"
 bpm_belgian_historical_events.1.d: "On #gold December 27, 1837#!, #yellow Archbishop#! [SCOPE.sCharacter('bpm_sterckx_bishop').GetFullName], together with four other bishops, issued a circular pastoral letter to all Catholic priests.\n\nThe letter condemns and excommunicates Freemasons, forbidding Catholics from joining them.\n\nThis move is seen by [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] as an attack on freedom of assembly, and even [SCOPE.sCharacter('king_leopold').GetFullName] considered the bishops' initiative dangerous.\n\nHowever, this condemnation also signaled the complete identification of Freemasonry with anti-clericalism."
 bpm_belgian_historical_events.1.f: "Gentlemen, We have learned with regret that among the faithful entrusted to our pastoral care, there are some who believe that they can, without offending their conscience, join Masonic associations and attend their meetings.\n\n— Archbishop Engelbert Sterckx, 28 December 1837"
 bpm_belgian_historical_events.1.a: "Are they nuts?"

 bpm_belgian_historical_events.2.t: "Paul Devaux Ends his Support for the Union"
 bpm_belgian_historical_events.2.d: "[SCOPE.sCharacter('bpm_paul_devaux_scope').GetFullName], one of the most famous of the so-called ‘radicals’, ended his support for the government some time after the signing of the Treaty of London.\n\nA few months later, he founded the periodical ‘#yellow Revue Nationale#!’, in which he began launching various attacks on the [concept_government], demanding change, criticizing various politicians, and increasingly opposing Catholicism.\n\nHis activity is slowly causing us to lose more and more pro-Unionist liberals from the administration."
 bpm_belgian_historical_events.2.f: "By sticking to extreme, theoretical, or non-governmental positions, a practical opposition, on the contrary, fights to ensure that its ideas prevail as far as possible. It does not merely aspire to destroy; it knows what it will put in place of what it overthrows.\n\n— Paul Devaux in his #italic Revue Nationale#!, 1839"
 bpm_belgian_historical_events.2.a: "The last of the splinters, hopefully..."

