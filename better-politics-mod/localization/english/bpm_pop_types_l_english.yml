l_english:
 aristocrats_desc: "Wealthy landowners, old money with old connections. They exclusively work in [GetBuildingType('building_manor_house').GetName] [Concept('concept_building', '$concept_buildings$')], where they own farms and plantations. They contribute some of their profits to the [concept_investment_pool]. Their political interests are represented as the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]."

 bureaucrats_desc: "High-ranking officials responsible for administration of government functions, law enforcement and infrastructure.\n$TOOLTIP_DELIMITER$\nInstitutionally they are represented by [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant]; whereas politically, they tend to align with [Concept('concept_bpm_ig_is_mainstream_conservative', 'Conservative')] groups, but may lean towards whoever is the status quo."

 capitalists_desc: "Captains of industry, new money for a new era. They exclusively work in [GetBuildingType('building_financial_district').GetName] [Concept('concept_building', '$concept_buildings$')], where they own mines and manufacturies. They contribute some of their profits to the [concept_investment_pool]. Their institutional interests are represented as the [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant]; politically, they initially tend to lean [Concept('concept_bpm_ig_is_liberal', 'Liberal')], but over time they may become more [Concept('concept_bpm_ig_is_mainstream_conservative', 'Conservative')]."

 clergymen_desc: "Priests, religious scholars, monks and other religious and moral guides tending to the spiritual needs of the lay population.\n$TOOLTIP_DELIMITER$\nUsually rural and apolitical, they tend to stick to [Concept('concept_bpm_institutional_ig', 'Institutional Interest Groups')]."

 clerks_desc: "#v Above 10 [Concept('concept_sol', 'Standard of Living')]#! (@impoverished! #bold #yellow Impoverished#!#! ):\nLower-ranking office and professional workers performing minor and day-to-day administrative and financial tasks in government, businesses, infrastructure and other establishments.\n\n#v Below 10 [Concept('concept_sol', 'Standard of Living')]#! (@impoverished! #bold #yellow Impoverished#!#! ):\nLower-ranking office workers who perform tiring day-to-day administrative tasks with little extensively complicated work, but also little pay.\n$TOOLTIP_DELIMITER$\nEarly on they tend to be [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')] or a part of [Concept('concept_bpm_institutional_ig', 'Institutional Interest Groups')], but when more common they tend to divert to worker-based or [Concept('concept_bpm_ig_is_liberal', 'Liberal')] [Concept('concept_bpm_ideological_ig', 'Ideological Interest Groups')]."

 engineers_desc: "#v Above 15 [Concept('concept_sol', 'Standard of Living')]#! (@middling! #bold #yellow Middling#!#! ):\nEducated workers and skilled artisans operating advanced machinery needed in day-to-day operations, with enough wealth to be perceived by upper classes as 'labor aristocracy'.\n\n#v Below 15 [Concept('concept_sol', 'Standard of Living')]#! (@middling! #bold #yellow Middling#!#! ):\nEducated workers who operate advanced machinery needed in day-to-day operations, who despite their importance struggle to survive.\n$TOOLTIP_DELIMITER$\nThey usually lean towards worker-based [Concept('concept_bpm_institutional_ig', 'Institutional')] and [Concept('concept_bpm_ideological_ig', 'Ideological')] [Concept('concept_interest_group', 'Interest Groups')], but may also lean [Concept('concept_bpm_ig_is_liberal', 'Liberal')]."

 farmers_desc: "#v Above 15 [Concept('concept_sol', 'Standard of Living')]#! (@middling! #bold #yellow Middling#!#! ):\nSmallholders, ranchers, industrial farmers and other farm owners who own plots of land and primarily live off them, producing food and raising cash crops, livestock and more.\n\n#v Below 15 [Concept('concept_sol', 'Standard of Living')]#! (@middling! #bold #yellow Middling#!#! ):\nStruggling smallholders, tenant farmers and sharecroppers who make a scant living producing field crops for their own survival.\n$TOOLTIP_DELIMITER$\nMost tend to be [Concept('concept_bpm_ig_is_mainstream_conservative', 'Conservative')], though they can also find themselves as part of [Concept('concept_bpm_ig_is_socialist', 'Socialist')] or [Concept('concept_bpm_ig_is_agrarian', 'Populist')] [Concept('concept_interest_group', 'Interest Groups')]."

 peasants_desc: "Subsistence farmers found only in [Concept('concept_subsistence_building', '$concept_subsistence_buildings$')], where they produce agricultural and simple manufactured products they use mostly for their own needs. They rely on [concept_subsistence_output] for survival and play only a limited role in the [concept_market] economy. They tend to be [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')]."

 laborers_desc: "#v Above 10 [Concept('concept_sol', 'Standard of Living')]#! (@impoverished! #bold #yellow Impoverished#!#! ):\nCommon, unskilled laborers who always perform dangerous or unstable jobs in factories, mines, railways or farms, often losing lives or employment.\n\n#v Below 10 [Concept('concept_sol', 'Standard of Living')]#! (@impoverished! #bold #yellow Impoverished#!#! ):\nCommon, unskilled laborers and farmhands, who, without stable employment, often find themselves on the streets or constantly changing jobs.\n$TOOLTIP_DELIMITER$\nOften unable to safely sustain themselves, they tend to not partake in politics; but when they do, they tend to lean [Concept('concept_bpm_ig_is_mainstream_conservative', 'Conservative')] or support worker-based [Concept('concept_interest_group', 'Interest Groups')]."

 officers_desc: "Commissioned officers, usually with their status granted by inheiritance, wealth or merit, commanding and taking care of nation's military forces, primarily in the army and navy.\n$TOOLTIP_DELIMITER$\nInstitutionally their interests are represented by [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant], commonly leaning towards [Concept('concept_bpm_ig_is_hawkish', 'Hawkish')] or [Concept('concept_bpm_ig_is_patriotic', 'Patriotic')]-[Concept('concept_bpm_ig_is_moderate_conservative', 'Conservative')] groups."

 academics_desc: "Doctors, lawyers, researchers, journalists, teachers or other educated professionals, whether independent or employed, who specialize in certain branches and live primarily off them. Such specialists often tend to have friendly ties with the wealthy.\n$TOOLTIP_DELIMITER$\nUsually leaning moderately [Concept('concept_bpm_ig_is_liberal', 'Liberal')], they may also become the leaders and educators of the most [Concept('concept_radical', 'Radicalized')]. "

 shopkeepers_desc: "#v Above 20 [Concept('concept_sol', 'Standard of Living')]#! (@secure! #bold #yellow Secure#!#! ):\nSmall business owners, well-connected traders, wealthy artisans, stockbrokers or other wealthy business people who find themselves in the upper echelon of the middle-class.\n\n#v Below 20 [Concept('concept_sol', 'Standard of Living')]#! (@secure! #bold #yellow Secure#!#! ):\nCommon merchants, minor shop owners, brewers or skilled artisans who usually struggle to survive and compete with the new, big capital.\n$TOOLTIP_DELIMITER$\nThey institutionally are represented by [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant], commonly leaning towards moderately [Concept('concept_bpm_ig_is_liberal', 'Liberal')] positions unless under perceived danger."

 slaves_desc: "Treated not as a person but as property, performing forced labor in various sectors in countries where slavery is permitted. Due to their status, they are not allowed to participate in politics."

 soldiers_desc: "Common, struggling soldiers like military engineers, infantrymen, sailors or conscripts making up the bulk of the nation's military personel.\n$TOOLTIP_DELIMITER$\nThey are often either [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')] or not allowed to participate politics, but when they do they prefer [Concept('concept_bpm_ig_is_patriotic', 'Patriotic')] and [Concept('concept_bpm_ig_is_radical_liberal', 'Radical')]/[Concept('concept_bpm_ig_is_actually_desiring_socialism', 'Socialist')] groups."

 machinists_desc: "#v Above 15 [Concept('concept_sol', 'Standard of Living')]#! (@middling! #bold #yellow Middling#!#! ):\nPhysical workers, agricultural operators or independent craftsmen who perform manual labor taking care of machinery, usually with stable employment and appropriate education.\n\n#v Below 15 [Concept('concept_sol', 'Standard of Living')]#! (@middling! #bold #yellow Middling#!#! ):\nSkilled workers and craftsmen who operate common, basic machinery with stable employment but without the ability to properly provide for themselves.\n$TOOLTIP_DELIMITER$\nEarly on they tend to lean [Concept('concept_bpm_ig_is_liberal', 'Liberal')] or [Concept('concept_bpm_ig_is_mainstream_conservative', 'Conservative')] depending on their employment, but when more common they often divert to worker-based [Concept('concept_bpm_ideological_ig', 'IDGs')] or, if rural, [GetInterestGroupVariant('ig_agrarian_populists',GetPlayer).GetNameWithCountryVariant]."