 bpm_springtime_of_the_peoples.12.t: "Italian War of Independence"
 bpm_springtime_of_the_peoples.12.d: "The fact that the revolutionaries in [SCOPE.sState('1848_5_days_of_milan').GetName] and [SCOPE.sState('1848_san_marco_source').GetName] succeeded in driving out the [SCOPE.sCountry('1848_austria_country').GetAdjective] [concept_army] and [Concept('concept_bureaucracy', 'Administration')] can be called a resounding success.\n\nBut their removal does not mean the end of the revolution, for it is necessary to maintain one's own rule.\n\nHowever, it is unlikely that the revolutionaries will succeed in this, as noted by many and even [SCOPE.sCountry('1848_italian_interventionist').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('1848_our_leader_italy').GetFirstName], all those who strive for our country to enter the war in order to achieve a decisive, patriotic victory over the Austrians.\n\nShould we join the fight for Italian independence?" # With the outbreak of the revolution in [SCOPE.sState('1848_5_days_of_milan').GetName] and , there was already a strong belief that our [SCOPE.sCountry('1848_austria_country').GetRuler.GetPrimaryRoleTitle], [SCOPE.sCountry('1848_italian_interventionist').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('1848_our_leader_italy').GetFullName], would make the patriotic decision to side with the revolutionaries in order to secure independence for our Italian people; perhaps even to unite them, or at least part of them, under our rule?\n\nWhat are we to do? 
 bpm_springtime_of_the_peoples.12.f: "I offer neither pay, nor quarters, nor provisions; I offer hunger, thirst, forced marches, battles and death. Let him who loves his country in his heart, and not with his lips only, follow me.\n\n— Giuseppe Garibaldi, July 2nd 1849" # If ever a new war arises against Austria, I will come running immediately, even if only as a simple soldier, among the ranks of her enemies I am equally raised up by the thought and the hope that the day will come which I tried to bring about... The nation could have had a better prince than me, but not one that loved her more.\n\n— King Charles Albert, 1849
 Cernuschi: "Cernuschi"
 Enrico: "Enrico"
 bpm_springtime_of_the_peoples.12.a: "L'Italia farà da se!"
 bpm_springtime_of_the_peoples.12.b: "Why should we care?"
 
