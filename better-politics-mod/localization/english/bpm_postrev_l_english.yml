 je_bpm_postrev_republic_of_virtue_complete_tt: "Complete four goals and the #gold Capstone#!.\n\nGoals:\n- Proclaim Universal Human Rights\n- Enshrine the Right to Private Property\n- Proclaim the Sister Republics\n- Create an Ideological Power Bloc\n- Disband Your Empire\n- Build Twenty Universities\n\nCapstone:\n- Convert #v 25%#! of the population to [GetReligion('atheist').GetName]"

