  bpm_cabinet_agenda_events.1.t: "Report on the Religious Focus"
  bpm_cabinet_agenda_events.1.d: "bpm_cabinet_agenda_events.1.d"
  bpm_cabinet_agenda_events.1.d_desc: "The Cabinet is meeting to discuss policies and present a report on actions regarding the focus on religion present in [GetPlayer.MakeScope.Var('bpm_headofgov').GetCharacter.GetFullName]'s agenda."
  bpm_cabinet_agenda_events.1.d_report: "The Minister of Bla bla named Bla bla did bla bla\nThe Minister of Bla bla named Bla bla did bla bla..."
  bpm_cabinet_agenda_events.1.f: "”If God did not exist, it would be necessary to invent him.” - Voltaire"
  bpm_cabinet_agenda_events.1.a: "Duly Noted"
  bpm_cabinet_agenda_events.1.b: "Do not report again."

