 bpm_funding_and_organizing_primary_schooling: "Funding Establishment and Organization of Schooling"

 bpm_belgian_law_events.2.t: "Organic Law on Primary Education"

 bpm_belgian_law_events.2.religious: "The organic law organizing and establishing #yellow public primary education#! has just passed through the Parliament after years of debates since #gold 1834#!.\n\nThis law provides for the establishment of at least one primary school in each municipality, accessible to everyone, unless a private school already exists there. The curriculum includes reading, writing, arithmetic, weights and measures, the local language, and religion with morals.\n\nThe law also provides subsidies for private schools run by the clergy and provides various concessions and support for the church."
 bpm_belgian_law_events.2.public: "The organic law organizing and establishing #yellow public primary education#! has just passed through the Parliament after years of debates since #gold 1834#!.\n\nThis law provides for the establishment of at least one primary school in each municipality, accessible to everyone, unless a private school already exists there. The curriculum includes reading, writing, arithmetic, weights and measures, the local language, and religion with morals.\n\nThe law also provides subsidies for private schools and a provision allowing #yellow municipal councils#! to appoint @academics! Teachers."

 bpm_belgian_law_events.2.f: "You desire the influence of religion in the schools of the people; you feel the importance of it. But your wishes probably do not stop there. You also want the influence of religion in the families, in the households of the people. Does this mean that you wanted to give the clergy the domination of the family, absolute power over the household?\n\n— Paul Devaux, August 9th 1842"
 bpm_belgian_law_events.2.a: "To think that establishing public education could be such a hassle in this day and age..."

 ##################################################

 bpm_belgian_law_events.3.t: "Law on the Organization of the Army"

 bpm_belgian_law_events.3.d: "A new law reorganizing and reforming our #yellow Armed Forces#! has recently passed through Parliament.\n\nThis law reorganizes the entire [Concept('concept_army', 'Military')], establishing 80,000 soldiers in the field and reserve in peacetime; it professionalizes and decides what each unit consists of, how it is to be organized, including all details; it also organizes a professional general staff, officer corps, and administrative services."
 bpm_belgian_law_events.3.f: "Almost all Belgian leaders are incompetent and incapable. It is a great victory to have overcome the resistance of a new people whose self-esteem is exaggerated.\n\n— Augustin-Daniel Belliard, 1831"

 bpm_belgian_law_events.3.a: "Grand triomphe d’une petite nation!"

 ideology_leader_ultramontane: "Ultramontane"
 ideology_leader_ultramontane_desc: "#lore This leader is a deep and proud ultramontane, and, holding deep loyalty to the Pope and Catholicism, seeks to empower the Church as a bulwark of public morality.#!"

 ideology_leader_unorthodox_unionist: "Unorthodox Unionist"
 ideology_leader_unorthodox_unionist_desc: "#lore This leader seeks to continue the tradition of unionism, while also significantly differing in opinion with those interested.#!"

 bpm_belgian_nationbuilding_romanticism: "Belgian Nation-building Romanticism"

 bpm_belgian_law_events.4.t: "Law on the Organization of Jury"
 bpm_belgian_law_events.4.d: "A new law has been passed by parliament concerning the organization of #yellow juries#! and the reform of criminal corrections.\n\nJurors must be Belgian citizens who pay a certain [Concept('concept_taxes', 'Tax')] or belong to specific categories of people, such as burgomasters, aldermen, doctors of law, notaries and more.\n\nIt also introduces a mechanism for correcting crimes, which deprives jury courts of their essence. It consists in the public prosecutor's office and investigative courts allowing mitigating circumstances or justifying reasons, referring the case to a criminal court instead."
 bpm_belgian_law_events.4.f: "The jury is established in all criminal matters and for political and press offenses.\n\n— Article 98 of the Belgian Constitution of February 7th 1831"
 bpm_belgian_law_events.4.a: "The citizens shall be a part of law too."

 bpm_grandeous_army_reorganization: "Grandeous Army Reorganization"

 bpm_belgian_law_events.5.t: "Organic Law on the Organization of the Military Academy"
 bpm_belgian_law_events.5.d: "A bill reorganizing the #gold Royal Military Academy#! and defining its purpose and organization has just passed successfully through Parliament.\n\nIt defines the #gold Academy#! as an ‘#bold authentic military university#!’, establishes its internal organization, ensures adequate education with a curriculum for soldiers, and transfers various tasks and powers to the [concept_government]."
 bpm_belgian_law_events.5.f: "Education promotes discipline and a sense of honor, it has been said. Nothing could be truer, and education is, in our opinion, only necessary at the beginning of a military career.\n\n— François Joseph Liévin in ‘#italic Les établissements d'instruction et d'éducation militaires en Belgique#!’, 1872"
 bpm_belgian_law_events.5.a: "A much needed reform."

 bpm_the_royal_military_academy: "Active Increase in Student Soldiers"

