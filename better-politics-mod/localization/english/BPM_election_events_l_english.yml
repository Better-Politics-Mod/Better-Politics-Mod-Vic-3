 bpm_election_events.1.d:0 "The new government of [SCOPE.sCharacter('bpm_new_ruler_scope').GetLastNameNoFormatting] must set about the task of assembling a cabinet and a series of new executive appointments. What strategy should the government adopt?\n@information! #bold This will impact the automatic cabinet appointments. You can always manually change the cabinet members after the event.#!"
