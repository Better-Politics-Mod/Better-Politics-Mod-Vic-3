l_english:
  hog_regency.1.t: "The Regency"
  hog_regency.1.d: "The title of $bpm_hog_title_default_contextless$ has passed to [SCOPE.sCharacter('hog_scope').GetFullName], who has yet to reach the age of majority. The task of assembling a regency has fallen to the sitting government."
  hog_regency.1.f: ""Your task will, foremostly, be to maintain the stability of [ROOT.GetCountry.GetNameNoFormatting] for the span of the $bpm_hog_title_default_contextless$'s minority. We are prepared to assume responsibility for raising the child. You may rest assured that you are not being drafted as a surrogate parent."\n\nThe emissary paused, awaiting the minister's response.\n\n"I understand," came the reply. "On the matter of education, [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] is prepared to discharge the necessary sum. What else do you require?""
  hog_regency.1.a: "[SCOPE.gsInterestGroup('ig_candidate_1').GetLeader.GetFullName] is the obvious choice."
  hog_regency.1.b: "[SCOPE.gsInterestGroup('ig_candidate_2').GetLeader.GetFullName] can be trusted to uphold the [SCOPE.sCharacter('hog_scope').GetCountry.GetGovernment.GetName]."
  hog_regency.1.c: "We may compromise with [SCOPE.gsInterestGroup('ig_candidate_3').GetLeader.GetFullName]."
  hog_regency.1.e: "Appointing [SCOPE.gsInterestGroup('ig_candidate_4').GetLeader.GetFullName] will be the popular choice."

  hog_regency_c1: "[SCOPE.gsInterestGroup('ig_candidate_1').GetLeader.GetFullName] will become the Acting $bpm_hog_title_default_contextless$"
  hog_regency_c2: "[SCOPE.gsInterestGroup('ig_candidate_2').GetLeader.GetFullName] will become the Acting $bpm_hog_title_default_contextless$"
  hog_regency_c3: "[SCOPE.gsInterestGroup('ig_candidate_3').GetLeader.GetFullName] will become the Acting $bpm_hog_title_default_contextless$"
  hog_regency_c4: "[SCOPE.gsInterestGroup('ig_candidate_4').GetLeader.GetFullName] will become the Acting $bpm_hog_title_default_contextless$"

  modifier_hog_regency: "Head of Government Regency"

  hog_regency.3.t: "Coronation Day"
  hog_regency.3.d: "[SCOPE.sCharacter('hog_scope').GetFullName] has reached the age of majority, and may now become the $bpm_hog_title_default_contextless$. [SCOPE.sCharacter('regent_hog_scope').GetFullName]'s regency has come to an end."
  hog_regency.3.f: "[SCOPE.sCharacter('regent_hog_scope').GetFullNameNoFormatting] watched as the priest carried out the final anointments. The difference between the $bpm_hog_title_default_contextless$ of today and of yesterday was starker than [SCOPE.sCharacter('regent_hog_scope').GetSheHe] could ever have imagined. [SCOPE.sCharacter('hog_scope').GetSheHe|U] stood taller than before, with a practiced look of determination on [SCOPE.sCharacter('hog_scope').GetHerHis] face. The vestments appeared weightless when placed upon [SCOPE.sCharacter('hog_scope').GetHerHis] shoulders.\n\nThe priest stepped away, and a fanfare played, accompanied by the rumble of cannons from outside the palace walls.\n\n"The things which I have here before promised, I will perform and keep," the $bpm_hog_title_default_contextless$ recited. "So help me [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')].""
  hog_regency.3.a: "Long live the $bpm_hog_title_default_contextless$!"