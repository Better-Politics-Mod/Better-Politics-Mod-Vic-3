# Conservatives
 ig_konservative: "Konservative"
 ig_konservative_desc: "The Konservative are the most conservative wing of German nationalists, mainly comprised of South Germans and Catholics. The fear of Prussian and by extension protestant dominance over a united Germany has led to the faction's support of a greater German federation. The Konservative's rejection of constitutionalism makes them the only faction to advocate for a continuation of the absolute monarchy."

 ig_freikonservative: "Freikonservative"
 ig_freikonservative_desc: "$ig_conservatives_desc$"

 ig_volkskonservative: "Volkskonservative"
 ig_volkskonservative_desc: "$ig_progressive_conservatives_desc$"

