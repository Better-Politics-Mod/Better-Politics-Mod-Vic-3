

 bpm_revcell_urban_lv1: "#crisis Small Revolutionary Urban Front#!"
 bpm_revcell_urban_lv2: "Medium Revolutionary Urban Front"
 bpm_revcell_urban_lv3: "Large Revolutionary Urban Front" 
 bpm_revcell_progress_urban_popscaled_add: "Urban Front Revolution Progress (Population-Scaled)"

 bpm_revcell_progression_urban: "#header Cell Progression#!\nEach Month, the state invests a certain amount of [concept_bpm_state_capacity], based on its total [concept_bpm_state_capacity] and Laws.  If this is higher than the revolution progress, the cell will shrink, otherwise it will grow.  #bold Revolutionaries Progress#!: [State.MakeScope.ScriptValue('bpm_front_urban_progressrate')|-v2]  \n[State.MakeScope.GetScriptValueDesc('bpm_front_urban_progressrate')]\n  #bold Government Progress#!: [State.MakeScope.ScriptValue('bpm_state_repression')|-v2]\n[State.MakeScope.GetScriptValueDesc('bpm_state_repression')]"



