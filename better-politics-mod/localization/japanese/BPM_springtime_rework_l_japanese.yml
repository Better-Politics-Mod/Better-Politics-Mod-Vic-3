 bpm_springtime_this_was_our_very_first_revdis: "This was our very first [concept_bpm_springtime_revolutionary_disorder_events]."
 bpm_springtime_to_quell_disorder: "@information! To suppress [concept_bpm_springtime_revolutionary_disorder_events], you can take various actions. These primarily include increasing the [concept_investment_level] of [GetInstitutionType('institution_police').GetName] and [GetInstitutionType('institution_home_affairs').GetName], as well as using the buttons in the #springtime $je_springtime_of_the_peoples$#! [concept_journal_entry]."

 bpm_springtime_to_disorder_likelyhood: "The likelihood of disorder occurring is based on the [concept_bpm_springtime_revolutionary_drift] of the group involved; several such events may occur simultaneously, carried out by different interests-factions."

 

 bpm_springtime_revolutionary_disorder.1.t: "@intelligentsia! #yellow Artisans#! Wreck [GetBuildingType('building_railway').GetName] Section"
 bpm_springtime_revolutionary_disorder.1.d: "Unemployed or low-paid wagoners in [SCOPE.sState('bpm_springtime_revdis_railway_tracks_destroyed').GetName], along with teamsters and freightmen, took matters into their own hands after a long period of pleading for restrictions on rail transport.\n\nAn angry mob, driven into poverty by [GetGoods('coal').GetName] and @engines! #yellow Steam#! [concept_technology], destroyed many sections of a [GetBuildingType('building_railway').GetName] at night, tearing up ties, threatening workers, and demolishing a station house.\n\nOther local artisans, incited by the situation, carried out similar acts of vigilantism on the railways.\n\nThe [concept_army], along with the #yellow Civil Guard#!, soon arrived at the scene of the sabotage, restoring order. There is a great deal of damage, but it can be easily repaired; however, it will take some time before the entire [Concept('concept_building', 'Local Industry')] is back on its feet."
 bpm_springtime_revolutionary_disorder.1.f: "The incidents are, to put it bluntly, a tragedy for our city. They contribute directly and indirectly to the business depression and unemployment, they bring humiliation and dishonor to our inhabitants, and they undermine the freedom of the state and of the entire fatherland.\n\n— Article in #italic Neueste Nachrichten aus dem Gebiete der Politik#!, April 11th 1848"
 bpm_springtime_revolutionary_disorder.1.a: "An unruly mob."

 bpm_springtime_revolutionary_disorder.2.t: "@intelligentsia! #yellow Artisans#! Force Regulation of Production in [SCOPE.sState('bpm_springtime_revdis_production_regulated').GetName]"
 bpm_springtime_revolutionary_disorder.2.d: "Dissatisfied and impoverished weavers and carpenters, as well as journeymen, demanding redress for past grievances, forced local @shopkeepers! #yellow Merchants#! and [GetPopType('capitalists').GetName] to make concessions.\n\nThe outworkers and other artisans, having arrived in crowds, began to threaten violence and destruction, or began smashing windows, in order to force concessions from their employers and industrialists.\n\nMany owners agreed to establish pacts #gold regulating production#!, limiting the use of #gold machinery#!, and #gold stabilizing#! or #gold fixing prices#!.\n\nSometimes these concessions were smaller and simpler, ensuring increases in [Concept('concept_building_wage', 'Piece-Rate Wages')], resolving #red disputes#! in favor of the craftsmen, or promising to protect ‘#yellow journeyman customs#!’ (such as drinking [GetGoods('liquor').GetName] on the job)."
 bpm_springtime_revolutionary_disorder.2.a: "...They drink on the job?"

 bpm_springtime_revolutionary_disorder.3.t: "@intelligentsia! #yellow Artisans#! Wage War Against the Steamship"
 bpm_springtime_revolutionary_disorder.3.d: "Independent shipowners, sailors, dockworkers, guards, and even innkeepers and blacksmiths — all of whom had become [concept_unemployed] or @impoverished! #v Impoverished#! due to competition — joined forces to launch attacks on the ships of large companies traveling along the rivers of [SCOPE.sState('bpm_springtime_revdis_wage_against_the_steamship').GetName].\n\nThe targeted entrepreneurs refused to be intimidated, continuing their operations and supplying crews with defensive equipment.\n\nHowever, when rioters began to appear armed with [GetGoods('small_arms').GetName] and even [GetGoods('artillery').GetName], local companies and traders quickly began to withdraw, temporarily ceasing or severely limiting their operations.\n\nA silent and massive paralysis of river transport ensued, causing great harm to [concept_trade] and [concept_good_production]." # They are demanding, among other things, a complete ban on the transport of goods by steamboats, the abolition of ship fees, and the establishment of a carriers’ guild.
 bpm_springtime_revolutionary_disorder.3.f: "There were three issues in particular on which the German people rose up most unequivocally and emphatically in defense of their material interests... These issues were the question of freeing the land from its burdens; the question of regulating trade; and the question of the commercial unity and consolidation of the German Confederation.\n\n— Bernhard Eisenstuck, 1848" 
 bpm_springtime_revolutionary_disorder.3.a: "You're supposed to be keeping watch on the Rhine!"

 bpm_railway_service_suspended: "Railway Service Suspended"
 
 bpm_springtime_revolutionary_disorder.4.t: "@intelligentsia! #yellow Artisans#! Devastate Property"
 bpm_springtime_revolutionary_disorder.4.d: "Crowds of poor and embittered craftsmen, filled with hatred for the [Concept('concept_good', 'Machines')], injustice, and the [concept_upper_strata], began to launch isolated yet widespread attacks on private property and industry in [SCOPE.sState('bpm_springtime_revdis_mills_devastated').GetName].\n\nThey throw stones at the residences of the rich, destroy machines, smash windows, commit arson on mills, and sometimes take justice into their own hands — beating and even #red killing#!.\n\nMany [GetBuildingType('building_tooling_workshop').GetName] are devastated or damaged; [GetBuildingType('building_textile_mill').GetName] are in flames or facing widespread demonstrations; whilst [GetBuildingType('building_steel_mill').GetName] have mostly been wrecked.\n\nTerrified [GetPopType('capitalists').GetName] and [GetPopType('shopkeepers').GetName] sign agreements, cut back [concept_good_production], and flee with their capital; they bring in private police and the civic guard, or make desperate promises."
 bpm_springtime_revolutionary_disorder.4.f: "In most cities of the Rhine Province more or less violent scenes have occurred, as for example in Cologne, Düsseldorf, Krefeld, Bonn, Coblenz, and especially in the factory districts of the Berg highlands, where blood has actually flowed in some instances.\n\n— Article in #italic Bayerische Landbötin#!, March 30th 1848"
 bpm_springtime_revolutionary_disorder.4.a: "They are the ones perpetrating injustice."

 bpm_local_production_regulated: "Factory Production Regulated"
 bpm_total_waterway_paralysis: "Total Waterway Transport Paralysis"

 bpm_devastation_of_property: "Mass Devastation of Property and Mills"

 bpm_springtime_revolutionary_disorder.5.t: "@intelligentsia! #yellow Artisans#! Bent on Violence"
 bpm_springtime_revolutionary_disorder.5.d: "Many militant artisans, embittered by the impoverishment caused by machines, began demonstrations, protests, and riots, smashing windows, making threats, and shouting.\n\nIsolated and sporadic crowds of these desperate people marched through various cities, often encountering equally militant authorities at the end of their processions.\n\nA clash between the crowds of craftsmen and [GetInstitutionType('institution_police').GetName] #gold Officers#! from the #yellow Police#! and local #yellow Civic Militias#! seems inevitable to observers, but local authorities and police are racking their brains to find some peaceful resolution to the issues and misfortunes raised by the crowds."
 bpm_springtime_revolutionary_disorder.5.a: "A peaceful settlement is much needed."
 bpm_springtime_revolutionary_disorder.5.b: "We need to keep them in check, somehow."

 bpm_content_local_artisans: "Local Artisans Temporarily Content"
 bpm_effects_of_the_peaceful_settlement: "The Peaceful Settlement"

 bpm_proletarian_strikes: "Factory Strikes"
 bpm_stirke_outcomes: "Strike Concessions"

 

 bpm_springtime_revolutionary_disorder.6.t: "@trade_unions! #pink Proletarians#! Organize Strikes"
 bpm_springtime_revolutionary_disorder.6.d: "The proletariat — the hard-working, poor, and unskilled children of modernity — also strive to taste freedom and secure benefits for themselves and their fellow workers.\n\nThat is why they have begun to organize and employ various methods of struggle against [GetPopType('capitalists').GetName].\n\nPress workers, [GetPopType('machinists').GetName], [GetPopType('laborers').GetName] in [Concept('concept_building', 'Heavy Industry')] and [GetBuildingType('building_textile_mill').GetName], in isolated instances together, as workers of their own plants, carry out #yellow strikes#!, #yellow collective bargaining#!, or #yellow demonstrations#!.\n\nSome demand better conditions, others want a higher [concept_building_wage]; and still others want everything or something else entirely"
 bpm_springtime_revolutionary_disorder.6.f: "Article 1. In that the abolition of any kind of citizen's guild in the same trade or of the same profession is one of the fundamental bases of the French Constitution, it is forbidden to reestablish them under any pretext or in any form whatsoever.\n\n— The #italic Le Chapelier Law#!, June 14th 1791"
 bpm_springtime_revolutionary_disorder.6.a: "There is nothing we can do."
 bpm_springtime_revolutionary_disorder.6.b: "Bust and arrest them all, immedietely!"

 bpm_proletarian_strikes_weak: "Factory Strikes"
 bpm_worker_associations: "Very Active Workers’ Associations & Trade Unions"

 
 
 bpm_springtime_revolutionary_disorder.7.t: "@trade_unions! #pink Proletarians#! Organize Associations and Unions"
 bpm_springtime_revolutionary_disorder.7.d: "Taking advantage of the current situation and the freedom of association they enjoy, workers in [SCOPE.sState('bpm_springtime_revdis_proletarian_associations').GetName] have began to organize various societies, such as [Concept('concept_education_access', 'Educational')] and [Concept('concept_welfare_payments', 'Mutual Aid Societies')], as well as [GetLawGroup('lawgroup_labour_associations').GetName].\n\nDifferent organizations deal with various issues, generally social ones, caring for the needy, workers, and members of these societies.\n\nThere are also emerging semi-legal trade unions or similar organizations striving for the legalization of #pink Trade Unions#!, the ‘#yellow right to work#!’, [GetLawGroup('lawgroup_labor_rights').GetName], or other activities."
 bpm_springtime_revolutionary_disorder.7.a: "They better not be planning anything unlawful..."

 

 bpm_concessions_of_panic: "Concessions of Panic"
 
 bpm_springtime_revolutionary_disorder.8.t: "@trade_unions! #pink Proletarians#! Whisper of a General Strike"
 bpm_springtime_revolutionary_disorder.8.d: "Rumors and talk of a magnificent and massive general strike began to slowly but surely terrify the capitalists in industrial centers of [SCOPE.sState('bpm_springtime_revdis_proletarian_general_strike_whispers').GetName].\n\nEverywhere, workers spoke to one another about their own hardships — long hours, lack of money, and exhaustion — and thousands of others like them shared their sorrows.\n\nEmployers, growing increasingly frightened, rushed to make peace with their workers, just so the crowd wouldn’t get out of control, by granting them [GetLawType('law_limited_work_hours').GetName] and raising [Concept('concept_building_wage', 'Wages')], and sometimes by trying to improve working conditions."
 bpm_springtime_revolutionary_disorder.8.f: "If we consider once again the circumstances which have created great distress at the present time, we find that they lie above all in the fact that domestic commerce is lacking in confidence, that property appears to be threatened by constant agitation, and finally that concern about a disruption of foreign trade and of markets abroad has caused the extinction of almost all spirit of enterprise."
 bpm_springtime_revolutionary_disorder.8.a: "Peace at last."

 bpm_farmhand_extortions: "Farmhand Extortions"

 bpm_springtime_revolutionary_disorder.9.t: "@trade_unions! #pink Proletarians#! Extort Concessions in Agriculture"
 bpm_springtime_revolutionary_disorder.9.d: "The [GetPopType('aristocrats').GetName] — losing their influence and privileges, and troubled by the unrest among the peasantry — as well as the [GetPopType('farmers').GetName], preoccupied with exercising their new freedoms and rights — are both unable to effectively deal with the internal unrest on their land, estates, where the #yellow Rural#! [GetPopType('laborers').GetName] work.\n\nApart from increasing their [Concept('concept_building_wage', 'Pay')], securing changes regarding specific physical tasks or obligations from their employers, some, rarely, also climb the social ladder from #yellow cottager#!, to #yellow crofter#!, and even further — to #yellow lessee#!."
 bpm_springtime_revolutionary_disorder.9.f: "Only here and there a spark shows that beneath the ashes of seeming tranquillity all the glow of desire for a plot of land is still alive among the day laborers.\n\n— Otto von Bismarck, July 2nd 1848"
 bpm_springtime_revolutionary_disorder.9.a: "Maybe you do get a piece of land someday..."

 bpm_manorial_despair: "Manorial Despair"
 bpm_springtime_revolutionary_disorder.10.t: "@rural_folk! #green Peasants#! Wreck a Local Castle, Manor and Documents"
 bpm_springtime_revolutionary_disorder.10.d: "Living in despair, with little [Concept('concept_food_security', 'Food')] or [Concept('concept_arable_land', 'Land')], and driven by anger at their oppression, the peasants set out for the local, grand and majestic residences in [SCOPE.sState('bpm_springtime_revdis_wrecked_castle').GetName].\n\nOnce inside a residence, they would begin to burn and loot, wringing money from the terrified [GetPopType('aristocrats').GetName].\n\nAs they would move through the entire estate, they would steal and destroye, manhalding stewards, overseers, and the proprietors themselves. Having then seized the documents of [Concept('concept_ownership_share', 'Ownership')] and [Concept('concept_credit', 'Debt')], the peasants would took special care of them.\n\nSimilar situations are unfolding in surrounding smaller [GetBuildingType('building_manor_house').GetName], with fields being set ablaze and peasants returning with all manner of spoils, distributing and sharing them among themselves and the village."
 bpm_springtime_revolutionary_disorder.10.f: "Let our voices rise, let our hands join together — not empty hands — and you, Sicilian bell, ring out for our feast! For a long time now, the cunning enemy has been trading in blood; God, who sanctifies our suffering, sanctifies our vengeance. As long as blood flows in our veins, as long as breath remains in our chests: Vengeance upon him!\n\n— Kornel Ujejski’s ‘#bold The Song of Vengeance#!’ poem in his ‘#bold Skargi Jeremiego#!’ chorale, Paris 1847"
 bpm_springtime_revolutionary_disorder.10.a: "Pure terror and destruction."

