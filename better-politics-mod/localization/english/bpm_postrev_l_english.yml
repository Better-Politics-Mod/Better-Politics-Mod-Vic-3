# SWEEPING THE OLD # ===========
 je_bpm_sweeping_away_the_old: "Sweeping Away the Old"
 je_bpm_sweeping_away_the_old_reason: "The revolution has succeeded, but so much more is needed to truly change society. The Ancien Régime must be swept away meticulously so that a new, modern order can take its place.\nUnfortunately, no one agrees on how to do this.\n\nRevolutionary [Concept('concept_interest_group', '$concept_interest_groups$')] have organized themselves into Factions. If their $IG_APPROVAL_BELOW_UNHAPPY$ for #v 6#! months, they will leave the Revolutionary Coalition. Fulfilling their factional demands gives a boost to their [concept_approval].\n\n@warning! #N The Revolution ends when [GetLawType('law_provisional_government').GetName] is abolished."
 BPM_REVOLUTIONARY_ZEAL_OVERBAR: "$bpm_revolutionary_zeal$: [Character.MakeScope.Var('bpm_revolutionary_zeal').GetValue|v0] ([GuiScope.SetRoot(GetPlayer.MakeScope).AddScope('faction', Character.MakeScope).ScriptValue('bpm_revolutionary_zeal_change_value')|=+v] /week)"
 BPM_OVERALL_REVOLUTIONARY_ZEAL_OVERBAR: "$bpm_revolutionary_zeal$: [GetPlayer.MakeScope.ScriptValue('bpm_overall_revolutionary_zeal')|v0]"
 BPM_REVOLUTIONARY_ZEAL: "$bpm_revolutionary_zeal$"
 bpm_revolutionary_zeal: "#gold $concept_bpm_revolutionary_zeal$#!"
 concept_bpm_revolutionary_zeal: "Revolutionary Zeal"
 BPM_OVERALL_REVOLUTIONARY_ZEAL: "Overall $bpm_revolutionary_zeal$"

 bpm_faction_zeal_level_tooltip_one: "#tooltip_header;gold Disillusioned#!\n$TOOLTIP_DELIMITER$\n"
 bpm_faction_zeal_level_tooltip_two: "#tooltip_header;gold Wavering#!\n$TOOLTIP_DELIMITER$\n"
 bpm_faction_zeal_level_tooltip_three: "#tooltip_header;gold Stalwart#!\n$TOOLTIP_DELIMITER$\n"
 bpm_faction_zeal_level_tooltip_four: "#tooltip_header;gold Fanatical#!\n$TOOLTIP_DELIMITER$\nThis Faction fanatically supports the Revolution. This increases the [concept_approval] of all supporting [Concept('concept_interest_group', '$concept_interest_groups$')] by #P +20#!.\n\nChanging at a rate of [GuiScope.SetRoot(GetPlayer.MakeScope).AddScope('faction', Character.MakeScope).ScriptValue('bpm_revolutionary_zeal_change_value')|=+v] because:\n[GuiScope.SetRoot(GetPlayer.MakeScope).AddScope('faction', Character.MakeScope).GetScriptValueDesc('bpm_revolutionary_zeal_change_value')]"


