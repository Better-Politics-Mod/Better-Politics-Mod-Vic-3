 je_springtime_of_the_peoples_reason: "Humanity, all of Europe, all who clutch power and the whip, tremble before the the Revolution’s beautifully dreadful majesty, wrought from the suffering of all. This majesty, these [SCOPE.GetRootScope.GetCountry.GetCustom('bpm_springtime_check_tricolor')] flags, these chants and barricades, these ruined buildings and the scorched lands, spread like a raging fire from country to country, city to city, fueled by the blood of the resolute. The resolute who, though divided on every issue, cry out as one for #yellow Liberty#!, #yellow Equality#!, and #yellow Fraternity#!. The rulers and lords shall kneel before the people, begging them for forgiveness.\n\nThe majesty and spririt of the #springtime Revolution#! will spread across the entire old continent, using blood and force to turn countries into its [Concept('concept_bpm_springtime_victim_of_the_revolution', 'Victims')] or [Concept('concept_bpm_springtime_child_of_the_revolution', 'Children')], and igniting widespread [concept_bpm_springtime_revolutionary_disorder_events]. During this [concept_journal_entry], time is of the essence, as the balance of power can shift drastically within mere days or weeks.\n\nYour ultimate goal, therefore, is to enter or ‘complete’ the [concept_bpm_springtime_reform_phase] by dismantling the past, rectifying injustices, enacting #bold #blue Reforms#!#!, completing #PB Objectives#!, and establishing a #YB Constitution#!. All the while, you must strive to maintain a positive [concept_bpm_springtime_revolutionary_drift] to keep the [Concept('concept_bpm_springtime_counterrevolutionary_preparadness', 'Counterrevolution')] and the [concept_bpm_springtime_wrath_of_the_revolution] in check.\n\n#lore There would never have been Christianity, or the Reformation, or any revolution, or anything good or great at all, if everyone had always thought: ‘You’re not going to change anything anyway!’\n\n— Robert Blum, November 23rd 1844#!" # Across Europe, various peoples raise flags and march for change. Inscribed on their dazzling banners are the forbidden words of a generation past: #gold Liberty, Equality, Fraternity#!. \n\nAt the end of this period, the #gold Revolutionaries#! will emerge victorious if your country:\n- Is a #yellow Republic#!, and\n- Has #yellow Wealth Voting#! or #v better#!.\n\nOn the other hand, the #purple Reactionaries#! will emerge victorious if:\n- [GetInterestGroupVariant('ig_radicals',GetPlayer).GetName] and [GetInterestGroupVariant('ig_socialists',GetPlayer).GetName] are [concept_marginalized].\n\nOtherwise, your country maintains a reformed status quo.\n\n#lore What is the Third Estate? Everything.\n—Abbé Sieyès, 1788#!#! # \n\n[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]’ #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_artisans_revolutionary_drive_tooltip #tooltip_header Revolutionary Drive: [Country.MakeScope.ScriptValue('bpm_springtime_artisanal_disorder_vs_law_and_order')|D+0=]#!#!#!\n[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName]’ #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_peasants_revolutionary_drive_tooltip #tooltip_header Revolutionary Drive: [Country.MakeScope.ScriptValue('bpm_peasant_revolutionary_drive_target')|D+0=]#!#!#!\n\n[Country.MakeScope.ScriptValue('bpm_king_reactionism_meter')|D+0=]\n\nWrath of the Revolution points/resources: [Country.MakeScope.ScriptValue('bpm_springtime_wrath_of_the_revolution_calc')|D+0=] vs. [Country.MakeScope.ScriptValue('bpm_springtime_fear_of_the_revolution_calc')|D+0=]\n\nVulnerability points: [Country.MakeScope.ScriptValue('bpm_springtime_vulnerability_points')|D+0=]\n\nLaw and Order values: [Country.MakeScope.ScriptValue('bpm_springtime_law_and_order_values')|D+0=]\n\n\nMonths passed overall: [ROOT.GetCountry.MakeScope.Var('bpm_springtime_phases_changing_variable').GetValue]\nCountries Affected by the Revolution: [GetGlobalVariable('bpm_je_springtime_countries_affected_by_the_revolution').GetValue|+0=]\n\nGerman states that have fallen: [GetGlobalVariable('bpm_springtime_number_of_german_states_to_explode').GetValue|+0=]\nTurkey Relations: [Country.MakeScope.ScriptValue('bpm_springtime_romanian_revolutionary_values')|D+0=]\nMonths of Responsible ministers: [ROOT.GetCountry.MakeScope.Var('bpm_springtime_objective_responsible_ministers').GetValue]\n\nJelacic vs Hungary: [Country.MakeScope.ScriptValue('bpm_springtime_croatian_hungarian_battle_count')|D+0=]

