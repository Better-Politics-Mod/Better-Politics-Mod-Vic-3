l_russian:
  bpm_amendment_artisanal_economy: "Ремесленная Экономика"
  bpm_amendment_artisanal_economy_desc: "Экономика, основанная на мелком ремесленном производстве, в которой товары изготавливаются квалифицированными мастерами или ремесленными гильдиями, а не в рамках промышленного производства."
  bpm_france_artisanal_lowest_level_pm: "[Concept('concept_production_method', '$concept_production_methods$')] в обрабатывающей промышленности ограниченны."
  bpm_france_artisanal_lowest_level_pm_desc: "[GetBuildingGroup('bg_manufacturing').GetName] не может использовать продвинутые или уменьшающие необходимую рабочую силу [Concept('concept_production_method', '$concept_production_methods$')]."
  interest_group_ig_intelligentsia_artisanal_economy_attraction: "Повышенная привлекательности [Amendment.GetSponsor.GetName] для населения занятого в городских сооружениях."
  interest_group_ig_intelligentsia_artisanal_economy_attraction_desc: "Влечение групп населения [Amendment.GetSponsor.GetName] работающих в [GetBuildingGroup('bg_manufacturing').GetName], [GetBuildingGroup('bg_extraction').GetName] и [GetBuildingGroup('bg_private_infrastructure').GetName] увеличенно пропорционально владению уровнями своего рабочего места"
  concept_bpm_pop_artisan:0 "Ремесленник с Ремесленной Экономикой"
  concept_bpm_pop_artisan_desc:0 "Из за поправки Ремесленная Экономика, влечение этой группы населения к данной группе интереса увеличенно пропорционально ее владению уровнями своего рабочего места"