 bpm_springtime_buildup.6.t: "The Sicilian Revolution"
 bpm_springtime_buildup.6.d: "Today, #gold January 12#!, on the birthday of [SCOPE.sCountry('country_of_two_sicilies_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('ferdinian_2nd_of_two_sicilies').GetFullName], the inhabitants of [SCOPE.sState('BPM_1848_sicialian_revolution_source').GetName], more precisely [SCOPE.sCountry('1848_sicialian_revolution_capital').GetCapital.GetCityHubName], started a rebellion that is turning into an island-wide revolution.\n\nThis date was deliberately chosen by the revolutionaries, with hatred for the [SCOPE.sCountry('country_of_two_sicilies_scope').GetRuler.GetPrimaryRoleTitle] for suppressing Sicilian autonomy and the 1812 constitution.\n\nSicilian independence euphoria is beginning to appear in every town and village on the island, and our efforts to defend our control over [SCOPE.sState('BPM_1848_sicialian_revolution_source').GetName] are difficult, and we will most likely be completely pushed out of it."
 bpm_springtime_buildup.6.f: "Sicilians! The time for prayers has passed in vain, protests, pleas, peaceful demonstrations have been useless... Ferdinand has despised everything, and we, a people born free, reduced to chains and misery, will we still delay in regaining our legitimate rights?\n\n— Text of the proclamation encouraging revolt, January 9th 1848"
 bpm_springtime_buildup.6.a: "We must crush them, eventually!"
 bpm_springtime_buildup.6.b: "Siciliani all’armi!"

 notification_bpm_1848_sicilian_revolution_name: "#v Siciliani All’armi!#!"
 notification_bpm_1848_sicilian_revolution_desc: "On King [SCOPE.sCharacter('ferdinian_2nd_of_two_sicilies').GetFirstName]'s birthday, the #yellow Sicilians#! have started a revolution, driving out most enemy troops."
 
 BPM_SIL: "Sicily"
 BPM_SIL_ADJ: "Sicilian"

 BPM_CAL: "Calabria"
 BPM_CAL_ADJ: "Calabrian"
 
 bpm_springtime_buildup.7.t: "Riots in Campania"
 bpm_springtime_buildup.7.d: "On #gold January 27#!, demonstrations and riots broke out in #gold Naples#! in support of liberal reforms, encouraged by the successful #red Sicilian Revolution#!.\n\nPreceded by revolts in the town of #gold Cilento#! in the province of #yellow Salerno#!, they were loud, with thousands of participants shouting:\n\n‘#yellow Long live Pius IX! Long live Italy! Long live the constitution!#!’.\n\nTwo days later, on #gold January 29#!, the [SCOPE.sCountry('country_of_two_sicilies_scope').GetRuler.GetPrimaryRoleTitle] passed the Sovereign Act, promising to promulgate a constitution."
 bpm_springtime_buildup.7.f: "Instead of waiting weapons at the ready for the revolution everything must be done to prevent it.\n\n— Giuseppe Ceva Grimaldi, September 8th 1846"
 bpm_springtime_buildup.7.a: "The other option is total collapse."

 notification_bpm_1848_two_sicilies_constitution_name: "#v Viva Pio IX! Viva l'Italia! Viva la costituzione!#!"
 notification_bpm_1848_two_sicilies_constitution_desc: "A few days after promising a [Concept('concept_bpm_constitutional_level', 'Constitution')] during protests in #gold Naples#!, the King of [SCOPE.sCountry('country_of_two_sicilies_scope').GetName] has officially promulgated a constitution."
 bpm_peoples_springtime_it_is_the_beginning_of_the_year: "It is the beginning of the year."
 
 notification_bpm_1848_tuscany_constitution_name: "#v Statuto fondamentale in [SCOPE.sCountry('1848_tuscany_country').GetName]!#!"
 notification_bpm_1848_tuscany_constitution_desc: "A [Concept('concept_bpm_constitutional_level', 'Constitution')], drafted in four days filled with fear and worry, has been proclaimed in [SCOPE.sCountry('1848_tuscany_country').GetName]."

 bpm_springtime_buildup.8.t: "Costituzione del Regno delle Due Sicilie"
 bpm_springtime_buildup.8.d: ""
 bpm_springtime_buildup.8.f: ""
 bpm_springtime_buildup.8.a: "So be it..."

 bpm_springtime_buildup.9.t: "Statuto Fondamentale"
 bpm_springtime_buildup.9.d: "Today, on #gold February 15#!, the [SCOPE.sCountry('1848_tuscany_country').GetRuler.GetPrimaryRoleTitle] announced the constitution — the ‘#italic #L Statuto fondamentale#!#!’.\n\nInitially, the [SCOPE.sCountry('1848_tuscany_country').GetRuler.GetPrimaryRoleTitle] sought to reform the press and the #yellow Consulta di Stato#!, but when [SCOPE.sCharacter('king_of_piedmont').GetFullName] promised granting a constitution of his own on February 8, three days later the ruler expanded the committee's goal with an additional #italic motuproprio#!, which announced the creation of a ‘national representation’.\n\nThe committee completed its work in four days, so the [SCOPE.sCountry('1848_tuscany_country').GetRuler.GetPrimaryRoleTitle] proclaimed the new constitution of Tuscany."
 bpm_springtime_buildup.9.f: "The only means to replace the government on secure foundations was the transition from a pure monarchy to moderate monarchy.\n\n— Neri Corsini, September 1847"
 bpm_springtime_buildup.9.a: "Very well."

 bpm_springtime_buildup.10.t: "The Government Bans Political Banquets"
 bpm_springtime_buildup.10.d: "Prime Minister [SCOPE.sCharacter('BPM_prime_minister_guizot').GetLastName]’s [concept_government] today imposed a total ban on political banquets in the country.\n\nA week ago, a highly anticipated banquet in #gold Paris#! was banned, so its organizers moved it to the day when #yellow George Washington#! was born. They also decided to hold a political demonstration for that day.\n\nPolitical banquets have been organized since the end of the so-called ‘#v Hungry [SCOPE.GetRootScope.GetCountry.GetCustom('getDecadeName')|U]#!’ and are attended by various [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant], the [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant], and other liberal groups.\n\nTheir aim is to agitate for electoral reform, which, however, destabilizes our country."
 bpm_springtime_buildup.10.f: "Long live reform! Down with Guizot!\n\n— Chants of the Parisian crowds, February 22nd 1848"
 bpm_springtime_buildup.10.a: "Can't they just go home?"

 bpm_springtime_buildup.11.t: "Republican Decrees"
 bpm_springtime_buildup.11.d: "WIP"
 bpm_springtime_buildup.11.f: "The provisional government of the French Republic undertakes to guarantee the existence of the workmen by work. It undertakes to guarantee work for every citizen.\n\n— The content of the decree establishing the National Workshops, February 25th 1848"
 bpm_springtime_buildup.11.a: "Great!"

 bpm_peoples_springtime_spark_has_ignited_the_fuse: "A #bold #pink Revolutionry#! Spark#! has ignited the fuse"
 bpm_peoples_springtime_the_powderkeg_exploded: "#bold #red The powderkeg exploded, its echo rippling throughout Europe!#!#!"

 bpm_amendment_national_workshops: "National Workshops"
 bpm_amendment_national_workshops_desc: "In the spirit of the ‘right to work’, the state organizes public works and ensures access to work for everyone, with mixed results."

 bpm_amendment_akademische_legion: "Akademische Legion"
 bpm_amendment_akademische_legion_desc: "The Academic Legion is a powerful student militia that is part of the National Guard. Various radical and liberal ideals are widespread among its members."

