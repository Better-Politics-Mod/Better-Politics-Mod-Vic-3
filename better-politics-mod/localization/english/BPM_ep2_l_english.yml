  je_tenpo_crisis_reason: "Declared in 1830, the Tenpō, or 'Heavenly Protection' Era initially lived up to its auspicious name. However, poor weather conditions on [GetGeographicRegion('geographic_region_honshu').GetName] would soon result in soaring rice prices and a country-wide famine, while the increasing wealth and influence of the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] threatens the established [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] order.\n\nMeanwhile, on the horizon, Western [Concept('concept_great_power','$concept_great_powers$')] are getting ever bolder, and their merchantmen and gunboats ever closer to our shores.\n\nSeeking to address these issues, reform-minded notables have outlined their visions to the Bakufu.\n\n#tooltippable;tooltip:tenpo_reformer_tt #b Reformer Agenda#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')] [ROOT.GetCountry.GetNameNoFlag] has enacted [GetLawType('law_lax_edo_system').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')] [ROOT.GetCountry.GetNameNoFlag] has #b not#! enacted [GetLawType('law_hereditary_bureaucrats').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')] [ROOT.GetCountry.GetNameNoFlag] has #v 3#! [Concept('concept_state', '$concept_states$')] with a level #v 3#! [GetBuildingType('building_urban_center').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_government')] Any [concept_bpm_ig_is_liberal] [concept_interest_group] is in in [concept_government]\n#tooltippable;tooltip:tenpo_hardliner_tt #b Hardliner Agenda#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')] [ROOT.GetCountry.GetNameNoFlag] has enacted [GetLawType('law_strict_edo_system').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')] [ROOT.GetCountry.GetNameNoFlag] has enacted [GetLawType('law_shinsengumi').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')] [ROOT.GetCountry.GetNameNoFlag] has #v 40#! levels of [GetBuildingType('building_rice_farm').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_liberals_marginalized')] Every [concept_bpm_ig_is_liberal] [concept_interest_group] is [concept_marginalized]\n#tooltippable;tooltip:tenpo_shared_tt #b Shared Agenda#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')] #b No#! owned [GetCulture('japanese').GetName] [concept_homeland] [concept_state] is suffering from [concept_famine]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')] [ROOT.GetCountry.GetNameNoFlag] has a [Concept('concept_gdp', '$concept_gdp_short$')] of @gdp!#v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#! or above\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')] [ROOT.GetCountry.GetAdjectiveNoFlag] army [concept_power_projection] is greater than #v 500#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')] We have #v 10#! or more levels of [GetBuildingType('building_naval_fortification').GetName] in owned [Concept('concept_state', '$concept_states$')]"