 #bpm_auth_tt: "#tooltip_header State Capacity#!\n$TOOLTIP_DELIMITER$\nState capacity is equivalent to your total [concept_authority] generation.\n[concept_bpm_state_capacity]: [Country.GetModifier.GetValueWithBreakdownFor('country_authority_add')]\n\nIt is primarily generated by [concept_battalion]#gold s#! and [concept_bureaucracy].\n[concept_authority] per [concept_battalion]: [Country.GetModifier.GetValueWithBreakdownFor('country_bpm_auth_authority_per_army_size_add')] #b x#! [Country.GetRegularBattalions|Dv0] = [Country.MakeScope.ScriptValue('bpm_frontend_authority_from_army')|D+0=]\n[concept_authority] per [concept_bureaucracy]: [Country.GetModifier.GetValueWithBreakdownFor('country_bpm_auth_authority_per_bureaucracy_add')] #b x#! [Country.GetPowerIncome('bureaucracy')|Dv0] = [Country.MakeScope.ScriptValue('bpm_frontend_authority_from_bureaucracy')|D+0=]\n\n#tooltip_header Exhaustion Recovery#!\n$TOOLTIP_DELIMITER$\nExhaustion recovery is a percentage of your [concept_bpm_state_capacity].\n$je_bpm_auth_tracker_recovery_rate_tooltip$\n\n#tooltip_header Exhaustion Increase#!\n$TOOLTIP_DELIMITER$\n$je_bpm_auth_tracker_increase_rate_tooltip$\n\n@information! To increase [concept_bpm_state_capacity] recovery, build more bureaucracy, demobilize your army, build a larger army, and keep your [GetInterestGroupVariant('ig_petty_bourgeoisie', GetPlayer).GetName], [GetInterestGroupVariant('ig_landowners', GetPlayer).GetName] and[GetInterestGroupVariant('ig_armed_forces', GetPlayer).GetName] as well as [concept_in_government] [concept_interest_group]#gold s#! satisfied."

