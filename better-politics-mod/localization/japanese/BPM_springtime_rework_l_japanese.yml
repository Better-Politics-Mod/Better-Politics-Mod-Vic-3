 bpm_springtime_italian_unification.19.t: "On Suffrage"
 bpm_springtime_italian_unification.19.desc_freehold: "Something almost unexpected happened.\n\nDuring the debates on the nature and scope of electoral law — specifically, who was entitled to vote and how this crucial matter should be institutionally regulated — some @ig_conservatives! #conconf Con. Confederationists#! had proposed an amendment to establish a system based on freehold ownership.\n\nThis unpopular amendment would have been rejected and forgotten, but following increasingly radical demands and speeches by the @ig_radicals! #mazzinianist Mazzinianists#!, a significant portion of the @ig_liberals! #gradualist Gradualists#! and even a small group of the @ig_national_liberals! #supremelib Supreme Liberals#! voted in favor, fearing destructive demagoguery."
 bpm_springtime_italian_unification.19.desc_property: "After exhausting debates and arguments in the #bold #P Italian#! #v National#! #red Assembly#!#!, a final resolution on the issue of suffrage was reached.\n\nThe future system will be based on property ownership, with property owners eligible to vote.\n\nThis concept, though uncompromising and quite unpopular with the public, nevertheless found strong support among the @ig_liberals! #gradualist Gradualists#!, Italian [Concept('concept_ruler', 'Rulers')], and the [concept_upper_strata], who fear demagoguery.\n\nEven those excluded modestly nodded in agreement with the argument that education and money make a person civilized and discerning — qualities they currently lack."
 bpm_springtime_italian_unification.19.desc_census: "Through a process of compromise and agreement, and following grand and magnificent debates, the #bold #P Italian#! #v National#! #red Assembly#!#! decided that representation shall be based on a [GetLawType('law_census_voting').GetName].\n\nNoting the political underdevelopment of the #P Italian#! [Concept('concept_pop', 'People')], their educational backwardness, and low [concept_sol], but also the prospect of magnificent development, the majority of the Assembly had decided to take this step.\n\nUnfortunately, this does not satisfy the @ig_radicals! #mazzinianist Mazzinianists#! very much."
 bpm_springtime_italian_unification.19.desc_universal: "After lengthy debates, discontent, even protests, and many concerns, the #bold #P Italian#! #v National#! #red Assembly#!#! decided to adopt the most radical of the radical options: [GetLawType('law_universal_suffrage').GetName]. It had the support of many, mainly of the @ig_conservatives! #conconf Neo-Guelphs#! from the north, the @ig_national_liberals! #supremelib Supreme Liberals#!, and the @ig_radicals! #mazzinianist Mazzinianists#!; the latter, having recognized the Assembly’s ability to ensure [GetTechnology('democracy').GetName] and [GetTechnology('egalitarianism').GetName], began to act and think favorably and reasonably."
 
 bpm_springtime_italian_unification.19.f: "We built Italy; now we need to build the Italian people.\n\n— Massimo Taparelli d'Azeglio, allegedly"
 bpm_springtime_italian_unification.19.a: "May Italians and Italy grow wealthy and wise."

 bpm_springtime_italian_unification.20.t: "Our Future Beautiful Italian Constitution"
 bpm_springtime_italian_unification.20.d: "The #yellow Constitutional Committee#! has completed its work.\n\nThis may be the final step toward the unification of all of #P Italy#!.\n\nAfter many weeks of work, the incorporation of previous laws and resolutions passed by the Assembly, internal debates, and amendments, a wonderful [Concept('concept_bpm_constitutional_level', 'Constitution')] has been drafted.\n\nNow, article by article and paragraph by paragraph, the #bold #P Italian#! #v National#! #red Assembly#!#! will make the final decision that everyone — both our ancestors and those living today — has been waiting for."
 bpm_springtime_italian_unification.20.f: ""
 bpm_springtime_italian_unification.20.a: "We cannot fail now!"

 bpm_springtime_italian_unification.21.t: "A House of Gentlemen"
 bpm_springtime_italian_unification.21.desc_advisory: "After truly lengthy and complex debates, the #bold #P Italian#! #v National#! #red Assembly#!#! has decided on the role of the future Parliament.\n\nIt shall serve as an auxiliary body to the [concept_ruler] of a unified #P Italy#!, who holds the majority of power.\n\n@ig_conservatives! #conconf Con. Confederationists#!, some @ig_national_liberals! #supremelib Supreme Liberals#!, and even small other groups seeking to decentralize central power, following the ideas of #yellow Cesare Balbo#!, have made the state legislatively decentralized, rendering the national parliament merely a hollow representation of the people."
 bpm_springtime_italian_unification.21.desc_regular: "After truly lengthy and complex debates, the #bold #P Italian#! #v National#! #red Assembly#!#! has decided on the role of the future Parliament.\n\nItaly will adopt a system of [GetLawType('law_separated_powers').GetName], in which the legislature will have strong control over lawmaking, the budget, and the general ability to oversee the [concept_government].\n\nPower will truly rest with the people."
 bpm_springtime_italian_unification.21.f: ""
 bpm_springtime_italian_unification.21.a: "All power to the people, away from twisted centralism!"
 bpm_springtime_italian_unification.21.b: "One powerful nation, one powerful parliament."

 bpm_springtime_italian_unification.22.t: "Power from God"
 bpm_springtime_italian_unification.22.desc_ceremonial: "Following extensive debates, the #bold #P Italian#! #v National#! #red Assembly#!#! has decided on the role of the future head of state of a unified Italy.\n\nThe role of the future [Concept('concept_ruler', 'Head of State')] is to be strictly ceremonial, devoid of prerogatives and many rights, while granting many such rights to the leaders of the member states of Italia.\n\nHis role will primarily be to represent the Italian people in the realm of diplomacy.\n\nThis signifies a deeper decentralization of power to local rulers and [Concept('concept_government', 'Governments')]."
 bpm_springtime_italian_unification.22.desc_appointed: "Following extensive debates, the #bold #P Italian#! #v National#! #red Assembly#!#! has decided on the role of the future head of state of a unified Italy.\n\nAs the supreme leader of the Italian people, the [concept_ruler] of Italy is granted various prerogatives, control over the stability of the [concept_government] and [Concept('concept_bpm_minister', 'Ministers')], and other checks and balances designed to ensure a balance of power with Parliament."
 bpm_springtime_italian_unification.22.f: ""
 bpm_springtime_italian_unification.22.a: "This will ensure a stable rule of law!"
 bpm_springtime_italian_unification.22.b: "Progress is all about balance."

 bpm_springtime_italian_unification.23.t: "A Radical Compromise"
 bpm_springtime_italian_unification.23.desc_compromise: ""
 bpm_springtime_italian_unification.23.desc_democratization: ""
 bpm_springtime_italian_unification.23.f: ""
 bpm_springtime_italian_unification.23.a: "Without finding common ground we will never achieve anything."
 bpm_springtime_italian_unification.23.b: "Necessary for stability."

 bpm_springtime_italian_unification.24.t: "Nothing but the Constitution"
 bpm_springtime_italian_unification.24.d: "Across Italy, the same euphoria erupted as after the final defeat of the enemies who had invaded our homeland.\n\nThe #YB Italian Constitution#!, in all its majesty, was adopted by the #bold #P Italian#! #v National#! #red Assembly#!#! with the support of more than half of the deputies in the #gold Palazzo Vecchio#!.\n\nAll that remains now is the official coronation of the new [Concept('concept_ruler', 'King')] of Italy.\n\nLong live Italy!"
 bpm_springtime_italian_unification.24.f: "We were for centuries. Downtrodden, derided, because we are not one people, because we are divided. Let one flag, one hope, gather us all. The hour has struck for us to unite.\n\n— Goffredo Mameli’s ‘#bold Il Canto degli Italiani#!’, September 10th 1847"
 bpm_springtime_italian_unification.24.a: "Italy did it all herself!"

 bpm_springtime_florence_country_candidate: "@information! [SCOPE.sCharacter('bpm_florence_crown_ruler').GetFirstName] of [SCOPE.sCountry('bpm_florence_crown_candidate').GetName] will be proposed the [Concept('concept_unification_candidate', 'Crown of Italy')]."
 bpm_springtime_florence_countries_may_refuse_tt: "@warning! Depending on the current of the #P Parliamentary and National Unity#!, certain [GetCulture('north_italian').GetName] and [GetCulture('south_italian').GetName] [Concept('concept_country', 'States')] may refuse to recognize the [Concept('concept_bpm_constitutional_level', 'Constitution')]!"

 bpm_springtime_italian_unification.25.t: "Our Response"
 bpm_springtime_italian_unification.25.d: "Several days have passed since the [Concept('concept_bpm_constitutional_level', 'Constitution')] was announced.\n\nThe entire nation, all citizens, and many politicians are waiting for us to make a truly important decision: whether to accept the constitution or reject it.\n\nWhat decision will we make?"
 bpm_springtime_italian_unification.25.f: ""
 bpm_springtime_italian_unification.25.a: "Long live the Constitution!"
 bpm_springtime_italian_unification.25.b: "No."

 bpm_florence_democratic_discontent_increase_5: "Excessive conservatism and anti-popular decisions will increase popular radicalism. Therefore, #PB Democrats’ Discontent#! has #PB significantly increased#!!"

 bpm_florence_democratic_discontent_increase_3: "Excessive conservatism and anti-popular decisions will increase popular radicalism. Therefore, #PB Democrats’ Discontent#! has #PB increased#!!"

 bpm_florence_democratic_discontent_increase_1: "Excessive conservatism and anti-popular decisions will increase popular radicalism. Therefore, #PB Democrats’ Discontent#! has #PB slightly increased#!!"

 bpm_florence_democratic_discontent_decrease_1: "Popular concessions and satisfying, egalitarian liberalism will decrease popular radicalism. Therefore, #PB Democrats’ Discontent#! has #P slightly decreased#!!"
 
 bpm_florence_democratic_discontent_decrease_3: "Popular concessions and satisfying, egalitarian liberalism will decrease popular radicalism. Therefore, #PB Democrats’ Discontent#! has #P decreased#!!"
 bpm_florence_democratic_discontent_decrease_5: "Popular concessions and satisfying, egalitarian liberalism will decrease popular radicalism. Therefore, #PB Democrats’ Discontent#! has #P significantly decreased#!!"

 bpm_springtime_italian_unification.16.t: "League and Military Affairs Committee Finishes Its Work"
 bpm_springtime_italian_unification.16.d: "The #yellow League and Military Affairs Committee#! has succeeded where Italian diplomats had failed: in persuading many [Concept('concept_country', 'Countries')] to join the so-called ‘#yellow Customs League#!’ and to begin talks on a military alliance.\n\nFurthermore, it succeeded in conferring great significance and importance on the #bold #P Italian#! #v National#! #red Assembly#!#!, which was established as the parliament of the #yellow League#!."
 bpm_springtime_italian_unification.16.f: "Without that: do you think it is reasonable to believe that a confederated Italy — adhering to the customs system that others have so wisely discussed — will suffer a shortage of the funds intended for the military treasury?\n\n— Sebastiano Trecchio, September 27th 1848"
 bpm_springtime_italian_unification.16.a: "One step closer to unification."

