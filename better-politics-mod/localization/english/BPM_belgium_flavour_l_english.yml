 bpm_belgian_historical_events.3.t: "Société de l'Alliance of Brussels Created"
 bpm_belgian_historical_events.3.d: "The constant attacks by Catholics on Freemasons, [SCOPE.sCharacter('bpm_paul_devaux_scope').GetLastName]'s change of sides, and the growing rapprochement between secular [GetInterestGroupVariant('ig_reactionaries',GetPlayer).GetName] and local organizations of [GetInterestGroupVariant('ig_radicals',GetPlayer).GetName] and [GetInterestGroupVariant('ig_socialists',GetPlayer).GetName] led to a union within a newly-created ‘#gold Société de l'Alliance#!’, an electoral and political platform.\n\nThis organization, led by [SCOPE.sCharacter('bpm_eugene_defacqz_scope').GetLastName], was created after months of work by the Masonic lodges Les Amis Philanthropes, Les Amis du Progrès and Les Vrais Amis de l'Union. Despite its Masonic origins, non-Masons are also admitted."
 bpm_belgian_historical_events.3.f: "To put conciliation on trial, one must always strive to ensure that the weaker opinion retains enough strength to act as a barrier against the excesses of the other.\n\n— Paul Devaux, November 20th 1845"
 bpm_belgian_historical_events.3.a: "Preferably they should dissapear."

 bpm_belgium_l_alliance_creation_effects_tt: "With the creation of ‘#gold Société de l'Alliance#!’ [GetInterestGroupVariant('ig_radicals',GetPlayer).GetName] [GetInterestGroupVariant('ig_reactionaries',GetPlayer).GetName] [GetInterestGroupVariant('ig_socialists',GetPlayer).GetName] and [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] will act as one political, though divided, body, all allied with one another." 
 

