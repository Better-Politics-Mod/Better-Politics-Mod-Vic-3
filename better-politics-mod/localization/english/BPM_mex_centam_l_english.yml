 je_bpm_central_republic:0 "The Centralist Republic"
 je_bpm_central_republic_reason:0 "A new constitution known as "the Seven Laws" has been in place for just a year. Written and ratified by the conservative establishment in Mexico City, the document eliminates the autonomy of states in favir of a unitary republic, while insituting a variety of moderating institutions.\n\nThe constitution is deeply unpopular with liberals and the people of remote states and territories. The conservatives must prove the merits of centralism before their power is wrenched away."