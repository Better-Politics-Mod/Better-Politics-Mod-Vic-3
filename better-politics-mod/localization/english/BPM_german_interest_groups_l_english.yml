l_english:

# Intelligentsia
 ig_burschenschaften: "Burschenschaften"
 ig_burschenschaften_desc: "The Burschenschaften are German student associations, which formed shortly after the end of the Napoleonic Wars. Their platform is inspired mainly by the liberal ideas of the French Revolution, such as equality for all men and rights to property. The Burschen are particularly opposed to the reactionary measures introduced by the Congress of Vienna and German small-statery."

