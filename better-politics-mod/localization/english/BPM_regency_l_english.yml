l_english:
  hog_regency.1.t: "The Child $bpm_hog_title_default_contextless$"
  hog_regency.1.d: "The title of $bpm_hog_title_default_contextless$ has passed to [SCOPE.sCharacter('hog_scope').GetFullName], who has yet to reach the age of majority. The task of selecting an Acting $bpm_hog_title_default_contextless$ has fallen to the sitting government."
  hog_regency.1.f: ""Your task will, foremostly, be to maintain the stability of [ROOT.GetCountry.GetNameNoFormatting] for the span of the $bpm_hog_title_default_contextless$'s minority. We are prepared to assume responsibility for raising the child. You may rest assured that you are not being drafted as a surrogate parent."\n\nThe emissary paused, awaiting the minister's response.\n\n"I understand," came the reply. "On the matter of education, [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] is prepared to discharge the necessary sum. What else do you require?""
  hog_regency.1.a: "[SCOPE.sCharacter('acting_hog_scope').GetFullName] shall take on the responsibilities of ruling in the young $bpm_hog_title_default_contextless$'s stead."

  modifier_acting_hog: "Acting Head of Government"
  modifier_acting_hog_landowners: "$modifier_acting_hog$"
  modifier_acting_hog_devout: "$modifier_acting_hog$"
  modifier_acting_hog_petty_bourgeoisie: "$modifier_acting_hog$"
  modifier_acting_hog_industrialists: "$modifier_acting_hog$"
  modifier_acting_hog_trade_unions: "$modifier_acting_hog$"
  modifier_acting_hog_intelligentsia: "$modifier_acting_hog$"
  modifier_acting_hog_armed_forces: "$modifier_acting_hog$"
  modifier_acting_hog_rural_folk: "$modifier_acting_hog$"
  modifier_acting_hog_conservatives: "$modifier_acting_hog$"
  modifier_acting_hog_reactionaries: "$modifier_acting_hog$"
  modifier_acting_hog_liberals: "$modifier_acting_hog$"
  modifier_acting_hog_radicals: "$modifier_acting_hog$"
  modifier_acting_hog_national_liberals: "$modifier_acting_hog$"
  modifier_acting_hog_market_liberals: "$modifier_acting_hog$"
  modifier_acting_hog_christian_democrats: "$modifier_acting_hog$"
  modifier_acting_hog_fascists: "$modifier_acting_hog$"
  modifier_acting_hog_agrarian_populists: "$modifier_acting_hog$"
  modifier_acting_hog_reformist_socialists: "$modifier_acting_hog$"
  modifier_acting_hog_socialists: "$modifier_acting_hog$"

  hog_regency.3.t: "The $bpm_hog_title_default_contextless$'s Majority"
  hog_regency.3.d: "[SCOPE.sCharacter('hog_scope').GetFullName] has reached the age of majority, and may now become the $bpm_hog_title_default_contextless$. [SCOPE.sCharacter('acting_hog_scope').GetFullName] will cease to be Acting $bpm_hog_title_default_contextless$."
  hog_regency.3.f: "[SCOPE.sCharacter('acting_hog_scope').GetFullNameNoFormatting] watched as the priest carried out the final anointments. The difference between the $bpm_hog_title_default_contextless$ of today and of yesterday was starker than [SCOPE.sCharacter('acting_hog_scope').GetSheHe] could ever have imagined. [SCOPE.sCharacter('hog_scope').GetSheHe|U] stood taller than before, with a practiced look of determination on [SCOPE.sCharacter('hog_scope').GetHerHis] face. The vestments appeared weightless when placed upon [SCOPE.sCharacter('hog_scope').GetHerHis] shoulders.\n\nThe priest stepped away, and a fanfare played, accompanied by the rumble of cannons from outside the palace walls.\n\n"The things which I have here before promised, I will perform and keep," the $bpm_hog_title_default_contextless$ recited. "So help me [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')].""
  hog_regency.3.a: "Long live the $bpm_hog_title_default_contextless$!"

  regency.1.a: "[SCOPE.sCharacter('regent_scope').GetFullName] shall take on the responsibilities of ruling in the young [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]'s stead."