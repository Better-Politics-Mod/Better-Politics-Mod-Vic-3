 bpm_springtime_italian_unification.1.t: "A National Assembly?"
 bpm_springtime_italian_unification.1.d: "After the final defeat of the [SCOPE.sCountry('austria_country_scope').GetAdjective] [concept_army], an unearthly joy swept through the inhabitants of the entire #yellow Apennine Peninsula#!.\n\nCities and villages are filled with #P green#!, #bold #v white#!#!, and #red #bold red#!#! flags, and with praise for heroes and rulers.\n\n[GetGoods('wine').GetName] is drunk, songs are sung, and poetry is read, all in honor of #P Italy#!’s future and its beauty. Differences between man and man have completely faded away.\n\nMeanwhile, among the [Concept('concept_politician', 'Politicians')] of the various #P Italian#! [Concept('concept_country', 'States')], opinions appear in newspapers and speeches calling for and planning the creation of what everyone has been waiting for — an #yellow Italian National Assembly#! — which, as the highest representative of the Italian nation, will bring about its final unification into a beautiful whole."
 bpm_springtime_italian_unification.1.f: "All peoples have for centuries strived for unity: the Italian character, more than any other, is reluctant and reticent, and not without very serious and hidden reasons.\n\n— Emilo Brioglio, September 27th 1848" # Italy, on the other hand, will find in the free exchange of goods with all the nations of the world a source of widespread general prosperity, and at the same time a bond of alliance and peace, and may perhaps once again aspire to a new era of preeminence: # ; and may the Confederation be for her a cleansing and a baptism of health:
 bpm_springtime_italian_unification.1.a: "Interesting..."

 bpm_springtime_italian_national_assembly_tt: "Over the next few days, or perhaps weeks, a group of distinguished gentlemen will gather in one of the [Concept('concept_capital_state', 'Capitals')] of the #P Italian#! [Concept('concept_country', 'States')] to discuss the establishment of an #yellow Italian National Assembly#! — in cooperation with the [Concept('concept_ruler', 'Monarchs')] of #P Italy#!."
 bpm_springtime_italian_national_assembly_p2_tt: "The issue of the #yellow Suffrage#! system for this assembly, its fuctions and structure, will also be addressed."

 bpm_springtime_italian_unification.2.t: "Yells of Anger"
 bpm_springtime_italian_unification.2.d: "Today, inside the #yellow Palazzo Vecchio#! in #gold Florence#!, #P 327#! men gathered under the chairmanship of #yellow Antonio Scialoja#! to prepare for the [concept_election] and organization of a #yellow all-Italian Parliament#!.\n\nThe atmosphere there, however, was not the best.\n\nAlthough all the #P Italian#! [Concept('concept_ruler', 'Rulers')] are supportive, the [Concept('concept_politician', 'Politicians')] are terribly divided. During the debates and arguments, programmatic issues proved to be deeply contentious, especially regarding territorial and political systems.\n\nThus, after #v 5 days#! of deliberations, its members agreed that these matters would be decided by the #yellow National Assembly#!, which, under the control of the #yellow National Committee#!, would be elected through a [SCOPE.GetRootScope.GetCountry.GetCustom('bpm_check_italian_national_suffrage')]."
 bpm_springtime_italian_national_uni: "[GetLawType('law_universal_suffrage').GetName]"
 bpm_springtime_italian_national_census: "[GetLawType('law_census_voting').GetName]"
 bpm_springtime_italian_unification.2.f: "Those born into an aging nation are, above all, scarred by the old vices, and to renew it they bring about revolutions; but those born in the midst of these are scarred by the new vices, and bring them to an end.\n\n— Cesare Balbo, November 1843"
 bpm_springtime_uni_national_assembly: "Legge Elettorale"
 bpm_springtime_census_national_assembly: "Legge Elettorale"
 bpm_springtime_italian_unification.2.a: "Next months will be rough."

 bpm_springtime_italian_unification.3.t: "All Roads Lead to Rome"
 bpm_springtime_italian_unification.3.d: "While [Concept('concept_politician', 'Politicians')] of all political stripes in #gold Florence#! are bickering and yelling at one another, on the second day of the pre-parliamentary debates, several dozen lawyers gathered at the #yellow Sapienza University of Rome#!.\n\nTaking up the concept of a congress of legal experts proposed by the late #yellow Matteo De Augustinis#!, they formed the ‘#yellow Preparatory Committee#!’ and gained [SCOPE.sCharacter('pope_pius_ix').GetFullName]’s blessings.\n\nIts goal will be to organize a #yellow Lawyers’ Congress#!, inviting participants from all over #P Italy#!, to draft a comprehensive #yellow Code of Law#! valid in all nations of the #yellow Apennine Peninsula#!."
 bpm_springtime_italian_unification.3.f: "We accept codification, but as a de facto right that is both absolute and relative, insofar as it is necessary for the current situation, which can and must be improved; and until such improvements are made, it must be obeyed as it stands, despite its own flaws; for it is these very flaws that alert legislators and awaken the minds of writers, and sooner or later lead to reforms.\n\n— Pasquale Stanislao Mancini, 1842"
 bpm_springtime_italian_unification.3.a: "Valuable work."
 bpm_springtime_italy_assembly_valuable_tt: "A #bold #yellow Lawyers’ Congress#!#! will be held during the #yellow National Assembly#!'s sessions."
 bpm_springtime_italy_assembly_valuable_2_tt: "It will address all aspects of drafting and modernizing the #yellow Code of Law#!, and its political composition will be roughly the same as that of the #yellow Assembly#!, with a small bias toward the #PB Left#! (@ig_national_liberals! #supremelib Supreme Liberals#! & @ig_radicals! #mazzinianist Mazzinianists#! & @ig_socialists! #piscanian Pisacanians#!)."

 bpm_springtime_italian_unification.4.t: "The all-Italian National Assembly"
 bpm_springtime_italian_unification.4.d: "Today, on a beautiful afternoon, with thousands of attendees and #yellow [GetGlobalVariable('bpm_springtime_italy_florence_total_seats').GetValue|0]#! delegates present, the #bold #P Italian#! #v National#! #red Assembly#!#! was officially opened at the #yellow Palazzo Vecchio#! in #gold Florence#!.\n\nFollowing earlier deliberations a month ago in the same location, as well as the elections to it, the process of unifying #P Italy#! can be considered underway.\n\nThe goal of this Assembly is to resolve the problems plaguing Italia and weighing on the consciences of many [Concept('concept_politician', 'Politicians')]."
 bpm_springtime_italian_unification.4.f: "We were for centuries. Downtrodden, derided, because we are not one people, because we are divided. Let one flag, one hope, gather us all. The hour has struck for us to unite.\n\n— Goffredo Mameli’s ‘#bold Il Canto degli Italiani#!’, September 10th 1847"
 bpm_springtime_italian_unification.4.a: "Avanti Italia!"

 bpm_springtime_italian_assembly_committees_explanation: "Decisions and [Concept('concept_law', 'Laws')] introduced in the Assembly do not happen ‘just like that’."
 bpm_springtime_italian_assembly_committees_explanation_2: "Before a debate can be held on a given topic — or, more specifically, a bill — it must be prepared by a #yellow Committee#! specifically designated for that purpose."
 bpm_springtime_italian_assembly_committees_explanation_3: "The pace of the #yellow Committees#!’ work and the debates on their proposals are based on #P National Unity#!. Parliamentary decisions can lead to its increase or decrease."

 bpm_springtime_italian_unification.5.t: "Appointing Committees"
 bpm_springtime_italian_unification.5.d: "In accordance with earlier agreements, the #bold #P Italian#! #v National#! #red Assembly#!#! will address issues related to territorial and political matters. However, before it can do so, these laws must be drafted — by #yellow Committees#!.\n\nThus, during its first week of session, the Assembly has established several committees.\n\nThe most important ones are: the #yellow Constitutional Committee#! — which will draft the [Concept('concept_bpm_constitutional_level', 'Constitution')]; the #yellow Territorial Committee#! — which will discuss the territorial system and autonomy; and the #yellow League and Military Affairs Committee#! — which will coordinate trade and military relations among the #P Italian#! states. Also important are the #yellow Electoral Law Committee#! and the #yellow Ministerial Responsibility Committee#!."
 bpm_springtime_italian_unification.5.f: ""
 bpm_springtime_italian_unification.5.a: "Very well." 

 bpm_springtime_italian_unification.10.t: "Civil Rights Subcommittee Presents Its Works" 
 bpm_springtime_italian_unification.10.d: "Today, the #yellow Subcommittee on Civil Rights#!, one of several divisions of the #yellow Constitutional Committee#!, has presented its draft to the #bold #P Italian#! #v National#! #red Assembly#!#! on civil rights and individual freedoms to be enshrined in the future.\n\nIt guarantees, amongst other things, freedom of speech, trade, conscience, and religion; it protects property, personal safety, and other assets. These seemingly obvious and simple guarantees, however, are the subject of intense controversy and debate, even more so than before.\n\nFor example, the @ig_conservatives! #conconf Con. Confederationists#! oppose freedom of trade; some @ig_liberals! #gradualist Gradualists#! have reservations about other freedoms in the context of church and property; while the @ig_radicals! #mazzinianist Mazzinianists#! and many @ig_national_liberals! #supremelib Supreme Liberals#! are calling for the addition of the ‘#bold right to work#!’."

 bpm_springtime_italian_unification.10.a: "Will we ever be free from squabbles?"

 bpm_springtime_10_whole_percent: "The initial #v Completion Rate#! for the #yellow Rights and Freedoms#! [Concept('concept_law', 'Bill')] will be #v 10%#!."

 bpm_springtime_italian_unification.11.t: "On Religious Freedoms and Rights" 
 bpm_springtime_italian_unification.11.desc_always: "After lengthy debates, attempts at negotiation, and compromises, the #bold #P Italian#! #v National#! #red Assembly#!#! voted to definitively determine the Church freedoms and rights of the future [SCOPE.GetRootScope.GetCountry.GetCustom('bpm_check_italian_centralization')] Italy.\n\n"
 bpm_springtime_italian_unification.11.desc_religious: "The Parliament has determined that limited and moderate academic freedom shall be introduced until further reforms are implemented; the [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant], as well as religious and moral organizations, are guaranteed the right to form and operate; the state will also guarantee equal funding to any and all private schools that, however, are not Jesuit."
 bpm_springtime_italian_unification.11.desc_secular: "Parliament has decided that academic freedom of teaching and learning will be fully guaranteed; and the state will provide funding for private schools that are not exclusively religious in nature."
  
 bpm_springtime_italian_unification.11.a: "We can’t let the Church be too powerful!"

 je_bpm_springtime_encourage_concilation_name: "Encourage Concillation" 
 je_bpm_springtime_encourage_concilation_desc: "The future and unity of all of Italy lie with the #bold #P Italian#! #v National#! #red Assembly#!#!. It is up to it — that is, to the factions within — to determine what Italy will look like: its territorial systems, customs, laws, freedoms, and the relationships between institutions, between Parliament and the [concept_government].\n\nEverything.\n\nAnd that very same assembly is beginning to fall apart at the seams, torn by factionalism and hostility among its representatives. And all of this, on top of that, is a source of great delight to the @ig_radicals! #mazzinianist Mazzinianists#! and the @ig_socialists! #piscanian Pisacanians#!, whose goal is to delegitimize this national parliament as much as possible in order to gain sufficient public support and spark a bloodthirsty #springtime Revolution#!.\n\nAll of us here outside this assembly must convince its members to cooperate, support them, and mediate — whatever it takes — so that everyone’s dreams do not collapse in their quarrels."

 bpm_florence_parliament_concilation: "The #bold #P Italian#! #v National#! #red Assembly#!#! factions will be slightly more likely to cooperate and make compromises with one another."

 bpm_je_florence_2_weeks_cooldown_tt: "#v 2 weeks#! have passed since we encouraged concillation"
 bpm_florence_discontent_below_25: "#PB Democrats’ Discontent#! is below #v 25#!"

 bpm_springtime_italian_unification.6.t: "Territorial Commmittee Presents Its Works"
 bpm_springtime_italian_unification.6.d: "Today, the #yellow Territorial Committee#! has submitted its draft proposal on the territorial system and autonomy to the #bold #P Italian#! #v National#! #red Assembly#!#!.\n\n#P Italy#! shall become a [SCOPE.GetRootScope.GetCountry.GetCustom('bpm_check_italian_centralization')] state.\n\nIn addition, a decision was made to maintain the existing internal borders within the future state, allowing them to have their own legislative and electoral-local laws for the election of #gold Provincial Councils#!.\n\nHowever, the draft bill has sparked intense debates and disputes regarding [SCOPE.sCountry('1848_sardinia_piedmont_country').GetName]’s dominance, unmet expectations, questions about the duties and role of the constituent states vis-à-vis the [concept_government], and many other issues.\n\nThe parliamentary factions will strive to have their way."
 bpm_springtime_italian_confederation: "[GetLawType('law_confederated').GetName]"
 bpm_springtime_italian_federation: "[GetLawType('law_federated').GetName]"
 bpm_springtime_italian_unification.6.f: ""
 bpm_springtime_italian_unification.6.a: "This better not take too long..."

 bpm_springtime_italian_unification.7.t: "On Internal Territory"
 bpm_springtime_italian_unification.7.desc_before: "After lengthy debates, attempts at negotiation, and compromises, the #bold #P Italian#! #v National#! #red Assembly#!#! voted to definitively determine the internal borders of the future [SCOPE.GetRootScope.GetCountry.GetCustom('bpm_check_italian_centralization')] Italy.\n\nNo changes were made to the draft.\n\nThis means that the de jure [SCOPE.sCountry('1848_sardinia_piedmont_country').GetAdjective] territories, such as [SCOPE.sCountry('lombardy_state_scope').GetName] and [SCOPE.sCountry('1848_san_marco_source').GetName], will certainly become full-fledged territories within the new nation-state."
 bpm_springtime_italian_unification.7.desc_after: "After lengthy debates, attempts at negotiation, and compromises, the #bold #P Italian#! #v National#! #red Assembly#!#! voted to definitively determine the internal borders of the future [SCOPE.GetRootScope.GetCountry.GetCustom('bpm_check_italian_centralization')] Italy.\n\nReferendums will be held in [SCOPE.sCountry('lombardy_state_scope').GetName] and [SCOPE.sCountry('1848_san_marco_source').GetName], in which citizens will decide for themselves whether they want to be part of [SCOPE.sCountry('1848_sardinia_piedmont_country').GetName] or remain as directly autonomous states. However, the latter option is likely to prevail."
 bpm_springtime_italian_unification.7.desc_sicily_indpendent: "\n\nSicily, on the other hand, is to remain an independent member of the union and will choose its own ruler."
 bpm_springtime_italian_unification.7.desc_sicily_compromise: "\n\nThrough a compromise brokered by the @ig_national_liberals! #supremelib Supreme Liberals#!, King [SCOPE.sCharacter('ferdinian_2nd_of_two_sicilies').GetFirstName] in exchange for becoming King, has made a signed pledge to legally and faithfully guarantee [SCOPE.sCountry('sicilian_country_rev').GetName]’s autonomy and the rights of its inhabitants"
 bpm_springtime_italian_unification.7.a: "Very well!"

 bpm_springtime_italian_unification.8.t: "On Local, Statutory and Electoral Law"
 bpm_springtime_italian_unification.8.desc_rights: "After lengthy debates, attempts at negotiation, and compromises, the #bold #P Italian#! #v National#! #red Assembly#!#! voted to definitively determine the local rights and autonomy of the future [SCOPE.GetRootScope.GetCountry.GetCustom('bpm_check_italian_centralization')] Italy.\n\nIt has been established that the states retain broad autonomy over matters not specified in the [Concept('concept_bpm_constitutional_level', 'Constitution')] and specified [concept_law].\n\nThis means that legislative unification processes may be virtually impossible without the consent and cooperation of #P Italy#!’s constituent members; however, the interpretation of this provision may lead to disputes.\n\nIn addition, each state establishes its own electoral law for the election of representatives to the future #yellow Upper House#!."
 bpm_springtime_italian_unification.8.desc_wrongs: "After lengthy debates, attempts at negotiation, and compromises, the #bold #P Italian#! #v National#! #red Assembly#!#! voted to definitively determine the local rights and autonomy of the future [SCOPE.GetRootScope.GetCountry.GetCustom('bpm_check_italian_centralization')] Italy.\n\nIt was established that, although the states retain broad autonomy, they are subject to laws enacted jointly by the future parliament.\n\nAs a compromise, however, it was agreed that the #yellow Upper House#! would have greater powers in order to balance the new situation.\n\nThe electoral law governing the election of the #yellow Upper House#! will also uniform and imposed from above."
 bpm_springtime_italian_unification.8.a: "We’re nearly there!"

 bpm_springtime_italian_unification.12.t: "On Economic Freedom"
 bpm_springtime_italian_unification.12.desc_always: "After lengthy debates, attempts at negotiation, and compromises, the #bold #P Italian#! #v National#! #red Assembly#!#! voted to definitively determine the economic freedoms of the future [SCOPE.GetRootScope.GetCountry.GetCustom('bpm_check_italian_centralization')] Italy.\n\n"
 bpm_springtime_italian_unification.12.desc_free: "The #red #bold Assembly#!#! has established complete freedom of trade and commerce.\n\nGuilds shall be completely outlawed, as is all production and price controls. [GetPopType('peasants').GetName] have also been granted full freedom of movement, and all citizens have been freed from unfair taxation and compulsory patronage. Internal tariffs shall be completely abolished."
 bpm_springtime_italian_unification.12.desc_prot: "A certain degree of freedom of trade and professional practice has been established, limiting the quasi-legal rights and powers of #yellow Guilds#!. However, the freedom of exchange has been guaranteed. Internal tariffs shall not be permitted, except in cases specified by [concept_law]."
 bpm_springtime_italian_unification.12.f: "A small-scale, female-run household industry — without machines, without a division of labor, and without a market to exchange its products — could only produce the few basic items necessary to meet the most urgent needs of daily life.\n\n— Emilo Brioglio, September 27th 1848"

 bpm_springtime_italian_unification.12.a: "Sell and buy!"

 bpm_springtime_italian_unification.13.t: "Abolition of Privileges"
 bpm_springtime_italian_unification.13.d: "The #bold #P Italian#! #v National#! #red Assembly#!#! was united as never before.\n\nThe debate over the articles and the speeches concerning the privileges of certain groups, such as of the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant], galvanized the entire Assembly.\n\nRegardless of which side one sat on or what one believed: the need to abolish the privileges and remnants of seigneurialism and injustices weighing on all of society, [GetPopType('peasants').GetName] and cities, had to be realized.\n\nAnd so, the Assembly, almost unanimously, guaranteed human rights and abolished all the privileges of the [GetBuildingType('building_manor_house').GetName]."
 bpm_springtime_italian_unification.13.a: "This might not happen again."

 bpm_springtime_italian_unification.14.t: "The Life of the Workingman"
 bpm_springtime_italian_unification.14.desc_left: "The #bold #P Italian#! #v National#! #red Assembly#!#! has decided to include the ‘#bold right to work#!’ in the draft civil rights bill, and thus in the future [Concept('concept_bpm_constitutional_level', 'Constitution')]; and to ensure the legality of strikes and trade union activities.\n\nThe implementation of this ‘#yellow right to work#!’, however, depends on the decisions of the national and local [Concept('concept_government', 'Governments')], which could range from small-scale public works to the establishment of the system of ‘[GetAmendmentType('bpm_amendment_national_workshops').GetName]’."
 bpm_springtime_italian_unification.14.desc_right: "The #bold #P Italian#! #v National#! #red Assembly#!#! voted on an amendment introduced by the @ig_national_liberals! #supremelib Supreme Liberals#!, @ig_radicals! #mazzinianist Mazzinianists#!, and @ig_socialists! #piscanian Pisacanians#!: the amendment establishing the ‘#yellow right to work#!’ was not adopted.\n\nIn addition, a special #yellow Committee of Inquiry on Workers’ and Professional Associations#! was established, whose purpose will be to investigate the activities of [GetTechnology('labor_movement').GetName]#yellow s#! to ensure compliance with the [concept_law] and, possibly, to severely restrict the activities of #pink Trade Unions#!."
 bpm_springtime_italian_unification.14.a: "Happens!"

 bpm_springtime_italian_unification.9.t: "Legge Territoriale"
 bpm_springtime_italian_unification.9.d: "Today, following lengthy debates, discussions in cafés and hotels, speeches, concessions, and compromises, the #bold #P Italian#! #v National#! #red Assembly#!#! has voted to adopt the ‘#yellow Legge Territoriale#!’.\n\nIt outlines the future territorial and legal structure of #P Italy#!, the responsibilities and rights of local and territorial entities, and much more.\n\nAlthough many articles and provisions sparked heated debates and arguments, they were successfully navigated."
 bpm_springtime_italian_unification.9.f: ""
 bpm_springtime_italian_unification.9.a: "Great work!"

 bpm_decrease_national_unity_by_5: "Parliamentary and National Unity of the Italians [Concept('concept_culture', 'Nation')] has #PB significantly decreased#!!"
 bpm_decrease_national_unity_by_3: "Parliamentary and National Unity of the Italians [Concept('concept_culture', 'Nation')] has #PB decreased#!!"
 bpm_decrease_national_unity_by_1: "Parliamentary and National Unity of the Italians [Concept('concept_culture', 'Nation')] has #PB slightly decreased#!!"

 bpm_springtime_italian_unification.17.t: "Ministerial Responsibility"
 bpm_springtime_italian_unification.17.d: "Another victory!\n\nThe #bold #P Italian#! #v National#! #red Assembly#!#!, having received the bill establishing the ministerial responsibility to national and local parliaments, swiftly passed it and returned to work on the remaining bills and other matters."
 bpm_springtime_italian_unification.17.a: "That was quick."

 ita_customs_league: "Customs League"

 bpm_increase_national_unity_by_1: "Parliamentary and National Unity of the Italians [Concept('concept_culture', 'Nation')] has #P very slightly increased#!!"

 bpm_increase_national_unity_by_2: "Parliamentary and National Unity of the Italians [Concept('concept_culture', 'Nation')] has #P slightly increased#!!"
 bpm_increase_national_unity_by_35: "Parliamentary and National Unity of the Italians [Concept('concept_culture', 'Nation')] has #P increased#!!"

 bpm_springtime_italy_progress_increases_by_25_tt: "#v Progress#! of the #gold #bold $je_italia_fara_de_se$#!#! [concept_journal_entry] will increase by #v 25%#!!"

 bpm_springtime_explanation_committee_work_order: "Although work on the drafts is constantly ongoing, individual bills will be thoroughly reviewed and debated by Assembly."

 bpm_springtime_italian_unification.15.t: "Libertà, Uguaglianza, Fratellanza"
 bpm_springtime_italian_unification.15.d: "Today, the #bold #P Italian#! #v National#! #red Assembly#!#! has voted in favor of the entire draft bill on civil rights and freedoms.\n\nThe process of passing this [concept_law] was arduous and painful, marked by too many conflicting visions and debates of the worst kind.\n\nFortunately, we managed to get through it."
 bpm_springtime_italian_unification.15.f: ""
 bpm_springtime_italian_unification.15.a: "Not good."

 je_florence_all_is_well_in_the_assembly: "All is well in Florence."
 je_florence_debating_territory: "Gallantly debating future internal territory and autonomy."
 je_florence_debating_civil_rights: "Gallantly debating civil rights and freedoms."

 ig_con_confederalists: "Con. Confederationists"
 ig_con_confederalists_desc: "Conservative Confederationists seek the unification of Italy based on a confederal relationship among autonomous states. Such a union would have a constitution guaranteeing the rights and freedoms of the people, with an advisory parliament elected through a highly limited suffrage. They also believe that the state should be separated from the church and vice versa. Examples include Cesare Balbo, Vincenzo Gioberti, Terenzio Mamiani, and Carlo Troya."

 ig_lib_confederalists: "Lib. Confederationists"
 ig_lib_confederalists_desc: "Liberals Confederationists seek the unification of Italy based on a confederal relationship among autonomous states. Unlike their conservative counterparts, they envision a relatively representative parliament in a balance with the ruler. They also strive for a freer market and trade throughout Italy. Examples include Camillo di Cavour, Pellegrino Rossi, Bettino Ricasoli, and Alessandro Manzoni."

 ig_gradualists: "Gradualists"
 ig_gradualists_desc: "As the main proponents of liberal thought among the Italian people, the Gradualists strive to gradually achieve national unity based on the renewal and development of existing institutions. Seeking to strike a balance between a reactionary confederation and a destructive unitary state, they advocate for a constitution that would federalize Italy, complete with all manner of demagoguery-free guarantees and liberties. Examples include Urbano Ratazzi, Marco Minghetti, Gino Capponi, and Carlo Poerio."

 ig_supreme_liberals: "Supreme Liberals"
 ig_supreme_liberals_desc: "Supreme Liberals are a disparate faction composed mainly of left-leaning politicians lacking open revolutionism. Comprised of Democratic Federalists like Carlo Cattaneo, bourgeois liberals like Daniele Manin, hegelians like Silvio Spaventa, or pro-welfare monarchists like Giuseppe La Farina, they are all united by a single, supreme belief: the need for conciliation for the sake of Italian unity."
 
 ig_mazzinians: "Mazzinianists"
 ig_mazzinians_desc: "Mazzinianists represent the most active faction of Europe’s Democrats, grounded in the ideas of Giuseppe Mazzini. Placing a high value on Liberty, Equality, and Humanity, they strive to create a united and unitary Italy through a mass revolution. However, unlike the much smaller Pisacanians (Radical Democrats), they consider the discourse of modern politics as equally valuable. Their support strongholds are in Genua, Livorno, Rome and Calabria."

 ig_pisacanians: "Pisacanians"
 ig_pisacanians_desc: "Pisacanians follow the socialist thought of Carlo Pisacane, which combines proto-anarchist ideas with an emphasis on the peasantry’s role in bringing about social revolution. Their goal is therefore to establish a secular Italian Republic, based on the ideals of freedom and equality, and thus free from the shackles of private property. Their pervasive radicalism makes them a distrusted or even threatening faction in the eyes of most Italians."

 ig_radical_democrats_1848: "Radical Democrats"
 ig_radical_democrats_1848_desc: ""
 
 bpm_springtime_invasion_of_sicily_tt: "#v 6 months#! have passed since #yellow Sicily#! broke away"
 je_bpm_invade_island_of_sicily_name: "Invade Sicily"
 je_bpm_invade_island_of_sicily_desc: "The region of [GetStateRegion('STATE_SICILY').GetName], burning with hatred for our King #yellow Ferdinand#!, broke free at the beginning of the year. Its inhabitants planned everything perfectly, and after many days of fighting, they took control of the entire island.\n\nThey established new [Concept('concept_law', 'Laws')], including the restoration of the reekingly liberal [Concept('concept_bpm_constitutional_level', 'Constitution of 1812')], and destroyed nearly everything. This defeat, their radicalism, which spreads to [GetStateRegion('STATE_CALABRIA').GetName] and #gold Naples#!, pains us mercilessly, and the desire for revenge for the insult to the King is widespread.\n\nNow, after several months of preparation and internal stabilization, we can begin the invasion and recapture the island that rightfully belongs to us."

 bpm_springtime_depending_on_how_liberal_are_we: "Depending on just how liberal our [Concept('concept_law', 'Laws')] are, the #springtime Springtime of the Peoples#! [concept_journal_entry] may or may not activate"

 bpm_springtime_there_are_four_children_of_the_revolution: "Half of #P Italian#! [Concept('concept_country', 'Countries')] are [Concept('concept_bpm_springtime_child_of_the_revolution', 'Children of the Revolution')]"
 bpm_florence_italy_failure_condition_2: "#YB #L Parliamentary and National Unity#!#! has fallen below #v 40%#!" 

 bpm_springtime_of_the_peoples.111.t: "The End of Spring"
 bpm_springtime_of_the_peoples.111.d: "It is already another [SCOPE.GetRootScope.GetCountry.GetCustom('country_red_season_name')].\n\nAll the problems, anxieties, aspirations, and cries that once dominated the streets have completely faded away, along with the spirit of the #springtime Revolution#!. Her victories and defeats will leave a mark on every soul, and the future of the world has changed irrevocably.\n\nThose who fell during this great event will surely be remembered for centuries to come, for their sacrifice in the name of #yellow Liberty#!, #yellow Equality#!, and #yellow Fraternity#!."
 bpm_springtime_of_the_peoples.111.f: "The revolution is dead. Long live the revolution!\n\n— Karl Marx, 1850"
 bpm_springtime_of_the_peoples.111.a: "Never again."