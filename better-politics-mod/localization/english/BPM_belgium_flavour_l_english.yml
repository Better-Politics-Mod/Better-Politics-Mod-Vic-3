 bpm_belgian_historical_events.7.t: "Flax Industry Crisis"
 bpm_belgian_historical_events.7.d: "Statistics on the declining [GetCulture('flemish').GetName] #L flax industry#! became so bad, the [concept_government] has established a commission of inquiry.\n\nMost households cannot support themselves, unemployment is rising, and wages have been continuously falling. Competing with the mechanized #L British#! textile industry has proven impossible, #L Prussian#! textile manufacturers, thanks to low rents, have been able to compete safely with [GetCulture('flemish').GetName] ones, and trade with the #L French#! is difficult due to high customs duties.\n\nIn addition, our slow trade liberalization and inept mechanization have worsened the situation. The [GetCulture('flemish').GetName] countryside is experiencing a serious crisis."
 bpm_belgian_historical_events.7.f: "It was the pillow on which the national industry fell asleep.\n\n— Édouard Ducpétiaux, 1834"
 bpm_belgian_historical_events.7.a: "Institute a comission of inquiry now!"
 
 bpm_food_crisis_flemish: "Total Food Crisis"

 bpm_belgian_historical_events.8.t: "Severe Flemish Food Crisis"
 bpm_belgian_historical_events.8.d: "The previous problems of the [GetCulture('flemish').GetName] flax industry were nothing compared to what is happening now.\n\nAlong with the terrible harvest, a great famine has now begun.\n\nThe response of the [concept_government] and the entire Parliament was almost immediate.\n\nAn extraordinary meeting was convened, at which free entry for food was introduced; two million was lent to municipalities; municipal funds were created; supply agencies and charity committees were established; bonuses were awarded for potato imports, and much, much more."
 bpm_belgian_historical_events.8.f: "It was the pillow on which the national industry fell asleep.\n\n— Édouard Ducpétiaux, 1834"
 bpm_belgian_historical_events.8.a: "Horrible news."
 
 bpm_belgian_historical_events.10.t: "Struggle for Trade Policy"
 bpm_belgian_historical_events.10.d: "While the whole world was turning towards free trade and ever closer cooperation between countries, our beloved Belgium clung to protectionism. Tariffs inside, tariffs outside, tariffs everywhere. Some industrialists and politicians organized themselves to fight for free trade.\n\nIn 1846, the ‘#yellow Belgian Association for Commercial Freedom#!’ was founded, led by [SCOPE.sCharacter('bpm_scope_de_brouckere').GetLastName]. A year later, the ‘Congress of Economists’ was held, which presented its own program. A few years later, the ‘#yellow Belgian Economist#!’ was founded, edited by Gustave de Molinari. They sent out 140,000 leaflets, set up committees in different parts of the country, and organized English-style meetings.\n\nThe protectionists responded by founding the ‘#yellow Association for the Defense of National Labor#!’ in #gold Ghent#! and two newspapers, #italic Le Trevail#! and #italic Le Trevail National#!. The war over the concept of trade policy is generally calm; free traders are slowly gaining the upper hand." 
 bpm_belgian_historical_events.10.f: "The cabinet will not disrupt our economic system with ill-timed changes to customs legislation.\n\n— Charles Rogier, August 12th 1847"
 bpm_belgian_historical_events.10.a: "Interesting."

 bpm_belgian_historical_events.11.t: "The Creation of the Conservative (Catholic) Party"
 bpm_belgian_historical_events.11.d: "Two years after the #gold Third Congress in Malines#!, the ‘#yellow Federation of Circles and Associations#!’ was established, the final building block for the #L Conservative (Catholic) Party#!.\n\nIts program is still taking shape, but the various organizations that make it up are striving for financial and clerical-conservative reforms, still sincerely believing in the Constitution and their own liberal-democratic concepts.\n\nThe construction began in the 50s with the emergence of Catholic newspapers and circles, and the ‘#yellow Constitutional and Conservative Association#!’ was also established. Then the ‘#yellow Conservative Association#!’ was formed, and Congresses were held in #gold Malines#!, preceding the ‘#yellow Federation#!’."
 bpm_belgian_historical_events.11.f: "Nothing compares to the weakness of our people; the only place where Catholic energy remains is within the clergy... Outside of the clergy, do you know what the ‘Catholic’ party is? It is the party of cowards.\n\n— Barthélémy Dumortier, 1852"
 bpm_belgian_historical_events.11.a: "A two-party sytem begins..."

 je_bpm_unions_des_oppositions_lobby: "The young Belgian state is in lawful anarchy — it lacks laws, cohesion, organized structures, education; and all of them are to be debated and implemented by the always divided Unions des Oppositions, which purpose is decreasing as time and legislation pass..."