 BPM_FACTION_DEMANDS: "Complete #v 3#! goals, the #gold Capstone#! and finally replace [GetLawType('law_provisional_government').GetName] with their preferred [GetLawGroup('lawgroup_governance_principles').GetName] \n\nGoals:\n[GetScriptedGui(Concatenate(Character.MakeScope.Var('bpm_faction_type').GetFlagName, '_goals')).ExecuteTooltip(GuiScope.SetRoot(Character.GetCountry.MakeScope).End)]\n\nFoundation [Concept('concept_law', '$concept_laws$')]:\n[GetScriptedGui(Concatenate(Character.MakeScope.Var('bpm_faction_type').GetFlagName, '_laws')).ExecuteTooltip(GuiScope.SetRoot(Character.GetCountry.MakeScope).End)]\n\n#gold Capstone#!:\n[GetScriptedGui(Concatenate(Character.MakeScope.Var('bpm_faction_type').GetFlagName, '_capstone')).ExecuteTooltip(GuiScope.SetRoot(Character.GetCountry.MakeScope).End)]"
