 bpm_springtime_victory_effects: "Depending on which faction wins — whether the @ig_liberals! @ig_national_liberals! @ig_market_liberals! #bold #yellow Liberals#!#!, the @ig_radicals! @ig_socialists! #bold #pink Democrats#!#!, or the #purple #bold @ig_reactionaries! Reactionaries#!#! — there will be different bonuses or penalties once this [concept_journal_entry] is concluded. As #bold #blue Reforms#!#! and [Concept('concept_law', 'Laws')] are implemented, along with the passage of time and other factors, the following bonuses will be listed below."
 
 # Therefore, the ultimate goal of the @ig_liberals! @ig_national_liberals! @ig_market_liberals! #bold #yellow Liberals#!#! and @ig_radicals! @ig_socialists! #bold #pink Democrats#!#! is for their homeland to enter or ‘complete’ the [concept_bpm_springtime_reform_phase] by dismantling the past, rectifying injustices, enacting #bold #blue #L Reforms#!#!#!, completing #PB #L Objectives#!#!, and establishing a #YB #L Constitution#!#!. All the while, they must strive to maintain a positive [concept_bpm_springtime_revolutionary_drift] to keep the [Concept('concept_bpm_springtime_counterrevolutionary_preparadness', 'Counterrevolution')] and the [concept_bpm_springtime_wrath_of_the_revolution] in check.

 # The majesty and spririt of the #springtime Revolution#! will spread across the entire old continent, using blood and force to turn countries into its [Concept('concept_bpm_springtime_victim_of_the_revolution', 'Victims')] or [Concept('concept_bpm_springtime_child_of_the_revolution', 'Children')].\n\nThe purpose of the [Concept('concept_bpm_springtime_victim_of_the_revolution', 'Victims')] is to maintain the highest possible [concept_bpm_springtime_revolutionary_drift], which also brings about [concept_bpm_springtime_revolutionary_disorder_events], as they pass through the unstable [concept_bpm_springtime_revolution_phase] and [concept_bpm_springtime_reaction_phase]. They will be tossed about by these phases until they enter the [concept_bpm_springtime_reform_phase] through a victory or a successful [Concept('concept_bpm_springtime_counterrevolutionary_preparadness', 'Counterrevolution')], or until the [concept_bpm_springtime_wrath_of_the_revolution] appears and a [GetLawType('law_parliamentary_republic').GetName] is established.\n\nThe [Concept('concept_bpm_springtime_child_of_the_revolution', 'Children of the Revolution')], on the other hand, will strive to maintain high [Concept('concept_bpm_springtime_revolutionary_drift', 'Legitimacy')], seeking to prepare to protect their power from external threats and internal opponents who may challenge the future of the current state.

