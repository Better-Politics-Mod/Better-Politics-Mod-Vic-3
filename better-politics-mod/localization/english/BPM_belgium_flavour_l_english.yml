l_english:

 ig_left_unionists: "Left Unionists"
 ig_left_unionists_desc: "The Left Unionists are a faction within a broader alliance called Unions des Oppositions. Composed mainly of so-called Doctrinaires, they seek to consolidate Belgium within a liberal interpretation of the constitution, complemented by interventionism, decentralization, and secularization. Although currently conciliatory, the need for profound reform is growing, which may result in splits. Prominent figures include Charles Rogier and Joseph Lebeau."

 ig_right_unionists: "Right Unionists"
 ig_right_unionists_desc: "The Right Unionists are a faction within a broader alliance called the Unions des Oppositions. Representing right-wing liberal and Catholic thought, they generally seek to consolidate the Belgian state — while ensuring considerable power for the King, the Church, and the village. Prominent figures include Jean-Baptiste Nothomb, Adolphe Deschamps, and Barthélémy de Theux."

 ig_conservative_unionists: "Conservative Unionists"
 ig_conservative_unionists_desc: "Conservative Unionists strive to develop the state within the framework of the prolonged Unions des Oppositions. This is to be based on the ideals of moderation, laissez-faire economics, and centralized power in the hands of the King. Well-known figures include brothers Henri and Charles de Brouckère."

 ig_catholic_liberals: "Catholic Liberals"
 ig_catholic_liberals_desc: "The idea of laissez-faire economics was also embraced by a considerable portion of Catholics, known as Catholic Liberals (not Liberal Catholics). They believe primarily in developing the economy through liberal policy, maintaining the status of the Catholic Church, and moderation. Popular figures include Jules d'Anethan and Jules Malou."
  
 ig_ultraliberals: "Ultraliberals"
 ig_ultraliberals_desc: "Not all liberals from various schools joined the Unions des Oppositions. Some of them, called Ultraliberals, Radicals or Progressives, due to their distrust of Catholics, established themselves as a bastion of defense against the Catholic Church. Residing as a small group within the administration and in Masonic lodges, their strength is slowly growing as disappointment with the Union grows."

 ig_orangists: "Orangists"
 ig_orangists_desc: "The Orangists are a political and social movement seeking to restore Belgium as part of the Kingdom of the Netherlands. Consisting mainly of the urban bourgeoisie and believing in enlightened absolutism, free trade, and secularism, they find themselves oddly close to liberals. Pierre-Théodore Verhaegen is a famous figure from amongst their ranks."

 ig_lamennaisians: "Lamennaisians"
 ig_lamennaisians_desc: "$ig_catholic_interests_desc$"

 ideology_dop_doctrinaire_democrat: "Doctrinaire Democrat"
 ideology_dop_doctrinaire_democrat_desc: "#lore This group believes in principles of deep democratic moderation, seeking to ensure that only the most outstanding citizens vote, as to ensure the state working.#!"

 ig_democrats_belgium: "Democrats"
 ig_democrats_belgium_desc: "$ig_radicals_desc$"

 bpm_amendment_1831_electoral_law: "1831 Electoral Law"
 bpm_amendment_1831_electoral_law_desc: "The 1831 electoral law heavily favors the Catholic countryside, granting them the constitutional minimum of 20 florins, compared to the 35-80 florins in various urban areas."

 bpm_amendment_doctrinairean_1848_35_florins: "35 Florin Suffrage"
 bpm_amendment_doctrinairean_1848_35_florins_desc: "The electoral law was reformed, setting the electoral tax to a minimum of 35 florins for the entire state."
 
 bpm_amendment_doctrinairean_1848_50_florins: "50 Florin Suffrage"
 bpm_amendment_doctrinairean_1848_50_florins: "The lectoral law was reformed, setting the electoral tax to a minimum of 50 florins for the entire state."

 bpm_amendment_doctrinairean_1848_60_florins: "60 Florin Suffrage"
 bpm_amendment_doctrinairean_1848_60_florins_desc: "The electoral law was reformed, setting the electoral tax to a minimum of 60 florins for the entire state."

 bpm_amendment_king_appointed_burgomasters: "King-appointed Burgomasters"
 bpm_amendment_king_appointed_burgomasters_desc: "With the power granted to the King to appoint burgomasters from amongst the electors, the King has begun using this privilege to empower his favorites."

