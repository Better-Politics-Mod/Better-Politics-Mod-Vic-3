 bpm_switzerland_flavour.4.t: "The Diet's Vote"
 bpm_switzerland_flavour.4.d: "A few months later since Aargau's closure of monasteries, the Federal Assembly voted that the closure was unconstitutional.\n\nIn #gold July#!, a vote was held on the issue again.\n\nHowever, despite the Assembly's decision, #gold Aargau#! is reluctant to restore the monasteries, although it has allowed several convents (female monasteries) to operate."
 bpm_switzerland_flavour.4.f: "The Jesuits are the radical cure against Straussism.\n\n— Josef Leu von Ebersol, 1840"
 bpm_switzerland_flavour.4.a: "Can we drop this from the agenda already?"
 
 bpm_switzerland_flavour.5.t: "Lucerne Recalls the Jesuits & the Freischarenzüge"
 bpm_switzerland_flavour.5.d: "On #gold October 24, 1844#!, the #yellow Canton of Lucerne#! passed a resolution inviting the #L Jesuits#! to the canton to oversee education. It was [SCOPE.sCharacter('bpm_leader_josef_leu').GetFirstName]'s idea, who convinced others that only the Society of Jesus would be able to fight the forces threatening eternal values.\n\nThe resolution was met with dissatisfaction by many [GetInterestGroupVariant('ig_reactionaries',GetPlayer).GetName], as well as various [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetName], [GetInterestGroupVariant('ig_liberals',GetPlayer).GetName], and [GetInterestGroupVariant('ig_radicals',GetPlayer).GetName]; the latter responded with force.\n\nThe first attack was small and ultimately unsuccessful. However, in the second attack, led by [SCOPE.sCharacter('bpm_leader_ochsenbein').GetFullName], the city could not be captured, and after a series of battles, including one at #gold Malters#!, a total of 120 people were #red killed#!, with thousands wounded and imprisoned."
 bpm_switzerland_flavour.5.f: "The grave question before us is: Shall we like cowards bend to this yoke, do we want to be robbed by devious means of the work of Luther and Zwingli and thus submit to the oppressive, sinister rule of papacy and aristocracy?\n\n— Ulrich Ochsenbein, January 1845"
 bpm_switzerland_flavour.5.a: "Bloody hell."

 bpm_switzerland_flavour.6.t: "Radical Victories"
 bpm_switzerland_flavour.6.d: "Dr. #yellow Jakob Robert Steiger#!, a famous radical politician, escaped from prison in #yellow Lucerne#!.\n\nA companion of [SCOPE.sCharacter('bpm_leader_ochsenbein').GetLastName] and leader of the radical refugees from Lucerne, he was initially sentenced to death by firing squad in #gold May#! for treason, but this never happened. This night, Steiger, protected by two guards bribed by the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetName], slipped out of prison and returned to Zürich.\n\nIn the rest of the country, the Radicals also triumphed: on #gold February 13-14th#!, a victorious revolution broke out in #yellow Vaud#!, and on #gold April 2nd#!, the [GetInterestGroupVariant('ig_liberals',GetPlayer).GetName] won the elections in Zürich."
 bpm_switzerland_flavour.6.f: "The grave question before us is: Shall we like cowards bend to this yoke, do we want to be robbed by devious means of the work of Luther and Zwingli and thus submit to the oppressive, sinister rule of papacy and aristocracy?\n\n— Ulrich Ochsenbein, January 1845"
 bpm_switzerland_flavour.6.a: "Oh."

 bpm_switzerland_flavour.7.t: "Assassination of [SCOPE.sCharacter('bpm_josef_leu').GetFullName]"
 bpm_switzerland_flavour.7.d: "The famous, beloved, and controversial ‘Catholic Democrat’ [SCOPE.sCharacter('bpm_josef_leu').GetFullName] was murdered today, at #yellow 12:15#! #L A.M.#!.\n\nThe killer was a certain Jakob Müller, an illiterate farmer. The reason he gave was a personal grudge against Josef caused by his arrest last December during anti-government riots, as well as personal gain linked to politics.\n\nHe also said that he had been bribed by various Radical leaders; however, this proved to be questionable after Judge #yellow Wilhelm Ackermann#! of #yellow Thurgau#! questioned these alleged collaborators. He was later sentenced to be beheaded by the #yellow Lucerne#! #gold Supreme Court#!."
 bpm_switzerland_flavour.7.f: "He can hardly write his name and can read only with great difficulty.\n\n— Findings of the Lucerne Court on Jakob Müller, 1845"
 bpm_switzerland_flavour.7.a: "A good man dies..."

 bpm_switzerland_flavour.8.t: "What is the Sonderbund?!"
 bpm_switzerland_flavour.8.d: "During one of the sessions in #yellow Fribourg#!, the topic of joining the ‘Separate League’ was raised: a league no one had ever heard of before.\n\nIt turned out that last year, an organization was formed in #yellow Lucerne#! with the aim of protecting itself from further potential raids such as the #L 2nd Freischarenzüge#!.\n\nNews of the existence of a secret organization openly violating the #gold Federal Treaty#! are spreading widely, causing outrage among @ig_conservatives! Liberals and @ig_radicals! @ig_liberals! Radicals."
 bpm_switzerland_flavour.8.f: "The cantons of Lucerne, Uri, Schwyz, Unterwalden above and below the Forest, Zug, Fribourg and Valais pledge that if there should be an attack on one or any other number of them, ... they will, to maintain their sovereign and cantonal rights, engage in a joint defense with every means at their disposal.\n\n— Agreement of the Separate League, December 11th 1845"
 bpm_switzerland_flavour.8.a: "This is not gonna end well."

 bpm_switzerland_flavour.9.t: "The Sonderbund is Ordered to be Resolved"
 bpm_switzerland_flavour.9.d: "Today, opponents of the #L #blue Sonderbund#!#!, as well as the [GetInterestGroupVariant('ig_reactionaries',GetPlayer).GetInterestGroupVariant], who are disgusted by pro-Jesuit stances and the promotion of the solely Catholic character of the #L #blue Sonderbund#!#!, pushed through a resolution demanding the Sonderbund’s dissolution."
 bpm_switzerland_flavour.9.f: "1. The separate alliance between the seven cantons of Lucerne, Uri, Schwyz, Unterwalden, Zug, Fribourg, and Valais is irreconcilable with the provisions of the Federal Treaty and is therefore declared to be dissolved.\n2. The cantons named are responsible for complying with this decision, and the Diet reserves the right, should circumstances necessitate it, to take any further measures to see that it is implemented.\n\n— Federal Diet's Resolution of July 20th, 1847"
 bpm_switzerland_flavour.9.a: "#red They refuse?!#!"

 BPM_a_civil_war_will_begin_tt: "@information! #red A civil war may begin!#!"

 bpm_switzerland_flavour.10.t: "The Sonderbund War"
 bpm_switzerland_flavour.10.d: "Preceded by the decision to expel all #blue Jesuits#! on #gold September 3rd#!, as well as the election of  [SCOPE.sCharacter('bpm_dufour').GetFullName] as commander of the mobilized federal army on #gold October 21#!, today, on #gold November 4th, 1847#!, the ‘Decree of Implementation’ was issued, starting a civil war.\n\nOn one side are the Catholic members of the #L #blue Sonderbund#!#!: the cantons of #yellow Lucerne#!, #yellow Uri#!, #yellow Schwyz#!, #yellow Unterwalden#!, #yellow Zug#!, #yellow Fribourg#!, and #yellow Valais#!;\n\nOn the other side: practically everyone else.\n\nGeneral Dufour ordered his division commanders to instruct their soldiers to behave with moderation, without unnecessary violence, and to treat wounded enemies as their own."
 bpm_switzerland_flavour.10.f: "Soldiers! You must emerge from this fight not only victorious, but also without reproach.\n\n— Guillaume Henri Dufour, November 5th 1847"
 bpm_switzerland_flavour.10.a: "May little blood be spilled..."

 bpm_switzerland_flavour.11.t: "The End of Bloodshed"
 bpm_switzerland_flavour.11.d: "The civil war, known as the #gold Sonderbund War#!, ended with the surrender of the #yellow Canton of Uri#! on #gold November 27th#!.\n\nNearly #L 100 people#! were killed and about #L 500#! wounded. It lasted so briefly thanks to the brotherhood on both sides and the small area of fighting, which allowed for a quick end to the conflict without the intervention of any Great Powers.\n\nAll the [Concept('concept_government', 'Governments')] belonging to the #L #blue Sonderbund#!#! resigned, ordered elections.\n\nThe effects of this conflict will remain with us for centuries, so we must reconcile and heal our wounds and feuds, as well as completely #green reform#! the #L Swiss Confederation#!."
 bpm_switzerland_flavour.11.f: "I feel like a man awakening from a nightmare to a peaceful life.\n\n— Jonas Furrer, November 16th 1848"
 bpm_switzerland_flavour.11.a: "It is time to create a new constitution. May those who have fallen rest in peace."

 ################# Hungry Forties!
 bpm_hungry_forties_pursue_free_trade_name: "Import"
 bpm_hungry_forties_pursue_free_trade_desc: "The potato blight, which ruined the livelihoods of many peasants, as well as poor harvests, pose a serious crisis for the state.\n\nWe must begin importing [GetGoods('grain').GetName] on a massive scale and remove all trade barriers to this as quickly as possible." # 
 bpm_hungry_forties_export_bans_name: "Ban Exports"
 bpm_hungry_forties_export_bans_desc: "What our starving population needs now is food. Food, that is exported to various corners of the world, instead of being used and consumed here by those in need.\n\nTherefore, a total ban on foodstuff exports must be introduced, whether it be grain, bread, vegetables, or other products."
 bpm_hungry_forties_intervention_name: "Distribute"
 bpm_hungry_forties_intervention_desc: "The situation caused by this year’s harvest and potato blight is unimaginably tense, with the population unable to cope on its own and hundreds of thousands pushed to the brink of starvation.\n\nMillions must be provided immediately in the form of loans to municipalities; municipal funds, supply agencies, soup kitchens, import bonuses, and much, much more must be created."
 bpm_hungry_forties_response_free_trade_possible_tooltip: "#yellow Political#! #gold Preparedness#! is at least #v 20#!"
 bpm_hungry_forties_response_intervention_possible_tooltip: "#yellow Political#! #gold Preparedness#! is at least #v 30#!"
 BPM_hungry_forties_potatoes_phase_tt: "The #yellow Potato Blight#! has hit Europe"

 je_bpm_crises_hungry_forties_desc: "#tooltip_header #bold The Hungry [SCOPE.GetRootScope.GetCountry.GetCustom('getDecadeName')|U]#!#!\n$TOOLTIP_DELIMITER$\n#v This [Concept('concept_journal_entry', 'Crisis')] will activate if:#!\n[SCOPE.GetRootScope.GetCountry.GetCustom('hungry_forties_has_global_var')] $BPM_hungry_forties_triggered_tt$\n$TOOLTIP_DELIMITER$\n#lore Potato blight, brought over from America, after a long period of wet weather and humidity, has begun to spread dramatically. Rapidly spreading in all directions thanks to the recent conditions, it turns every potato into a foul-smelling, inedible mush. The people of Europe — mainly the poor — use potatoes as a staple and common everyday food, and the scale of the famine that may come is unimaginable. And worst of all, after this series of rains, a suspiciously long period of little rainfall has begun...#!\n\nDuring this [Concept('concept_journal_entry', 'Crisis')] we may experience #bold #red Food Riots#!#! if we don't take sufficient measures!\n\n#bold In order to combat people's anger and fear after crop destruction, you need to decrease the amount of [Concept('concept_pop', 'Pops')] below the [Concept('concept_expected_sol', 'Minimum Expected')] [concept_sol]#!.\n\nThis can be done through, for example:\n• Using the buttons of this #gold Crisis#!;\n• Increasing [Concept('concept_loyalist', 'Loyalists')];\n• Granting [GetDecreeType('decree_emergency_relief').GetName] to affected states;\n• Importing [GetPopNeed('popneed_basic_food').GetName];" # \n[SCOPE.GetRootScope.GetCountry.GetCustom('hungry_forties_has_one_of_these')] At least one of these:\n   [SCOPE.GetRootScope.GetCountry.GetCustom('hungry_forties_has_75_springtime')] $BPM_75_points_into_springtime_tt$\n   [SCOPE.GetRootScope.GetCountry.GetCustom('hungry_forties_has_flanders_with_blight')] [GetStateRegion('STATE_FLANDERS').GetName] has [GetHarvestConditionType('disease_outbreak').GetName]

 BPM_hungry_forties_triggered_tt: "At least #v 10#! states in Europe have the [GetHarvestConditionType('disease_outbreak').GetName] [concept_harvest_condition]"

 je_bpm_crises_the_hungry_forties_have_ended: "No [concept_state_region] has [GetHarvestConditionType('disease_outbreak').GetName] or [GetHarvestConditionType('drought').GetName]"

