 bpm_springtime_wrath_of_the_revolution.1.t: "Soldiers in the Capital"
 bpm_springtime_wrath_of_the_revolution.1.desc_regular: "Tension is beginning to mount in the capital, as increasingly larger and better-armed units have started arriving in and around our capital, #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#!.\n\nThe city’s population, which has shown extraordinary support for the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] and the more militant [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant], is beginning to fear some sort of siege, despite reassurances from local [GetLawType('law_national_guard').GetName] units and the [concept_army], who speak of the need to ensure public order in the face of [concept_bpm_springtime_revolutionary_disorder_events].\n\nUncertainty and fear hang over #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#!."
 bpm_springtime_wrath_of_the_revolution.1.desc_austria: "Tension is beginning to mount in the capital, as increasingly larger and better-armed units have started arriving in and around our capital, #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#!.\n\nThe city’s population, which has shown extraordinary support for the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] and the more militant [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant], is beginning to fear an invasion by the [concept_army] into [SCOPE.sCountry('hungary_country_scope').GetName] — with which the residents sympathize — and even a siege. \n\nFurthermore, Kaiser [SCOPE.sCharacter('our_beloved_ruler').GetFirstName] has appointed [SCOPE.sCharacter('bpm_scope_jelacic').GetFullName] as commander-in-chief and governor of all of [SCOPE.sCountry('hungary_country_scope').GetName].\n\nUncertainty and fear hang over #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#!."
 bpm_springtime_wrath_of_the_revolution.1.f: ""
 bpm_springtime_wrath_of_the_revolution.1.a: "They better not do anything risky..."

 bpm_springtime_current_wrath_power: "Current [Country.MakeScope.ScriptValue('bpm_springtime_wrath_of_the_revolution_calc')|D+0=] #red #bold Strength#!#! of the [concept_bpm_springtime_wrath_of_the_revolution] vs. [Country.MakeScope.ScriptValue('bpm_springtime_fear_of_the_revolution_calc')|D+0=] #blue #bold Defence#!#! of @ig_reactionaries! #bold #purple Reactionaries#!#!’ ([Country.MakeScope.ScriptValue('bpm_sprintime_wrath_of_the_revolution_2x')|D+0=]) is required for a #P Success#!"

 bpm_springtime_depending_on_who_has_what_three_outcomes_are_possible: "@information! Depending on the strength of the [concept_bpm_springtime_wrath_of_the_revolution] and other factors, there are three possible outcomes:"
 bpm_springtime_wrath_first_outcome_success: "@warning! If the strength and power of the [concept_bpm_springtime_wrath_of_the_revolution] exceed the capabilities and fighting spirit of the @ig_reactionaries! #bold #purple Reactionaries#!#!, the [concept_army] will be defeated after terribly overwhelming [Concept('concept_battle', 'Battles')], and the [concept_ruler] and some [Concept('concept_politician', 'Politicians')] will flee the [concept_country] in fear. A [GetLawType('law_parliamentary_republic').GetName] will then be proclaimed"
 bpm_springtime_wrath_second_outcome_likely_failure: "@warning! If the strength and power of the [concept_bpm_springtime_wrath_of_the_revolution] is smaller than the capabilities and fighting spirit of the @ig_reactionaries! #bold #purple Reactionaries#!#!, it is relatively likely that the fighting will drag on for #yellow days#! or #yellow weeks#! and ultimately end in a counterrevolutionary victory. The [concept_bpm_springtime_counterrevolutionary_preparadness] progress bar will return to #v 0%#!, and the [concept_bpm_springtime_revolution_phase] will begin."
 
 bpm_springtime_wrath_of_the_revolution.2.t: "The [SCOPE.GetRootScope.GetCountry.GetCustom('getCurrentMonthName')] Revolution"
 bpm_springtime_wrath_of_the_revolution.2.desc_regular: "In #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#!, a vast number of barricades have been erected. Houses, workshops, all manner of buildings, and bridges are burning or have already been destroyed.\n\nThe [concept_army] sent to pacify and take control of the capital was unable to cope with the angry crowds of students, workers, artisans, and members of the bourgeoisie armed with weapons looted from barracks and armories.\n\nSome [GetPopType('soldiers').GetName], members of the [GetLawType('law_national_guard').GetName], and #yellow Civil Guard#! have joined the side of the #springtime Revolutionaries#!.\n\n[SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('our_beloved_ruler').GetFirstName] is planning his escape, and local commanders, seeing this vast and magnificent crowd, are doing everything they can to prevail."
 bpm_springtime_wrath_of_the_revolution.2.desc_austria: "In #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#!, a vast number of barricades have been erected. Houses, workshops, all kinds of buildings, and bridges are burning or have already been destroyed.\n\nThe [concept_army], intended to march on [SCOPE.sCountry('hungary_country_scope').GetName] and fight the [GetCulture('hungarian').GetName]#yellow s#!, was unable to cope with the aggressively angry crowds of students, workers, artisans, and the bourgeoisie, who wanted to stop the [concept_army]’s advance.\n\nSome of the [GetPopType('soldiers').GetName], the [GetLawType('law_national_guard').GetName], the #yellow Civil Guard#!, as well as the [GetAmendmentType('bpm_amendment_akademische_legion').GetName], have sided with the #springtime Revolutionaries#!.\n\nKaiser [SCOPE.sCharacter('our_beloved_ruler').GetFirstName] and his court are planning their escape, while local [Concept('concept_general', 'Generals')] are engaged in bloody and overwhelming street [Concept('concept_battle', 'Battles')]."
 bpm_springtime_wrath_of_the_revolution.2.f: "And so long as you are ready to die for Humanity, the life of your country will be immortal.\n\n— Giuseppe Mazzini, 1858"
 bpm_springtime_wrath_of_the_revolution.2.a: "Dear God!"

 bpm_springtime_wrath_of_the_revolution.4.t: "Lanternization of Theodor Baillet von Latour"
 bpm_springtime_wrath_of_the_revolution.4.d: "Shortly after the [SCOPE.GetRootScope.GetCountry.GetCustom('getCurrentMonthName')] Revolution began, we received word that #gold War Minister#! #yellow Theodor Baillet von Latour#! had been... 'lanternized'?\n\nWe soon learned of his unfortunate fate.\n\nThe poor man had wanted to call in an additional battalion to quell the unrest, and an enraged mob stormed the #gold Ministry#! building.\n\nThey dragged him out and hanged him alive from a lamppost, then beat and stabbed his suffering body — or perhaps his already lifeless corpse. His body was then left for over 14 hours.\n\nNews of the [concept_bpm_minister]’s brutal death led to the [Concept('concept_ruler', 'Court')] and [concept_government] fleeing the city in haste."
 bpm_springtime_wrath_of_the_revolution.4.f: ""
 bpm_springtime_wrath_of_the_revolution.4.a: "Horrible fate..."

 bpm_springtime_wrath_of_the_revolution.3.t: "Calm Once Again"
 bpm_springtime_wrath_of_the_revolution.3.d: "The power and majesty of the [concept_bpm_springtime_wrath_of_the_revolution] completely crushed the attempt to destroy the fruits and achievements of the #springtime Revolution#!.\n\nAfter defeating the [Concept('concept_army', 'Military Forces')] and garnering sufficient [Concept('concept_bpm_springtime_revolutionary_drift', 'Support')], a new [Concept('concept_government', 'Provisional Government')] was formed, which, composed of [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant], subsequently proclaimed the [GetLawType('law_parliamentary_republic').GetName].\n\nThe now ex-[SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('our_beloved_ruler').GetFirstName] is already abroad, living in fear and paranoia."
 bpm_springtime_wrath_of_the_revolution.3.a: "Vive la Révolution!"

 bpm_springtime_wrath_of_the_revolution.9.t: "The Forced Calm"
 bpm_springtime_wrath_of_the_revolution.9.d: "The #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#! Revolution has come to an end.\n\nIn the captured capital, after days and weeks of fighting, sieges, and skirmishes, absolute calm now reigns.\n\nThe death toll runs into the #red thousands#!, and it will rise slightly still, as the perpetrators of all this must be brought before a military court.\n\nThe rule of law and order triumphs in its beautiful, natural system and state."
 bpm_springtime_wrath_of_the_revolution.9.a: "Shouldn’t have done that!"

 BPM_VALUE_FROM_WARY_OF_WRATH: "the crippling fear of the [concept_bpm_springtime_wrath_of_the_revolution] (#italic based on the average [concept_bpm_springtime_revolutionary_drift]#!)"

 BPM_VALUE_ANOTHER_COUNTERREVOLUTION: "having an another [Concept('concept_bpm_springtime_counterrevolutionary_preparadness', 'Counterrevolution')]"
 
 bpm_springtime_counterrevolutionary_preparadness_goes_to_0: "[concept_bpm_springtime_counterrevolutionary_preparadness] loses all its progress and returns to #v 0%#!. "

 bpm_springtime_wrath_was_killed_and_calmed: "The [concept_bpm_springtime_wrath_of_the_revolution] has been subdued and has perished in the name of the #springtime Revolution#! and your #yellow achievements#!. Now nothing will be able to stop the @ig_reactionaries! #bold #purple Reactionaries#!#! from destroying you works, unless you manage to enter the [concept_bpm_springtime_reform_phase], which will be really hard."

 bpm_springtime_powerful_reaction: "Powerful and Fearless Reaction"

 bpm_springtime_wrath_of_the_revolution.10.t: "Execution of [SCOPE.sCharacter('bpm_springtime_robert_blum_scope').GetFullName]"
 bpm_springtime_wrath_of_the_revolution.10.d: "[SCOPE.sCharacter('bpm_springtime_robert_blum_scope').GetFullName], a famous [concept_agitator] and member of the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] in the #yellow Frankfurt National Assembly#!, was executed today.\n\nHe and his colleague #yellow Julius Fröbel#! had been arrested five days earlier. He was then brought before a military court, which initially sentenced him to hanging, a sentence that was later commuted to ‘execution by powder and lead’. The death sentence was strongly opposed by [concept_general] [SCOPE.sCharacter('windisch_gratz_character').GetLastName].\n\nAt 7:30 in the morning, the order to fire was given."
 bpm_springtime_wrath_of_the_revolution.10.f: "I die for the German freedom, for which I have fought. May the fatherland remember me.\n\n— Robert Blum, November 9th 1848"
 bpm_springtime_wrath_of_the_revolution.10.a: "Rest in peace."

 notification_bpm_1848_robert_blum_executed_name: "#v Schicksalstag#!"
 notification_bpm_1848_robert_blum_executed_desc: "[SCOPE.sCharacter('bpm_springtime_robert_blum_scope').GetFullName], a member of the #yellow National Assembly#! in #gold Frankfurt#! and a renowned orator of the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant], was convicted and executed by firing squad in [SCOPE.sCountry('austria_country_scope').GetName] for his participation in the #springtime Revolution#!."

 von_Puchner: "von Puchner"
 Bem: "Bem"
 transylvanian_uprising: "Transylvanian Uprising"

 bpm_springtime_of_the_peoples.41.t: "Transylvanian Revolution"
 bpm_springtime_of_the_peoples.41.d: "Today, [SCOPE.sCharacter('bpm_puchner_character').GetFullName], an imperial governor, citing the proclamation declaring martial law in our country, launched a major rebellion in [SCOPE.sCountry('bpm_transylvania').GetName].\n\nEarlier, the Romanians had declared their opposition to the union with us, decided to adopt [SCOPE.sCountry('austria_country_scope').GetAdjective] [Concept('concept_law', 'Laws')], and begun to arm themselves."
 bpm_springtime_of_the_peoples.41.f: "The Budapest House of Representatives, falsely invoking the holy name of King Ferdinand V, under the presidency of Lajos Kossuth, has — through so-called royal commissioners, invalid proclamations, and null and void decrees — imposed a veritable reign of terror here in Transylvania as well, instead of the promised freedom and equality. His Majesty, through his proclamations dated October 3rd and 4th of this year, has annulled this violent tyranny and unlawful government; — we are no longer permitted to recognize or regard it as lawful.\n\n— Anton von Puchner, October 18th"
 bpm_springtime_of_the_peoples.41.a: "Hopefully we can quell this in time."

 je_bpm_a_new_ruler_name: "Crown Franz Josef"

 franz_ferdinand_was_crowned_as_emperor: "[SCOPE.sCharacter('bpm_sprintime_franz_josef').GetFullName] was crowned as Kaiser of [SCOPE.sCountry('bpm_springtime_austria').GetName]"

 bpm_springtime_it_is_unlikely_hungarians_will_also_crown_him: "Given the current legal situation and the tensions in [SCOPE.sCountry('bpm_springtime_hungary').GetName], it is very, very unlikely that [SCOPE.sCharacter('bpm_sprintime_franz_josef').GetFirstName] will be crowned by the [GetCulture('hungarian').GetName]#yellow s#!."
 bpm_springtime_it_is_unlikely_hungarians_we_can_beat_em_up: "@information! But this will give us a pretext — albeit a rather flimsy one — to declare war on [SCOPE.sCountry('bpm_springtime_hungary').GetName]!"

 bpm_springtime_of_the_peoples.42.t: "The Handsome Youngster"
 bpm_springtime_of_the_peoples.42.d: "Today, [SCOPE.sCharacter('bpm_sprintime_franz_josef').GetFullName] was formally crowned as the new [Concept('concept_ruler', 'Kaiser')], following [SCOPE.sCharacter('ferdinandy_the_first').GetFullName]’s abdication.\n\nA new and promising era for [SCOPE.sCountry('bpm_springtime_austria').GetName]’s future has begun."
 bpm_springtime_of_the_peoples.42.f: "I am the Emperor, and I want dumplings!\n\n— Kaiser Ferdinand I"
 bpm_springtime_of_the_peoples.42.a: "All the world is subject to Austria!"
 
 notification_bpm_1848_franz_josef_crowned_name: "#v A.E.I.O.U.#!"
 notification_bpm_1848_franz_josef_crowned_desc: "Following [SCOPE.sCharacter('ferdinandy_the_first').GetFirstName]’s abdication, the [SCOPE.sCountry('bpm_springtime_austria').GetAdjective] throne has been assumed by [SCOPE.sCharacter('bpm_sprintime_franz_josef').GetFullName], whose Reactionary tendencies are already becoming apparent."
 
 notification_bpm_1848_hungarians_refuse_to_crown_fj_name: "#v Interregnum Hungariae!#!"
 notification_bpm_1848_hungarians_refuse_to_crown_fj_desc: "The [GetCulture('hungarian').GetName]#yellow s#! have refused to recognize the new Kaiser, [SCOPE.sCharacter('bpm_sprintime_franz_josef').GetFirstName], and subsequently have begun preparations for war."

 bpm_springtime_of_the_peoples.43.t: "[SCOPE.sCountry('bpm_springtime_hungary').GetName] Refuses to Crown [SCOPE.sCharacter('bpm_sprintime_franz_josef').GetFirstName]"
 bpm_springtime_of_the_peoples.43.desc_austria: "Today, the Hungarian Parliament officially refused to recognize and crown the new Kaiser [SCOPE.sCharacter('bpm_sprintime_franz_josef').GetFullName] as King of Hungary, calling on the nation to take up arms.\n\nUnlike in the vast majority of monarchies in Europe and the world, in [SCOPE.sCountry('bpm_springtime_hungary').GetName] the coronation is proof of authority over the region, and as long as the previous ruler, #yellow Ferdinand I#!, does not die or is not dethroned, he will continue to reign."
 bpm_springtime_of_the_peoples.43.desc_hungary: "Today, our Parliament voted to reject the throne and recognize the new Kaiser of [SCOPE.sCountry('bpm_springtime_austria').GetName], [SCOPE.sCharacter('bpm_sprintime_franz_josef').GetFullName].\n\nAccording to [concept_law], #yellow Ferdinand I#!, the former Kaiser, continues to rule [SCOPE.sCountry('bpm_springtime_hungary').GetName], and no one is in a hurry to kill or dethrone him in favor of Franz Joseph."
 bpm_springtime_of_the_peoples.43.a: "They seem to think they will win this war..." 
 bpm_springtime_of_the_peoples.43.b: "They better prepare to defend Vienna!"

 je_bpm_a_new_ruler_desc: "Let’s be honest… the current Kaiser [SCOPE.sCharacter('ferdinandy_the_first').GetFullName] is not in the best physical or mental condition to rule [SCOPE.sCountry('bpm_springtime_austria').GetName] effectively or to consolidate his power.\n\nIn fact, he has never been an effective [concept_ruler], as he suffers from various ailments, speech impairments, and other conditions that only tarnish our image both internationally and domestically. We need someone young, strong, and capable. And the best candidate is the Kaiser’s nephew, [SCOPE.sCharacter('bpm_sprintime_franz_josef').GetFullName].\n\nHe is an ambitious, young, and hardworking man who will definitely enable us to stand on our own two feet. [SCOPE.sCharacter('ferdinandy_the_first').GetFirstName] must abdicate, and the young man must take his throne."

 je_declare_indpendence_hungary_name: "Declare Independence"
 
 bpm_springtime_of_the_peoples.44.t: "Függetlenségi Nyilatkozat"
 bpm_springtime_of_the_peoples.44.d: "Seeing that the time was right, [SCOPE.sCharacter('bpm_lajos_kossuth').GetFullName] submitted a declaration of independence (#yellow Függetlenségi nyilatkozat#!) and dethronement of the of the #gold House#! of [SCOPE.sCharacter('bpm_sprintime_franz_josef').GetLastName] for consideration during a closed session of parliament.\n\nThe following day, during an open session of parliament, the declaration was unanimously adopted, proclaiming [SCOPE.sCountry('bpm_springtime_hungary').GetName]’s independence.\n\n#v 5 days#! later the declaration was published, and is beign printed en masse." # Függetlenségi nyilatkozat
 bpm_springtime_of_the_peoples.44.f: "We, the National Assembly, the lawful representative of the Hungarian state, hereby restore Hungary to its inalienable natural rights through this solemn declaration, and, together with all its constituent parts and provinces, admit it into the ranks of autonomous, independent European states; and hereby declare the treacherous House of Habsburg-Lorraine deposed from the throne before God and the world: We consider it our moral duty to make known the reasons for this decision, so that the entire civilized world may know that this step was taken not out of excessive presumption or revolutionary restlessness, but out of the ultimate exhaustion of patience and the necessity of self-preservation by the Hungarian nation, which has been persecuted to the point of death.\n\n— #bold Declaration of Independence of the Hungarian Nation#!, April 19th 1849"
 bpm_springtime_of_the_peoples.44.a: "We are free from oppression!"

 notification_bpm_1849_hungary_declares_independence_name: "#v Talpra magyar, hí a haza!#!"
 notification_bpm_1849_hungary_declares_independence_desc: "[SCOPE.sCountry('bpm_springtime_hungary').GetName] has declared its independence and deposed the House of [SCOPE.sCharacter('bpm_sprintime_franz_josef').GetLastName] from the Kingdom, appointing [SCOPE.sCharacter('bpm_lajos_kossuth').GetFullName] as regent."

 bpm_springtime_6_months_have_passed_since_we_were_invaded: "#v 6 months#! have passed since [SCOPE.sCountry('bpm_springtime_austria').GetName] has invaded [SCOPE.sCountry('bpm_springtime_hungary').GetName]"
 
 bpm_springtime_of_the_peoples.45.t: "Kossuth Schemes: Gold"
 bpm_springtime_of_the_peoples.45.d: "[SCOPE.sCharacter('bpm_lajos_kossuth').GetFullName], an already well-known [concept_politician] and [concept_bpm_minister], is pursuing his own agenda. An illegal agenda, in fact — schemes that do not necessarily sit well with other members of the [concept_government].\n\nHe has begun withholding and delaying the delivery of bullion and tax revenues to #gold Wien#!, which is depriving [SCOPE.sCountry('bpm_springtime_austria').GetName] of a considerable amount of [concept_money].\n\nHowever, this is nothing compared to the confiscation and withholding of any and all private shipments of [GetGoods('gold').GetName] and #yellow Silver#!, while simultaneously diverting gold mine products to his coffers.\n\nThese funds, which he continues to withhold secretly or on the down-low, flow into #pink Magyar#! hands. For many, a strangely large amount of [concept_money] is coming into the state coffers..."
 bpm_springtime_of_the_peoples.45.f: "Because of the legal formalities the fatherland is being lost.\n\n— Lajos Kossuth, 1848"
 bpm_springtime_of_the_peoples.45.a: "Very brave of him."

 bpm_springtime_of_the_peoples.46.t: "Kossuth Schemes: Currency"
 bpm_springtime_of_the_peoples.46.d: "[SCOPE.sCharacter('bpm_lajos_kossuth').GetFullName], an already well-known [concept_politician] and [concept_bpm_minister], continues to pursue his own policies with even greater determination and arrogance.\n\nThis time, he decided to begin issuing a new national currency without informing anyone beforehand.\n\nThe so-called ‘#yellow Kossuth Dollars#!’ are a partly founded and unfunded currency with virtually no value.\n\nFortunately, to remedy this, [SCOPE.sCharacter('bpm_lajos_kossuth').GetLastName] began threatening military court-martial to anyone who refused to accept the new ‘#yellow currency#!’; and after [Concept('concept_taxes', 'Taxing')] everyone, he demanded that they hand over valuable as collateral for the paper banknotes.\n\nAt the same time, he has started makign efforts to create public credit, which, however, poses a problem when there is no credit in the [concept_country]."
 bpm_springtime_of_the_peoples.46.a: "...What is he doing now?"

 bpm_springtime_of_the_peoples.47.t: "Kossuth Schemes: Armaments"
 bpm_springtime_of_the_peoples.47.d: "[SCOPE.sCharacter('bpm_lajos_kossuth').GetFullName] continues to pursue his own policies with dedication and authority, paying no heed to what others have to say.\n\nNow he is really starting to go too far.\n\nHe began by attempting to purchase [GetGoods('small_arms').GetName] from abroad, and when that proved a failure, he ‘[Concept('concept_nationalize', 'Nationalized')]’ all @shopkeepers! #yellow Gunsmiths#!, ordering them to produce for the [Concept('concept_country', 'State')].\n\nHe also began [Concept('concept_nationalize', 'Nationalizing')] private enterprises that made use of [concept_subsidies], and initiated all kinds of construction projects.\n\nThen he introduced military discipline into all kinds of workplaces, imposing military justice and court-martials on workers, and even capital punishments for ‘#red sabotage#!’."
 bpm_springtime_of_the_peoples.47.f: "I almost envy the prisoners for their clothing.\n\n— Lajos Kossuth, 1848"
 bpm_springtime_of_the_peoples.47.a: "Poor people."
 
 bpm_springtime_of_the_peoples.48.t: "Kossuth Schemes: Recruits"
 bpm_springtime_of_the_peoples.48.d: "[SCOPE.sCharacter('bpm_lajos_kossuth').GetFullName], with vigor and a strong voice, continues to pursue his own political agenda, this time in the grassroots.\n\nLiterally in the grass, for he set out to the countryside to recruit [GetPopType('soldiers').GetName] and win the peasantry’s support for the nation.\n\nHe visited, spoke, and persuaded village after village, small town after small town, to recruit as many [GetPopType('peasants').GetName] as possible to enlist in the army and defend the homeland.\n\nThis dedication has garnered unprecedented support from the peasantry for the #springtime Revolution#!, where a spirit of patriotism and purpose prevails."
 bpm_springtime_of_the_peoples.48.a: "Finally something that isn't really illegal!"

 bpm_springtime_kossuth_schemes_coins: "Kossuth Schemes: Gold"
 bpm_springtime_kossuth_schemes_dollars: "Kossuth Schemes: Dollars"
 bpm_springtime_kossuth_schemes_armaments: "Kossuth Schemes: Armaments"

 je_bpmutton_call_russia_name: "Call Russia to War" # made by blahj!!!!
 je_bpmutton_call_russia_desc: "It would be an understatement to say that the war with the Hungarian revolutionaries is not progressing in our favor. A quick and decisive war became out of the question a long time ago, and now the ministers whisper of another possibility altogether: What if they march on #gold Vienna#!? What could we do? Our forces are stretched thin as-is, with the war with the Italians ongoing too.\n\nOur German allies in the Confederation are busy with their own problems, and the Frankfurt Parliament continues to bicker on. Aid is not coming from our brothers anytime soon. Russia, though, is geared up to intervene on our behalf. It may yet be our saving grace against the march of the #P Magyar#!, and all we need do is send the word, and tens of thousands of cossacks will cross the Carpathian Mountains and slaughter the Hungarian radicals.\n\nJust as easy as it would be to request the intervention, worries form about how we are potentially handing our sovereignty to another [concept_great_power]. If we are unable to put down a simple rebellion ourselves, what does that say about the stability of the state? Are we to become another Poland, stripped of parts by our neighbors? And what will Russia ask of us in return? Would we be dragged into a war against our interests? This is not a zero-sum game, and the choice must be made carefully"
 bpm_springtime_recruitment_efforts: "Large Scale Recruitment Efforts"
 je_bpm_establish_honved_army_name: "Establish the Honvéd"
 je_bpm_establish_honved_army_desc: "Although we have obtained the [concept_government]’s authorization and full control over our kingdom’s armed forces and those stationed on our territory, they remain very weak.\n\nUnder-armed, outdated in many respects, and with unsatisfactory capabilities. Such an army, tiny and weak, will not be able to defend the borders of our territories, especially if the integrity of those territories and our borders were to be called into question by some enemy.\n\nThe threats and fears are therefore great, shared by various [Concept('concept_politician', 'Politicians')] and citizens.\n\nA concrete and substantial budget must therefore be established for the creation of a modern [concept_army] — the ‘#yellow Honvédség#!’ — which is to be consisting of 200,000 [GetPopType('soldiers').GetName] must be established by [concept_law]. It is time to get to work."

 bpm_springtime_of_the_peoples.49.t: "Legiony Polskie"
 bpm_springtime_of_the_peoples.49.d: "After the outbreak of hostilities by forces of the Habsburg Empire, volunteers began pouring into our [concept_country], ready to fight and die for our freedom.\n\nMany of them are highly experienced and capable, possessing great vigor and a readiness to fight against oppressive and reactionary [SCOPE.sCountry('bpm_springtime_austria').GetName].\n\nMany of them are also #yellow Poles#! who, like us, suffer under the heel of other powers, and knowing this feeling deeply, they zealously fight for us.\n\nAmong them were several famous [Concept('concept_general', 'Generals')] accompanied by crowds of [GetCulture('polish').GetName] volunteers: #yellow Józef Wysocki#! and #yellow Henryk Dembinski#!; as well as the most distinguished of them all, #yellow Józef Bem#!, who had returned from the revolutionary battles in Vienna."
 bpm_springtime_of_the_peoples.49.f: "Poland has not yet succumbed.\nAs long as we remain,\nWhat the foe by force has seized,\nSword in hand we'll gain.\n\n— ‘#bold Mazurek Dąbrowskiego#!’ made by Józef Wybicki, written between July 16th-19th 1797"
 bpm_springtime_of_the_peoples.49.a: "Hungary is not yet lost, too!"

 Vasile: "Vasile"
 Alecsandri: "Alecsandri"
 
 notification_bpm_1848_successful_moldovan_revolution_name: "#v Ziua vieții a sosit!#!"
 notification_bpm_1848_successful_moldovan_revolution_desc: "Prince [SCOPE.sCharacter('our_beloved_ruler').GetLastName] has agreed to all demands of the ‘#yellow Petiția-proclamație#!’, beginning the proccess of slow reform in [SCOPE.sCountry('bpm_country_moldova').GetName]." 

 bpm_springtime_of_the_peoples.52.t: "Petiția-proclamație"
 bpm_springtime_of_the_peoples.52.desc_failure: "Today, on #gold April 9th#!, several [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant] led by [SCOPE.sCharacter('bpm_vasile_alecsandri').GetFullName] have read a document titled ‘#yellow Petiția-proclamație#!’, in which they outlined the various needs and aspirations of the people of [SCOPE.sState('capital_region_scope').GetName]. These included, among other things, a more representative assembly, improvements in rural conditions, the eradication of corruption, civil and legal equalizaton, and other demands.\n\nHowever, they also demanded tha [SCOPE.sCharacter('our_beloved_ruler').GetLastName] agree to all the points; this did not happen, however, as he refused to consent to the last two points regarding [GetLawType('law_censorship').GetName] and #yellow Citizens Guard#!. For this reason, fearing a #springtime Revolution#!, he ordered his [GetCulture('albanian').GetName] mercenary bodyguards that evening to arrest the opposition.\n\nAbout 300 people were arrested, but some, such as [SCOPE.sCharacter('bpm_vasile_alecsandri').GetLastName], managed to escape."
 bpm_springtime_of_the_peoples.52.desc_success: "Today, on #gold April 9th#!, several [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant] led by [SCOPE.sCharacter('bpm_vasile_alecsandri').GetFullName] have read a document titled ‘#yellow Petiția-proclamație#!’, in which they outlined the various needs and aspirations of the people of [SCOPE.sState('capital_region_scope').GetName].\n\nThese include, among other things, a more representative assembly, improvements in rural conditions, the eradication of corruption, civil and legal equalizaton, and other demands.\n\nThese concerns certain social and economic reforms without changing the current political system.\n\nThe want [SCOPE.sCountry('bpm_country_moldova').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('our_beloved_ruler').GetLastName] to sign all the points of the petition."
 bpm_springtime_of_the_peoples.52.f: "The Committee, however, having convened today, March 28, 1848, and having examined the critical state of society today, has come to the firm and dispassionate conclusion that, in order to set Moldavia on the path to happiness, the surest and most essential means are as follows:\n1. The strict observance of the Regulations in their entirety and without any misinterpretation.\n\n— ‘#bold Petiția-proclamație#!’, April 8th-9th 1848"
 bpm_springtime_of_the_peoples.52.a: "Accept all demands. Let’s hope the Turks are fine with that."
 bpm_springtime_of_the_peoples.52.b: "Farawell!"

 bpm_springtime_of_the_peoples.53.t: "The Wallachian Revolution" # Pașoptist
 bpm_springtime_of_the_peoples.53.d: "The end of [SCOPE.sCountry('bpm_our_capital').GetName] as we know it has come! For today, following [SCOPE.sCharacter('monarch_scope').GetLastName]’s flight, a [Concept('concept_government', 'Provisional Government')] composed of [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant] and [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] has been formed\n\nTwo days earlier, on #gold June 21st#!, [SCOPE.sCharacter('bpm_radulescu_leader').GetLastName], [SCOPE.sCharacter('bpm_tell_leader').GetLastName], and [SCOPE.sCharacter('bpm_popa_sapca').GetFullName] presented a grand proclamation to the cheering crowd in the city of #gold Islaz#!.\n\nHaving formed a [concept_government], tens of thousands of people and loyal [GetPopType('soldiers').GetName] set out for #gold Craiova#!, also hoping that the Prince would recognize the document. Soon, however, an attempt was made on the Prince’s life.\n\nOn #gold June 23rd#!, the desperate [concept_ruler] signed the document as a [Concept('concept_bpm_constitutional_level', 'Constitution')], and soon afterward, together with the #green Russian#! consul, went into exile."
 bpm_springtime_of_the_peoples.53.f: "Fellow Romanians,\n\nThe time of our salvation has come; the Romanian people are awakening to the sound of the trumpet of the angel of salvation and are realizing their right to sovereignty. Peace be with you, for freedom is proclaimed to you!\n\n— ‘#bold Proclamația de la Islaz#!’, June 21st 1848"
 bpm_springtime_of_the_peoples.53.a: "Salvation has come indeed!"

 notification_bpm_1848_successful_wallachian_revolution_name: "#v Dreptate, Frăție!#!"
 notification_bpm_1848_successful_wallachian_revolution_desc: "As #blue Ro#!#yellow mani#!#red an#! tricolors fly over [SCOPE.sCountry('bpm_our_capital').GetName], a new [Concept('concept_government', 'Provisional Government')], formed after [SCOPE.sCharacter('monarch_scope').GetLastName]’s self-exile, has started implementing its first social reforms."
 Ion_Heliade: "Ion Heliade"
