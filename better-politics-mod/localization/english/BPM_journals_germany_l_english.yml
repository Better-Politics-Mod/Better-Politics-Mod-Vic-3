### Vormärz ###
 je_vormaerz: "Vormärz"
 je_vormaerz_reason: "Following the end of the Napoleonic Wars, a wave of reaction swept across much of Europe. The Great Powers had met in Vienna to orchestrate the Concert of Europe, vowing to supress both liberalism and nationalism while restoring the monarchial order.\n\nWithin the German Confederation, encompassing most of the disbanded Holy Roman Empire, restoration manifested itself through the Karlsbad decrees heavily restricting freedom of speech and introducing strict censorship. Despite all the hardships, both liberal and nationalist ideals imported from the French Revolution have taken ahold of bourgeoisie all over Central Europe, eagerly awaiting the right time to set the brooding powder keg ablaze. \n\n#lore "If you stand still in a crowd that is pushing forward, you are resisting as well as if you were stepping against it: you will be trampled underfoot."\n-Georg Büchner, 1835#!"

### Schutzzollpolitik ###
 je_addressing_grunderkrach: "Introducing Schutzzölle"
 je_addressing_grunderkrach_reason: "The aftermath of the Gründerkrach has left our domestic industries in a vulnerable state. Both industrialists and agrarians demand the introduction of $CONCEPT_IMPORT$ [Concept('concept_tariffs','$concept_tariffs$')] to stabilise the domestic market. Apart from the benefit of appeasing Big Business and aiding our Junker friends, the introduced tariffs should fill the state treasurey nicely."

