 bpm_belgian_historical_events.4.t: "Jean-Baptise Nothomb Retires"
 bpm_belgian_historical_events.4.d: "[SCOPE.sCharacter('bpm_jean_baptiste_nothomb').GetLastName], a famous liberal politician, although more associated with the [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant], finally retired after more than a decade of hard work on building the Belgian State.\n\nThis was due to the growing dissatisfaction of the [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant] and his own increasing political isolation, unable to identify with either #blue Catholics#! or #yellow Liberals#!.\n\nHe was replaced by Adolphe Dechamps, a relatively young but already experienced statesman with his own [GetIdeology('ideology_leader_unorthodox_unionist').GetName] tendencies."
 bpm_belgian_historical_events.4.f: "In the crisis that brought me to this position, I lost all my friends, but not my principles.\n\n— Jean-Baptiste Nothomb, March 18th 1843"
 bpm_belgian_historical_events.4.a: "May he live long and in peace."

 bpm_belgian_historical_events.5.t: "The Liberal Congress"
 bpm_belgian_historical_events.5.d: "Today, the #yellow Liberal Congress#! gathered in the #gold Brussels City Hall#!.\n\n#v 384#! delegates attended, including members of the #L National Congress#!; #L burgomasters#!, #L municipal#! and #L provincial councilors#!; members of #L Chambers of Commerce#!, #L lawyers#!, #L doctors#!, #L aristocrats#!, and #L journalists#!; #L deputies#!, #L senators#!, and #L young politicians#! such as [SCOPE.sCharacter('bpm_verheagen_scope').GetLastName], [SCOPE.sCharacter('bpm_paul_devaux_scope').GetLastName], #yellow Frère-Orban#!, Lelièvre, and Piercot; and presiding over them all was [SCOPE.sCharacter('bpm_eugene_defacqz_scope').GetFullName].\n\nThe congress announced the creation of liberal associations in every major city to field candidates, and adopted the program of ‘Belgian liberalism’ — progress, electoral reform lowering the census, secularization of public education, repeal of ‘reactionary laws’, independence of secular authority and improvement of living conditions for the working classes."
 bpm_belgian_historical_events.5.f: "Each person will adjust their own pace so that we can all march forward, but at an even pace, in tight ranks, in a compact body, under the banner bearing this indelible motto: The Constitution, nothing but the Constitution, but the whole Constitution!\n\n— Eugène Defacqz, July 14th 1846"
 bpm_belgian_historical_events.5.a: "Here we go..."

