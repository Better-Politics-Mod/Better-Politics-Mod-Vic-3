 bpm_amendment_20_house_village_suffrage: "20-Hut Suffrage"
 bpm_amendment_20_house_village_suffrage_desc: "Every village with at least 20 houses with perpetual tenants has the right to elect one tenant from among its community who, on behalf of his fellow residents, will exercise the political right of election."
 
 bpm_city_of_artisans_and_art: "City of Artisans and Art"
 bpm_conference_of_residents: "Konferencya Rezydentòw"

 je_bpm_last_vestige_of_poland: "The Last Vestige of Poland"
 je_bpm_last_vestige_of_poland_reason: "The #v Wolne, Niepodległe i Ściśle Neutralne Miasto Krakòw i jego Okręg#!, or commonly known as #v Rzeczypospolita Krakowska#!, is a small country made out of an old Polish city — Krakòw. It is considered as a humble city; a laissez-faire and liberal-democratic enclave.\n\nDespite its independence and neutrality being guaranteed by the Congress of Wien, the three partitioning powers, and only neighbours or ours, continuously try to weaken our independence or to even find an excuse to annex the remaining vestige of Poland."

 bpm_independence_radicals: "Pro-Independence Radicals"

 bpm_krakow_uprising.1.t: "Murder of Jan Behrens-Pawłowski"
 bpm_krakow_uprising.1.d: "This morning, merchants traveling from #gold Chrzanòw#! found the snow-covered corpse of a man by the roadside near the forest in #gold Rząska#!. He had a large sum of money and valuables with him, as well as a note on his chest with the words — ‘#bold #L This is what happens to spies#!#!’.\n\nHe was a spy from Russia who presented himself as an envoy from #yellow Paris#! and an admirer of #yellow Adam Mickiewicz#!. After arriving in Krakòw, he dined at the ‘#yellow Hotel Pollera#!’ and played games, a veteran of the #gold November Uprising#!.\n\nAssassins from the @ig_radicals! #gold Democratic#! ‘#yellow Stowarzyszenie Ludu Polskiego#!’, informed that Behrens was a spy, lured the man and shot him on an empty road, then stabbed him seven times.\n\nThey left everything behind, except for his documents, most likely, to make it clear that this was a political murder."
 bpm_krakow_uprising.1.f: ""
 bpm_krakow_uprising.1.a: "Oh."

 bpm_krakow_uprising.2.t: "Konferencya Rezydentòw Demands Expelling of Foreigners"
 bpm_krakow_uprising.2.d: "On #GOLD February 9th, 1836#!, the #yellow Konferencya Rezydentòw#! ordered the removal of all emigrants from our country within eight days.\n\nThis was in response to the murder of a russian spy named #yellow Jan Behrens-Pawłowski#! by members of the @ig_radicals! #gold Democratic#! ‘#yellow Stowarzyszenie Ludu Polskiego#!’.\n\nMost of these ‘emigrants’ were former members, patriots, and soldiers associated with the failed #gold November Uprising#!.\n\nWhat to do?"
 bpm_krakow_uprising.2.f: ""
 bpm_krakow_uprising.2.a: "We must ask them to kindly leave..."
 some_400_poles_will_leave_tt: "@information! #blue Some #yellow 400#! #L Poles#! will leave our country.#!"
 bpm_weakening_of_patriotic_movements: "Weakening of Patriotic Movements"

 bpm_Rabacya_Galicyjska: "Rabacya Galicyjska"

 bpm_krakow_uprising.3.t: "February Interferences"
 bpm_krakow_uprising.3.d: "From #yellow February 7th#! to #yellow 17th#!, #L Austrian#! troops and police began entering the territory of #L Krakòw#!. On #yellow February 20th#!, the first #L Russian#! and #L Prussian#! appeared.\n\nThe entry of the great powers’ armies violated the provisions of the #gold Congress of Vienna#!, which led to diplomatic notes and protests from the British and French.\n\nOn #yellow February 25th#!, #gold Senate President#! [SCOPE.sCharacter('kasper_senat').GetFullName] resigned from his post; on #yellow February 29#!, under the supervision of the #yellow Konferencya Rezydentòw#!, [SCOPE.sCharacter('bpm_haller').GetFullName] became #gold President of the Senate#!."
 bpm_krakow_uprising.3.f: ""
 bpm_krakow_uprising.3.a: "Are we independent or not?"

 bpm_krakow_uprising.4.t: "The Krakòw Uprising"
 bpm_krakow_uprising.4.d: "The failure of the #gold November Uprising#!, attributed to its inability to gain the support of the peasantry, taught many Polish #L émigrés#! and #L revolutionaries#! that without the support of the peasantry, an uprising would not succeed.\n\nPreparations were therefore made to gain their support, as well as preparations for the uprising itself.\n\nAnd so, on today's night, the uprising was launched. It failed in #gold Greater Poland#!, and in #gold Congress Poland#! it did not even begin. Lasting over 10 days, the #gold Krakòw Uprising#! was unable to survive, especially when the ‘#yellow Galician Rabacya#!’ started to kill szlachta-supporters."
 bpm_krakow_uprising.4.f: "Poles! The hour of uprising has struck — all of torn Poland is rising and uniting — our brothers have already risen in Poznań, in Congress Poland, in Lithuania, and in Ruthenia, they are fighting the enemy.\n\n— ‘#bold Manifest Rządu Narodowego Rzeczypospolitéj Polskiéj do Narodu Polskiego#!’, January 22nd 1846"
 bpm_krakow_uprising.4.a: "Poland has lost!"

 bpm_krakow_uprising.5.t: "Rabacya Galicyjska"
 bpm_krakow_uprising.5.d: "While the #gold Krakòw Uprising#! was beginning, a few days earlier, incited by the Austrian authorities, [GetPopType('peasants').GetName], fueled by anger at their misery, began their own ‘uprising’.\n\nThey began raiding manors, massacring and committing atrocities against the local nobility (#L szlachta#!) and noble administrators.\n\nPeasant ‘troops’, led by those such as #yellow Jakub Szela#!, are one of the most fearful in #yellow Galicya#!."
 bpm_krakow_uprising.5.f: "Oh, Lord, Lord! With the horror of the world,\nTerrible events have come upon us,\nA son killed his mother, a brother killed his brother,\nThere are many Cains among us.\n\n— Kornel Ujejski’s ‘#bold Skargi Jeremiego#!’ chorale, Paris 1847"
 bpm_krakow_uprising.5.a: "Horrors."

 BPM_the_game_will_end_nay: "@warning! #red The game will end!#!"

 bpm_krakow_uprising.6.t: "The Fate of the Rzeczypospolita Krakowska"
 bpm_krakow_uprising.6.d: "The failed #gold Krakòw uprising#!, the ‘#yellow Galician Rabacya#!’, earlier provocations, and the weakening socio-political independence of the small state ultimately provided Austria with a pretext to annex the small state — [ROOT.GetCountry.GetName], without interference or protest from the partitioning powers, as agreed in 1835.\n\nKrakòw now will be a part of the #gold Austrian Empire#!."
 bpm_krakow_uprising.6.f: ""
 bpm_krakow_uprising.6.a: "Farawell [ROOT.GetCountry.GetName]."
 bpm_krakow_uprising.6.b: "Continue as Crownland of Galicia-Lodomeria"
 bpm_krakow_uprising.6.c: "Continue as Austria"
 
