 bpm_springtime_peasants_seigneurial_remnants: "Over time, the #P very positive#! [Concept('concept_timed_modifier', 'Benefits')] and [Concept('concept_modifier', 'Modifiers')] will gradually decrease until they have become relatively satisfactory. Be quick to implement #blue #bold Reforms#!#! before their rewards become too small!"

