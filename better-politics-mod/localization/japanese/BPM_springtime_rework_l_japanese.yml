 law_heimatrecht: "Heimatrecht"
 law_heimatrecht_desc: "Traditional law of being a citizen of a municipality, which is always inherited and rarely obtainable. Citizens of one canton treat citizens of other cantons as unknown foreigners; the Swiss state has no official national citizenship."

 bpm_amendment_cantonal_suffrages: "Cantonal Suffrage"
 bpm_amendment_cantonal_suffrages_desc: "Each canton and half-canton establishes its own suffrage within its own constitution, if it has one. Some cantons, such as Solothurn and Zürich, have universal suffrage; others, such as Bern and Basel-Stadt, have moderate censuses; while Genève still has an elitist, patrician government."

 bpm_amendment_the_federal_diet: "The Federal Diet"
 bpm_amendment_the_federal_diet_desc: "The Federal Diet (Tagsatzung) is the centuries-old parliament of the Swiss Confederation. Each delegate represents the ideology and interest of their canton, having one or half a vote. This often gives small and conservative cantons a disproportionate advantage."

