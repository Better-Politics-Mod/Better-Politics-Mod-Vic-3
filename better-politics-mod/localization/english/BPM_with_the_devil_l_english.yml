l_english:
  bpm_with_the_devil.0.f: "@warning! You are seeing this event because your [concept_bpm_state_exhaustion] is rapidly increasing. If you do nothing, the government #bold will#! be couped or a Revolution #bold will#! succeed when your [concept_bpm_state_capacity] reaches zero.\n@information! You can monitor the [concept_bpm_state_exhaustion] and [concept_bpm_state_capacity] in the #gold Cabinet#! tab of the #gold Politics#! screen."
  bpm_with_the_devil.se.2: "[concept_bpm_state_exhaustion] will be halved."


  bpm_with_the_devil.1.t: "Tranquility #italic ...#! for a Price"
  bpm_with_the_devil.1.d: "Various police forces across the country have proposed to help maintain order and suppress the growing dissent in the country. In return, they expect to be given free rein to perform secret operations, outside the law."
  bpm_with_the_devil.1.a: "Accept the deal"
  bpm_with_the_devil.1.b: "We have other options"