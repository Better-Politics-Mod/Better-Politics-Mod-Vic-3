 concept_bpm_springtime_revolutionary_disorder_events: "Revolutionary Disorder"
 concept_bpm_springtime_revolutionary_disorder_events_desc: "Revolutionary Disorder is a state of social chaos, lawlessness, and forced compensation and reparations carried out by @intelligentsia_bpm! #yellow Artisans#!, @trade_unions_bpm! #pink Proletarians#!, and @rural_folk_bpm! #green Peasants#!.\n\nBased on the [concept_bpm_springtime_revolutionary_drift], each of these groups causes various events and problems in different parts of the country at their discretion (and as opportunities arise), whether by destroying, burning, killing, forcing concessions and regulations, intimidating, and much more.\n\nTo combat Disorder, you must, for example, increase the [concept_investment_level] in [GetInstitutionType('institution_police').GetName] and [GetInstitutionType('institution_home_affairs').GetName], lower the [concept_bpm_springtime_revolutionary_drift], or use buttons in the #springtime $je_springtime_of_the_peoples$#! [concept_journal_entry].\n\nRevolutionary Disorder is most common for [Concept('concept_bpm_springtime_victim_of_the_revolution', 'Victims of the Revolution')] and during the [concept_bpm_springtime_revolution_phase]."

 bpm_springtime_frankfurt_elected: "The #yellow Frankfurt National Assembly#! has been elected"

 concept_bpm_springtime_wrath_of_the_revolution: "Wrath of the Revolution"
 concept_bpm_springtime_wrath_of_the_revolution_desc: "Wrath of the Revolution is the sum of the accumulated anger and pains of various social groups within the country; who, radicalized by [Concept('concept_agitator', 'Agitation')] and prevailing [Concept('concept_sol', 'Conditions')], are ready to spark another #springtime Revolution#! that will establish a [GetLawType('law_parliamentary_republic').GetName].\n\nWrath may appear if the average [concept_bpm_springtime_revolutionary_drift] is equal to or greater than #v 30#!; it can also be triggered by reactionary decisions of the [concept_government] or the [concept_ruler]. If Wrath is present in the [concept_country], and it has not entered the [concept_bpm_springtime_reform_phase] has not begun within 6 months, it will result in, for example, a political assassination, large demonstrations, or an uprising, after which the current system will be replaced by a [Concept('concept_bpm_springtime_child_of_the_revolution', 'Revolutionary State')] (immediately or after some time).\n\nThe appearance of Wrath of the Revolution also instills great fear among the @ig_reactionaries! @landowners_bpm! @petty_bourgeoisie_bpm! @armed_forces_bpm! #bold #purple Reactionaries#!#!, which will increase the growth of [concept_bpm_springtime_counterrevolutionary_preparadness] during the [concept_bpm_springtime_reaction_phase]. If it reaches #v 100%#! and the @ig_reactionaries! @landowners_bpm! @petty_bourgeoisie_bpm! @armed_forces_bpm! #bold #purple Reactionaries#!#! attempt to seize power and take control of the capital using the [concept_army], a major uprising will begin, initiating another #springtime Revolution#!.\n\nIf Wrath of the Revolution is stronger and has favorable conditions, in most cases it will prevail within a few days, the [concept_ruler] will flee, and a [GetLawType('law_parliamentary_republic').GetName] will be declared. However, if the Wrath is weaker than the attackers and conditions are not sufficiently favorable, the fighting will drag on for days and weeks, most likely ending in a devastating defeat for the @ig_radicals! @ig_socialists! #bold #pink Democrats#!#!. Wrath of the Revolution will perish in defence of recent achievements, giving you a last chance to enter the [concept_bpm_springtime_reform_phase]. The [concept_bpm_springtime_revolution_phase] will then begin and [Concept('concept_bpm_springtime_counterrevolutionary_preparadness', 'Preparadness')] will drop to #v 0%#!. The next time around, a truly autocratic [concept_government] will be established."

 concept_bpm_springtime_revolutionary_drift: "Revolutionary Drift" 
 concept_bpm_springtime_revolutionary_drift_desc: "Revolutionary Drift represents dedication and faith in the ideals and achievements of the #springtime Revolution#!. It also encompasses the ability and need of the [concept_lower_strata] to strive to force redress and secure concessions from the cowardly social elites.\n\nThree social groups — @intelligentsia_bpm! #yellow Artisans#!, @trade_unions_bpm! #pink Proletarians#!, and @rural_folk_bpm! #green Peasants#!  — have their own distinct as well as shared aspirations and expectations of the [Concept('concept_country', 'State')] and [Concept('concept_politician', 'Politicians')], which, however, often do not align with the aspirations of various [Concept('concept_bpm_ideological_ig', 'Ideological Groups')].\n\nFor example, @intelligentsia_bpm! #yellow Artisans#! want production and price controls, which may be supported by @ig_reactionaries! @landowners_bpm! @petty_bourgeoisie_bpm! @armed_forces_bpm! #bold #purple Reactionaries#!#! in contrast to most @ig_liberals! @ig_national_liberals! @ig_market_liberals! #bold #yellow Liberals#!#! and all @ig_radicals! @ig_socialists! #bold #pink Democrats#!#!.\n\nThey may therefore gravitate toward both #springtime Revolutionary#! and #purple Reactionary#! sides and values, which can lead to a drastic change in the rate of growth of [concept_bpm_springtime_counterrevolutionary_preparadness].\n\nIn the case of [Concept('concept_bpm_springtime_victim_of_the_revolution', 'Victims')], too high a Drift can lead to the emergence of [concept_bpm_springtime_wrath_of_the_revolution], and too low a Drift to a rapid [Concept('concept_bpm_springtime_counterrevolutionary_preparadness', 'Counterrevolution')]; in the case of [Concept('concept_bpm_springtime_child_of_the_revolution', 'Children of the Revolution')], too low a Drift will lead to a decline in legitimacy and the emergence of a dangerous and charismatic group or figure."

 bpm_springtime_of_the_peoples.21.t: "The Barricade Days"
 bpm_springtime_of_the_peoples.21.d_austria: "Today, on #gold May 28th#!, the latest fighting in our capital — #gold Wien#! — has come to an end, after the [concept_government] made several attempts to weaken the forces of the #springtime Revolution#!.\n\nEarlier, on #gold May 24th#!, the [GetBuildingType('building_university').GetName] was closed, which sparked student riots.\n\nThen, on #gold May 26th#!, the dissolution of the [GetAmendmentType('bpm_amendment_akademische_legion').GetName] was announced; its members, together with workers and the petty bourgeoisie, began defending and building barricades and engaging in street battles with the [concept_army] for the next two days.\n\nWe had to end our activities, while at the same time allowing for the formation of a revolutionary ‘#yellow Security Committee#!’, which effectively has taken control of the capital for the moment.\n\nOn #gold May 26th#!, a ‘#pink Workers’ Committee#!’ was also formed, whose aim is to improve the lot of the proletariat."
 bpm_springtime_of_the_peoples.21.d_europe: "Today, the latest fighting in our capital — #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#! — has come to an end, after the [concept_government] made several attempts to weaken the forces of the #springtime Revolution#!.\n\nEarlier, a few days earlier, the [Concept('concept_capital_state', 'Capital')] [GetBuildingType('building_university').GetName] was closed, which sparked student riots.\n\nThen, two days later, news broke of the disarmament of civilians and plans to disband the [GetLawType('law_national_guard').GetName]; its members, together with workers and the petty bourgeoisie, began defending and building barricades and engaging in street battles with the [concept_army] for the next two days.\n\nWe had to end our activities, while at the same time allowing for the formation of a revolutionary #yellow Committee#!, which effectively has taken control of the capital for the moment.\n\nBefore the street fighting begun, a ‘#pink Workers’ Committee#!’ was formed, whose aim is to improve the lot of the proletariat."
 bpm_springtime_of_the_peoples.21.f: "Ill-advised statecraft has kept the peoples of Austria apart, they must now come together as brothers and increase their strength through unity.\n\n— Adolf Fischhof, March 13th 1848" # Today we have a serious mission to fulfil. We must take heart, be decisive and hold out bravely. # Those who have no courage on this day belong in the political nursery (...) # In this way the weakness of one nationality will find compensation in the virtues of another and the merits of all will be intensified through being united.
 bpm_springtime_of_the_peoples.21.a: "Dammit!"
