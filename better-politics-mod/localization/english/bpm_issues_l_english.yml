  bpm_issue_sol_name: "Increasing the [Concept('concept_sol', 'SoL')]"
  bpm_issue_sol_tooltip: "#tooltip_header Increasing the [concept_sol]#!\n$TOOLTIP_DELIMITER$\nRelevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest')|%v0] to the electorate:\n#yellow;bold Workers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_workers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_workers_weight')|%v0].\n#yellow;bold Professionals#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_professionals')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_professionals_weight')|%v0].\n#yellow;bold Peasantry#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_peasantry')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_peasantry_weight')|%v0].\n#yellow;bold Soldiers#!: Relevance of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_soldiers')|%v0] with electorate share of [GetPlayer.MakeScope.ScriptValue('bpm_issue_sol_interest_soldiers_weight')|%v0]."
  bpm_issue_sol_attack_flavor: "#italic “Poverty, and the wretchedness and human degradation which always follows in its camp, will be as remote to the people of this country as the wolves which once infested its forests.” ー Lloyd George#!"
  bpm_issue_sol_progressbar_tooltip: "#tooltip_header Increasing the [concept_sol]#!\n$TOOLTIP_DELIMITER$\nThe [concept_sol] progress bar tracks the progress of the ruling party in increasing the [concept_sol] of the population. Every increase from the start by #v 0.25#! provides one point. The [Concept('concept_sol', 'SoL')] before the [concept_election] was [GetPlayer.MakeScope.Var('bpm_electoral_mandate_sol_baseline_sol').GetValue|v1]."

