 je_bpm_reactionary_agitation_desc: "Modern politics no longer relies on backroom deals between individuals or small groups.\n\nNow, everything is orchestrated by large organizations and associations through their own or affiliated newspapers, which then form the entity that is often a [Concept('concept_party', 'Political Party')].\n\nThey garner broad support among the [Concept('concept_middle_strata', 'Middle')] and [concept_lower_strata], who, involved in politics and conspiracies, give great support and strength to their [Concept('concept_politician', 'Politicians')], who then destroy everything that is natural and eternal and lie to their supporters. Moreover, none of these organizations has even a shred of love for the homeland or patriotism, loving instead some other, terrible ideals that supposedly stand above everything.\n\nWe must therefore begin to create our own associations.\n\nHowever, this would be to no avail if these associations did nothing beyond organizing the community. They must, therefore, organize beautiful parades; display patriotic insignia and signal to everyone the importance of the homeland; show just how destructive those [Concept('concept_bpm_ig_is_republican', 'Reds')] in the [Concept('concept_capital_state', 'Capital')] are; and demonstrate great Christian love for the [GetPopType('laborers').GetName] and [GetPopType('peasants').GetName]. Only then will the #springtime Revolution#! see our strength."
 
 je_bpm_reactionary_newspapers_name: "#bold #purple Reactionary Journalism#!#!"
 je_bpm_reactionary_newspapers_desc: "With the onset of the tragic #springtime Revolution#! in our homeland, interest in public and political life has also surged dramatically.\n\nAcross the [concept_country], tens of thousands, perhaps even hundreds of thousands, of readers are learning about the world and life, and their hearts and minds are being won over by newspapers.\n\nNewspapers are thus a wonderful invention through which one can reach the minds of many people; many people, such as [GetPopType('laborers').GetName] and [GetPopType('peasants').GetName], who, despairing of their own misery, will gladly join those who, with Heart and God in mind, will strive to ensure them a dignified life.\n\nWe must therefore establish a newspaper which, thanks to the funds of various [GetPopType('aristocrats').GetName], will be capable of fighting the #springtime Revolution#!.\n\nForward with God for the [SCOPE.sCountry('je_bpm_our_ruler_king_president').GetRuler.GetPrimaryRoleTitle] and the Fatherland!"

 bpm_springtime_counter_revolution.6.t: "A New Player"
 bpm_springtime_counter_revolution.6.d: "A new newspaper has appeared, backed by what many consider a terrifyingly large amount of capital and funding.\n\nIt is the ‘#yellow New [SCOPE.sCountry('bpm_our_capital').GetAdjectiveNoFormatting] Newspaper#!’.\n\nFueled by the generous funds of [GetPopType('aristocrats').GetName] fearful for the security of their estates, and under the motto ‘#gold Forward with God for the [SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle] and the Fatherland!#!’, it strives for true freedom and progress, love of the fatherland, and peace without #springtime Revolution#!.\n\nIt is, above all, a newspaper of the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant], hostile to both bureaucratic absolutism and radical democracy." # 
 bpm_springtime_counter_revolution.6.a: "A successful hit!"

 bpm_springtime_counter_revolution.7.t: "Patriotic Associations"
 bpm_springtime_counter_revolution.7.d: "In various parts of our homeland, especially in rural areas, patriotic and benevolent associations are springing up.\n\nWhether they are ‘#Yellow Homeland Associations#!’, ‘#yellow [SCOPE.sCountry('bpm_our_capital').GetAdjectiveNoFormatting] Associations#!’, or ‘#yellow Associations for [SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle] and Fatherland#!’, they are composed of distinguished and benevolent [GetPopType('aristocrats').GetName] and [GetPopType('officers').GetName].\n\nNot only do they expose to the people the evils sown by the [concept_government], but they also generously reward loyalty and promote patriotism. Certainly, thousands have already joined them."
 bpm_springtime_counter_revolution.7.a: "Welcome, welcome!"
 
 bpm_springtime_new_country_news: "Golden Age of the Reactionary Journalism"
 bpm_springtime_patriotic_associations: "Patriotic Associations"

 ideology_dop_tactical_democrat: "Tactical Democrat"
 ideology_dop_tactical_democrat_desc: "Cynically or sincerely, this group believes that the hopeless masses should be allowed to vote within a limited parliamentary system, all in order to weaken hostile liberal forces."

 je_bpm_reactionary_agitation_name: "#bold #purple Patriotic Associations#!#!"
 je_bpm_junker_parliament_name: "#bold #purple Welfare Advancement#!#!"
 je_bpm_junker_parliament_desc: "The final cherry on top of our organizational preparations and our entry into modern politics will be a distinguished association that will fight the new order with its own weapons.\n\nIt shall be dedicated to building the strongest possible support and defining the [GetInterestGroupVariant('ig_reactionaries',GetPlayer).GetNameWithCountryVariant] stance toward the current state of affairs, as well as the [concept_government]’s policies. It shall be called the ‘#yellow Association for the Protection of Property and the Advancement of the Welfare of All Classes#!’.\n\nComposed of the most distinguished figures and statesmen, [GetPopType('aristocrats').GetName], [GetPopType('bureaucrats').GetName], and other men of good standing, it shall coordinate and direct our policy, court public opinion, and lead the fight against [Concept('concept_bpm_constitutional_level', 'Constitutionalism')].\n\nIn its most prominent forms, its members will surely debate, discuss, make decisions, and vote, as well as establish committees and agree on common legislative goals, in order to rally people around them, primarily from cities such as [GetPopType('laborers').GetName] and [GetPopType('shopkeepers').GetName]. The #springtime Revolution#! will soon be defeated!"

 bpm_springtime_counter_revolution.8.t: "The Landowner Parliament"
 bpm_springtime_counter_revolution.8.d: "The ‘#yellow Association for the Protection of Property and the Advancement of the Welfare of All Classes#!’ was founded today, with the aim of promoting political development and safeguarding the interests and well-being of society.\n\nSoon after, its members decided on the association’s platform, which declares a willingness to outbid parliamentarianism in order to gain the support of the lower classes; speaks of the need for economic reforms and local autonomy vis-à-vis the crown; and calls on the [GetPopType('aristocrats').GetName] to protect the weak and oppressed, while proclaiming the virtues of loyalty and obedience."
 bpm_springtime_counter_revolution.8.f: "If this honorable assembly shares my views, we will refrain from all political dispute and thus avoid conflicts leading to disunion. Material interests have a significance outweighing all others, and by pursuing them we will always be on firm ground. Let us exert all our energies to advance these interests. If we are successful, we can count on the approval of the broad masses of the population and of all propertied groups. Let us work toward our goal harmoniously, actively, wisely, and boldly.\n\n— Ernst von Bülow-Cummerow, August 1848"
 bpm_springtime_counter_revolution.8.a: "Soon it all will end well."

 je_bpm_win_over_peasants_name: "#bold #purple Gain Peasant Support#!#!"
 je_bpm_win_over_peasants_desc: "Although eternal principles — with the [SCOPE.sCountry('je_bpm_our_ruler_king_president').GetRuler.GetPrimaryRoleTitle] and God at the helm — come naturally to the [GetPopType('peasants').GetName], many of them still do not feel sufficiently attached to these values to avoid causing [concept_bpm_springtime_revolutionary_disorder_events] and problems for the [GetPopType('aristocrats').GetName].\n\nFurthermore, there are those who are active in organizations and cells of the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant], thereby harming their homeland.\n\nNaturally, they seek solutions to their problems and past grievances, but through their actions and disloyalty, they harm everyone — and above all, themselves.\n\nWe must therefore promise the [GetPopType('peasants').GetName] and show them that standing with us is necessary to swiftly and properly eliminate the remnants of feudalism."

 je_bpm_win_over_artisans_name: "#bold #purple Gain Artisanal Support#!#!"
 je_bpm_win_over_artisans_desc: "The artisan, whether rural or urban, suffers terribly.\n\nWorn down and starved by [Concept('concept_building', 'Industrialization')], deprived of [Concept('concept_unemployed', 'Work')] and freedom, he languishes on the streets and in his own home, trying to earn whatever he can just to avoid being lost to history. On top of that, he lacks the bread to [Concept('concept_starvation', 'Feed')] even his own children.\n\nOnce, in their majesty, the #yellow Guilds#! existed; with strict regulations on [concept_good_production], [Concept('concept_market_price', 'Prices')], [Concept('concept_building_wage', 'Wages')], and quality, they ensured equality and a dignified life for all residents, training them in the spirit of patriotism and dedication to quality.\n\nAnd what now? Now most guilds in Europe have died out after being outlawed, or have been severely weakened by the reforms of anarchic freedom carried out by states or individuals.\n\nWe must ensure they have everything they deserve, and this can be done through a simple promise to legally restore the #yellow Guilds#! for them, as well as promises regarding safe work, life, and political and social rights — rights that so many are suppressing today, though promising them beforehand!"

 je_bpm_win_over_proletarians_name: "#bold #purple Gain Proletarian Support#!#!"
 je_bpm_win_over_proletarians_desc: "Members of the working class, the so-called proletariat, suffer the most of all the inhabitants of our [concept_country].\n\nThough deprived of the right to vote by the [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant], constantly oppressed directly or indirectly by members of the Bourgeoisie and treacherous [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant], living on the margins in [concept_starvation], practically fighting for food and survival, they still stand close to the #springtime Revolution#! and support its achievements.\n\nThe #springtime Revolution#!, one that devours its own children for the sake of the ideals of freedom, taking away their limbs and any chance of improving their [concept_sol] through dreadful [Concept('concept_good', 'Machines')].\n\nThough we consider [Concept('concept_building', 'Industrialization')] a terrible sin, it is not these Proletarians who sin by being forced to work in factories — thus becoming victims — but rather the vile and greedy [GetPopType('capitalists').GetName].\n\nWe must support the workers so as to improve their lot, while promising them the right to form unions and strike, so that they may fight against their oppressors."

 bpm_springtime_we_promise_reductions: "@information! In order to gain the support of the @rural_folk_bpm! #green Peasants#! and reduce their [concept_bpm_springtime_revolutionary_drift], we will promise to abolish the [GetAmendmentType('bpm_amendment_noble_police_privilages').GetName] and some of [GetAmendmentType('bpm_amendment_peasant_taxes').GetName] #springtime Privileges#! ([Concept('concept_amendment', 'Amendments')]) shortly after a successful [Concept('concept_bpm_springtime_counterrevolutionary_preparadness', 'Counterrevolution')]."
 bpm_springtime_we_promise_reductions_artisans: "@information! In order to gain the support of the @intelligentsia_bpm! #yellow Artisans#! and reduce their [concept_bpm_springtime_revolutionary_drift], we will promise to bring back the [GetAmendmentType('bpm_amendment_the_guild_system').GetName] ([Concept('concept_amendment', 'Amendment')]) shortly after a successful [Concept('concept_bpm_springtime_counterrevolutionary_preparadness', 'Counterrevolution')]."

 bpm_springtime_we_promise_reductions_proletarian: "@information! In order to gain the support of the @trade_unions_bpm! #pink Proletarians#! and reduce their [concept_bpm_springtime_revolutionary_drift], we will promise to make [GetLawType('law_right_to_associate').GetName] ([concept_law]) shortly after a successful [Concept('concept_bpm_springtime_counterrevolutionary_preparadness', 'Counterrevolution')]."

