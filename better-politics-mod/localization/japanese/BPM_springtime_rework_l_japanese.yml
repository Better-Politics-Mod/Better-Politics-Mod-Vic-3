 je_italia_fara_de_se: "L'Italia Farà da Se!" # 
 je_italia_fara_de_se_reason: "Italia has freed herself from the yoke of foreign powers. She has succeeded, contrary to what the world wanted and believed. Now, thanks to these marvelous circumstances, the time has come for the Italian people to gather in #gold Florence#! in a single, grandeous #yellow National Assembly#! — one that will unite this chaos into a single beauty. Despite internal differences and factionalism. Despite the specter of Revolution looming over us all. The fate of all of Italia rests in #gold Palazzo Vecchio#!.\n\n#bold Factional composition of the #P Italian#! #v National#! #red Assembly#!#!:\n@ig_conservatives! #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_springtime_conconf_description_tooltip #conconf Con. Confederationists#!#!#!: #v [GetGlobalVariable('bpm_springtime_florence_conconf_seats').GetValue|0] deputies#! (#lore #bold [GetGlobalVariable('bpm_florence_parliament_conconf_percent').GetValue|%]#!#!)\n@ig_market_liberals! #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_springtime_libconf_description_tooltip #libconf Lib. Confederationists#!#!#!: #v [GetGlobalVariable('bpm_springtime_florence_libconf_seats').GetValue|0] deputies#! (#lore #bold [GetGlobalVariable('bpm_florence_parliament_libconf_percent').GetValue|%]#!#!)\n@ig_liberals! #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_springtime_gradualists_description_tooltip #gradualist Gradualists#!#!#!: #v [GetGlobalVariable('bpm_springtime_florence_gradualist_seats').GetValue|0] deputies#! (#lore #bold [GetGlobalVariable('bpm_florence_parliament_gradualist_percent').GetValue|%]#!#!)\n@ig_national_liberals! #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_springtime_supreme_liberals_description_tooltip #supremelib Supreme Liberals#!#!#!: #v [GetGlobalVariable('bpm_springtime_florence_supremelibs_seats').GetValue|0] deputies#! (#lore #bold [GetGlobalVariable('bpm_florence_parliament_supreme_liberals_percent').GetValue|%]#!#!)\n@ig_radicals! #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_springtime_mazzinianists_description_tooltip #mazzinianist Mazzinianists#!#!#!: #v [GetGlobalVariable('bpm_springtime_florence_mazzinianists_seats').GetValue|0] deputies#! (#lore #bold [GetGlobalVariable('bpm_florence_parliament_democrats_percent').GetValue|%]#!#!)\n@ig_socialists! #bold #tooltippable;tooltip:[Country.GetTooltipTag],je_bpm_springtime_pisacanians_description_tooltip #piscanian Pisacanians#!#!#!: #v [GetGlobalVariable('bpm_springtime_florence_piscanians').GetValue|0] deputies#! (#lore #bold [GetGlobalVariable('bpm_florence_parliament_pisacanians_percent').GetValue|%]#!#!)\n\nOverall: #v [GetGlobalVariable('bpm_springtime_italy_florence_total_seats').GetValue|0]#! #bold #yellow distinguished gentlemen#!#!.\n\n#YB #L Parliamentary and National Unity#!#! may increase and decrease depending on the decisions made by Assembly and concillatory efforts of its factions. The progress and speed of drafting and debating bills depend on it; and on whether the Assembly will be able to withstand internal clashes with other opinions.\n\nA decline in this #YB #L Unity#!#!, excessive conservatism, and [Concept('concept_radical', 'Radicals')] will lead to a rise in @ig_radicals! @ig_socialists! #PB #L Democrats’ Discontent#!#! — which will inevetibly lead to a #springtime Revolution#!!\n\n#lore The poets dreamed that immortal fairies would wash away the wrinkles of old age from their faces with the ablutions and baths of miraculous waters, so that they would emerge from the magical river beautiful with renewed youth. May Italy, our beloved land, do the same.\n\n— Emilo Brioglio, September 27th 1848#!" # \n\n\n@ig_national_liberals! #supremelib Democratic Federalists#!: #v [GetGlobalVariable('bpm_springtime_florence_democratic_federalists').GetValue|0] deputies#! (#lore #bold [GetGlobalVariable('bpm_florence_parliament_demfeds_percent').GetValue|%]#!#!)\n\nConfedertationists: #v [GetGlobalVariable('bpm_springtime_florence_confederalist_seats').GetValue|0] deputies#!\nFederalists: #v [GetGlobalVariable('bpm_springtime_florence_federalist_seats').GetValue|0] deputies#!\nUnitarians: #v [GetGlobalVariable('bpm_springtime_florence_unitarian_seats').GetValue|0] deputies#!\n\n\n Territorial Committee Confeds: #v [GetGlobalVariable('bpm_springtime_florence_territorial_committee_confeds').GetValue|0]#!\nTerritorial Committee Feds: #v [GetGlobalVariable('bpm_springtime_florence_territorial_committee_feds').GetValue|0]#!\n\n\n#bold Current Parliamentary Composition#!\n\n[Country.MakeScope.ScriptValue('bpm_springtime_italian_total_population')|+0=]\n[Country.MakeScope.ScriptValue('bpm_springtime_seats_counter')|+0=]\n[Country.MakeScope.ScriptValue('bpm_springtime_con_confederalists_seats')|0]\n[Country.MakeScope.ScriptValue('bpm_springtime_lib_confederalists_seats')|0]\n[Country.MakeScope.ScriptValue('bpm_springtime_gradualists_seats')|0]\n[Country.MakeScope.ScriptValue('bpm_springtime_supremelibs_seats')|0]\n\n\nSeats controlled by the #pink Left#!: [GetGlobalVariable('bpm_frankfurt_parliament_left_percent').GetValue|%]\nSeats controlled by the #yellow Center#!: [GetGlobalVariable('bpm_frankfurt_parliament_center_percent').GetValue|%]\nSeats controlled by the #blue Right#!: [GetGlobalVariable('bpm_frankfurt_parliament_right_percent').GetValue|%]\n\n\nSardinian [GetGlobalVariable('bpm_springtime_sardinian_sardinian_total_seats').GetValue|0] deputies\nAnti-Sardinian [GetGlobalVariable('bpm_springtime_anti_sardinian_total_seats').GetValue|0] deputies\n\nIn order to unify Italy, the #P Italian#! #v National#! #red Assembly#! must enact the necessary and appropriate laws, as well as a Constitution.

 bpm_florence_italy_countries_united: "The #bold #P Italian#! #v National#! #red Assembly#!#! has completed the [Concept('concept_bpm_constitutional_level', 'Constitution')] and the [Concept('concept_unification_candidate', 'Crown Candidate')] has recognized it"

 BPM_VALUE_FROM_NUMBER_OF_LAWS_AND_REFORMS_PASSED: "number of [Concept('concept_law', 'Laws')] and #bold #blue Reforms#!#! passed"

 bpm_springtime_italian_unification.18.t: "Future National Electoral Suffrage"
 bpm_springtime_italian_unification.18.d: "Another important issue that the #bold #P Italian#! #v National#! #red Assembly#!#! must address is the future electoral [concept_law].\n\nGenerally speaking, this is a topic divided between supporters of the [GetLawType('law_landed_voting').GetName], [GetLawType('law_wealth_voting').GetName] and [GetLawType('law_universal_suffrage').GetName], with smaller groups supporting the [GetLawType('law_census_voting').GetName].\n\nIn addition, there is the question of whether voting should be for electors or direct.\n\nIn the coming weeks, the assembly will discuss those matters."
 bpm_springtime_italian_unification.18.f: "We built Italy; now we need to build the Italian people.\n\n— Massimo Taparelli d'Azeglio, allegedly"
 bpm_springtime_italian_unification.18.a: "Very well."

 BPM_VALUE_FROM_COUNTRIES_IN_REVOLUTION_PHASE: "[Concept('concept_country', 'Countries')] in the [concept_bpm_springtime_revolution_phase]"
