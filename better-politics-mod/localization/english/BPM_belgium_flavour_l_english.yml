 bpm_belgian_historical_events.6.t: "Liberal Split in Brussels and the Liberal Association"
 bpm_belgian_historical_events.6.d: "Due to growing republican and pro-welfare tendencies among members of the ‘#L radical#!’ faction — composed of some [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] and [GetInterestGroupVariant('ig_socialists',GetPlayer).GetNameWithCountryVariant] — the prominent politician [SCOPE.sCharacter('bpm_verheagen_scope').GetLastName], and his supporters, formed the ‘L'Association libérale de Bruxelles’ both to follow up on the #yellow Liberal Congress#! and to distance himself from the l'Alliance.\n\nThe association complies with the Congress resolution, but remaining silent on education. It has also established an administrative committee for supervisory purposes.\n\n[SCOPE.sCharacter('bpm_eugene_defacqz_scope').GetLastName], leader of the #gold Société de l'Alliance#!, soon wrote a letter defending the ‘#L Radicals#!’, which, however, began to sink him."
 bpm_belgian_historical_events.6.f: "The main issue, the only one on which all shades of liberalism could agree, seems to have been removed from the agenda. It has been replaced by social and humanitarian issues. We will not compromise on principles.\n\n— Pierre-Théodore Verhaegen, October 28th 1846"
 bpm_belgian_historical_events.6.a: "From anti-Belgian enlightened absolutists to constitutional liberals..."

