# Radicals
 ig_demokraten: "Demokraten"
 ig_demokraten_desc: "The Demokraten are the most radical wing of German liberals and staunchly oppose Metternich's lingering influence on the German political sphere, like the Karlsbad Decrees. Being radical democrats, they advocate for the abolition of the monarchy entirely and the establishment of a greater German unitary state. Progressive social reforms are key parts of their agenda as well, extending their ambitions to the lower-classes."

 ig_demokraten_post: "Demokraten"
 ig_demokraten_post_desc: "$ig_social_liberals_desc$"

 ig_sozialliberale: "Sozialliberale"
 ig_sozialliberale_desc: "$ig_social_liberals_desc$"

# Liberals
 ig_parlamentarisch_liberale: "Parlamentarisch-Liberale"
 ig_parlamentarisch_liberale_desc: "The Parlamentarisch-Liberale are the moderate wing of German liberals. Unlike their constitutionalist counterparts, the parliamentary liberals support a solely ceremonial monarch as head of a German federation of princes. Both greater and lesser German stances have found their way into the faction, leaving the parliamentary liberals divided on the issue."

 ig_linksliberale: "Linksliberale"
 ig_linksliberale_desc: "$ig_moderate_liberals_desc$"

# National Liberals
 ig_konstitutionell_liberale: "Konstitutionell-Liberale"
 ig_konstitutionell_liberale_desc: "The Konstitutionell-Liberale are the right wing of German liberals. They support a lesser German federation of princes, under a constitutionalist monarch. Beyond constitutionalism, their primary aim is securing political freedoms across Germany."

 ig_nationalliberale: "Nationalliberale"
 ig_nationalliberale_desc: "$ig_national_liberals_desc$"

