je_addressing_grunderkrach_reason: "The aftermath of the Gründerkrach has left our domestic industries in a vulnerable state. Both industrialists and agrarians demand the introduction of $CONCEPT_IMPORT$ [Concept('concept_tariffs','$concept_tariffs$')] to stabilise the domestic market. Apart from the benefit of appeasing Big Business and aiding our Junker friends, the introduced tariffs should fill the state treasurey nicely."

