 bpm_amendment_corporate_control_over_production: "Corporate Control over Production"
 bpm_amendment_corporate_control_over_production_desc: "Regulations governing output and discriminatory taxation of industrial enterprises perpetuate the status quo of the past."

 BPM_VALUE_FROM_PRO_GUILD_AMENDMENTS: "pro-#bold Guild System#! [Concept('concept_amendment', 'Amendments')] (#italic the more Amendments the more inclined they will be towards total opposites#!)"

 bpm_amendment_trade_exercisment_regulations: "Regulations Governing the Exercise of a Profession"
 bpm_amendment_trade_exercisment_regulations_desc: "To exercise a trade independently, one must demonstrate qualifications in that profession, certified by a guild or a state examining commission. A person who passes the exam becomes a member of the guild; master craftsmen who are not members of the guild must either join one within a specified period or cease practicing their profession. Furthermore, the training of journeymen and apprentices is regulated by the guilds."

 

 bpm_amendment_land_transfers: "Land Ownership Transfers"
 bpm_amendment_land_transfers_desc: "Following hundreds of incidents of peasant rebellion, many aristocrats, out of fear, began to give away land for free or at low prices, dividing and distributing it in moderation."

 
