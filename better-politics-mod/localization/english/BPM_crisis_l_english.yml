l_english:
  bpm_state_crisis.1.t: "Crisis!"
  bpm_state_crisis.1.d: "The traditional institutions of the state are under threat. Every [Concept('concept_interest_group', 'Interest Group')] loyal to the state has agreed to work together to protect the current institutions from radicals. They will support extreme measures to ensure the survival of the state."
  bpm_state_crisis.1.f: "“To defend the oppressed against their oppressors, to plead the cause of the weak against the strong who exploit and crush them, this is the duty of all hearts that have not been spoiled by egoism and corruption.” - Maximilien Robespierre" 
  bpm_state_crisis.1.a: "L'État, c'est moi!"
  bpm_state_crisis.1.b: "The State is the People!"

  je_bpm_crisis_of_the_state: "A Crisis of the State"
  je_bpm_crisis_of_the_state_desc: "The State is threatened by radicals."
  je_bpm_crisis_of_the_state_reason: "All [Concept('concept_interest_group', 'Interest Groups')] loyal to the state have agreed to work together to protect the current institutions from the rising threat of radicals."
  bpm_extremist_tt: "Interest Group is Extremist"
  bpm_crisis_movement_radicalism: "Turned a Blind Eye to Radicalism"
  bpm_crisis_movement_crackdown: "Crackdown on Radicals"
  je_bpm_crisis_of_the_state_goal: "The above conditions have been maintained for 6 months."

  je_bpm_constitutional_restrictions: "Legal Restrictions"
  je_bpm_constitutional_restrictions_desc: "The [GetPlayer.GetRuler.GetPrimaryRoleTitle] has too much power."
  je_bpm_constitutional_restrictions_reason: "Most Interest Groups in our nation are in agreement that the [Country.GetRuler.GetPrimaryRoleTitle] has too much power. They are willing to support legal measures to limit the power of the [Country.GetRuler.GetPrimaryRoleTitle]. However the [Country.GetRuler.GetPrimaryRoleTitle] is not willing to give up power easily.\n\nIf we can convince the [Country.GetRuler.GetPrimaryRoleTitle] to give up some power, we can more easily enact our agendas. The [Country.GetRuler.GetPrimaryRoleTitle] can be convinced if there is a threatening revolution or a strong movement against [Country.GetRuler.GetHerHim]."
  bpm_the_eternal_ruler_mod: "The Eternal Ruler" # bug with spostrophe titles [GetPlayer.GetRuler.GetPrimaryRoleTitle]
  je_bpm_crises_government_scandal: "Government Scandal"
  je_bpm_crises_government_scandal_desc_low: "#bold Rumors are spreading.#!\n$je_bpm_crises_government_scandal_reason$"
  je_bpm_crises_government_scandal_desc_medium: "#bold The press has caught wind of the rumors.#!\n$je_bpm_crises_government_scandal_reason$"
  je_bpm_crises_government_scandal_desc_high: "#bold The scandal has erupted in full force.#!\n$je_bpm_crises_government_scandal_reason$"

  je_bpm_crises_government_scandal_reason: "Some unsavory details about government officials have come to light, causing public outrage. Each week, the #crisis severity#! will increase by five until it reaches #v 100#!. The government must take action to restore public trust or face severe consequences."

  je_bpm_crises_government_scandal_end_party_left_tt: "A New Government has Come to Power"

  bpm_crisis_scandal_scandal_in_the_press: "Scandal"

  bpm_scandal_events.1.t: "Allegations of Corruption Surface"
  bpm_scandal_events.1.d: "Reports have emerged suggesting that several high-ranking officials may have been involved in corrupt activities including bribes. The public is demanding transparency and accountability.\n@information! You may track this #crisis Crisis#! in the #crisis Crisis Monitor#!."
  bpm_scandal_events.1.f: "“We have the best government that money can buy.” ー Mark Twain"
  bpm_scandal_events.1.a: "Nonsense!"
  bpm_scandal_events.1.b: "Perhaps we should investigate."


  bpm_scandal_events.2.t: "Romantic Affair Comes to Light"
  bpm_scandal_events.2.d: "A prominent government figure has been implicated in a romantic scandal that has captured the public's attention. The media frenzy is making it difficult for the government to focus on its duties.\n@information! You may track this #crisis Crisis#! in the #crisis Crisis Monitor#!."
  bpm_scandal_events.2.f: "“The only way to get rid of a temptation is to yield to it.” ー Oscar Wilde"
  bpm_scandal_events.2.a: "This is a private matter!"
  bpm_scandal_events.2.b: "We must address this head-on."


  bpm_scandal_events.3.t: "Rumors of Cheating at Baccarat"
  bpm_scandal_events.3.d: "A scandal has erupted involving a government official caught cheating at a high-stakes baccarat game at a house party. The incident has raised questions about the integrity of those in power.\n@information! You may track this #crisis Crisis#! in the #crisis Crisis Monitor#!."
  bpm_scandal_events.3.f: "“He has committed a mortal offence. Society can know him no more” ー The Times (yes this is real and actually happened)"
  bpm_scandal_events.3.a: "Gambling is a personal choice!"
  bpm_scandal_events.3.b: "This could damage our reputation."


  bpm_scandal_events.4.t: "Foreign Influence Exposed"
  bpm_scandal_events.4.d: "It has come to light that certain government officials may have been unduly influenced by foreign entities, raising concerns about their service to the nation.\n@information! You may track this #crisis Crisis#! in the #crisis Crisis Monitor#!."
  bpm_scandal_events.4.f: "“When it is a question of money, everybody is of the same religion.” ー Voltaire"
  bpm_scandal_events.4.a: "These are baseless accusations!"
  bpm_scandal_events.4.b: "We must protect our sovereignty!"

  bpm_scandal_events.5.t: "To the Wolves!"
  bpm_scandal_events.5.f: "In the little world in which children have their existence whosoever brings them up, there is nothing so finely perceived and so finely felt, as injustice.” ー Charles Dickens"
  bpm_scandal_events.5.d: "We can manufacture a scapegoat to take the fall for this scandal. By diverting public anger towards a single individual, we can protect the rest of the government from scrutiny."
  bpm_scandal_events.5.a: "[SCOPE.gsInterestGroup('selected_ig1').GetName] will be blamed!"
  bpm_scandal_events.5.b: "Perhaps it should be [SCOPE.gsInterestGroup('selected_ig2').GetName]."
  bpm_scandal_events.5.c: "[SCOPE.gsInterestGroup('selected_ig3').GetName] is a convenient target!"


  bpm_scandal_response_distract: "Distract"
  bpm_scandal_response_distract_desc: "There are other things that desire our ungrateful public's attention. Let's divert them from this so-called scandal to the things in question."
  bpm_end_the_crisis_tt: "The Scandal subsides."
  bpm_crisis_progresses_tt: "The Scandal worsens."
  bpm_scandal_response_distract_effect_tooltip: "Reduces Media Preparedness by #v 20#!"
  bpm_scandal_response_distract_possible_tooltip: "Media Preparedness is at least #v 20#!"
  je_bpm_crises_government_scandal_end_resolved_tt: "The Scandal has been Resolved"

  bpm_scandal_response_cover_up_possible_tooltip: "Political Preparedness is at least #v 20#!"
  bpm_scandal_response_cover_up_possible_tooltip_2: "Has Minister of Culture"
  bpm_scandal_response_cover_up_possible_tooltip_3: "Scandal Progress is below #v 50#!"
  bpm_scandal_response_cover_up_effect_tooltip: "Reduces Political Preparedness by #v 20#!"

  bpm_scandal_response_scapegoat: "Scapegoat"
  bpm_scandal_response_scapegoat_desc: "Not all of us are responsible for that, surely. Let us make the public think that, offering them a scapegoat to tear down in recompense.

  bpm_scandal_response_cover_up: "Cover Up"
  bpm_scandal_response_cover_up_desc: "We need to cover up the details of this scandal before it blows up even further!"

  bpm_scandal_response_admit_failure: "Admit Failure"
  bpm_scandal_response_admit_failure_desc: "Perhaps this scandal has merit. We will take the blame for it - after all, that will allow us to frame our failures in a more positive light than if it was framed exclusively by our detractors."

  bpm_ig_government_admission_of_failure_happiness: "Admitted Failure"
  bpm_ig_government_scapegoated_ig: "Scapegoated IG"

  bpm_country_has_rising_extremist_during_crisis: "Another #crisis Crisis#! has over #v 50#! progress"
  bpm_country_has_devastating_war: "War with over #v 0.1%#! of the population as casualties"
  je_bpm_crises_rising_extremism: "Rising Extremism"
  bpm_country_extremist_exist_or_would_spawn: "There are #v 1#! or more extremist [concept_interest_group], or Fascists and Communists can spawn in the country"

  bpm_rise_of_extremism: "#crisis Rising Extremism#!"
  ORG_TREND_RISING_EXTREMISM: "$bpm_rise_of_extremism$"
  bpm_extremism_response_crackdown: "Crackdown"
  bpm_extremism_response_crackdown_desc: "The rise of extremism is a threat to the stability of our nation. We must take decisive action to crack down on extremist groups and prevent them from gaining more influence."
  bpm_crisis_extremism_extremist_boost: "Increased support for Extremist [concept_interest_group]"

 ##### Powerful Underworld
  bpm_crisis_rigidity_penalty: "Opted Out of a Crisis"

  bpm_powerful_underworld_events.1.t: "Reports on Violent Banditry"
  bpm_powerful_underworld_events.1.d: "The frequency of successful robberies, thefts, and murders have risen dramatically with the increased presence of an emboldened corp of bandit gangs prowling the countryside of [SCOPE.sState('bpm_crisis_pu_targeted_state').GetName].\n\nThe people find themselves growing increasingly fearful as they bear witness to the failures of [GetInstitutionType('institution_police').GetName] and guardsmen at controlling the situation, the cries and bloodshed echoing ever louder at every new incident. [Concept('concept_building', 'Industry')] and [concept_trade] interests have faltered at the news of shipments being robbed, and businessmen being kidnapped.\n\nAs fear roots deeper and deeper into the hearts of [SCOPE.sState('bpm_crisis_pu_targeted_state').GetName]’s citizens, the local media has written up a storm and all but appealed to the [concept_government] for a solution to this mess." # 
  bpm_powerful_underworld_events.1.f: "Your worst sin is that you have destroyed and betrayed yourself for nothing.\n\n— Fyodor Dostoevsky in ‘#italic Crime and Punishment#!’, 1866"
  bpm_powerful_underworld_events.1.a: "We'll see how it develops."

  bpm_powerful_underworld_events.2.t: "#crisis Powerful Underworld Crisis#!: All Off-board!"
  

  decree_reinforced_police: "Reinforce Police"
  

  
  bpm_crisis_can_be_tracked_tt: "@information! You may track the #crisis $je_bpm_crises_powerful_underworld$ Crisis#! in the #crisis Crisis Monitor#!."

  je_bpm_crises_powerful_underworld: "Powerful Underworld"
  je_bpm_crises_powerful_underworld_reason: "In the region of [SCOPE.sState('bpm_crisis_pu_targeted_state').GetName], due to our negligence — and perhaps also due to local corruption — a powerful criminal underworld has emerged, dominating every corner of the region. Various gangs terrorize the population and each other, posing a serious threat to the functioning of the economy, as well as to the lives and health of everyone living there. They also call into question the effectiveness and authority of the [concept_government].\n\nEvery week or every month, the #crisis Suppression Process#! will increase until it reaches #v 100%#!. During this #crisis Crisis#!, crime, assaults, and murders — as well as emerging opportunities, accusations, and resulting threats — may occur. As the #crisis Suppression Process#! increases, the activity and audacity of criminals will rise until it leads to their downfall, resulting in their flight and/or extermination."
  je_bpm_crises_powerful_underworld_desc: "...\n$TOOLTIP_DELIMITER$\n$je_bpm_crises_powerful_underworld_reason$"
 
  je_bpm_crises_border_skirmish: "Border Crisis
  je_bpm_crises_border_skirmish_desc: "Border skirmishes with [SCOPE.sCountry('border_skirmish_nation_scope').GetName] have broken out and threaten to ecscalate into a major conflict. The source of the conflict is conflicting claims over [SCOPE.sState('border_skirmish_state_scope').GetName]."
