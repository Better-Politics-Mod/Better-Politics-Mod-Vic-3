 Dorde: "Đorđe"
 Stratimirovic: "Stratimirović"
  
 bpm_springtime_of_the_peoples.36.t: "The Serbian May Assembly"
 bpm_springtime_of_the_peoples.36.d: "On #gold May 13th#!, a national assembly convened in #gold Sremski Karlovci#! to articulate the [GetCulture('serb').GetName] people’s stance on our policies.\n\nDuring the proceedings, various decisions were made that are openly hostile toward us: the election of [SCOPE.sCharacter('bpm_josif_raj').GetFullName] as Serbian Patriarch; the election of [SCOPE.sCharacter('bpm_dorde_stratimirovid').GetFullName] as leader (#yellow Vožd#!) of the nation; the appointment of delegates to the #yellow Slavic Congress#! in #gold Prague#!; and most importantly, the proclamation of the establishment of [GetCulture('serb').GetName] [SCOPE.sCountry('bpm_vojevodina').GetName], encompassing the territories of [SCOPE.sState('BPM_1848_wojwodina_state').GetName], [SCOPE.sState('BPM_1848_banat_state').GetName], and #yellow Syrmia#! under the leadership of [SCOPE.sCharacter('bpm_stevan_sup').GetFullName]; as well as the formation of an alliance with [SCOPE.sCountry('croatia_slavonia').GetName].\n\nTheir aspirations pose a threat to unity and our policies, so we must put them in their place, though it will not be easy."
 bpm_springtime_of_the_peoples.36.f: "Let Europe see, let the whole world see how brother goes to help brother...Let Europe see, let the whole world see how a brother helps his brother...\n\n— Stevan Šupljikac, December 15th 1848"
 
 bpm_springtime_serbia_vojivodina_is_a_tough_enemy: "@information! [SCOPE.sCountry('bpm_vojevodina').GetName] will be a tough opponent to defeat due to the strongly militarized nature of the region (#yellow $bpm_springtime_the_granicari$#! [concept_modifier])."
 bpm_springtime_serbia_vojivodina_may_receive_support_from_serbia: "@warning! [SCOPE.sCountry('bpm_vojevodina').GetName] may be able to receive support from [SCOPE.sCountry('bpm_serbia').GetName]!"
 bpm_springtime_of_the_peoples.36.a: "Hungarian citizens revolting against Hungary..."
 bpm_springtime_of_the_peoples.36.b: "Samo Sloga Srbina Spasava, indeed!"
 
 VJV: "Vojvodina"
 VJV_ADJ: "Vojvodinian"

 je_bpm_recognise_minorities_name: "#bold #pink Recognize Minorities#!#!"
 je_bpm_recognise_minorities_desc: "Within the borders of our centuries-old #yellow Kingdom of Hungary#! live various nationalities and ethnic groups that have long formed a cultural mosaic.\n\nSome are #blue Slavs#! living in the north of our territories and in the southern border regions; others are [GetCulture('romanian').GetName]#yellow s#! living in [SCOPE.sCountry('bpm_transylvania').GetName]. [GetCulture('south_german').GetName]#yellow s#! are scattered throughout the country in cities and suburban areas, in [GetStateRegion('STATE_BANAT').GetName] and [GetStateRegion('STATE_TRANSDANUBIA').GetName]; and in various corners, there are also [GetCulture('ashkenazi').GetName] #yellow Jews#!, mainly in [GetStateRegion('STATE_SLOVAKIA').GetName].\n\nNow, in the age of liberal nationalism, these minorities — who also desire freedom, autonomy, and rights for their languages — are viewed with distaste. Some, such as the [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant] or [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant], argue that because they are Hungarian citizens, they must also learn Hungarian, not their local languages.\n\nAlthough we fear for the stability of the state, this burden on these nationalities will do far more harm than good."

 bpm_springtime_until_you_complete_this_obj_minorities: "Until you complete this #pink #bold Objective#!#!, you are vulnerable to unrest and uprisings by various #blue Slavic#! peoples ([GetCulture('slovak').GetName], [GetCulture('serb').GetName]) or [GetCulture('romanian').GetName] [Concept('concept_pop', 'Pops')]!"

 bpm_has_adressed_the_slovaks_demands: "Has adressed the concerns of the [GetCulture('slovak').GetName] people"
 bpm_has_squashed_the_serbian_revolution: "Has supressed the [GetCulture('serb').GetName] uprising in [SCOPE.sState('BPM_1848_vojevodina_state').GetName]"

 bpm_springtime_of_the_peoples.110.t: "Minorities Recognized"
 bpm_springtime_of_the_peoples.110.d: "Today, the final bill establishing moderate autonomy for the [GetCulture('serb').GetName] [Concept('concept_pop', 'People')] was introduced in parliament.\n\nPrevious bills concerned the [GetCulture('slovak').GetName] and [GetCulture('romanian').GetName] people, granting them broad autonomy, the right to use their own language in national schools and administration, personal rights, and other minor reforms.\n\nOther [Concept('concept_culture', 'Cultures')] were also granted freedom of education and instruction, as well as guarantees regarding language use.\n\nContrary to what many feared, [SCOPE.sCountry('hungary_country_scope').GetName] is stable and continues to thrive, with support of its loyal people."
 bpm_springtime_of_the_peoples.110.f: "I will never ever recognise another nation and nationality under the Hungarian holy crown than the Hungarian. I know that there are people and nationalities that speak another language, but there is one nation here and not more.\n\n— Lajos Kossuth, 1848"
 bpm_springtime_of_the_peoples.110.a: "This took far too much time..."

 bpm_springtime_every_state_acceptance: "[concept_acceptance] of [GetCulture('slovak').GetName], [GetCulture('serb').GetName] and [GetCulture('romanian').GetName] [Concept('concept_pop', 'Pops')] is #P improved#! in every [concept_state_region] we own"

 je_bpm_adress_the_slovaks_concerns_name: "#bold #blue Adress [GetCulture('slovak').GetName] Concerns#!#!"
 je_bpm_adress_the_slovaks_concerns_desc: "" # Ludzie, którzy zwą się Słowakami, żyjący na terenie Felvidek'u, zaczęli brać aktywny udział w polityce
  
 bpm_springtime_croatia_hungary: "@information! We will immedietely declare war and invade [SCOPE.sCountry('bpm_springtime_hungary').GetName]."

 bpm_springtime_croatia_will_may_invade_us_in_the_future: "The [GetCulture('croat').GetName]#yellow s#! may invade our country by declaring #red #bold war#!#! on [SCOPE.sCharacter('ferdinandy_the_first').GetFullName], #yellow King#! of [SCOPE.sCountry('hungary_country_scope').GetName], on behalf of [SCOPE.sCharacter('ferdinandy_the_first').GetFullName], #yellow King#! of [SCOPE.sCountry('croatia_slavonia').GetName]."

 bpm_springtime_will_invade_hungary_in_the_future: "We will be able to invade their country by declaring #red #bold war#!#! on [SCOPE.sCharacter('ferdinandy_the_first').GetFullName], #yellow King#! of [SCOPE.sCountry('hungary_country_scope').GetName], on behalf of [SCOPE.sCharacter('ferdinandy_the_first').GetFullName], #yellow King#! of [SCOPE.sCountry('croatia_slavonia').GetName]."
 

 je_bpm_invade_hungary_name_croat: "Invade Hungary"

 bpm_springtime_of_the_peoples.37.t: "The Croatian Ultimatum" 
 bpm_springtime_of_the_peoples.37.desc_croatia: "Those [SCOPE.sCountry('hungary_country_scope').GetAdjective] scoundrels, while striving to retain their independent right to oppress and rule over whomever they please, are also undermining Austria’s precious stability.\n\nThe demands to assume part of [SCOPE.sCountry('austria_country_scope').GetName]’s [Concept('concept_credit', 'Debt')] and to centralize the ministries of finance and war in #gold Wien#! were rejected by both the Hungarian Parliament and [SCOPE.sCharacter('BPM_prime_minister_batthyany').GetFullName] earlier at the conference.\n\nSince we have #gold Wien#!’s tacit support for our actions, we will be able to attack the Hungarians and put them in their place, and secure for ourselves broad rights and freedoms from their rule, and a secure empire."
 bpm_springtime_of_the_peoples.37.desc_hungary: "Today, following a meeting arranged by [SCOPE.sCharacter('ferdinandy_the_first').GetFullName] between [SCOPE.sCharacter('bpm_scope_jelacic').GetFullName] and [SCOPE.sCharacter('BPM_prime_minister_batthyany').GetFullName] in #gold Wien#!, an ultimatum was sent to our parliament.\n\nIn it, the still-disgruntled and likely overly royalist [SCOPE.sCharacter('bpm_scope_jelacic').GetLastName] repeated the demands he had previously presented to the [concept_politician]: he demanded that [SCOPE.sCountry('hungary_country_scope').GetName] assume part of [SCOPE.sCountry('austria_country_scope').GetName]’s [Concept('concept_credit', 'Debt')], and that the war and finance [Concept('concept_bpm_minister', 'Ministries')] of the entire Habsburg Empire be centralized in #gold Wien#!.\n\nNot only do such demands pose a threat to our politics and rights, but they also reek of greed and a strange @ig_reactionaries! #purple Austrophilia#!. He was also supposed to be removed over a month ago, no mediations included!\n\nThe answer remains: no!"
 bpm_springtime_of_the_peoples.37.f: "See you on the Drava.\nNo need to worry. See you on the Danube.\n\n— Last exchange between Lajos Batthyány and Josip Jelačić July 29th 1848"
 bpm_springtime_of_the_peoples.37.a: "Why is that idiot still a Ban?"
 bpm_springtime_of_the_peoples.37.b: "Alright. Well, then, blood shall be spilled!"

 bpm_springtime_croatia_beating_up_jelacic: "If we manage to #P defeat#! [SCOPE.sCharacter('bpm_scope_jelacic').GetFullName] in a few decisive [Concept('concept_battle', 'Battles')], we may be able to force him to retreat."

 bpm_springtime_of_the_peoples.38.t: "The Silent Manifesto"
 bpm_springtime_of_the_peoples.38.d: "We have heard that, nearly two weeks ago, at the urging and under pressure from [SCOPE.sCharacter('BPM_prime_minister_batthyany').GetFullName], [SCOPE.sCharacter('ferdinandy_the_first').GetFirstName] signed a manifesto in which [SCOPE.sCharacter('bpm_scope_jelacic').GetFullName] was replaced by [concept_general] #yellow János Hrabovszky#!, and Ban’s policies were condemned.\n\nHowever, this manifesto was not announced immediately.\n\nConsequently, our [GetCulture('croat').GetName] #yellow Sabor#! convened an extraordinary session, during which it was concluded that the entire nation must liberate itself by force and reinstate thousands of border troops.\n\nThe Ban soon calmed the fighting spirit through a letter, and rumors soon emerged that mediations would take place between [SCOPE.sCountry('hungary_country_scope').GetName] and us, all the way in #gold Wien#!."
 bpm_springtime_of_the_peoples.38.a: "We'll see how it goes."

 bpm_springtime_of_the_peoples.39.t: "Blood in Pannonia"
 bpm_springtime_of_the_peoples.39.d: "Today, Croatian troops have crossed the #gold Drava River#!, entering [SCOPE.sCountry('hungary_country_scope').GetAdjective] territory.\n\nAbout a week ago, Kaiser [SCOPE.sCharacter('ferdinandy_the_first').GetFirstName] sent a letter to Ban [SCOPE.sCharacter('bpm_scope_jelacic').GetLastName] revoking his dismissal, for which [SCOPE.sCharacter('bpm_scope_jelacic').GetFirstName] retaliated with today’s action.\n\nBan [SCOPE.sCharacter('bpm_scope_jelacic').GetFullName], on behalf of Ferdinand V, King of Croatia, declared war on Ferdinand V, King of Hungary."
 bpm_springtime_of_the_peoples.39.a: "To war!"

 if_we_defeat_the_croatians_x_times_they_will_retreat: "@information! If we #P defeat#! the forces of [SCOPE.sCountry('croatia_slavonia').GetName] in [GetGlobalVariable('bpm_springtime_jelacic_battles_left').GetValue|+0] consecutive [Concept('concept_battle', 'Battles')], the defeated #PB Croats#! will retreat beyond our borders, ending the war. You can track the battle count in the #springtime $je_springtime_of_the_peoples$#! [concept_journal_entry]!" 
 if_the_croats_take_pest_were_cooked: "@warning! However, if the #PB Croats#! capture [SCOPE.sState('BPM_1848_budapest_capital').GetName], we will be forced to sign a #red #bold terrible#!#! peace treaty, suffering immense losses — both political and social. We must not allow this to happen at any cost!" 
 if_we_defeat_the_croatians_x_times_new_war: "@warning! This war may break out again; if it does, we will likely find ourselves fighting a more powerful #red #bold enemy#!#!!"

 notification_bpm_1848_jelacic_invades_hungary_name: "#v The [SCOPE.GetRootScope.GetCountry.GetCustom('country_red_season_name')] Campaign#!" 
 notification_bpm_1848_jelacic_invades_hungary_desc: "Following earlier mutual threats of conflict, [SCOPE.sCharacter('bpm_scope_jelacic').GetFullName], Ban of [SCOPE.sCountry('croatia_slavonia').GetName], has invaded [SCOPE.sCountry('hungary_country_scope').GetName]."

 bpm_springtime_the_hungarians_have_refused_the_ultimatum: "The ultimatum issued to the [SCOPE.sCountry('bpm_springtime_hungary').GetAdjective] #yellow Diet#! was ignored or rejected"

 bpm_springtime_the_document_was_incorporated: "A document setting forth all the demands and needs of the #blue Slavs#! living in [ROOT.GetCountry.GetName], drafted by the #yellow Slavic Congress#! in #gold Prague#!, was incorporated into the [Concept('concept_bpm_constitutional_level', 'Constitution')] and [Concept('concept_law', 'Subsequent Legislation')]"

 je_bpm_invade_hungary: "Invade Hungary"

 bpm_springtime_austrian_army_is_bigger_than_hungary: "The [concept_army] of [SCOPE.sCountry('bpm_springtime_austria').GetName] and her [Concept('concept_ally', 'Allies')] and [Concept('concept_subject', 'Subjects')] is bigger than of [SCOPE.sCountry('bpm_springtime_hungary').GetName]"

 je_bpm_invade_hungary_austria_desc: "The #yellow Lands of the Crown of Saint Stephen#! — that is, [SCOPE.sCountry('bpm_springtime_hungary').GetName] — are a major thorn in our side. They are striving to secure the greatest possible independence from our authorities in #gold Wien#!, doing whatever they want and whatever they can.\n\nThey constitute an increasingly dangerous and volatile region of our empire, possessing their own [Concept('concept_law', 'Laws')], freedoms, reforms, and parliament; oppressing whomever they please — more specifically, national minorities — minorities who later come to us and beg for any kind of intervention.\n\nEveryone already knows that the modern state of the future is centralized, ensuring universal law, guaranteeing equality and representation.\n\nHow can we call ourselves modern when Hungary exists?"

 bpm_springtime_if_we_take_control_of_alflod: "@information! If we capture [GetStateRegion('STATE_CENTRAL_HUNGARY').GetName], the #P Hungarians#! will agree to sign a treaty that will strip them of many rights and benefits, while we and #gold Wien#! will gain many and various #P benefits#!!"
 bpm_springtime_if_we_lose_x_we_will_have_to_treat: "@warning! However, if we lose [GetGlobalVariable('bpm_springtime_jelacic_battles_left').GetValue|-0] [Concept('concept_battle', 'Battles')], we will have to retreat to #gold Wien#!, bringing the war to an end."
 
 bpm_springtime_battles_until_croatians_retreat: "Battles left until the #PB Croatians#! retreat: [GetGlobalVariable('bpm_springtime_jelacic_battles_lost_count').GetValue|+0]/[GetGlobalVariable('bpm_springtime_jelacic_battles_left').GetValue|+0]"

 bpm_springtime_battles_hungarian_defence: "Forradalom és Szabadságharc"

 bpm_springtime_of_the_peoples.40.t: "Szabadságharc..."
 bpm_springtime_of_the_peoples.40.d: "The time has come for a great and terrible trial.\n\nAustrian troops under the command of [concept_general] [SCOPE.sCharacter('windisch_gratz_character').GetFullName] have crossed the border to crush us and destroy the gains of #yellow March#! and #yellow April#!.\n\nNow, there will be no more compromises.\n\nWe must either win or perish a terrible death."
 bpm_springtime_of_the_peoples.40.f: "The policy of the house of Austria, which aimed at destroying the independence of Hungary as a state, has been pursued unaltered for three hundred years.\n\n— Lajos Kossuth, April 19th 1849"
 bpm_springtime_of_the_peoples.40.a: "We ought to win."

 

 
