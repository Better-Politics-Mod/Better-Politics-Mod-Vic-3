 # ALERTS
 alert_bpm_auth_shortage_name: "[Concept('concept_authority', 'Authority')] Shortage!"
 alert_bpm_auth_shortage_desc: "We have a shortage of [Concept('concept_authority', 'Authority')]. This happens at #v 80%#! [concept_bpm_state_exhaustion]. This means that [Concept('concept_bpm_state_collapse', 'Collapse')] can not be prevented by any means and removing [Concept('concept_bpm_state_collapse', 'Collapse')] and [Concept('concept_bpm_partisans', 'Partisans')] from our [Concept('concept_state', 'States')] will be impossible. Additionally, the shortage of authory applies the following effects to our country:\n[GetStaticModifier('bpm_auth_shortage').GetDesc]"
 alert_bpm_auth_shortage_hint: "Consider removing [Concept('concept_decree', 'Decrees')] or passing more restrictive [Concept('concept_laws', 'Laws')]. Investing more in the [GetInstitutionType('institution_police').GetName] [Concept('concept_institution', 'Institution')] may also help."
 alert_bpm_auth_shortage_name_action: "Politics Panel"

 alert_bpm_auth_high_exhaustion_name: "High [Concept('concept_bpm_state_exhaustion', 'State Exhaustion')]"
 alert_bpm_auth_high_exhaustion_desc: "Our [Concept('concept_bpm_state_exhaustion', 'State Exhaustion')] is reaching dangerous levels. As long as our [concept_bpm_state_exhaustion] is not over #v 80%#! of [concept_bpm_state_capacity], no negative effects will be experienced, however you should consider preventing further exhaustion gains if possible to avoid it going out of control."
 alert_bpm_auth_high_exhaustion_hint: "Avoid taking on unnecessary large [Concept('concept_war', 'Wars')] and finish those that you have already. Consider mobilizing smaller portion of your [Concept('concept_army', 'Army')] while increasing its size. Find out how to reduce the amount of [Concept('concept_radical', 'Radicals')] you are gaining to avoid having to use repressive measures. Try to avoid conquering too many lands at once to avoid having to suppress [Concept('concept_bpm_partisans', 'Partisans')] or, alternatively, grant these lands to a [Concept('concept_subject', 'Subject')] to manage them in your stead."
 alert_bpm_auth_high_exhaustion_action: "Politics Panel"

 alert_bpm_auth_high_exhaustion_critical_name: "Critical [Concept('concept_bpm_state_exhaustion', 'State Exhaustion')]!"
 alert_bpm_auth_high_exhaustion_critical_desc: "Our [Concept('concept_bpm_state_exhaustion', 'State Exhaustion')] has reached dangerous levels. As long as our [Concept('concept_authority', 'Authority')] is not in shortage, no negative effects will be experienced, however you should consider preventing further exhaustion gains if possible to avoid it going out of control."
 alert_bpm_auth_high_exhaustion_critical_hint: "$alert_bpm_auth_high_exhaustion_hint$"
 alert_bpm_auth_high_exhaustion_critical_action: "Politics Panel"

 alert_bpm_auth_army_costs_exhaustion_name: "High [Concept('concept_bpm_state_exhaustion', 'State Exhaustion')] from raised army!"
 alert_bpm_auth_army_costs_exhaustion_desc: "The amount of raised battalions you have is causing [Concept('concept_bpm_state_exhaustion', 'State Exhaustion')] gain to overwhelm its natural decay."
 alert_bpm_auth_army_costs_exhaustion_hint: "Make sure that the level of military mobilization you are enacting is adequate to the military tasks in question. If your [Concept('concept_bpm_state_exhaustion', 'State Exhaustion')] is too high to control, consider demobilizing some units or enacting a peace with your enemies."
 alert_bpm_auth_army_costs_exhaustion_action: "Army Panel"

 alert_bpm_auth_emboldened_movements_from_collapses_name: "[Concept('concept_political_movement', 'Political Movements')] Emboldened by [Concept('concept_bpm_state_collapse', 'Collapse')] and [Concept('concept_bpm_partisans', 'Partisans')]!"
 alert_bpm_auth_emboldened_movements_from_collapses_desc: "Our [Concept('concept_incorporated_state', 'Incorporated States')] with [Concept('concept_bpm_state_collapse', 'Collapsed Authority')] and [Concept('concept_bpm_partisans', 'Partisans')] increase [Concept('concept_activism', 'Activism')] of our [Concept('concept_political_movement', 'Political Movements')]."
 alert_bpm_auth_emboldened_movements_from_collapses_hint: "Make sure to get rid of [Concept('concept_bpm_state_collapse', 'Collapse')] and [Concept('concept_bpm_partisans', 'Partisans')] from our [Concept('concept_incorporated_state', 'Incorporated States')]. If you can not do it all at once, prioritize reducing their amount, as every state affected by these chaotic modifiers increases the [Concept('concept_activism', 'Activism')] of our [Concept('concept_political_movement', 'Political Movements')]."
 alert_bpm_auth_emboldened_movements_from_collapses_action: "Politics Panel"

 alert_bpm_state_about_to_collapse_name: "[concept_state]#gold s#! are about to [Concept('concept_bpm_state_collapse', 'Collapse')]!"
 alert_bpm_state_about_to_collapse_desc: "These [concept_state]#gold s#! have high [Concept('concept_turmoil', 'Turmoil')] and are about to [Concept('concept_bpm_state_collapse', 'Collapse')]:\n[GetScriptedGui('bpm_state_about_to_collapse_sgui').ExecuteTooltip(GuiScope.SetRoot(GetPlayer.MakeScope).End)]"
 bpm_state_is_about_to_collapse: "[SCOPE.sState('bpm_tt_sgui_state').GetName]"
 alert_bpm_state_about_to_collapse_hint: "Use relevant [Concept('concept_decree', 'Decrees')], such as [GetDecreeType('decree_violent_suppression').GetName] to prevent that from happening."
 alert_bpm_state_about_to_collapse_action: "State Panel"

 alert_bpm_collapsed_state_ignored_name: "[concept_state]#gold s#! have [Concept('concept_bpm_state_collapse', 'Collapsed')]!"
 alert_bpm_collapsed_state_ignored_desc: "These [concept_state]#gold s#! have experienced a [Concept('concept_bpm_state_collapse', 'Collapse')]:\n[GetScriptedGui('bpm_state_collapsed_sgui').ExecuteTooltip(GuiScope.SetRoot(GetPlayer.MakeScope).End)]"
 alert_bpm_collapsed_state_ignored_hint: "Increase [concept_bpm_state_capacity] and reduce [concept_bpm_state_exhaustion] to Restore Order."
 alert_bpm_collapsed_state_ignored_action: "State Panel"

 alert_bpm_partisans_ignored_name: "[SCOPE.GetRootScope.GetState.GetName] has [Concept('concept_bpm_partisans', 'Partisans')]!"
 alert_bpm_partisans_ignored_desc: "A [Concept('concept_state', 'State')] has [Concept('concept_bpm_partisans', 'Partisans')] resisting our occupation."
 alert_bpm_partisans_ignored_hint: "As long as our @aut! [Concept('concept_authority', 'Authority')] remains positive, this issue will be resolved without your direct intervention. Avoid taking on large territories in the meantime and make sure to watch out for [Concept('concept_bpm_state_exhaustion', 'State Exhaustion')]!"
 alert_bpm_partisans_ignored_action: "State Panel"

