l_english:

 ig_left_unionists: "Left Unionists"
 ig_left_unionists_desc: "The Left Unionists are a faction within a broader alliance called Unions des Oppositions. Composed mainly of so-called Doctrinaires, they seek to consolidate Belgium within a liberal interpretation of the constitution, complemented by interventionism, decentralization, and secularization. Although currently conciliatory, the need for profound reform is growing, which may result in splits. Prominent figures include Charles Rogier and Joseph Lebeau."

 ig_doctrinaires_belgium: "Doctrinaires"
 ig_doctrinaires_belgium_desc: "The Belgian Doctrinaires are a liberal faction within the Liberal Party. They are characterized by pro-professional moderation, decentralization, hostility toward socio-political reforms, and anti-clericalism. At the same time, they are divided on the issue of the role of the state in the economy. Famous figures of this faction include Charles Rogier, Joseph Lebeau, and Walthère Frère-Orban."

 ig_right_unionists: "Right Unionists"
 ig_right_unionists_desc: "The Right Unionists are a faction within a broader alliance called Unions des Oppositions. Representing right-wing liberal and Catholic thought, they generally seek to consolidate the Belgian state — while ensuring considerable power for the King, the Church, and the Village. Prominent figures include Jean-Baptiste Nothomb, Adolphe Dechamps, and Barthélémy de Theux."

 ig_constitutionalists_belgium: "Constitutionalists"
 ig_constitutionalists_belgium_desc: "Constitutionalists are a faction within the Conservative (Catholic) Party who, unlike the Ultramontanes, wholeheartedly want to maintain the existing constitution. They are generally conservative, with varying specific approaches to autonomy, nationalism, and socio-political reforms. Well-known politicians are Charles Woeste, Victor Jacobs and Auguste Beernaert."

 ig_conservative_unionists: "Conservative Unionists"
 ig_conservative_unionists_desc: "Conservative Unionists strive to develop the state within the framework of the prolonged Unions des Oppositions. This is to be based on the ideals of moderation, laissez-faire economics, and centralized power in the hands of the King. Well-known figures include brothers Henri and Charles de Brouckère."

 ig_catholic_liberals: "Catholic Liberals"
 ig_catholic_liberals_desc: "The idea of laissez-faire economics was also embraced by a considerable portion of Catholics, known as Catholic Liberals (not Liberal Catholics). They believe primarily in developing the economy through liberal-economic policy, maintaining the status of the Catholic Church, and moderation. Popular figures include Jules d'Anethan and Jules Malou."
  
 ig_ultraliberals: "Ultra-Liberals"
 ig_ultraliberals_desc: "Not all liberals from various schools joined the Unions des Oppositions. Some of them, called Ultra-Liberals, Radicals or Progressives, due to their distrust of Catholics, established themselves as a bastion of defense against the Catholic Church. Residing as a small group within the administration and in Masonic lodges, their strength is slowly growing as disappointment with the Union grows."

 ig_orangists: "Orangists"
 ig_orangists_desc: "The Orangists are a political and social movement seeking to restore Belgium as part of the Kingdom of the Netherlands. Consisting mainly of the urban bourgeoisie and believing in enlightened absolutism, free trade, and secularism, they find themselves oddly close to liberals. Pierre-Théodore Verhaegen is a famous figure from amongst their ranks."

 ig_ultramontanes: "Ultramontanes"
 ig_ultramontanes_desc: "Ultramontanes are a group of extremely conservative Catholic politicians who are distinguished by a high degree of clericalism, a certain nostalgia for guilds, and aspirations to maintain the decentralization of the state; sometimes they also question certain points of the constitution. They constitute a small force in the state, existing primarily in grassroots organizations and in the municipal administration."

 ig_provincial_liberals: "Provincial Liberals"
 ig_provincial_liberals_desc: "The Provincial Liberals are doctrinaire-liberal splinter groups who, considering the concept of Unionism obsolete, have ended their support for the government. They seek to end the Union and demand the creation of a homogeneous liberal cabinet and anti-clerical reforms. Their small size makes them a force really only in urban municipalities. Paul Devaux is a famous figure among them."

 ig_brussels_liberals: "Brussels Liberals"
 ig_brussels_liberals_desc: "The Brussels Liberals are a liberal faction that upholds the ideals of the Liberal Congress and Constitution, while remaining silent on education and questioning the need to improve the condition of the working classes. This faction is closely linked to the Liberal Association of Brussels, both led by Pierre-Théodore Verhaegen."

 from_opposition_to_unionism: "Opposition to Unionism"

 ig_lamennaisians: "Lamennaisians"
