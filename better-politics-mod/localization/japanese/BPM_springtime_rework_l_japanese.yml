 bpm_springtime_revolution_phase_victim: "The #springtime Revolution#! has inevetibly reached #gold [GetPlayer.GetCapital.GetCityHubName]#!, bringing chaos, unrest and death. @information! #bold We have entered the [concept_bpm_springtime_revolution_phase] as a [concept_bpm_springtime_victim_of_the_revolution]!#!"

 bpm_springtime_reaction_phase_victim: "The #springtime Revolution#! has inevetibly reached #gold [GetPlayer.GetCapital.GetCityHubName]#!, bringing chaos, unrest and death. @information! #bold We have entered the [concept_bpm_springtime_reaction_phase] as a [concept_bpm_springtime_victim_of_the_revolution]!#!"

 bpm_springtime_we_have_entered_reaction_phase: "The chaos of the #springtime Revolution#! has finally subsided, so the #purple #bold @ig_reactionaries! Reactionaries#!#!, no longer cowering, have begun preparations to retake power. @information! #bold We have entered the [concept_bpm_springtime_reaction_phase] as a [concept_bpm_springtime_victim_of_the_revolution]!#!"

 bpm_springtime_we_have_entered_revolution_phase: "The fighting spirit of the masses striving for justice is spreading at an astonishing rate, driving the #purple #bold @ig_reactionaries! Reactionaries#!#! back into their cowardly hiding places and spurring the people to action. @information! #bold We have entered the [concept_bpm_springtime_revolution_phase] as a [concept_bpm_springtime_victim_of_the_revolution]!#!"

 bpm_springtime_revolution_phase_victim_moderate: "The #springtime Revolution#! has inevetibly reached #gold [GetPlayer.GetCapital.GetCityHubName]#!, bringing unrest, petitions and activism. @information! #bold We have entered the [concept_bpm_springtime_revolution_phase] as a [concept_bpm_springtime_victim_of_the_revolution]!#!"

 bpm_springtime_reform_phase_victim: "We were able to avoid major demonstrations and the wrath of the #springtime Revolution#!. @information! #bold We have entered the [concept_bpm_springtime_reform_phase] as a [concept_bpm_springtime_victim_of_the_revolution]!#!"

 bpm_springtime_reform_phase_victim_entrance: "We have successfully subdued the might of the #springtime Revolution#!. @information! #bold We have entered the [concept_bpm_springtime_reform_phase] as a [concept_bpm_springtime_victim_of_the_revolution]!#!"

 

 bpm_springtime_of_the_peoples.4.t: "Viennese Märzrevolution"
 bpm_springtime_of_the_peoples.4.d: "It all began on #gold March 12th#! when a group of students passed a resolution demanding various freedoms and reforms.\n\nThe next day, on #gold March 13th#!, thousands of people gathered in front of the #yellow #L Standehaus#!#!, and later, aware of its reluctance to grant reforms, stormed the building. Soldiers opened fire, and the growing crowd defended itself with stones, later supported by barricades. Later, the Viennese bourgeoisie issued a petition-ultimatum, which was approved and [SCOPE.sCharacter('metternich_scope').GetLastName] agreed to resign.\n\nOn #gold March 14th#!, following the appointment of the hated #yellow #L von Windischgrätz#!#! and new demands, the Viennese crowds engaged in further clashes. Out of fear, the #yellow Kaiser#! and the #yellow Diet#! lifted [GetLawType('law_censorship').GetName] and formed the [GetLawType('law_national_guard').GetName], and promised a [Concept('concept_bpm_constitutional_level', 'Constitution')]."
 bpm_springtime_of_the_peoples.4.f: "My efforts have been in vain. And as I do not know how to steer a middle course, or to remain in a situation repugnant to my moral sense, I have retired from the scene.\n\n— Klemens von Metternich, March 14th 1848" # Too advanced in years to hope to witness the events which, according to my views, may ultimately put an end to the present crisis, it only remains for me to offer to my master and to my country the good wishes which I shall not cease to entertain for their inseparable happiness...
 bpm_springtime_of_the_peoples.4.a: "Oh no..." # Metternich? More like Matter-Nicht!

 notification_bpm_1848_the_vienna_revolution_name: "#v Märzrevolution in Wien!#!"
 notification_bpm_1848_the_vienna_revolution_desc: "Two days of fighting, gunfire, and barricades overall culminated in [SCOPE.sCharacter('metternich_scope').GetLastName]’s resignation, many liberal demands being met, and a promise to create a [Concept('concept_bpm_constitutional_level', 'Constitution')]."

 notification_bpm_1848_march_days_berlin_name: "#v Märztage in Berlin!#!"
 notification_bpm_1848_march_days_berlin_desc: "The failed attempt to clear the #yellow Schlossplatz#!, which was packed with happy crowds, resulted in barricades throughout #gold Berlin#! and hundreds of deaths. [SCOPE.sCharacter('king_willy_iv').GetFirstName] decrees liberalization and promises [Concept('concept_unification', 'German Unification')]."

 notification_bpm_1848_hungarian_revolution_new_name: "#v Revolution in Pest!#!"
 notification_bpm_1848_hungarian_revolution_new_desc: "Following unrest in #gold Vienna#!, the [SCOPE.sCountry('country_hungarian_revolution').GetAdjective]#yellow s#! have begun their own revolution, already gaining concessions." 

 notification_bpm_1848_the_april_laws_name: "#v Legyen béke, szabadság, egyetértés!#!"
 notification_bpm_1848_the_april_laws_desc: "After a month of work, legislation, and reforms, the process of drafting the so-called ‘#yellow April Laws#!’ has been completed in [SCOPE.sCountry('country_hungarian_revolution').GetName], entering a new era of constitutional rule."

 notification_bpm_1848_war_in_northern_italy_name: "#v L'Italia Farà da Se!#!"
 notification_bpm_1848_war_in_northern_italy_desc: "The #P Italian#! revolutionaries have struck while the iron is hot, and have successfully driven the #v Austrians#! out of [SCOPE.sState('1848_5_days_of_milan').GetName] and [SCOPE.sState('1848_san_marco_source').GetName] within six days."

 notification_bpm_1848_may_revolution_name: "#v Mairevolution in Wien#!"
 notification_bpm_1848_may_revolution_desc: "Crowds of #gold Viennese#! residents have forced the terrified [Concept('concept_government', 'Authorities')] to repeal the [Concept('concept_bpm_constitutional_level', 'Pillersdorf Constitution')], establish [GetLawType('law_universal_suffrage').GetName], and maintain the existance of the ‘#yellow Zentralkomitee#!’. Kaiser [SCOPE.sCharacter('emperor_austria').GetFirstName] has fled to #gold Innsbruck#!." 

 notification_bpm_1848_slavic_congress_name: "#v Slavic Congress in Prague#!"
 notification_bpm_1848_slavic_congress_desc: "The #yellow Slavic Congress#! has opened in #gold Prague#! with the aim of fostering cooperation among the #blue Slavic#! peoples and compiling their demands, so that they could later be peacefully presented to Kaiser [SCOPE.sCharacter('ferdinandy_the_first').GetFirstName]."

 notification_bpm_1848_barricade_days_name: "#v Barricade Days in [SCOPE.sCountry('bpm_our_capital').GetName]!#!"
 notification_bpm_1848_barricade_days_desc: "The attempt to weaken the revolutionary forces in #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#! in order to launch an early counterrevolution has ended in a humiliating defeat."

 bpm_springtime_of_the_peoples.5.t: "Forradalom..."
 bpm_springtime_of_the_peoples.5.d: "The enslavement of our nation comes to an end today.\n\nThis morning, on #gold March 15th#!, at the #gold Pilvax Coffee House#!, the poet #L #yellow Sándor Petőfi#!#!, the author #L #yellow Mór Jókai#!#!, and the philosopher #L #yellow Pál Vasvári#!#! formulated the ‘#yellow 12 points#!’, and the former recited ‘#yellow Nemzeti dal#!’.\n\nBefore noon, the gathered crowds set off for the printing house and printed thousands of copies of both texts. In the afternoon, despite the rain, thousands of people marched through #gold Pest#!, later gaining the support of the #L city council#!. In the evening, huge crowds made their way to #gold Buda#! and set out for the seat of the imperial authorities, who, frightened, yielded and allowed reforms, and released the writer [SCOPE.sCharacter('BPM_character_mihaly_tancsics').GetLastName]."
 bpm_springtime_of_the_peoples.5.f: "On your feet, Magyar, the homeland calls! The time is here, now or never! Shall we be slaves or free? This is the question, choose your answer! - By the God of the Hungarians We vow, We vow, that we won't be slaves any longer!\n\n— ‘#bold Nemzeti dal#!’ made by Petőfi Sándor, written on March 13th 1848"
 bpm_springtime_of_the_peoples.5.a: "On your feet, Magyar, the homeland calls!"

 bpm_springtime_of_the_peoples.6.t: "The April Laws"
 bpm_springtime_of_the_peoples.6.d: "Following the successful revolution of the previous month, Prime Minister [SCOPE.sCharacter('BPM_prime_minister_batthyany').GetLastName]’s [concept_government] began implementing the famous ‘#yellow 12 points#!’, approved by Kaiser [SCOPE.sCharacter('emperor_austria').GetFirstName].\n\nThese reforms include, among other things, #yellow Freedom of the Press#!, #yellow Democratization#!, a [GetLawType('law_national_guard').GetName], abolition of [GetLawType('law_serfdom').GetName], a #yellow #L national bank#!#!, #yellow #L equal rights#!#!, and much more.\n\nOur country has transformed into a constitutional monarchy, albeit with a strong emphasis on parliamentarism."
 bpm_springtime_of_the_peoples.6.f: "As the current National Assembly does not consider it its duty to deprive those who have hitherto exercised their political rights of such rights, all those who have hitherto been entitled to vote in the election of National Assembly deputies in the counties and free districts shall henceforth retain the right to exercise such rights.\n\n— Act V #bold On the Election of Deputies to the National Assembly on the Basis of Popular Representation#!, 1848" 
 bpm_springtime_of_the_peoples.6.a: "Great! Have the Croatians already implemented everything as instructed?"

 bpm_springtime_of_the_peoples.7.t: "Berlinese Märzrevolution"
 bpm_springtime_of_the_peoples.7.d: "Late in the morning of #gold March 18th#!, thousands of people gathered in front of #yellow Schlossplatz#!, where #yellow King#! [SCOPE.sCharacter('king_willy_iv').GetFirstName] appeared in public and announced a series of reforms.\n\nBut the crowd kept growing, so the [Concept('concept_army', 'Army')] was sent in to clear the square peacefully. However, in the chaos and desperation, someone fired two shots. Nearly a #L #yellow thousand barricades#!#! sprang up throughout #yellow Berlin#!, where artisans, workers, and the bourgeoisie began defending themselves against the army’s advance.\n\nA veritable battle for the city began, filled with bodies and spilled blood. At midnight, the King issued a proclamation titled ‘#yellow To My Dear Berliners#!’, however the capture of [concept_general] #yellow Möllendorf#! caused the withdrawal of the troops. Over 200 people were #red killed#!." # after speaking with [concept_general] #yellow Prittwitz#!,
 bpm_springtime_of_the_peoples.7.f: "It is now up to you, the citizens of my beloved hometown, to prevent a greater disaster. Know this: your king and most loyal friend implores you, by all that is sacred to you.\n— King Friedrich William IV in ‘#bold To My Dear Berliners#!’, March 19th 1848"
 bpm_springtime_of_the_peoples.7.a: "Was it all necessary?"

 bpm_as_the_king_promised_suffrage: "As the [Concept('concept_ruler', 'King')] promised, an [concept_bpm_decree_level] establishing the electoral law for the parliament tasked with drafting the [Concept('concept_bpm_constitutional_level', 'Constitution')] will be soon announced."

 
 bpm_springtime_of_the_peoples.8.t: "Prussian Electoral Law" 
 bpm_springtime_of_the_peoples.8.d: "As #yellow King#! [SCOPE.sCharacter('king_willy_iv').GetFirstName] had promised, the electoral law for the election of the parliament was enacted today; once convened, the parliament will begin work on a new constitution for [ROOT.GetCountry.GetName].\n\nThe electoral law has characteristics of [GetLawType('law_universal_suffrage').GetName]."
 bpm_springtime_of_the_peoples.8.f: "We, Frederick William, by the grace of God, King of Prussia, etc., etc.,\n\ndecree, after hearing Our loyal estates assembled in the United Landtag, upon the proposal of Our State Ministry, as follows:\n\n§ 1. Every Prussian who has attained the age of 24 and has not lost the full enjoyment of civil rights as a result of a final judicial decision shall be a voter with the right to vote in the municipality in which he has had his residence or place of abode for six months, provided that he does not receive public assistance for the poor.\n\n— Contents of the ‘#bold Wahlgesetz für die zur Vereinbarung der Preußischen Staatsverfassung zu berufende Versammlung#!’, April 8th 1848"
 bpm_springtime_of_the_peoples.8.a: "That should satisfy them, right?"

 notification_bpm_1848_greater_polish_uprising_name: "#v Jeszcze Polska Nie Zginęła!#!"
 notification_bpm_1848_greater_polish_uprising_desc: "As news of the successful revolution in #gold Berlin#! began to spread, the [GetCulture('polish').GetName] have started arming themselves and organizing to regain their independence, regardless of who they would have to fight."
 
 bpm_springtime_of_the_peoples.9.t: "The Poznań Uprising"
 bpm_springtime_of_the_peoples.9.d: "On the very same night that the people of #gold Berlin#! released two [GetCulture('polish').GetName] political prisoners — [SCOPE.sCharacter('bpm_karol_libelt').GetFullName] and [SCOPE.sCharacter('bpm_ludwik_mieroslawski').GetFullName] — upon hearing news of the #springtime Revolution#! in #bold Berlin#!, changes began in [SCOPE.sState('1848_posen_uprising').GetName] as if the region were no longer part of [ROOT.GetCountry.GetName].\n\nPeople began tearing down insignia, singing songs, organizing their own army and maintaining public order, and celebrating their freedom with their fellow countrymen.\n\n‘#yellow #L Komitet Narodowy#!#!’ was formed, which drafted a petition stating that the #yellow Grossherzogtum Posen#! would become independent in the event of German [concept_unification].\n\nAlthough the [concept_army] and police are trying to dampen the Poles’ ambitions, once news of the amnesty arrives, they will likely feel incomparably stronger and more empowered, and we will have to leave."
 bpm_springtime_of_the_peoples.9.f: "We, as Poles, with our own history and a completely different and distinct national spirit, neither wish nor are able to assimilate into the German nation; we neither wish nor are able to voluntarily consign our own lives — our homeland, so dearly paid for with the blood of our ancestors — to the grave of oblivion.\n\n— Komitet Narodowy, March 20th 1848"
 bpm_springtime_of_the_peoples.9.a: "We cannot let them break away!"
 bpm_springtime_of_the_peoples.9.b: "Jeszcze Polska nie zginęła!"
 

