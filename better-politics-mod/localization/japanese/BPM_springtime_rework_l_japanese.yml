 bpm_springtime_of_the_peoples.513.t: "The Revolution Fulfilled"
 bpm_springtime_of_the_peoples.513.desc_liberal: "The storm of the revolution and the militancy of the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] have already weakened too much for the angry masses to use [concept_bpm_springtime_revolutionary_disorder_events] and [Concept('concept_agitator', 'Agitation')] to create the threat of mob rule.\n\nAnd the forces of the [GetInterestGroupVariant('ig_reactionaries',GetPlayer).GetNameWithCountryVariant] have weakened too much to attempt to restore the old ancien régime.\n\nA new era of [concept_bpm_ig_is_liberal] ideals has dawned in our homeland, one of moderate reform, freedom, and unhindered development.\n\nSurely the rest of Europe, exhausted by the storm of revolution, will soon enter a period of peace and development with progress in mind, just like us."
 bpm_springtime_of_the_peoples.513.desc_democrat: "The tyranny and injustices of the past have been overcome.\n\nThere are no [Concept('concept_bpm_ig_is_monarchist', 'Monarchists')] [concept_in_opposition] that could drag us all back to the past. There is no ‘friend’ that could exploit the people for their own gain and arrogance.\n\nThe values engraved decades ago — #blue Liberté#!, #v Égalité#!, #red Fraternité#! — are now universal and eternal for us, and thanks to the trust and legitimacy of our citizens, we can move forward together toward a free Europe."
 bpm_springtime_of_the_peoples.513.f: "The cause of freedom is identified with the destinies of humanity, and in whatever part of the world it gains ground by and by, it will be a common gain to all those who desire it.\n\n— Lajos Kossuth, 1849"
 bpm_springtime_of_the_peoples.513.a: "No enemy will destroy us!"
 bpm_springtime_the_revolution_fulfilleed: "The Revolution Fulfilled"

 notification_bpm_1848_we_have_entered_the_reform_phase_name: "#v We have entered the [concept_bpm_springtime_reform_phase]!#!"
 notification_bpm_1848_we_have_entered_the_reform_phase_desc: "We were able to avoid major demonstrations and the [Concept('concept_bpm_springtime_wrath_of_the_revolution', 'Wrath')] of the #springtime Revolution#!"

 bpm_springtime_of_the_peoples.10.t: "Italy Falls!"
 bpm_springtime_of_the_peoples.10.d: "As news of the #springtime Revolution#! in #gold [GetPlayer.GetCapital.GetCityHubName]#! reached them, the Italians also rose up, launching the first skirmishes on #gold March 17#!.\n\nIn [SCOPE.sState('1848_5_days_of_milan').GetName], the so-called ‘#yellow #L Five Days of Milan#!#!’ began, during which the people of the provincial capital drove out our authorities and military, erecting over #L #yellow 1,000 barricades#!#! and establishing a provisional government.\n\nIn [SCOPE.sState('1848_san_marco_source').GetName], the people seized the #pink Arsenal#! and began to spread the spirit of revolution onto the mainland.\n\nTheir repugnant ideals are gaining widespread popularity among Italians of all social classes."
 bpm_springtime_of_the_peoples.10.f: "We are free, and we can take double pride in this, for we have attained our freedom without shedding a single drop of our own blood or that of our brothers...\n\n— Daniele Manin, March 22nd 1848"
 bpm_springtime_of_the_peoples.10.a: "Are we sure we're not gonna collapse soon?"
 bpm_springtime_of_the_peoples.10.b: "Long live the... Provisional Government!?"
 bpm_springtime_of_the_peoples.10.c: "Viva San Marco!"

 notification_bpm_1848_papal_constitution_name: "#v Statuto Fondamentale pel Governo temporale degli Stati di S. Chiesa#!"
 notification_bpm_1848_papal_constitution_desc: "With the advent of a wave of #springtime Revolutions#!, the liberal Pope [SCOPE.sCharacter('pope_pius_ix').GetFullName] has promulgated a new constitution for the Holy See."
 
 bpm_springtime_of_the_peoples.11.t: "Statuto Fondamentale pel Governo temporale degli Stati di S. Chiesa"
 bpm_springtime_of_the_peoples.11.d: "???"
 bpm_springtime_of_the_peoples.11.f: "Since we, though unworthy, act on earth as representatives of Him who is the Author of peace and the lover of charity, and by virtue of our supreme apostolate, we love and embrace all peoples and all nations with equal paternal affection.\n\n— Pope Pius IX, April 29th 1848"
 bpm_springtime_of_the_peoples.11.a: "Viva Pio IX! Viva la costituzione"

