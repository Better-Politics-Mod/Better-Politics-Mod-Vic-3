 Popa: "Popa"
 Tell: "Tell"

 bpm_springtime_of_the_peoples.54.t: "The Wishes of the National Party"
 bpm_springtime_of_the_peoples.54.d: "We have recently heard rumors of a document drafted in [SCOPE.sState('bpm_bukovina_state').GetName] by the criminal #yellow Mihail Kogălniceanu#!, titled ‘#yellow Dorințele partidei naționale în Moldova#!’.\n\nIn it, the [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant] demand the same things they did in #gold April#!, but now call for an even more powerful parliament, rights for towns and villages, and the unification of the principalities.\n\nUnfortunately for them, our eyes are wide open and protective of order."
 bpm_springtime_of_the_peoples.54.f: "The lord’s cruel rule, the lifting of all legal safeguards, the deprivation of liberty and property, locusts, cholera, the invasion of foreign armies, and other such calamities — which would have plunged any other nation into utter despair and anarchy — we have endured all these with sorrow, yet with patience; and the country, though without a government, still governs itself and by itself; for we cannot call a government that which limits its powers solely to imprisoning, punishing, and flogging left and right, without cause, without guilt, and without justice.\n\n— ‘#bold Dorințele partidei naționale în Moldova#!’, August 1848"
 bpm_springtime_of_the_peoples.54.a: "How sad!"
  
 bpm_springtime_prorecting_the_danubian_principalities_will_be_dangerous: "Any form of protection or tacit support for the reforms being carried out in the #yellow Danubian Principalities#! will undoubtedly provoke [SCOPE.sCountry('russia_scope').GetName]’s #red hostility#!. This could lead to a [concept_war] that is unlikely to end in our #P victory#!; but perhaps other [Concept('concept_great_power', 'Great Powers')] will take our side?"

 bpm_springtime_of_the_peoples.55.t: "Danger on the Danubian River"
 bpm_springtime_of_the_peoples.55.d: "With the outbreak of the #springtime Revolution#! in [SCOPE.sCountry('moldavia_scope').GetName] and [SCOPE.sCountry('wallachia_scope').GetName], and the departure of our consul from the latter out of fear, the Tsarist court began to consider what measures to take.\n\n[SCOPE.sCountry('wallachia_scope').GetName] is particularly dangerous, for it is there that the [Concept('concept_government', 'Provisional Government')] is most openly fighting against the [GetLawType('law_organic_regulation').GetName], disrupting the peace and undermining our influence.\n\nMoreover, they are trying to convince the [SCOPE.sCountry('ottoman_country').GetName] that they are friendly, and are very eager to make all manner of concessions to preserve the achievements of the #springtime Revolution#!."
 bpm_springtime_of_the_peoples.55.f: "The Danubian principalities are in fact an independent State under my protection; that solution may continue. Serbia may receive a similar form of government, and Bulgaria likewise; there is no reason that I know of why we should not make an independent State of that country.\n\n— Tsar Nicholas I, January 14th 1853" 
 bpm_springtime_of_the_peoples.55.a: "Nicely ask Porte to take care of the problem with us."
 bpm_springtime_of_the_peoples.55.b: "We shouldn’t risk foreign intervention."

 bpm_springtime_of_the_peoples.57.t: "Porte Supports the Principalities"
 bpm_springtime_of_the_peoples.57.d: "We have received a response from the [SCOPE.sCountry('ottoman_country').GetName].\n\nIt is a dangerous ‘#red no#!’, disguised as a kind concern for the protection of its own vassals, who not only ‘#red #L pose no threat#!#!’ but are also just as ‘#red #L moderate#!#!’ as the previous, deposed authorities.\n\nAccording to the Turks, nothing that is happening violates any treaties or agreements, undermines our or their influence, or disrupts the rule of [GetLawType('law_organic_regulation').GetName] in their permanent state."

 bpm_springtime_of_the_peoples.57.a: "War it is then."
 bpm_springtime_of_the_peoples.57.b: "We shouldn’t risk foreign intervention."

 bpm_springtime_of_the_peoples.58.t: "To Heck with Hecker"
 bpm_springtime_of_the_peoples.58.d: "Realizing their inability to pursue political goals both within our homeland and in #gold Frankfurt#!, the [GetInterestGroupVariant('ig_socialists',GetPlayer).GetNameWithCountryVariant], led by [SCOPE.sCharacter('bpm_springtime_hecker_uprising_char').GetFullName], decided after #yellow Joseph Fickler#!’s arrest that they must strive by force to establish a [GetLawType('law_parliamentary_republic').GetName].\n\nAnd so, today, on #gold April 13th#!, Mr. [SCOPE.sCharacter('bpm_springtime_hecker_uprising_char').GetLastName] gathered men into a militia and have began traveling through [SCOPE.sCountry('bpm_baden_scope').GetName] to cause chaos.\n\nAlthough, unfortunately for him, there are perhaps only a few hundred of these volunteers out of the thousands who were supposedly expected to show up, it is still a formidable force. The belief in [Concept('concept_bpm_springtime_revolutionary_disorder_events', 'Violence')] is still alive!"
 bpm_springtime_of_the_peoples.58.f: "By the entrails of the preachers, entrails of the preachers\nEntrails of the preachers hang the nobleman\nLet him hang and dangle, let him hang and dangle\nLet him hang and dangle hang him well, my friend\n\n— The ‘#bold Heckerlied#!’, ~1848"
 bpm_springtime_of_the_peoples.58.a: "He will hang!"

 notification_bpm_1848_hecker_uprising_name: "#v Lebt der Hecker noch?!#!"
 notification_bpm_1848_hecker_uprising_desc: "[SCOPE.sCharacter('bpm_springtime_hecker_uprising_char').GetFullName], believing that the [GetLawType('law_monarchy').GetName] ought to be overthrown by force to achieve united #grey Germany#!, has launched an uprising in [SCOPE.sCountry('bpm_baden_scope').GetName]."

 bpm_springtime_wrath_of_the_revolution.12.t: "One German Body"
 bpm_springtime_wrath_of_the_revolution.12.d: "With the #springtime Revolution#! in #gold Vienna#!, which swept away the [GetInterestGroupVariant('ig_reactionaries',GetPlayer).GetNameWithCountryVariant] and the entire system of past centuries, similar fears and dangers have begun to arise here as well.\n\nUnrestrained [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] and [GetInterestGroupVariant('ig_socialists',GetPlayer).GetNameWithCountryVariant] are conspiring, agitating, and cooperating; and having abandoned parliamentarianism, together with the desperate [Concept('concept_pop', 'Populaton')], they are preparing to destroy everything here as well.\n\nThe specter of the [concept_bpm_springtime_wrath_of_the_revolution] hangs over us."
 bpm_springtime_wrath_of_the_revolution.12.f: "Germany is now a field of corpses, but soon it will be a paradise. The German people are one body, and you are a member of that body. It does not matter where the corpse begins to twitch. When the Lord gives you his signs through the men through whom he leads the peoples from servitude to freedom, then rise up, and the whole body will rise with you.\n\n— Georg Büchner, July 1834"
 bpm_springtime_wrath_of_the_revolution.12.a: "May God protect us..."
 
 bpm_springtime_transfer_subjects_target_danube: "The [concept_war] will also target the [Concept('concept_subject', 'Subjects')] of [SCOPE.sCountry('moldavia_scope').GetName] and [SCOPE.sCountry('wallachia_scope').GetName], transferring them to our rule upon #P victory#!."

 war_of_the_danube: "The Danubian War"

 bpm_springtime_turkey_might_refuse_tt: "@information! The [SCOPE.sCountry('ottoman_country').GetName] might #bold #red refuse#!#! to invade the #yellow Danubian Principalities#! with us if they have been won over by the [GetCulture('romanian').GetName] revolutionaries."

 bpm_springtime_giving_up_influence: "Willingly Letting the Revolution Win"

 wallachian_counterrevolution: "Russo-Ottoman Counterrevolution"

 bpm_springtime_of_the_peoples.56.t: "The Danubian Principalities Question"
 bpm_springtime_of_the_peoples.56.d: "The matter of the #yellow Danubian Principalities#! is of great importance to us.\n\nWe have already fought many defensive wars over these territories and our influence there, and ultimately, in #gold 1831#!-#gold 32#!, we implemented the [GetLawType('law_organic_regulation').GetName] in those regions.\n\nThe #springtime Revolutions#! there, particularly in [SCOPE.sCountry('wallachia_scope').GetName], pose an open threat to the stability of relations among the parties involved.\n\nThe #green Russians#! are trying to push us toward [concept_war] with [SCOPE.sCountry('wallachia_scope').GetName], while the #yellow Romanians#! are making all sorts of quite satisfactory promises and taking various actions."
 bpm_springtime_of_the_peoples.56.f: ""
 bpm_springtime_of_the_peoples.56.a: "Maybe we can talk it all out."
 bpm_springtime_of_the_peoples.56.b: "The danger is too great, prepare for war!"
  
 bpm_springtime_wrath_of_the_revolution.11.t: "The Broken Eagle"
 bpm_springtime_wrath_of_the_revolution.11.d: "The Habsburg Empire, built over decades of effort and conquest, collapses and bows to the #springtime Revolution#!.\n\nWho would have thought that such a great state, the progenitor of the new world order after the #gold #bold French Revolution#!#!, could completely fall apart in just a month?\n\nIn the territories of the former empire where a power vacuum has emerged, local [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] and various opportunist [GetPopType('bureaucrats').GetName] have began to establish their own polities, [Concept('concept_government', 'Governments')] and #yellow Committees#!."
 bpm_springtime_wrath_of_the_revolution.11.f: "The entire German people must fight for their freedom. And that time, my fellow citizens, is not far off. The Lord has delivered the beautiful German land, which for many centuries was the most glorious realm on earth, into the hands of foreign and native oppressors, because the heart of the German people had strayed from the freedom and equality of their forefathers and from the fear of the Lord, because you had surrendered yourselves to the idolatry of the many petty lords, minor dukes and thumb-sized kings.\n\n— Georg Büchner, July 1834"
 bpm_springtime_wrath_of_the_revolution.11.a: "A.E.I.O.U. no more!"

 notification_bpm_1848_gebrochener_adler_name: "#v Gebrochener Adler!#!"
 notification_bpm_1848_gebrochener_adler_desc: "Following the establishment of a [GetLawType('law_parliamentary_republic').GetName] in [SCOPE.sCountry('1848_austria_country').GetName], the spirit of the #springtime Revolution#! has shattered the fallen Habsburg Empire into countless fragments."

 bpm_springtime_austria_collapse_italy: "Territories of [GetStateRegion('STATE_LOMBARDY').GetName]-[GetStateRegion('STATE_VENETIA').GetName] where #P Italians#! live will become [Concept('concept_country', 'Independent States')] with their own [Concept('concept_government', 'Governments')]"

 bpm_springtime_austria_collapse_bohemia: "Territories of [GetStateRegion('STATE_BOHEMIA').GetName] will create their own [Concept('concept_country', 'Independent State')]."

 bpm_springtime_austria_collapse_galicia: "[GetCulture('polish').GetName] and [GetCulture('ukrainian').GetName] revolutionaries will create a great and unified [Concept('concept_country', 'State')]"

 bpm_springtime_revolutionary_disorder.16.t: "Bureaucratic Particularism"
 bpm_springtime_revolutionary_disorder.16.d: "Local conservative [GetPopType('bureaucrats').GetName] and [GetPopType('aristocrats').GetName] in [SCOPE.sState('bpm_springtime_eveflav_bureaucratic_paricularism').GetName], taking advantage of the widespread [concept_bpm_springtime_revolutionary_disorder_events], have began to pursue their own policies independent of the [concept_government].\n\nGenerally, they are expanding their influence as much as possible, using [Concept('concept_institution', 'Institutions')], legal interpretations, bribery and force.\n\nSome are trying to gain a degree of autonomy from the authorities in #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#!, or to assure them that, as guardians of the [concept_law], they are fighting against [Concept('concept_radical', 'Social Radicalism')]."
 bpm_springtime_revolutionary_disorder.16.f: "Order! was Guizot's war-cry. Order! shouted Sebastiani, the Guizotist, when Warsaw became Russian. Order! shouts Cavaignac, the brutal echo of the French National Assembly and of the republican bourgeoisie. Order! thundered his grape-shot as it tore into the body of the proletariat.\n\n— Karl Marx, July 1st 1848"
 bpm_springtime_revolutionary_disorder.16.a: "Dangerous politics."
 
 bpm_springtime_local_bureaucratic_imperialism: "Local Bureaucratic Particularism"

 bpm_springtime_revolutionary_disorder.17.t: "Civic and Joyful Duties"
 bpm_springtime_revolutionary_disorder.17.d: "The #yellow Civil Guards#! in [SCOPE.sState('bpm_springtime_eveflav_civic_and_joyful_duties').GetName] are doing a good job... and are having a good time.\n\nAware that public safety is in no way threatened, the guards — composed mainly of [GetPopType('academics').GetName] — find opportunities for some innocent fun.\n\nWith ‘arrested’ lone citizens or other, equally amused #yellow Guardsmen#!, they take each other to the guardhouse and, in high spirits, drink whole bottles of [GetGoods('wine').GetName] or [GetGoods('liquor').GetName].\n\nThis small custom is becoming increasingly widespread, and in every other town the citizens enjoy themselves too."
 bpm_springtime_revolutionary_disorder.17.f: "Every solitary citizen whom we met late in the night was summoned with pompous phrases to ‘disperse’ and to betake himself to his ‘respective habitation’, or, if it pleased him better, to follow us to the guardhouse and have a glass of wine with us. Whenever we happened to run across a patrol not composed of students, but of citizens, we at once denounced them as a dangerous mob, arrested them and took them to the guardhouse, where with cheers for the new empire we drank as many glasses together as there were points of reform in the political programme.\n\n— ‘#bold The Reminiscences of Carl Schurz#!’, 1907-9"
 bpm_springtime_revolutionary_disorder.17.a: "So who's up for a glass of wine with me?"
 bpm_springtime_revolutionary_disorder.17.b: "They should be keeping law and order instead..."
 bpm_springtime_drunk_order: "Drunk Rule of Law and Order"
 bpm_springtime_drink_a_glass_of_wine_with_us: "Joyful Duties"

 bpm_springtime_revolutionary_disorder.18.t: "Newspaper Wars"
 bpm_springtime_revolutionary_disorder.18.d: "With the end of [GetLawType('law_censorship').GetName], interest in political and public life has skyrocketed.\n\nThis is most evident in [SCOPE.sState('bpm_springtime_eveflav_newspaper_wars').GetName], where a veritable [concept_war] has broken out among the newspapers.\n\nThe emerging needs of thousands of [Concept('concept_pop', 'Readers')] must be met by printing houses competing with one another for readers.\n\nTherefore, they strive to publish as many [Concept('concept_good', 'Copies')] as possible, as frequently as possible, as well as possible, and as loudly as possible, proclaiming their quality to every passerby and interested person."
 bpm_springtime_revolutionary_disorder.18.f: "The presses which the people build, you will never silence.\n\n— Johann August Wirth, January 1st 1832"
 bpm_springtime_revolutionary_disorder.18.a: "The only casualty here is the wood."

 bpm_springtime_newspaper_wars: "Warfare by Paper"

 bpm_springtime_wrath_of_the_revolution.13.t: "One and Great Germany"
 bpm_springtime_wrath_of_the_revolution.13.d: "A beautiful and momentous time has arrived for the history and future of #gold Germany#!.\n\nThe #springtime Revolutionar#! [Concept('concept_government', 'Provisional Government')], composed of [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] and [GetInterestGroupVariant('ig_socialists',GetPlayer).GetNameWithCountryVariant], following a series of #springtime Revolutions#! and the fall of many German monarchies, has announced the dissolution of the confederation of small states and the creation of a unified and [GetLawType('law_unitary').GetName] #gold Germany#!.\n\n#gold [SCOPE.sCountry('bpm_springtime_wrath_republican_state').GetCapital.GetCityHubName]#! is to be the capital of the new German Republic. All Germans rejoice with their brothers and sisters."
 bpm_springtime_wrath_of_the_revolution.13.f: "The Revolution must end and the Republic must begin. In our constitution, right must take the place of duty, well-being the place of virtue, and self-defense the place of punishment. Everyone must be able to act and live according to his own nature.\n\n— Georg Büchner, 1834" 
 bpm_springtime_wrath_of_the_revolution.13.a: "The whole body has risen!"

 bpm_springtime_unfied_germany_will_annex_all_german_states_besides_bohemia: "A unified and [GetLawType('law_unitary').GetName] #v Germany#! will annex all [GetCulture('north_german').GetName] and [GetCulture('south_german').GetName] [Concept('concept_country', 'Countries')] besides [SCOPE.sCountry('BPM_capital_state_of_bohemia').GetName]."

 bpm_springtime_unfied_italy_will_annex_all_the_countries_that_accepted_unification: ""

 bpm_springtime_italian_unification.26.t: "A Common Future"
 bpm_springtime_italian_unification.26.d: "Throughout #P Italy#!, there are cheers, beautiful demonstrations and parades, speeches, and celebrations on this truly flawless day.\n\nItalia, our homeland, will not be torn apart by decay and division; supported by the entire world, it has become the supreme unity, the mother of us all.\n\nMany have embraced the united [Concept('concept_bpm_constitutional_level', 'Constitution')] and made it their own, though pockets of resistance remain."
 bpm_springtime_italian_unification.26.f: "The poets dreamed that immortal fairies would wash away the wrinkles of old age from their faces with the ablutions and baths of miraculous waters, so that they would emerge from the magical river beautiful with renewed youth. May Italy, our beloved land, do the same.\n\n— Emilo Brioglio, September 27th 1848#!"
 bpm_springtime_italian_unification.26.a: "She did it all herself!"

 bpm_info_if_counterrevolutionary_preparadness_not_100_revolution_german_tt: "@information! #bold However#!, if this progress bar never reaches #v 100%#! and we haven’t entered the [concept_bpm_springtime_reform_phase] within the next #v 1 month#!, the @ig_radicals! @ig_socialists! #bold #pink Democrats#!#! will either stage their own revolution, assassinate a member of the [concept_government], or force the [concept_ruler] to flee — and successfully proclaim a [GetLawType('law_parliamentary_republic').GetName]! This small amount of time left is due to [SCOPE.sCountry('1848_austria_country').GetName] being the cataclyst."

 bpm_springtime_counter_revolution.5.t: "A Revolution from Above?"
 bpm_springtime_counter_revolution.5.d: "Among the various [GetPopType('aristocrats').GetName], [Concept('concept_general', 'Generals')], and other members of the political elite — now effectively in political exile — a certain idea has emerged. An opportunity.\n\nWhat if... they were to align themselves with the existing system in order to use it to combat [Concept('concept_bpm_ig_is_liberal', 'Liberalism')] and win over the support of the [Concept('concept_bpm_springtime_revolutionary_drift', 'Masses')], ultimately bringing about a [Concept('concept_bpm_springtime_counterrevolutionary_preparadness', 'Reaction')]?\n\nIs this even possible or acceptable?" 
 bpm_springtime_counter_revolution.5.f: "The socialist elements, which unhappily for our times have fallen into the hands of political radicalism, must be divorced from it. The proletariat as such is far from republican, although this is a very popular error. Any form of government which defends its interests boldly and wisely, which advocates the progressive income tax, the system of poor relief, the regulation of conflicts between capital and labor, will have ‘the common man’ on its side and thus a powerful force. This is admittedly a dangerous course, but what is not dangerous right now?\n\n— Joseph von Radowitz, March 28th 1848"
 bpm_springtime_counter_revolution.5.a: "For [SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle] and country!"
 bpm_springtime_counter_revolution.5.b: "Traditional ways don’t reek, unlike this."

 bpm_springtime_we_are_playing_as_the_counterevolution_tt: "@information! You will be playing as the @ig_reactionaries! #bold #purple Reactionaries#!#!."
 
 bpm_springtime_possible_buttons_tt: "@information! As the [Concept('concept_bpm_springtime_reaction_phase', 'Reaction')], you will be able to prepare a truly popular ‘#yellow Revolution from Above#!’ with the use of various buttons in the #springtime $je_springtime_of_the_peoples$#! [concept_journal_entry], which will help to increase your [concept_bpm_springtime_counterrevolutionary_preparadness] gain." # 
 bpm_springtime_counterrevolution_outcome: "@information! A successful [Concept('concept_bpm_springtime_counterrevolutionary_preparadness', 'Counterrevolution')] will bring a liberal-conservative [Concept('concept_bpm_constitutional_level', 'Constitution')]. It may also bring back some of the abolished #springtime Privileges#! (#italic [Concept('concept_amendment', 'Amendments')]#!), and the ones you promise to bring back yourself."
 bpm_springtime_wrath_of_the_revolution_possible: "@warning! The emergence of the [concept_bpm_springtime_wrath_of_the_revolution] will also be more likely!"
