 bpm_springtime_peasant_revdrift_change_big_increase: "Certain decisions, such as improving the [concept_sol], abolishing #springtime Privileges#!, or addressing injustices, will increase support in the countryside. Therefore, [concept_bpm_springtime_revolutionary_drift] of @rural_folk! #green Peasants#! has #P significantly increased#!!"

