l_english:
  bpm_postrev_events.1.t: "[SCOPE.gsInterestGroup('targeted_interest_group').GetName] Supports the Revolution"
  bpm_postrev_events.1.d: "After taking note of recent developments, members of the [SCOPE.gsInterestGroup('targeted_interest_group').GetName] have decided to change their stance on the Revolution, choosing to support it. They have immediately made their Factional demands known."
  bpm_postrev_events.1.f: "“This Revolution is nothing but the precursor of another revolution, one that will be greater, more solemn, and which will be the last.”"
  bpm_postrev_events.1.a: "The more the merrier..."
  bpm_postrev_events.2.t: "[SCOPE.gsInterestGroup('targeted_interest_group').GetName] Opposes the Revolution"
  bpm_postrev_events.2.d: "After taking note of recent developments, members of the [SCOPE.gsInterestGroup('targeted_interest_group').GetName] have decided to change their stance on the Revolution, choosing to oppose it."
  bpm_postrev_events.2.f: "“This Revolution is nothing but the precursor of another revolution, one that will be greater, more solemn, and which will be the last.”"
  bpm_postrev_events.2.a: "Those snakes..."