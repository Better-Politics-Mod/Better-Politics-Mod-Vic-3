 je_bpm_swiss_regeneration: "Regeneration"
 je_bpm_swiss_regeneration_reason: "Switzerland is in dire need of regeneration and renewal. It is an outdated confederation composed of many cantons that function as independent states. Many of these cantons are rife with injustice, the church, lack of freedom, and even limited democracy. The revolutions — the regeneration of 1830-31 — did not equalize the entire country from the bottom up, and the reform attempts of 1832 were unsuccessful. In order to move forward, Switzerland must throw off the yoke of the confederation.\n\nSwitzerland has entered the so-called ‘era of regeneration’, in which many groups will fight to impose their will on the rest of the country and even the entire [GetLawType('law_confederated').GetName] state, whether they be the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] and their @ig_liberals! #yellow Moderate#! brethren, the [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetName], the [GetInterestGroupVariant('ig_reactionaries',GetPlayer).GetName], or their @ig_christian_democrats! #yellow Catholic#! counterparts.\n\n#lore Switzerland was in need of regeneration and was ready for it, but it required a powerful, painful display of force to make it a happy reality.\n\n— Johann Jakob Rüttimann, 1847#!"
 je_bpm_swiss_regeneration_status: "Bloody antagonism is on the rise."
 
 BPM_switzerland_has_had_sonderbund_war_tt: "The #L #blue Sonderbund#!#! was #red #v defeated#!#!!"

 bpm_switzerland_flavour.1.t: "The Strauss Affair (Straussenhandel)"
 bpm_switzerland_flavour.1.d: "Today the Zürich [concept_government], led by #yellow Melchior Hirzel#!, offered a professorship to a German theologian named #yellow David Friedrich Strauss#!. In #gold 1835#!, #yellow Strauss#! published a book called ‘The Life of Jesus’, in which he attempted to liberate the figure of Jesus from biblical legends and present the most verified information and facts in their place.\n\nThe reaction of good country folk is great, and this controversial decision is already being loudly questioned and protested."
 bpm_switzerland_flavour.1.f: "The Jesuits are the radical cure against Straussism.\n\n— Josef Leu von Ebersol, 1840"
 bpm_switzerland_flavour.1.a: "And so what?"
 BPM_some_speak_of_rebellion: "@warning! #red Strauss’s appointment will be met with a reaction from the locals!#!"

 bpm_zuriputsch: "Züriputsch"
 
 bpm_switzerland_flavour.2.t: "The Züriputsch"
 bpm_switzerland_flavour.2.d: "After #yellow Strauss#!’s appointment as professor, protest meetings were held in churches in spring. A few months later, in Kloten, near Zürich, the opposition gathered in a mass meeting where he was condemned.\n\nFour days later, thousands of armed protesters singing songs and hymns marched into Zürich. Led by [SCOPE.sCharacter('bpm_zuriputsch_leader').GetFullName], they demanded Strauss’s removal.\n\nCouncilor #yellow Johannes Hegetschweiler#! attempted to mediate between the mob and the government, but ended up being shot in the head. The Zürich government capitulated, resigning and calling for new elections. [GetInterestGroupVariant('ig_liberals',GetPlayer).GetName] are expected to win."
 bpm_switzerland_flavour.2.f: "You, Jesuit, false man of God\nHow come no bullet's struck you yet?\nYou, who's destroying Switzerland\bYou, villain killing liberty\bYou now must go, you beast from hell...\n\n— Anynomous Zürich high school student’s poem, 1844"
 bpm_switzerland_flavour.2.a: "An unnecessary victim..."

 bpm_switzerland_flavour.3.t: "Aargau Monastery Dispute"
 bpm_switzerland_flavour.3.d: "This day, the [concept_government] of the #yellow Canton of Aargau#! dissolved all monasteries, seizing their lands and property. This decision has already been met with protests.\n\nIt was preceded by the victory of the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetName] and their support by [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetName] and @ig_christian_democrats! #yellow Liberal Catholics#!. As part of secularization, the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetName] also sought to overturn the so-called ‘parity system’, which required equal representation of Catholics and Protestants; instead, only the number of votes now decides who is a part of the Grand Council."
 bpm_switzerland_flavour.3.f: "You, Jesuit, false man of God\nHow come no bullet's struck you yet?\nYou, who's destroying Switzerland\bYou, villain killing liberty\bYou now must go, you beast from hell...\n\n— Anynomous Zürich high school student’s poem, 1844"
 bpm_switzerland_flavour.3.a: "That's unconstitutional!"

