 bpm_consolidation_of_the_state_desc: "" # Consolidation Progress

 bpm_belgian_law_events.1.t: "Municipal and Provincial Laws"
 bpm_belgian_law_events.1.federated: "The law organizing #yellow Municipalities#! passed through the [ROOT.GetCountry.GetAdjective] Parliament, having been under discussion since #gold 1834#!; a month later, the law organizing #yellow Provinces#! was passed.\n\nThese laws give broad powers to municipalities, allowing them to manage local taxes, militia, and police, as well as subsidies for schools, churches, and organizations.\n\nIn addition, it was established that #yellow burgomasters#! and #yellow aldermen#! are appointed by the King exclusively from among the municipal council."
 bpm_belgian_law_events.1.devolved: "The law organizing #yellow Municipalities#! passed through the [ROOT.GetCountry.GetAdjective] Parliament, having been under discussion since #gold 1834#!; a month later, the law organizing #yellow Provinces#! was passed.\n\nThese laws give broad powers to municipalities, allowing them to manage local taxes, militia, and police, as well as subsidies for schools, churches, and organizations.\n\nAfter many sessions and debates, the Prime Minister convinced many [GetInterestGroupVariant('ig_conservatives',GetPlayer).GetNameWithCountryVariant] to push through the amendment giving the #gold King#! the right to appoint #yellow burgomasters#! and #yellow aldermen#! from outside the municipal council, in exchange for an amendment on the fragmentation of districts. This amendment fragments the electoral districts for municipalities with a population of more than 12.000, which takes away a significant amount of liberal representatives in the municipalities."
 
 bpm_belgian_law_events.1.f: "The government has the right to count on the mayor's cooperation and support, on his commitment to order, on his zeal in fulfilling his important duties: even assuming that the mayor does not directly oppose the government, the mere inertia of this official can prevent the higher authority from acting and disturb public order. How can you expect the government, in difficult situations, to be obliged to employ a man in whom it has no confidence?\n\n— Antoine Ernst, July 24th 1834"
 bpm_belgian_law_events.1.a: "Finally, this took far too long!"

 bpm_organizing_municipalities: "Implementing the Municipal & Provincial Laws"

 bpm_codifying_elected_bureaucrats: "[concept_bpm_codification] of [GetLawType('law_elected_bureaucrats').GetName] is set to [concept_bpm_legal_level]"

