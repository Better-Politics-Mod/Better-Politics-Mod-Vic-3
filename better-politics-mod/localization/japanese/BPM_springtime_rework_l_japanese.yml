 bpm_codification_decree_support_from_guaranteed_liberties: "constitutional freedoms and rights"
 bpm_codification_decree_support_from_springtime: "It is Springtime of the Peoples"

 notification_bpm_1848_pellegrino_rossi_assassination_name: "#v [concept_politician] [SCOPE.sCharacter('bpm_springtime_pellegrino_rossi').GetFullName] Assassinated in [SCOPE.sCountry('bpm_our_capital').GetName]!#!"
 notification_bpm_1848_pellegrino_rossi_assassination_desc: "The [concept_bpm_springtime_wrath_of_the_revolution] led an unknown assailant to assassinate with a knife the well-known politician and liberal [SCOPE.sCharacter('bpm_springtime_pellegrino_rossi').GetFullName]."

 bpm_springtime_of_the_peoples.29.t: "[SCOPE.sCharacter('bpm_springtime_pellegrino_rossi').GetFullName] Assassinated!"
 bpm_springtime_of_the_peoples.29.d: "The well-known [concept_politician] and [concept_bpm_minister] [SCOPE.sCharacter('bpm_springtime_pellegrino_rossi').GetFullName] was murdered today.\n\nHe was on his way to the opening of Parliament at the #gold Palazzo della Cancelleria#!, and after stepping out of his carriage on his way to the entrance, an unknown man stabbed [SCOPE.sCharacter('bpm_springtime_pellegrino_rossi').GetLastName] in the neck with a knife, killing him shortly thereafter.\n\nThe impact of his brutal death did not affect the parliamentary proceedings, but the people of #gold Rome#! are singing and marching with joy, celebrating his death."
 bpm_springtime_of_the_peoples.29.f: "Blessed be the hand that stabbed the tyrant!\n\n— A part of the chant of Rome's crowds after the murder of Pellegrino Rossi, 1848"
 bpm_springtime_of_the_peoples.29.a: "How could they say that...?"

 notification_bpm_1848_roman_republic_proclaimed_name: "#v Viva la Repubblica Romana!#!"
 notification_bpm_1848_roman_republic_proclaimed_desc: "After Pope [SCOPE.sCharacter('the_pope').GetFullName] had fled, a [GetLawType('law_parliamentary_republic').GetName] was proclaimed in #gold Rome#!, soon under the leadership of [SCOPE.sCharacter('scope_giuseppe_mazzini').GetFullName]." # The Pope has fled to Gaeta, anticipating a republican uprisng in Rome.

 bpm_springtime_it_is_too_late_for_you_and_rossi: "#bold #red Now the [concept_bpm_springtime_wrath_of_the_revolution] will crush the entire [concept_country] and [SCOPE.sCharacter('our_beloved_ruler').GetFullName]!#!#!"
 bpm_springtime_wrath_of_the_revolution_has_killed: "The [concept_bpm_springtime_wrath_of_the_revolution] has fallen upon the both famous and infamous politician [SCOPE.sCharacter('bpm_springtime_pellegrino_rossi').GetFullName]. It is already too late for reforms and salvation. There is nothing we can do."

 IX: "IX"
 Pio: "Pio"

 bpm_springtime_buildup.12.t: "A Liberal Pope of the Future?"
 bpm_springtime_buildup.12.d: "Almost three weeks ago, the late [SCOPE.sCharacter('bpm_springtime_dead_gregory_xvi').GetFullName] (#v Pope Gregory XVI#!) passed away.\n\nThe election has been divided between absolutists, such as #yellow Luigi Lambruschini#!, and liberals and other moderates. The former sought to maintain a strong policy of papal absolutism, while the latter sought to introduce moderate reforms and changes.\n\nAt first, there were lengthy debates and great difficulty in reaching a decision and selecting a #yellow Pope#!. But after the liberals learned that the @ig_reactionaries! #purple Reactionary#! Cardinal #yellow Karl Kajetan von Gaisruck#! was traveling to #gold Rome#! with the aim of vetoing the candidacy of #yellow Giovanni Maria Mastai-Ferretti#!, they made a joint decision to vote for #yellow Mastai-Ferretti#!, who won.\n\nOn the evening of the second day, a signal of white smoke announced to the world the election of the new pope — #v Pius IX#!."
 bpm_springtime_buildup.12.f: "Give me an army that prays the Rosary and I will conquer the world.\n\n— Pope Pius IX"
 bpm_springtime_buildup.12.a: "Unexpected!"

 bpm_springtime_buildup.13.t: "The Spectre of Communism"
 bpm_springtime_buildup.13.d: "Today, on #gold February 21st#!, a political pamphlet was published anonymously by the @ig_socialists! #red Kommunistischer Arbeiterbildungsverein#!.\n\nThis 23-page pamphlet is titled ‘#yellow Manifest der kommunistischen Partei#!’, and is already being printed not only here in #gold London#! but is also reaching people abroad.\n\nIn it, two men named #yellow Karl Marx#! and #yellow Friedrich Engels#! present the foundations of their thought, criticize those like them, and proclaim the need to destroy everything by force."
 bpm_springtime_buildup.13.f: "A spectre is haunting Europe — the spectre of communism. All the powers of old Europe have entered into a holy alliance to exorcise this spectre: Pope and Tsar, Metternich and Guizot, French Radicals and German police-spies.\n\n— Preamble of the ‘#bold Manifesto of the Communist Party#!’, February 21st 1848"
 bpm_springtime_buildup.13.a: "How did they slip through?"

 notification_bpm_1848_communist_manifesto_name: "#v Working Men of All Countries, Unite!!#!"
 notification_bpm_1848_communist_manifesto_desc: "In #gold London#!, #yellow Karl Marx#! and #yellow Friedrich Engels#! have written the ‘#red Manifesto of the Communist Party#!’, introducing the world to a radical philosophy."

 bpm_springtime_buildup.14.t: "Metter-nicht"
 bpm_springtime_buildup.14.d: "The echoes of the popular demonstrations on the #yellow Apennine Peninsula#! and the #springtime Revolution#! in [SCOPE.sCountry('sicilian_country_rev').GetName], despite our hopes and decisions, are beginning to be heard here as well. For the people — whether workers, artisans, or even the bourgeoisie — in #gold Vienna#! are beginning to whisper.\n\nAbout the need for ‘freedom’ and ‘equality’, about the need to overthrow [SCOPE.sCharacter('metternich_scope').GetLastName], about representation. Even the [GetPopType('peasants').GetName] are grumbling, exhausted by [GetLawType('law_manorialism').GetName] and [GetAmendmentType('bpm_amendment_peasant_taxes').GetName].\n\nThese whispers are growing louder; they are even appearing in hidden print. It is frightening when all these unequal people whisper!"
 bpm_springtime_buildup.14.f: "Too advanced in years to hope to witness the events which, according to my views, may ultimately put an end to the present crisis, it only remains for me to offer to my master and to my country the good wishes which I shall not cease to entertain for their inseparable happiness...\n\n— Klemens von Metternich, March 14th 1848"
 bpm_springtime_buildup.14.a: "Something bad is about to happen..."

 bpm_springtime_pope_pio_ix_liberal: "Liberal Pope Pio IX Himself"
 Rossi: "Rossi"

 bpm_springtime_of_the_peoples.30.t: "Pope [SCOPE.sCharacter('our_beloved_ruler').GetFullName] Flees to Gaeta"
 bpm_springtime_of_the_peoples.30.d: "Today, disguised as an ordinary priest, #yellow Pope#! [SCOPE.sCharacter('our_beloved_ruler').GetFullName] left #gold Rome#! and fled to the fortress at #gold Gaeta#! in the [SCOPE.sCountry('country_of_two_sicilies_scope').GetName].\n\nThis was caused by the growing threat of #springtime Revolution#! and the decline of his [concept_popularity]; #gold Rome#! has been filled with people singing songs praising the murder of #yellow Pellegrino Rossi#!, who had been killed nearly two weeks earlier, marching with tricolor flags and a pole bearing the assassin's bloodstained knife.\n\nThe chaos of the days following the [concept_politician]’s death — including night attacks on the #gold Quirinale Palace#! and the murder of a priest by a bullet to the chest — also prompted the #yellow Pope#! to flee"
 bpm_springtime_of_the_peoples.30.f: "We entrust to your known prudence and honesty to inform the minister Galletti, engaging him with all the other ministers not only to defend the palaces, but especially the persons near you that did not know Our decision. Because not only you and your family are dear to Our heart, We repeat they did not know Our thinking, but much more We recommend to those Sirs tranquillity and order of the whole City.\n\n— Pope Pius IX, November 24th 1848"
 bpm_springtime_of_the_peoples.30.a: "That's not great..."

 notification_bpm_1848_pius_ix_flees_to_gaeta_name: "#v Pope Pius IX Flees Rome!#!"
 notification_bpm_1848_pius_ix_flees_to_gaeta_desc: "As violence and riots broke out in Rome, Pope [SCOPE.sCharacter('our_beloved_ruler').GetFullName] has fled to the fortress of #gold Gaeta#!."

 bpm_springtime_wrath_of_the_revolution.5.t: "The Dangerous Specter of Revolution"
 bpm_springtime_wrath_of_the_revolution.5.d: "In our capital, #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#!, and in every corner of our country, tension persists and continues to grow.\n\nDespite the [concept_government]’s efforts, [concept_bpm_springtime_revolutionary_disorder_events] persist; too few reforms have been implemented and too few privileges abolished.\n\nAnd the authorities’ occasional overly conservative decisions foster widespread doubt regarding their capabilities, stability, and, above all, their legitimacy.\n\nEveryone... can tell that the existing world will soon #red collapse#!, and something #P beautiful#! will rise from its ruins. But what that will be, no one knows... "
 bpm_springtime_wrath_of_the_revolution.5.f: "The rule of the masses has begun in Europe, although they have not been trained to rule. They have freed themselves from the burdens, partly imaginary, partly real, which once oppressed them, and violent revolutions rapidly following one another have placed the reins of power in their hands. These masses, however, must still acquire the education needed for government, they must still acquire the measure of self-control necessary for the achievement of social purposes.\n\n— Gustav von Mevissen, 1850"
 bpm_springtime_wrath_of_the_revolution.5.a: "Something is brewing. Something very, very bad..."

 bpm_springtime_wrath_of_the_revolution.6.t: "[SCOPE.sCharacter('old_ruler_scope').GetFullName] Flees Amidst Violent Revolt"
 bpm_springtime_wrath_of_the_revolution.6.d: "This marks the end of our [GetLawType('law_monarchy').GetName], for following the violent demonstrations in #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#!, [SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('old_ruler_scope').GetFullName] fled the country.\n\nThese demonstrations were caused by the hostility and rebelliousness of the people, incited by the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant], who saw how much they were oppressed by the [Concept('concept_bpm_ig_is_monarchist', 'Monarchist')] [concept_government]; the situation was exacerbated by the call of the [concept_army] and #yellow Civil Guards#! to the capital, which led to the erection of barricades and a battle that the existing government could not handle.\n\nIt was replaced by a [Concept('concept_government', 'Provisional Government')], which proclaimed a [GetLawType('law_parliamentary_republic').GetName] and soon thereafter began preparations to [Concept('concept_bpm_decree_level', 'Decree')] [GetLawType('law_universal_suffrage').GetName] and call new [Concept('concept_election', 'Elections')].\n\nA new era in history is dawning for [ROOT.GetCountry.GetName]."
 bpm_springtime_wrath_of_the_revolution.6.a: "A dawn of a new age."

 bpm_springtime_wrath_of_the_revolution_has_fallen_upon_us: "@information! The [concept_bpm_springtime_wrath_of_the_revolution] has fallen upon us. Having built up over weeks and months of hostility and betrayed hopes, needs, and interests, it will be a force of immense power and destruction." 

 notification_1848_49_bpm_springtime_wrath_destroys_name: "#v Wrath of the Revolution Destroys [SCOPE.sC('bpm_our_capital').GetName]!#!" 
 notification_1848_49_bpm_springtime_wrath_destroys_desc: "The spirit of the #springtime Revolution#! turned into its [Concept('concept_bpm_springtime_wrath_of_the_revolution', 'Wrath')], and through force and bloodshed has destroyed the [SCOPE.sC('bpm_our_capital').GetAdjective] [GetLawType('law_monarchy').GetName], declaring a [GetLawType('law_presidential_republic').GetName] instead."

 bpm_springtime_wrath_of_the_revolution.7.t: "Freedom without Consequences"
 bpm_springtime_wrath_of_the_revolution.7.d: "Following the high-profile demonstrations in his homeland, [SCOPE.sCountry('bpm_our_capital').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('old_ruler_scope').GetFullName] fled #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#! under cover of night, disguised as a peasant, and went into exile.\n\nHe left the task of forming a [concept_government] to the renowned members of the [GetInterestGroupVariant('ig_liberals',GetPlayer).GetNameWithCountryVariant], [SCOPE.sCharacter('ig_liberals_prime_minister').GetFullName].\n\nBack home, the news of [SCOPE.sCharacter('old_ruler_scope').GetFirstName]’s cowardly escape has the country in an uproar, and there is even a sense of joy, as more and more [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] are beginning to proclaim the greatness of a [GetLawType('law_parliamentary_republic').GetName] and work toward its establishment."
 bpm_springtime_wrath_of_the_revolution.7.a: "It might be the end in a few months."

 bpm_springtime_revolutionaries: "Popular Revolutionaries"


 bpm_springtime_wrath_of_the_revolution.8.t: "Republic Declared After Discussions"
 bpm_springtime_wrath_of_the_revolution.8.d: "After our former monarch fled the country, social and political chaos reigned.\n\n[SCOPE.sCharacter('ig_liberals_prime_minister').GetFullName]’s [concept_government] struggled to maintain any support, and in the local elections in #gold [SCOPE.sCountry('bpm_our_capital').GetCapital.GetCityHubName]#!, organized by the citizens, the [GetInterestGroupVariant('ig_radicals',GetPlayer).GetNameWithCountryVariant] won by a landslide.\n\nThe new parliament was dominated by the bourgeoisie, which, however, had decidedly strong republican aspirations, while the former monarchists were in the minority.\n\nAnd so, in the joy of the early hours of the morning, the #yellow Constitutional Assembly#! proclaimed the establishment of a [GetLawType('law_parliamentary_republic').GetName]."
 bpm_springtime_wrath_of_the_revolution.8.f: "The revolution is dead. Long live the revolution!\n\n— Karl Marx, 1850"
 bpm_springtime_wrath_of_the_revolution.8.a: "Long live the revolution!"

 bpm_universal_suffrage_traditional_tt: "[ROOT.GetCountry.GetNameNoFlag] enables law [GetLawType('law_universal_suffrage').GetName] with [concept_bpm_traditional_level] [concept_bpm_codification]"

 notification_bpm_1848_pope_pius_pulls_out_name: "#v [SCOPE.sCharacter('the_pope').GetFullName] Pulls Out!#!"
 notification_bpm_1848_pope_pius_pulls_out_desc: "Pope [SCOPE.sCharacter('the_pope').GetFullName] has announced his withdrawal from the #springtime $je_bpm_italian_war_of_independence$#!, causing him to lose significant popularity."

 bpm_springtime_of_the_peoples.31.t: "Non-semel"
 bpm_springtime_of_the_peoples.31.d: "Pope [SCOPE.sCharacter('the_pope').GetFullName], mindful of the grave threat posed by the army fighting in the #P Italian War of Independence#!, announced to the world during a papal consistory on #gold April 29th#! that the [SCOPE.sCountry('bpm_the_papal_states').GetName] were withdrawing from the war.\n\nAlthough [concept_general] #yellow Giovanni Durando#! continues to fight in northern Italy, effectively not withdrawing us from the war, the Pope’s [concept_popularity] has completely plummeted, and many are already shouting, ‘#red Tratidore!#!’"
 bpm_springtime_of_the_peoples.31.f: "Moreover, the aforementioned peoples of Germany could not really complain about Us if We were unable to curb the enthusiasm of Our subjects, who wished to applaud the feats accomplished against them in northern Italy and to join forces with the other peoples of Italy, inflamed, like the others, by love for their own nation. So much so that many other princes of Europe, far superior to Us in military strength, were themselves unable to resist the fervor of their peoples.\n\n— Pope Pius IX, April 29th 1848"
 bpm_springtime_of_the_peoples.31.a: "This is not going to end well."

 notification_bpm_1848_josip_jelacic_elected_as_ban_name: "#v Slava budi, gdi su naši!#!"
 notification_bpm_1848_josip_jelacic_elected_as_ban_desc: "The Croatian #yellow Sabor#! has elected [SCOPE.sCharacter('bpm_scope_jelacic').GetFullName] as #yellow Ban#!, and his election was confirmed by a decree issued by Kaiser [SCOPE.sCharacter('ferdinandy_the_first').GetFirstName]."

 Jelacic: "Jelačić"

 bpm_springtime_of_the_peoples.32.t: "A Proud, Illyrian Ban"
 bpm_springtime_of_the_peoples.32.d: "Today, on #gold March 23rd#!, following following his election by the Zagreb #yellow Sabor#!, Kaiser [SCOPE.sCharacter('ferdinandy_the_first').GetFirstName] issued a [concept_bpm_decree_level] appointing [SCOPE.sCharacter('bpm_scope_jelacic').GetFullName] as Ban of [SCOPE.sCountry('croatia_slavonia').GetName].\n\nHe is a well-known figure, a proponent of the Illyrian movement, and a supporter of moderate political and social reforms.\n\nHe is also a staunch Austrian loyalist, hostile to [SCOPE.sCountry('hungary_country_scope').GetName]’s centralist ambitions and #pink Magyarization#! efforts."
 bpm_springtime_of_the_peoples.32.f: "Being a son of the nation, being the supporter of liberty, and being subject to Austria, I am faithfully committed to the constitutional Emperor of the Empire and its Kings, and I long for a great, free Austria.\n\n— Josip Jelačić, 1848" # The Hungarian Government, as it is evident, would not like to agree on this; they insist on their separatist moves, which means they struggle to dismantle our Empire. It is the command of our duty and honour to go till the ultimate and to call for arms against them. And we, not sparing our wealth, blood and life, will stand for our rightful demands and sacred deeds.
 bpm_springtime_of_the_peoples.32.a: "Slava budi, gdi su naši!"

 bpm_springtime_we_shall_see_what_the_croats_think: "On #gold March 17th#!, we ordered the Croats to implement Hungarian [Concept('concept_law', 'Laws')] and [Concept('concept_law', 'Regulations')] in [SCOPE.sCountry('croatia_slavonia').GetName]. Since the last of the April laws took effect today, we should soon see the results of the work we expect from the Croats."

 bpm_springtime_of_the_peoples.33.t: "Zahtijevanja naroda" 
 bpm_springtime_of_the_peoples.33.d: "Today, on #gold March 25th#!, two days after [SCOPE.sCharacter('bpm_scope_jelacic').GetFullName] was appointed Ban, our Sabor adopted the ‘#yellow Zahtijevanja naroda#!’ (#v Demands of the People#!) — a list of the Croatian people’s demands and needs.\n\nThese include, among others: [GetLawType('law_universal_suffrage').GetName]; freedom of the press, speech, academia, and religion; equality and judicial reform; the abolition of serfdom; the establishment of a [GetBuildingType('building_university').GetName] in #gold Zagreb#!; the realization of the concept of the ‘#v Triune Kingdom of Croatia, Slavonia, and Dalmatia#!’; and a Croatian national currency.\n\nThese demands generally aim to establish an equal and autonomous [SCOPE.sCountry('croatia_slavonia').GetName] within the existing Habsburg Empire.\n\nWith the help of thousands of leaflets, this resolution is being distributed everywhere, and by the end of the month, the document is to be presented to the Kaiser."
 bpm_springtime_of_the_peoples.33.f: "1. Since we find ourselves in an extraordinary position, and it is necessary to restore the lawful state, that we have a lawful supreme head: therefore we have unanimously elected Baron JOSIP JELAČIĆ of Buzin as Ban of the Three-Fold Kingdom, a man in whom the entire nation places its trust, to whom the command of the border army and the right to convene the Diet are to be entrusted.\n\n— ‘Zahtijevanja naroda’, March 25th 1848"
 bpm_springtime_of_the_peoples.33.a: "A dream come true."

 bpm_springtime_of_the_peoples.34.t: "[SCOPE.sCharacter('bpm_scope_jelacic').GetLastName] Severs Ties with [SCOPE.sCountry('hungary_country_scope').GetName]"
 bpm_springtime_of_the_peoples.34.desc: "Today, #gold April 25th#!, Ban [SCOPE.sCharacter('bpm_scope_jelacic').GetFullName] announced the severance of all relations with the [SCOPE.sCountry('hungary_country_scope').GetAdjective] [concept_government] until such time as they are reestablished by the #yellow Sabor#! (#v which he said would happen#!), after having declared the ‘independence and equality’ of [SCOPE.sCountry('hungary_country_scope').GetName] and [SCOPE.sCountry('croatia_slavonia').GetName] on #gold April 19th#!.\n\nIn a decree to the kingdom’s administrative bodies, he ordered them not to accept any orders from Hungary, but instead to refer all matters to him as the ‘supreme head of the land’ by virtue of his sovereign authority."
 bpm_springtime_of_the_peoples.34.f: "4. Our national independence.\n5. Our own independent ministry responsible to our parliament, whose members should be people favorable to the people and of the new spirit of progress and freedom.\n\n— ‘Zahtijevanja naroda’, March 25th 1848"
 bpm_springtime_of_the_peoples.34.a: "Another step toward independence!"
 bpm_springtime_of_the_peoples.34.b: "What the hell are they thinking?"

 bpm_springtime_ss_the_hungarians_are_unlikely_to_like_that: "#red #bold The [GetCulture('hungarian').GetName]#yellow s#! are very, very unlikely to take that lightly!#!#!"
 bpm_springtime_ss_we_shall_take_action: "The #yellow Croats#!’ defiance is significant, but it is still something we can handle. So we shall speak with Kaiser [SCOPE.sCharacter('ferdinandy_the_first').GetFirstName] and his [concept_government] to elicit a #P response#! and prompt action from #gold Wien#!."

 bpm_amendment_institution_election_system: "Institutional System" 
 bpm_amendment_institution_election_system_desc: "The electoral system is based on a special property and educational census, under which voters select candidates from the institutions to which they belong. Householding peasants elect electors, who in turn elect representatives for the županija or regiments."

 bpm_springtime_of_the_peoples.35.t: "Parliamentary Electoral Order"
 bpm_springtime_of_the_peoples.35.d: "Today, #gold May 18th#!, Ban [SCOPE.sCharacter('bpm_scope_jelacic').GetFullName] issued an [concept_bpm_decree_level] regarding elections to the #yellow Sabor#!.\n\nDrafted on #gold May 13th#!, it establishes the rules and methods for how representatives are elected.\n\nIt works in such a way that institutions, such as counties or cities, receive a specific number of seats, and the ‘members’ of these institutions elect their own candidates.\n\n[GetPopType('peasants').GetName] elect representatives differently: householders elect electors, who then elect representatives of the županija or regiments."
 bpm_springtime_of_the_peoples.35.f: "10. The annual State Assembly shall alternate between Zagreb, Osijek, Zadar, and Rijeka.\n\n11. Thus, at the first upcoming and at all future State Assemblies, our people's representation (delegation) shall be based on equality without distinction of status.\n\n— ‘Zahtijevanja naroda’, March 25th 1848"
 bpm_springtime_of_the_peoples.35.a: "It’s almost equal!"

 notification_bpm_1848_demands_of_the_people_name: "#v ‘Zahtijevanja naroda#!’#!"
 notification_bpm_1848_demands_of_the_people_desc: "The Croats have declared their aspirations and needs, free from [SCOPE.sCountry('hungary_country_scope').GetName]."

 bpm_springtime_the_granicari: "The Graničari"

 serbian_revolution: "Serbian Revolution"

 notification_bpm_1848_may_assembly_and_serbian_revolution_name: "#v Samo Sloga Srbina Spasava!#!"
 notification_bpm_1848_may_assembly_and_serbian_revolution_desc: "Through the decisions of the #yellow May Assembly#!, the Serbs have launched their own revolution. To suppress it, the [SCOPE.sCountry('hungary_country_scope').GetAdjective]#yellow s#! are already beginning to mobilize."
 Rajacic: "Rajačić"
 Stevan: "Stevan"
